front:
  text: 欽定四庫全書御製樂善堂全集定本巻二十二
  hash: sha256:b225b9d3441a07ce0c49ddccb530f09faf6a386b0f02bc685294e81273fcf205
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0003_WYG_026-1a, image: WYG1300/WYG1300-0463a.png}
body:
  text: 古體詩熏香謡寳鴨昻頭綠雲吐湘簾㡬扇垂當户廣座風生六月涼水沉一片熏爐炷熏爐棐几清無埃芝印欲就光徘徊誰家才子紅蘭署何處佳人玉鏡臺篆絲細裊香烟散萬境都來參鼻觀主人日午正髙眠夢中留得殘香伴漁鄉曝網殘陽西落射柴扉漁翁盪槳前溪歸歸來枯栁扁舟繋長竿曝網溪風㣲風吹網眼千珠落網得魚歸兒共索老翁不與意非慳換取青錢供晩酌江鄉有酒更有魚一家長享豐年樂豐年樂雨後明霞抹林脚松隂午憇長松夏亦寒嘉䕃如張盖白石堪坐卧清泉流一派有時㣲風起瑟瑟泛虚籟繄余閒歩屧小憇松隂内枕簟延清芬濤聲凉可愛徙倚林泉間興寄雲霞外温泉荷花首夏荷葉纔田田温泉開花已如然六月池塘荷始盛温泉花謝餘青柄温泉水暖荷花早羣驚艶質凌波好那知消長不須時九夏未半先枯槁我欲乗興弄扁舟蒹葭青青壓㟁頭可憐荷花轉不若已作一段横塘秋聞雞起舞曲聞雞鳴中夜舞英雄志氣冲天宇聞雞鳴舞且歌功業未就可若何古來壯士多消磨待旦不寐空枕戈君不見士雅擊楫意慷慨越石清嘯胡兵退當年事蹟略相同恨不功成青史載題林朝鍇蒼松霜隼圖長松落落拏龍虬下暎清淺之碧流何来霜隼脫覊鞲高枝獨立態轉遒搏風羽翮横九秋電光閃閃輝雙眸挂壁直使燕雀愁啣泥怯上雕梁頭君不見將軍臂上軒勇氣饑飽由来受人制又不見王孫愛汝雪毛竒髙飛不得遭縛繋豈如幻化生綃裏厲爪秋空攫飛雉五方小兒謾張羅因風直欲凌雲起六月十四日聞蛩今年秋信早六月蛩已鳴月檻納凉天籟寂唧唧忽作三兩聲主人哦句繞徑行砌旁幽韻如共賡㡬度振羽音逾亮轉動經年離别情仰看踈梧魄影明銀河如練碧落横葛衾生寒羅幕静秋聲秋色今宵并卧月新月挂玉鈎露下空庭濕高懸緑湘簾盡放清光入桃笙漪翠浪桐風来習習獨卧看流螢千㸃星光集題趙文敏中峰懐浄土詩畫巻了得心如幻西天即東土多少念佛人覔佛在言語妙哉松雪翁筆意脫凡腐借問是佛非燈籠答露柱陌上桑離離陌上桑桑葉初染綠郎在姑蘇城妾在大隄曲相隔迢迢如萬里大隄秋冷芙蓉紫風光春去復秋来可憐郎心不可恃郎心風中燭妾志水中石願作白馬逐君行天宇寥寥覔無跡封鮓行曽聞陸氏子懐橘餉其親又聞陶氏母封鮓謹持身懐橘可云孝封鮓可云仁兒豈無母遺官物非濟貧卓哉陶士行其後為顯臣運甓久習勞分隂常所珍教子以義方湛氏真其倫疾風勁草金風颯沓至羣卉皆委靡豈無芳華姿時過不堪恃矯矯彼勁草特立秋原裏枝葉已蕭條堅心猶未死迴顧羣卉悲非甘衆所竒春和苟回煦願共芳菲時七夕篇白月皎皎欲上弦西風送爽侵帷筵秋聲秋色相婉孌撫景䇿杖庭梧前迢遥碧落横銀漢此夕雙星得相見脈脈盈盈一水間經年話别情何限桂宫雲帳罷龍梭羽盖初嚴欲渡河天下人間兩無異惟有今宵秋思多秋思綿綿亘今古離愁渺渺迷處所可憐羅幔暗驚秋不比尋常乞巧樓誰家砧杵傷獨宿何處邊笳淚欲流邊笳砧杵斷復續恨比蛛絲縈萬曲仙人掌上露華寒曝衣樓畔金颸肅天雞唱曙各東西榆影茫茫路更迷可知此夕雙星㑹便是當年古别離古風矗矗山頭峰忽為山下道汎汎水中萍倐作原上草何異人間世夢幻頻顛倒朱墨分貴賤彭殤齊夀天萬境何縈心瀟灑舒懐抱池水淡以深一泓秋月皎暮出城東門見彼耘田者傴僂畦壠間紅日正西下揮汗立片時薰風散平野指日卜西成篝車賽秋社還憂租稅重催廹不相假終嵗事辛勤農夫獲利寡黄金鏤為鈿明珠飾為珥裊裊瘦腰肢若不勝羅綺佳人命多蹇嫁與薄情子勸君覓封侯出門求金紫雖去萬里遥脉脉甘守此朝遊花陌間暮宿青樓裏終老迄無成妾身安所恃有客天一方遺我尺幅書開緘肅起拜如獲雙明珠還君以空函非緣友道疏相思在𠂻曲覼縷不能抒明月照髙樓上有窈窕人秋風冷蕙帯舞䄂欲生塵腸斷望斑騅心灰憶錦鱗叠我鴛鴦被收我芙蓉茵相思隔萬里羅帳為誰春獨樹少嘉䕃兩樹隂扶疎彼此相託藉春風擺葉初蘢葱森天宇綠影含綺疏雨露豈有私生理頗自殊忽然萎其一孤立等無徒草木尚如此交情慎莫渝秋風西北来庭砌凉以清玉魄映踈梧唧唧寒蛩鳴雙星在河漢新傷離别情誰家砧杵動良人方逺征而我晏然卧凉颸拂畵楹殘夢廻枕簟吟哦月影明細栁營行壁壘傳呼天子来將軍無令門不開介胄不拜識軍志棘門㶚上真兒戲君不見淮隂多多稱益善漢王夜入恣調遣從知持重勝多謀亞夫名望從兹顯掃平六國智不淺折檻行建章殿上垂龍裘槐里小令面請求願斷佞臣一人頭佞臣為誰安昌侯觸犯天威攀殿檻抛將血性塗肝膽免冠叩首老將軍却令遺直出屯坎嚴威忽霽迴春暄令勿完葺留斷痕徒教事後旌忠直何如聼取當時言寄衣曲綘河西亘天欲秋聲聲砧杵雜風流誰家少婦傷離别并剪裁衣明月樓新棉絮罷開香笈手把金針燈下泣舊衣棉少不禁寒新衣棉多線縫澁線縫澁衣寄遲夢中識得龍堆逺衣到愁過沍凍時詠塞上達蘭海蘭松木筆格迢遥絶塞隔萬里其間乃産海蘭松虬枝勁直傲霜雪盤盤偃盖蒼翠濃故人戍回言其畧懸知風景邊壌同開笈更贈我筆格云即此木已所攻視之脉理頗宻緻内黄外白如兩重磨礲光澤全天巧素莖幻出幽蘭崇背上題字選名句疑鏤玉葉鐫青銅吁嗟沙漠所生物何期得伴書齋中韵助揮毫楊栁月秀生覓句梧桐風芸窻宛覺添芬馥研山更似增玲瓏感君雅意恣吟玩良材樸斵思無窮觀刈秋露零場圃金風氣蕭索百榖已告成呼童庤錢鎛為地只盈畝頗可騐耕鑿届兹西成候䇿杖課收穫轉憶東作時雨暘卜時若入夏秀以實日中驅鳥雀念此終嵗勤亦得一朝樂園林喜空明爽氣侵簾箔撫景獨吟哦允矣興所託月夜泛舟西山斜照秋江暮東林乍湧銀蟾露隊隊歸鴉噪樹烟一葉扁舟凌晩渡風閃氷輪縷縷光波含玉鏡如如去長天一色望欲迷㸃㸃疎星堪計數髣髴河漢坐乗槎白榆茫茫夹兩路秋景寥蕭已可人更兼秋月明寒素便卧蘆花任所之何須更問歸来處招鶴行主人招鶴鶴不来雲中洒翮空徘徊徘徊有語不得訴一聲長唳告鶴媒翁家白石間蒼苔林園勝絶無塵埃飲啄更喜稻粱足翺翔無復駕鵞猜淡沲清池供暮浴迷離曉㟁衝烟開絶異華亭怨明月不殊瀛海棲瑶臺吁嗟不返胡為哉臞骨自知與世乖主人雖容奴僕恨不如小鳳巧語諧珍重深㤙從此去煙嶠茫茫不知處秋江曲送梁學士假歸省親秋江月印秋水明行人弄棹江上行帆指錢塘促離恨㕍来北塞多凄聲凄聲離恨何時已只為髙堂念遊子從知計日賦歸来繞膝承顔無限喜秋江㟁颭荻蘆花故鄉風物依然嘉慈親早慰門閭望再謁金門捲綘紗慕容垂慕容竒男子低頭初入鄴馬上歌丁零得預隂山獵髙繋白鼻騧共醉燕姬家燕山不知處健馬如飛去莫怪王景畧封劍用詭計早知未遂時已有虎狼志放燈曲中宵弄槳蘆荻洲幻成萬朶金蓮稠凉露涓涓月華白澄波㡬頃連天碧詩思因秋一快哉放燈滿湖歸去来待月銀河流素寒宵永簷牙挂樹疎無影石欄徙倚望金波時有金風送㣲冷瓊樓半開天際紅香熏睡鴨沉烟濃繡屏十二秋無色頻聼階前細語蛩蛩音留客為乆立寥空露重衣衫濕秋日泛舟西海金颸漾蘭渚霞光射明川兩㟁荻蘆花中流獨放船水氣含㣲冷棹破秋湖烟一派空明景與我相周旋憶我臨薫風輕舠弄清漣彈指九夏過秋水連長天擊檝暢吟懐鷺起横塘前題朱貞女傳卓哉朱氏賢女子柏舟矢志志不徙蔡公獨展大手筆質言傳紀書盈紙窈窕少長相公家笄年禮聘許適李李未昏姻中道捐女乃慟哭爺前跪兒已命字不可移兒未成婦不可死權衡生死兩塗間兒惟自盡兒心耳江頭秋冷水無波市中火煽房不燬貞心幸托蔡公傳傳存人亦歸蒿里伊余耳聞此事熟㡬年宛轉詩腸裏今朝檢傳作題詞題成凛凛秋風起鶴唳行長松落落經千嵗下有孤鶴石邊睡睡醒臨風唳一聲聲中無限幽憂思欲上松梢卧月明可憐剪却雙飛翅主人稻粱豈易餐獨歩青莎不得意漫誇衛國乗華軒空傳瑶島陪鸞馭争如野鶴不受覊飛止由心無箇事鳴鴈行洞庭葉落寒林空雁行斷續鳴金風烟波浩渺望無極好共銜蘆明月中流黄弱婦起長嘆銀河皎皎夜將半可憐鴻鴈尚知歸郎似斷蓬何處飛奕長夜苦無眠銀檠燈花落丁東漏聲寒風響葳㽔鑰消遣慿何物楸枰差可樂布子定規模就勢覘强弱棄取大小間幾許費忖度何須分勝負妙理應思索試從奕罷看本来無一着金籠鸚鵡曲芙蓉小苑曲欄東緑衣深貯黄金籠春来景色潑眼濃杏花㣲雨紅濛濛翠毛丹咮饒佳麗獨傍罘罳剪雙翅主家歌舞按凉州毎聞入破垂珠淚稻粱飽飲金籠裏不如饑飲壠頭水秋日過廣通寺鳴鞭御街過小憇招提境瀟灑松竹秋因風弄清影咫尺紅塵中便是山林景欲去夕陽西颯然衣袂冷西山下故宫曲蕭晨䇿馬西山足嵐氣纔分萬峰緑颯沓霜風冷野橋霏㣲露氣摇寒竹野橋寒竹接宫墻何年帝子黄金堂苔鎻雙扉人不見空餘寂寞山花香當時緑鬢承歡處燕巢蛇穴迷煙霧金牀文毯已成塵井欄想像梧桐樹華清宫殿絶鳴鑾建章萬户圖中看徘徊追賦前朝事蘚篆題碑字未殘瀛洲亭木天儲羣彦古蹟留芳馨咫尺樹石間舊結瀛洲亭清風振瑶席花影落階庭渺茫弱水遥荒唐白玉京誰知通仙籍不隔水盈盈院松四時色天籟萬古聲成器皆琳瑯裁詩或瑶瑛寄語亭中客莫負登仙名明窻秋影秋日上窻窻紙明閒庭梧竹紛縱横扶踈更復含凉籟為我乍作蕭騷聲霜林敗葉如染紫遥漏螺峰浄初洗引入文䟽弄影枝倍添一叚秋光美驄馬御史歌行且止避御史官道開驄馬来驄馬御史真雄才令行無阻厲風雷五日京兆誠惜哉民擁處驄馬去君不見鈎黨祻起玉石焚一時清流羣避路江臯曲蘭洲㶑灔春波緑十里横塘曲復曲歡跨青驄上大堤妾在吳船夜獨宿船頭恰見冶遊郎立馬贈我黄金璫還君金璫君莫惱不作錢塘蘇小小秋日同二十四叔父五弟遊玉泉諸名勝即事誌興用爽氣澄蘭沼秋香動桂林為韻十首秋光淡空碧蕭蕭天地朗令日勝遊招雙槳扁舟放倒影鴻鴈寒澄翠玻璃廣殘香度荷風颯然襟袖爽輕舸泝遥波荻㟁蒼茫意眼界淡烟光心宇澄秋氣便狎鷗鷺羣詎羡笙歌沸舊遊境頗諳兹遊足清味我聞好事者萬里勞攀登咫尺苟㑹心邱壑咸可慿草枯石岸出霜落溪光澄泊舟古寺邊欲覓浄名僧漁村互掩映遥矚凭䦨干三秋稻已熟空畦野水寒繁艶萎堤花幽香剰澗蘭最喜螺峰青不随時序殘層臺接曲阿梵宇凌霞曉紅舒野蓼花翠㸃殘蓮沼川泳而雲飛無心適魚鳥觸景樂相忘如遊寥廓表蕭晨歩名園况復值髙秋晴旭隔林上天宇嵐煙收長空浄如洗爽氣澄雙眸坐看衆木末如登百尺樓西風摇梧竹泠然泛笙簧石梁古月明華池淡冷光已見蒹葭白漫憶荷芰香妙哉嵇中散髙懐一嘯長雲日掩映間遥峰乍清聳霜染槲葉丹臨風枝亂動野鶴唳髙空忽被閒雲擁我亦棹歸舟明湖泛澒洞書帷捲午晴小山賦叢桂衣袂足清凉雲山復開霽故知素節佳况是神仙地即景暢襟抱陽烏已西逝凉風起天末落照掛疎林栖鴉噪樹杪寒烟濕衣襟勝遊那可戀逍遥本無心歸来坐明月蒼然暮色深題趙孟頫洗馬圖平郊拖邐迤一川寒且泚怪石刺波青槲林紅間紫奚官驅天閑盡就明波洗酡顔斜坐鞍奚童任指使計數約百千量材皆騄駬名駒志氣殊好境亦知喜或馳若龍飛或静若鴻止並驅争先後滚地烟塵起或牡求其牝或母乳其子亦有獨立者昂昂鬃上指駿馳千里遥怒破萬軍壘我聞李伯時畵馬夙擅美雪翁傳宗派妙意得神髓如遊汾漢間似歴渥洼裏是時金風奏郊外秋蒐始擬欲試金鞭一箭落雙雉御製樂善堂全集定本巻二十二
