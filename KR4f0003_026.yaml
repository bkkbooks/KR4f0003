front:
  text: 欽定四庫全書御製樂善堂全集定本卷二十二
  hash: sha256:99af7c1cf1dc1acd9a50efc0a4cddef75a890a928b6b5f25a5ffc9e006dc14f4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0003_WYG_026-1a, image: WYG1300/WYG1300-0463a.png}
body:
  text: 古體詩熏香謡寶鴨昻頭緑雲吐湘簾幾扇垂當户廣座風生六月涼水沉一片熏爐炷熏爐棐几清無埃芝印欲就光徘徊誰家才子紅蘭署何處佳人玉鏡臺篆絲細裊香煙散萬境都來參鼻觀主人日午正髙眠夢中留得殘香伴漁鄉曝網殘陽西落射柴扉漁翁蕩槳前溪歸歸來枯栁扁舟繫長竿曝網溪風微風吹網眼千珠落網得魚歸兒共索老翁不與意非慳換取青錢供晚酌江鄉有酒更有魚一家長享豐年樂豐年樂雨後明霞抹林腳松隂午憩長松夏亦寒嘉蔭如張蓋白石堪坐卧清泉流一派有時微風起瑟瑟泛虛籟繄余間步屧小憩松隂內枕簟延清芬濤聲涼可愛徙倚林泉間興寄雲霞外溫泉荷花首夏荷葉才田田溫泉開花已如然六月池塘荷始盛溫泉花謝餘青柄溫泉水暖荷花早羣驚艷質凌波好那知消長不須時九夏未半先枯稿我欲乘興弄扁舟蒹葭青青壓岸頭可憐荷花轉不若已作一段橫塘秋聞雞起舞曲聞雞鳴中夜舞英雄志氣沖天宇聞雞鳴舞且歌功業未就可若何古來壯士多消磨待旦不寐空枕戈君不見士雅擊楫意慷慨越石清嘯胡兵退當年事迹略相同恨不功成青史載題林朝鍇蒼松霜隼圖長松落落拏龍虬下映清淺之碧流何來霜隼脫羈鞲高枝獨立態轉遒搏風羽翮橫九秋電光閃閃輝雙眸挂壁直使燕雀愁銜泥怯上雕梁頭君不見將軍臂上軒勇氣飢飽由來受人制又不見王孫愛汝雪毛竒髙飛不得遭縛繫豈如幻化生綃裏厲爪秋空攫飛雉五方小兒謾張羅因風直欲凌雲起六月十四日聞蛩今年秋信早六月蛩已鳴月檻納涼天籟寂唧唧忽作三兩聲主人哦句繞徑行砌旁幽韻如共賡幾度振羽音逾亮轉動經年離别情仰看踈梧魄影明銀河如練碧落橫葛衾生寒羅幕靜秋聲秋色今宵并卧月新月挂玉鈎露下空庭濕高懸緑湘簾盡放清光入桃笙漪翠浪桐風來習習獨卧看流螢千點星光集題趙文敏中峰懷淨土詩畫卷了得心如幻西天即東土多少念佛人覔佛在言語妙哉松雪翁筆意脫凡腐借問是佛非燈籠答露柱陌上桑離離陌上桑桑葉初染緑郎在姑蘇城妾在大隄曲相隔迢迢如萬里大隄秋冷芙蓉紫風光春去復秋來可憐郎心不可恃郎心風中燭妾志水中石願作白馬逐君行天宇寥寥覔無迹封鮓行曽聞陸氏子懷橘餉其親又聞陶氏母封鮓謹持身懷橘可云孝封鮓可云仁兒豈無母遺官物非濟貧卓哉陶士行其後為顯臣運甓久習勞分隂常所珍教子以義方湛氏真其倫疾風徑草金風颯沓至羣卉皆委靡豈無芳華姿時過不堪恃矯矯彼徑草特立秋原裏枝葉已蕭條堅心猶未死回顧羣卉悲非甘衆所竒春和苟回煦願共芳菲時七夕篇白月皎皎欲上弦西風送爽侵帷筵秋聲秋色相婉孌撫景䇿杖庭梧前迢遙碧落橫銀漢此夕雙星得相見脈脈盈盈一水間經年話别情何限桂宫雲帳罷龍梭羽蓋初嚴欲渡河天下人間兩無異惟有今宵秋思多秋思綿綿亘今古離愁渺渺迷處所可憐羅幔暗驚秋不比尋常乞巧樓誰家砧杵傷獨宿何處邊笳淚欲流邊笳砧杵斷復續恨比蛛絲縈萬曲仙人掌上露華寒曝衣樓畔金颸肅天雞唱曙各東西榆影茫茫路更迷可知此夕雙星會便是當年古别離古風矗矗山頭峰忽為山下道泛泛水中萍倐作原上草何異人間世夢幻頻顛倒朱墨分貴賤彭殤齊夀天萬境何縈心瀟灑舒懷抱池水淡以深一泓秋月皎暮出城東門見彼耘田者傴僂畦壠間紅日正西下揮汗立片時薰風散平野指日卜西成篝車賽秋社還憂租稅重催迫不相假終嵗事辛勤農夫獲利寡黃金鏤為鈿明珠飾為珥裊裊瘦腰肢若不勝羅綺佳人命多蹇嫁與薄情子勸君覓封侯出門求金紫雖去萬里遙脈脈甘守此朝遊花陌間暮宿青樓裏終老迄無成妾身安所恃有客天一方遺我尺幅書開緘肅起拜如獲雙明珠還君以空函非緣友道疏相思在𠂻曲覼縷不能抒明月照髙樓上有窈窕人秋風冷蕙帶舞袖欲生塵腸斷望斑騅心灰憶錦鱗疊我鴛鴦被收我芙蓉茵相思隔萬里羅帳為誰春獨樹少嘉蔭兩樹隂扶疏彼此相託藉春風擺葉初蘢蔥森天宇緑影含綺疏雨露豈有私生理頗自殊忽然萎其一孤立等無徒草木尚如此交情慎莫渝秋風西北來庭砌涼以清玉魄映踈梧唧唧寒蛩鳴雙星在河漢新傷離别情誰家砧杵動良人方逺征而我晏然卧涼颸拂畫楹殘夢回枕簟吟哦月影明細栁營行壁壘傳呼天子來將軍無令門不開介胄不拜識軍志棘門灞上真兒戲君不見淮隂多多稱益善漢王夜入恣調遣從知持重勝多謀亞夫名望從兹顯掃平六國智不淺折檻行建章殿上垂龍裘槐里小令面請求願斷佞臣一人頭佞臣為誰安昌侯觸犯天威攀殿檻拋將血性塗肝膽免冠叩首老將軍却令遺直出屯坎嚴威忽霽回春暄令勿完葺留斷痕徒教事後旌忠直何如聼取當時言寄衣曲綘河西亘天欲秋聲聲砧杵雜風流誰家少婦傷離别并剪裁衣明月樓新棉絮罷開香笈手把金針燈下泣舊衣棉少不禁寒新衣棉多線縫澀線縫澀衣寄遲夢中識得龍堆逺衣到愁過沍凍時詠塞上達蘭海蘭松木筆格迢遙絶塞隔萬里其間乃産海蘭松虬枝徑直傲霜雪盤盤偃蓋蒼翠濃故人戍回言其略懸知風景邊壤同開笈更贈我筆格云即此木已所攻視之脈理頗密緻內黃外白如兩重磨礲光澤全天巧素莖幻出幽蘭崇背上題字選名句疑鏤玉葉鐫青銅吁嗟沙漠所生物何期得伴書齋中韻助揮毫楊栁月秀生覓句梧桐風藝窗宛覺添芬馥研山更似增玲瓏感君雅意恣吟玩良材朴斫思無窮觀刈秋露零場圃金風氣蕭索百榖已告成呼童庤錢鎛為地只盈畝頗可驗耕鑿屆兹西成候䇿杖課收穫轉憶東作時雨暘卜時若入夏秀以實日中驅鳥雀念此終嵗勤亦得一朝樂園林喜空明爽氣侵簾箔撫景獨吟哦允矣興所託月夜泛舟西山斜照秋江暮東林乍湧銀蟾露隊隊歸鴉噪樹煙一葉扁舟凌晚渡風閃氷輪縷縷光波含玉鏡如如去長天一色望欲迷點點疏星堪計數髣佛河漢坐乘槎白榆茫茫夾兩路秋景寥蕭已可人更兼秋月明寒素便卧蘆花任所之何須更問歸來處招鶴行主人招鶴鶴不來雲中灑翮空徘徊徘徊有語不得訴一聲長唳告鶴媒翁家白石間蒼苔林園勝絶無塵埃飲啄更喜稻粱足翺翔無復駕鵝猜淡沱清池供暮浴迷離曉岸衝煙開絶異華亭怨明月不殊瀛海棲瑶臺吁嗟不返胡為哉臞骨自知與世乖主人雖容奴僕恨不如小鳳巧語諧珍重深恩從此去煙嶠茫茫不知處秋江曲送梁學士假歸省親秋江月印秋水明行人弄棹江上行帆指錢塘促離恨堆來北塞多凄聲凄聲離恨何時已只為髙堂念遊子從知計日賦歸來繞膝承顔無限喜秋江岸颭荻蘆花故鄉風物依然嘉慈親早慰門閭望再謁金門捲綘紗慕容垂慕容竒男子低頭初入鄴馬上歌丁零得預隂山獵髙繫白鼻騧共醉燕姬家燕山不知處健馬如飛去莫怪王景略封劍用詭計早知未遂時已有虎狼志放燈曲中宵弄槳蘆荻洲幻成萬朵金蓮稠涼露涓涓月華白澄波幾頃連天碧詩思因秋一快哉放燈滿湖歸去來待月銀河流素寒宵永簷牙挂樹疏無影石欄徙倚望金波時有金風送微冷瓊樓半開天際紅香熏睡鴨沉煙濃繡屏十二秋無色頻聼階前細語蛩蛩音留客為久立寥空露重衣衫濕秋日泛舟西海金颸漾蘭渚霞光射明川兩岸荻蘆花中流獨放船水氣含微冷棹破秋湖煙一派空明景與我相周旋憶我臨薰風輕舠弄清漣彈指九夏過秋水連長天擊楫暢吟懷鷺起橫塘前題朱貞女傳卓哉朱氏賢女子柏舟矢志志不徙蔡公獨展大手筆質言傳紀書盈紙窈窕少長相公家笄年禮聘許適李李未昏姻中道捐女乃慟哭爺前跪兒已命字不可移兒未成婦不可死權衡生死兩塗間兒惟自盡兒心耳江頭秋冷水無波市中火煽房不燬貞心幸托蔡公傳傳存人亦歸蒿里伊余耳聞此事熟幾年宛轉詩腸裏今朝檢傳作題詞題成凛凛秋風起鶴唳行長松落落經千嵗下有孤鶴石邊睡睡醒臨風唳一聲聲中無限幽憂思欲上松梢卧月明可憐剪却雙飛翅主人稻粱豈易餐獨步青莎不得意漫誇衛國乘華軒空傳瑶島陪鸞馭爭如野鶴不受羈飛止由心無箇事鳴鴈行洞庭葉落寒林空雁行斷續鳴金風煙波浩渺望無極好共銜蘆明月中流黃弱婦起長嘆銀河皎皎夜將半可憐鴻鴈尚知歸郎似斷蓬何處飛奕長夜苦無眠銀檠燈花落丁東漏聲寒風響葳㽔鑰消遣慿何物楸枰差可樂布子定規模就勢覘強弱棄取大小間幾許費忖度何須分勝負妙理應思索試從奕罷看本來無一著金籠鸚鵡曲芙蓉小苑曲欄東緑衣深貯黃金籠春來景色潑眼濃杏花微雨紅濛濛翠毛丹咮饒佳麗獨傍罘罳剪雙翅主家歌舞按涼州每聞入破垂珠淚稻粱飽飲金籠裏不如飢飲壠頭水秋日過廣通寺鳴鞭御街過小憩招提境瀟灑松竹秋因風弄清影咫尺紅塵中便是山林景欲去夕陽西颯然衣袂冷西山下故宫曲蕭晨䇿馬西山足嵐氣才分萬峰緑颯沓霜風冷野橋霏微露氣搖寒竹野橋寒竹接宫墻何年帝子黃金堂苔鎖雙扉人不見空餘寂寞山花香當時緑鬢承歡處燕巢蛇穴迷煙霧金牀文毯已成塵井欄想像梧桐樹華清宫殿絶鳴鑾建章萬户圖中看徘徊追賦前朝事蘚篆題碑字未殘瀛洲亭木天儲羣彥古迹留芳馨咫尺樹石間舊結瀛洲亭清風振瑶席花影落階庭渺茫弱水遙荒唐白玉京誰知通仙籍不隔水盈盈院松四時色天籟萬古聲成器皆琳琅裁詩或瑶瑛寄語亭中客莫負登仙名明窗秋影秋日上窗窗紙明間庭梧竹紛縱橫扶踈更復含涼籟為我乍作蕭騷聲霜林敗葉如染紫遙漏螺峰淨初洗引入文疏弄影枝倍添一假秋光美驄馬御史歌行且止避御史官道開驄馬來驄馬御史真雄才令行無阻厲風雷五日京兆誠惜哉民擁處驄馬去君不見鈎黨祻起玉石焚一時清流羣避路江臯曲蘭洲瀲灔春波緑十里橫塘曲復曲歡跨青驄上大堤妾在吳船夜獨宿船頭恰見冶遊郎立馬贈我黃金璫還君金璫君莫惱不作錢塘蘇小小秋日同二十四叔父五弟遊玉泉諸名勝即事志興用爽氣澄蘭沼秋香動桂林為韻十首秋光淡空碧蕭蕭天地朗令日勝遊招雙槳扁舟放倒影鴻鴈寒澄翠玻璃廣殘香度荷風颯然襟袖爽輕舸泝遙波荻岸蒼茫意眼界淡煙光心宇澄秋氣便狎鷗鷺羣詎羡笙歌沸舊遊境頗諳兹遊足清味我聞好事者萬里勞攀登咫尺苟會心邱壑咸可慿草枯石岸出霜落溪光澄泊舟古寺邊欲覓淨名僧漁村互掩映遙矚憑闌干三秋稻已熟空畦野水寒繁艷萎堤花幽香剩澗蘭最喜螺峰青不隨時序殘層臺接曲阿梵宇凌霞曉紅舒野蓼花翠點殘蓮沼川泳而雲飛無心適魚鳥觸景樂相忘如遊寥廓表蕭晨步名園况復值髙秋晴旭隔林上天宇嵐煙收長空淨如洗爽氣澄雙眸坐看衆木末如登百尺樓西風搖梧竹泠然泛笙簧石梁古月明華池淡冷光已見蒹葭白漫憶荷芰香妙哉嵇中散髙懷一嘯長雲日掩映間遙峰乍清聳霜染槲葉丹臨風枝亂動野鶴唳髙空忽被間雲擁我亦棹歸舟明湖泛澒洞書帷捲午晴小山賦叢桂衣袂足清涼雲山復開霽故知素節佳况是神仙地即景暢襟抱陽烏已西逝涼風起天末落照挂疏林栖鴉噪樹杪寒煙濕衣襟勝遊那可戀逍遙本無心歸來坐明月蒼然暮色深題趙孟俯洗馬圖平郊拖邐迤一川寒且泚怪石刺波青槲林紅間紫奚官驅天間盡就明波洗酡顔斜坐鞍奚童任指使計數約百千量材皆騄駬名駒志氣殊好境亦知喜或馳若龍飛或靜若鴻止並驅爭先後滚地煙塵起或牡求其牝或母乳其子亦有獨立者昂昂鬃上指駿馳千里遙怒破萬軍壘我聞李伯時畫馬夙擅美雪翁傳宗派妙意得神髓如遊汾漢間似歷渥窪裏是時金風奏郊外秋搜始擬欲試金鞭一箭落雙雉御製樂善堂全集定本卷二十二
