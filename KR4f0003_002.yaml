body:
  text: 協辦大學士戸部尚書臣蔣溥等謹奏乾隆二十三年六月十五日奉上諭近日偶閲樂善堂集縁初刻所存巻帙頗繁其中多有不甚惬心之句昔人云文章千古得失寸心朕非悔其少作博不恡情去留之名政以隨時删訂則今昔詣力所到端可藉以自騐其令内廷諸臣悉心校閲分擬應存應删簽貼進呈候朕裁酌重訂定本以付剞劂欽此臣等恭奉樂善堂全集公同敬謹校閲仰見我皇上德協天行學勤時敏散體之文囊括六經自先聖以至先儒之理無不陶鎔貫串體大思精駢體之文軼唐駕漢籠罩羣言風格高古詩章則融洽三百篇温柔敦厚之㫖博採歴代之英華而機杼自出是内聖外王之全學無不統備兼賅實足以訓行萬禩兹恭承聖訓命臣等校擬簽呈恭候欽定臣等謹遵諭㫖詳細恭繹竊就管蠡之見分别貼簽恭呈御覽伏候訓示裁定俟發下之日交武英殿刋刻再臣等伏覩初刻内恭遇御名未經敬避深屬未安謹一併擬簽進呈仰祈睿鑒再集内所刻制義理醇詞茂雅正清真洵為文章榘矱今臣等恭查制藝巻内計文共得二十七首似應於目録末標附録制義四字而附刻於詩賦雜文之後標簽書樂善堂制義下刻一小附字則於刻集體製更為妥協至原本久經頒行今後訂成定本在我皇上制作如日月經天原可聽其並行但現在定本既經詳訂而出海内藝林寳購必當奉為指歸所有原本自應陸續恭繳臣等請㫖凡内外臣工曽䝉頒發初刻及書坊翻板并外省官刻本並令隨時收繳不必立定限期及行文追查在内交軍機處彚繳在外由各該地方官轉送布政司敬謹收貯定本刻成時仍乘便發交各布政司照依摹刻印行嘉惠天下臣等愚昧之見是否有當伏候聖訓謹奏協辦大學士户部尚書臣蔣溥吏部尚書臣劉統勲工部尚書臣嵇璜吏部左侍郎臣董邦達戸部左侍郎臣劉綸户部右侍郎臣裘曰修禮部左侍郎臣介福兵部左侍郎臣觀保刑部右侍郎臣王際華工部右侍郎臣錢維城内閣學士臣錢汝誠乾隆二十三年八月十五日奉㫖制義不必刋刻餘依議欽此
