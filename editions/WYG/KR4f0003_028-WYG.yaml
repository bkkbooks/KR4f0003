front:
  text: 欽定四庫全書御製樂善堂全集定本巻二十四
  hash: sha256:b5f5db601b23166a9b7efb10588cff8e03a1e96aa3d6684410f5b4ea23c7f3c7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0003_WYG_028-1a, image: WYG1300/WYG1300-0479c.png}
body:
  text: 今體詩燕山八景詩瓊島春隂瓊華瑶島欝嵯峨春日輕隂景色多雲䕶鳳樓松掩映瑞凝仙掌竹婆娑低臨禁苑滋苔蘚逺帶郊畿䕃麥禾更向五雲最深處好風時送九韶歌太液秋風秋到宸居爽籟生玉湖澄碧畵橋横荷風晩送殘香氣竹露凉敲緑玉聲翠合三山連閬苑波涵一鏡儼蓬瀛由来禁籞林泉好行樂還同萬物情玉泉垂虹湧湍千丈落垂虹風巻銀濤一望中聲震林梢趨衆壑光浮練影掛長空跳波激石珠丸碎濺沫飛花玉屑紅自此㤙波流處處公田時雨澤應同西山晴雪銀屏重叠湛虚明朗朗峯頭對帝京萬壑晶光迎曉日千林瓊屑映朝晴寒凝澗口泉猶凍冷逼枝頭鳥不鳴只有山僧頗自在竹爐茗椀伴髙清薊門煙樹蒼茫樹色望中浮十里輕隂接薊􅏀垂栁依依村舎隐新苖漠漠水田稠青蔥四合鶯留語空翠連天鴈逺遊南望帝京佳氣繞五雲飛䕶鳳凰樓盧溝曉月蘭若霜鐘斷續鳴盧溝曉月正西横蒼烟淡接平蕪逈曙色纔分逺水明傍㟁人行聞犬吠蹙波風動見魚驚車馳馬驟長安道何限低徊旅宦情居庸叠翠居庸天險列峰連萬里金湯固九邊雄峻莫誇三峡險崎嶇疑是五丁穿嵐拖千嶺浮佳氣日上羣峰吐紫烟盛世祗今無戰伐投戈戍卒藝山田金臺夕照燕臺遥望澹烟濛返照依稀禁籞東是處人家圖畵裏一川風景夕陽中溪頭棹響歸漁艇牛背簫聲過牧童千古望諸留勝蹟㡬迴慿弔向西風闕里祭器新成賜觀簠簋鉶登豆爵六色恭紀八韻代啓文明炳崇儒聖道光皇心欽日月禮噐偹宫墻舊譜稽成式新圖發尚方斑斕紛有耀簠簋列成行頒示来三殿傳觀遍兩庠涵光呈玉質絢彩燦金相萬國同文軌千秋肅典常從兹先後聖一揆頌吾皇恭祝皇母聖夀蓬莱曉日照金扉糺縵雲成五色輝觴捧六宫趨綵仗嵩呼四海仰慈闈瓊筵恭進仙人膳文錦歡呈玉女衣叨沐㤙勤逢令節年年拜舞慶春暉賦得一雨便如秋園林新霽後徙倚小亭前宿雨催殘暑餘霞抹逺天風隨輕扇度爽隔薄衫穿泉滿澄潭裏鷗閑野岸邊苔痕侵履濕梧影落階圓秋思先秋發於今卜有年雍正九年六月上以近畿三省雨澤愆期豫籌賑恤之䇿甘霖叠沛恭紀十二韻志喜帝念民衣食端惟農與桑粒民符后稷熙績法陶唐乾惕通朝夕中和善弛張朱明三夏永甘雨萬民望睿慮周三省宸􅇆達九蒼普天頒惠澤特地厪諮商精禱思無逸殷憂問未央貯倉施舊積轉漕截新航更降停徵詔仍頒捐賦章㤙綸過所望膏澤應非常對越何昭爽誠通自溥將從知天佑聖萬國慶豐穰賦得七月流火玉律商聲應金天大火流祝融朱斾巻少皥素車留炎氣驅天末凉颸拂樹頭潭中波影浄盤裏露珠稠興助西風客思添明月樓授衣期在即砧杵響清秋秋露如珠七月凉初至三危露漸零圓凝成顆粒紛墜散瓏玲只許盈眸洗無能傾耳聼平分素秋景梧葉老階庭秋日播麥新生釐牟遍壠拂參差正是西風八月時翠毯乍抽新頴細緑波輕泛早苖披芊芊不畏秋陽暴靡靡長霑白露滋此日種成来嵗穫化工四氣為全施將獵南苑檢㸃所擕書籍入髙秋氣肅郊坰南苑將除信宿停檢㸃行幐整書籍不因校獵廢談經校獵阻雨崇朝秋雨細絲絲草濕平原滑似脂罷却行圍何所事吟詩未稳獨尋思閣道遊廊鬪角齊侵堦嫩緑草萋萋却憐苑外随圍者上雨旁風下濁泥辛亥秋九月出南苑行圍以穡事未竣不果獵而還耞翻雲板敲塲圃錢利霜刀刈大田一幅􅃎風圖畵似肯教獵騎悮民天霜後平原地已堅青驄不用錦連錢相逢野老扶兒笑今嵗豐收倍往年讀楊忠愍集家學關西素行淳浩然惟與義為隣一生名節堂堂在兩䟽風霜字字新報國不辭履虎尾排奸直欲犯龍鱗開編省識忠良氣不愧牽衣折檻臣御賜詩經傳說彚纂恭紀十韻學古初循壁承㤙尚面墻二南風化首六義詠歌長邦國由閨闥聲音叶紀綱孔門傳卜氏漢代著毛萇考訂慿先哲要歸守紫陽膠庠遵注釋藝苑藉翺翔秉一先生訓排諸愽士場羣言難約達萃羙得㣲臧纂定遵皇祖装潢出上方趨庭慚寡昧雒誦敢遺忘恭瞻皇祖㤙賜御筆感賦亭俯玻璃荷芰芳賜書處名觀蓮所孫枝獲侍聖人旁寸心已覺趨陪幸尺幅曾頒翰墨光羲畫軒書叨賜屢玉函金笥貯㤙長只今空對宸章麗瞻仰徒迴九曲腸分隂宵旰萬㡬繁餘暇精神寄筆端運腕力如撐海岳揮毫形似舞龍鸞當年歡忭承榮賜此日依遲忍重看詎止宋臣飛白記涕流頻拭那能乾鏡中燈數尺玻璃鏡中含燭影横光凝千樹燄彩散一燈明圓相分来滿空花對處生撲蛾渾不用剪燼笑難成乍似氷壺漾還如水月盈若令長照物莫徹玉堂檠雍正九年十二月二十日皇祖實録御訓告成皇父陞殿恭受禮成羣臣慶賀恭紀承平嵗乆共尊親萬類欣遊浩蕩春六十一年緜郅治百千萬國沐洪仁行昭日月瑶篇富言揭山河寳冊新聖主紹庭欽陟降顯承允萃一人身寳袱金輿瑞靄盈恭迎帝輦出乾清起居本是當年注紀載欣看此日成佑啓萬年隆國祚繼承四海仰皇情告成應受千官賀金殿曈曨旭影明績奏修和被管絃只今載筆尚依然精研始識天心奥紬繹從知聖學淵乆道化成仁正漙重熙累洽慶方緜朝来閱罷昇平禮寳歴初周已十年史館修成聖典垂一畨歡喜一畨悲提擕舊憶音容在愾慕今驚嵗月移光發瓊嚢臨殿陛祥開玉帙煥罘罳㡬迴拱手丹墀立感事沉吟七字詩薄海霑濡雨露勻九重咨儆煥絲綸典謨從識唐虞聖功敘還同覆載仁憶昔追随宸極久祗今瞻仰史書新光天黎獻歌思永况復躬承渥澤人吾皇至德懋重華實錄成書自帝家經國大猷延宅俊務民本業重桑麻載功多藉羣工手紀實曾無一字夸受賀禮成還紫極中天日燦五雲斜賜烏銅罏恭紀迢遞三餘永研精書室中窻眀欣向日簾宻為禁風布澤從金殿頒恩自法宫名罏傳雅製新様出良工素色青鉛似圓形寳鏡同細雕檀木案巧鑄首山銅夜爇蘭煙紫朝熏獸炭紅袖来寒却避著處煖頻烘拜賜回春德榮分解凍功年年長至日永得奉恩融平郡王修理福陵前水法告成還京賦贈三十二韻薄海承平日光天丕冐時奉三宏郅治得一普恩施列祖貽鴻業吾皇紹大基聖心通陟降孝治本型儀緬想山陵地欽惟功德垂殿堂宜戎煥水法度重為簡命賢藩往工程鉅任禆星軺辭輦轂駟乗望靈祠九十韶光半逶迤周道遲嫩茵鋪古路山鳥喚髙枝日脚来孤鶩雲邊現彩芝奉天春滿目望海翠凝眉山海關有望海樓言邁勞征騎遄臻止繡麾命徒勤匠作鳩衆發工師月斧千人舉雲斤萬手持尋源䟽舊道鑿石濬新陂利便因形勢髙卑物土宜敬公常惓惓慎事毎孜孜不惜司農帑還餘御府資兩年寒暑易再往路途知晴旭光明照和風左右吹歸輿旋帝里返斾邁通逵蕆事封章奏論功聖澤推逾時成契濶此日喜追随分韻箋同劈探㣲冊共披心知才磊落意欲共磨治古有登臨士遊窮山水竒因之健筆力用以助文思况復三韓舊猶然萬載䂓省風思祖德考俗問鄉耆益重圭璋品應叨雨露私篇章聊志喜詎比穆如詩孟春十日夜偶成十六韻天宇祥風布東方木德生入春旬已過望月璧將盈獨坐披緗帙無眠對玉檠推敲裁律句吟咏費精評自憶髫童嵗粗知書史名但能覓梨栗豈解協音聲顧復皇恩厚提撕聖訓明選師皆宿彦教我盡披誠學識尊周孔詩知道性情韻宗金石響詞薄偽刓輕繭紙浮光净蘭毫蘸墨并綺思抽乙乙俗慮静營營堪㑹天人理兼消長短更燼生霜燕翦茶沸玉壺鳴旋裊沉香細迢遥永夜清吟成梅月朗天際玉繩横玻璃盤棐几無塵罽毯平玻璃盤子伴髙清一般皎潔羞雲母四射光芒突水精巧質非緣周玉府周禮天官玉府合諸侯則共珠盤玉敦嘉名詎數漢金莖㡬回拂拭澄如鏡静對氷心一片明恭讀皇祖御製避暑山莊三十六景詩井閲圖感成長句五首天開勝境比巻阿浩蕩春熙萬物和祗為養親温凊備非闗奉已豫遊過迎凉臺榭依山逈延爽軒窻傍水多頷領孫曽難數計扈遊何幸沭恩波猶憶壬寅三月春随鑾方始奉恩綸天顔近接承歡乆日角時臨賜喜頻在耳德音猶似昨開函御筆鎮如新祗緣深眷吾皇意愛育餘波及小臣金泉避暑闢離宫行樂還期兆庶同書史研求遵古訓桑麻藝植愛豳風追陪六膳分銀鱠趨侍三驅躍玉驄指㸃圖中當日事鼎湖何處可攀龍靈臺不見文王御仁夀空傳唐帝宫樓閣簾櫳虚夜月殿堂松柏老秋風當年遊賞疑天上此日酸辛對畵中賸有宸章恭洛誦㡬回青睐憶重瞳鼔響舂音夢裏遷披圖不覺淚澘然詩侔風雅傳千載畵聚烟霞扄一編爽籟秋風嘘大塊雲章星彩麗髙天冷窻課罷頻吟諷回首光隂已八年東作東作三春始滋生萬物稠公田平似掌新水緑如油蟲捲柔桑葉針抽嫩頴頭乗時功力備多稼定今秋賦得花随春令發青陽消息到春臺嫋嫋風光費剪裁滿院猶遲千樹放傍簷早覺一枝開日烘不藉温房暖令至何須羯鼔催嫩蕚半含春力薄悠揚蜂蝶莫頻来題蔣南沙相國畵屏五景桃栁金絲錦浪舞東風㸃綴陽和尺幅中見説花源春靄靄遥知㶚㟁雨濛濛輕綃雜間參差緑翠帶低臨深淺紅消息化工歸燮理丹鉛未許畵師同蒼松牡丹錦繡堂中開畵屏牡丹紅間老松青日烘始識三春麗嵗暮猶看百尺亭夭矯拏空欣得地輝煌散彩正當庭一般都是生生意坐對從知筆有靈荷玉鏡平鋪一帶長紅衣翠葢儼明粧不争艶麗當春日獨濯清漣傍夕陽雲髻峩峩疑洛浦秋風嫋嫋憶瀟湘鷺鷥可是知人意雙落明波領晩香黄蜀葵色是黄金花是盤迎風未舞已珊珊蕋珠宫裏仙人珮姑射山頭玉女冠承露更添千葉碧向陽還有寸心丹鵞黄淡抹饒深意漫作尋常渲染看梅天上春陽回未回早傳消息到庭梅暗香和雪尋常放嫩蕚侵寒三兩開每傍階前照清淺更於月下重徘徊一枝風物資清供調鼎還看濟世才春日寄朱可亭先生五十二韻遲日山河麗青春風物妍皇州籠淑氣天宇燦祥烟景媚韶華世人遊熙皥年先生方抱病静室獨安眠當代窮經彦清時守道賢事君欣際遇奉職佛仔肩寵命登台輔鴻才掌選銓寅恭朝宁右弼亮聖人前只此氷兢志那忘對命䖍皇情常有眷臣節總無偏早嵗承綸綍成童授簡編芳䂓看表帥函丈獲周旋義府優游永春風坐卧便賦詩閒檢韻味道細烹泉每自威儀謹從知學問全董生醇治術朱子續心傳十載如旬日髙山復大川汲長難試綆質魯詎窺淵惟借開陳力常資接引縁前途粗省識往籍事精研方示尋鄒屐旋招泛泗船髙深終莫測言象未忘筌竊意精神固何期衰病連道存看潤貎身老惜華顛觧習安心法參明樂性禪三年常疢疾晩嵗每迍邅更受宸𠂻注頻䝉恩㫖宣賜醫經嵗月賚食列甘鮮㡬度秋梧落經時春草芊尊生資攝理養静悟魚鳶入臘魔纔退頻年疾稍痊經帷常一過日暮薄言還早識文如斗新叨筆似椽風披重幙外晴照綺窻邊坐乆添光霽来頻領蕙荃如何新嵗到轉覺舊㽸牽呼僕長扄户飛花未撲韉竹爐朝自焙湯劑晩仍煎消悶慿書籍無心託管絃神清依素几守寂坐麄氊未及頒春俸應勞買藥錢東皇今布令黒帝乆收權坦履宜悠爾沉疴定霍然追随私念切趨歩寸心懸况乃須調鼎方看用作舷時平交正泰君道健如乾宣力疇堪並陳猷未或先陽和敷化國膏澤被王田何日趨朝陛多時隔講筵裁詩羞未稳有暇賜雕鐫御製樂善堂全集定本巻二十四
