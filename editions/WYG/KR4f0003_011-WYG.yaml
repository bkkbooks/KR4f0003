  text: 欽定四庫全書御製樂善堂全集定本巻七
  hash: sha256:dc27b3c9831d96571b13b53aa71d65594513bfdb16904819da0a7f449c22b7b2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0003_WYG_011-1a, image: WYG1300/WYG1300-0332a.png}
body:
  text: 序貞觀政要序夫三代以上君明臣良天下雍熙世登上理自東遷以降風俗日薄天下無復熙皥之美雖有質美之主望治甚切而所以屈己從諫力行善政者終不能有以震古而鑠今及唐貞觀太宗以英武之資能用賢良之士時若房元齡杜如晦魏徴王珪諸人布列左右相得益彰葢自三代以下能用賢納諫而治天下者未有如此之盛焉史臣呉兢纂輯其書名之曰貞觀政要後之求治者或列之屏風或取以進講元至順間戈直又刋其書以行於世余嘗讀其書想其時未嘗不三復而歎曰貞觀之治盛矣然其所以致治則又在於用此數賢而數賢之中又推魏徴禆益為多然魏徴不能自必信用於太宗以見其功業則又知太宗所以獨信魏徴言聽計從而見效若彼者固人君所當服膺書紳而勿失也書中分目目中有條條之末引先儒之言而論斷之其有望於後王也深矣人君當上法堯舜逺接湯武固不當以三代以下自畫然觀爾日君臣之所以持盈保泰行仁義薄法術太宗之虛己受言諸臣之論思啓沃亦庻㡬乎都俞吁咈之風矣韓文公文集序天下之事有其藝則必有精於其術無論小大精麤能使機應於心技疑於神則外物不能紛而後之習其藝者皆奉以為師法養叔治射離婁治規矩師曠之於音聲倉公之於病匠石之斤公孫之舞皆造其堂而嚌其胾傳之後世而無窮夫文亦天下之一藝也精其術可奉為師法者周有左氏漢有賈誼董仲舒馬遷相如劉向此數子者雖非見道之文要皆卓自樹立不合流俗而其文之古樸亦非浮華澆漓者所能及迨自五代剖分文弊質窮天下之言文者務以藻繢為事娓娓如婦人言世道衰㣲人心由之偽薄至唐幷天下蔚興文教殆百餘年而後昌黎以六經之文鳴天下由是言之文之繋於世道人心亦大矣葢昌黎之於文所謂造其室而嚌其胾因文以見道以蘄至於古之立言者也其自用之功在於培養仁義以為立言之本而其所得之趣則氣盛而言之短長與聲之髙下皆宜至其不蹈襲前人一語不煩䋲削而自合規矩不顧世人之笑譽反刓以樸剗偽以醇粹然一出於正後之習文者皆奉為師法而莫有能加焉噫亦至矣雖然公非徒長於文者其道徳謨猷皆有唐一代之特出而不能大顯於憲穆之朝者氣運之遷流非人力所能挽耶抑使之少抑於一時而終揚於萬世耶将全於此則不能全於彼耶孟子距楊墨而道以之傳昌黎排老佛而道亦因文而見起衰反正始若未之信終大顯於時蘓子瞻以之上擬孟子豈過譽哉杜子羙詩序夫自上古康衢有擊壤之歌虞廷有卿雲之詠帝與臯陶禹益諸臣勅命賡歌拜手颺言於一堂歌詠之興有自来矣爰逮姬周公旦公奭調宫協徴律其節族舂容乎大篇堂皇乎雅辭化自二南達於列國上自公卿下至黎庻至於變風變雅亦莫非忠臣義士攄其忠悃發為歌辭好色而不滛怨悱而不亂皆可以勸懲當時為教後世詩三百一言以蔽之曰思無邪孰謂詩僅緣情綺靡而無闗於學識哉然三百萹之詩不拘格律而音響中度所謂太羮不和而有至味也漢變四言為五言間亦有七言之體至魏晉而音韻愈盛入唐而格律益精鹽梅之設太羮之害也七竅之鑿渾沌之賊也至有不言性情而華靡是務無勸懲之實有滛慝之聲於詩教之温柔敦厚不大相剌謬乎是以言詩者必以杜氏子美為凖的子美之詩所謂道性情而有勸懲之實者也抒忠悃之心抱剛正之氣雖拘於音韻格律而言之愈暢擇之益精語之彌詳其於忠君愛國如飢之食渇之飲湏臾離而不能故雖短什偶吟莫不睠顧唐祚繋心明皇蜀中諸作尤致意焉屈原放逐離騷是作後代尊之為經子羙之詩亦因其顛沛流離抱忠秉義不究其用垂於詩以自見故後世宗之參之於三百篇之列若夫較一字之長争一韻之巧摛華藻於萹章誇博贍以耀衆者藝也非所以求子羙也朱子資治通鑑綱目序孔子作春秋而亂臣賊子懼夫春秋亦一編年之書而曰亂臣賊子懼者葢謂彰善癉惡比事屬辭誅姦諛於已徃杜僭亂於将來使亂臣賊子不畏王法者讀此書而知懼豈非有功於世道人心者哉三代而下孔子之道㡬乎息矣故臣叛其君者有之子背其父者有之而亂臣賊子無所忌憚子朱子生於周程之後修明絶學深痛而甚憫之祖夫子春秋之筆削因温公通鑑之書更創義例為書曰資治通鑑綱目其自序曰表嵗以首年因年以著統大書以提要分注以備言洵哉善善惡惡是是非非具於一篇之中而無不備矣然後人知忠臣義士必獲天休也雖不用於一時而後世莫不褒歎效法之恐後也亂臣賊子必攖天誅也雖幸免於當世而千載以下公議莫逃也彰善癉惡比事属辭雖不足以盡春秋之義抑其大畧則可謂同揆矣夫三代以下傳世久逺者莫如漢唐當其盛時政教恩澤入民之深非不可稱然其易代之際死君事者可數焉自修綱目之後士知顧禮義亷耻以事二姓為辱故南宋之末忠臣義士捐軀而徇王事不肯忍耻偷生以求苟活者屢見於史䇿之中且元代宋明代元無分析割㩀如前五代後五代之亂者亦因忠姦賢佞褒嘉貶斥凛若衮鉞人知有所懲勸懼見誅於後世也如是而謂之綱目修而亂臣賊子懼其誰曰不然大學衍義補序學貴於博乎堯舜心傳十六字有終身不能行其一語者焉學貴於約乎徃聖先賢作述相接有言之而不厭其詳者焉大凡言理則欲其精簡明切當而易守也言事則欲其詳條分縷析便於中材而易行也吾於邱瓊山大學衍義補葢知其義云夫聖經二百有五言為學之道備焉為教之法具焉為治之理盡焉所謂理極精而易守也至於後世道衰文敝賢者且不能窺聖經之閫奥又何怪於中材乎故西山先生作衍義之書至齊家而止而治國平天下之道備具不待瓊山之補然亦不可無瓊山之補所謂多備規軸而易行也聖人言理賢人言事先代言理後世言事亦學有所不齊世有所不同而所以啓廸當時為教後世之心則一也然於此亦可以見瓊山之有志於君民上下言事極其詳而言理亦極其精矣至其書之條目義例則詳於邱氏之序余因嘉其明於理而便於事故為序如右送五弟奉命徃祭闕里文廟序雍正八年冬十月新修闕里文廟告成殿廡門陛黄瓦丹雘既宏既隆圭瓚俎豆罇罍之器頒自上方聖天子親書大成殿大成門匾額復命良工重摹聖祖御製文廟碑文孝思繼述重道崇儒兼備於此既成例宜遣官祭告皇父特重其禮命皇五子齋居潔誠治装減從以行余與吾弟夙夜之與俱飲食之與共講習討論之日親至於今二十年茲徃千里之外能無依依繋戀而不忍舍顧思人自孩提以至於老大讀孔子之書未必能志希賢聖窮理探源以至於知孔子之道也幸而知之矣而私累之未捐精進之不勇則鮮能行之既行矣未有不心慕孔子欲登其堂而入其室者吾弟力學敦修不敢自懈於聖人之道者有年矣今奉命徃祭闕里瞻宫􅉹之數仞則欲得其門而入以見宗廟百官之美富也對聖貌之巍巍則思温厲恭安如在其上而自省其躬修也逰禮樂之區想見金聲玉振之氣象是行也不益以増其嚮徃服行之心而為有生一大快乎皇父猶有後命命吾弟祭闕里畢即徃致祭岱宗吾弟徃哉昔孔子嘗登泰山而小天下孟子述之葢謂得登聖人之堂與聞聖道之精深廣大則諸子百家羣言皆小也猶之登泰山之髙者得觀其嶔岑峻極則峛崺培塿皆不足言也吾弟既登聖人之堂又登泰山之髙誠敬之日積仰止之日深視瞻之廣濶胸次之豁然古文人學士所謂逰名山大川以助其文思筆力者又烏足云哉送平郡王奉命徃盛京修理福陵前河道序皇清承天命為天子太祖肇基盛京奄有三韓太宗積功累仁式廓疆宇以及世祖拯明室之亂興仁義之師平一六合定鼎燕京順治八年詔封福陵山為天柱山昭陵山為隆業山附祀方澤四時大祭必命宗室一人徃莅其事雍正八年四月詔曰福陵前水法歴年既久稍更故道朕萬㡬事重不能親徃經理惟是平郡王福彭小心畏慎克當斯任其代朕以行余與王敬業樂羣相晨夕也茲之徃也其可以無贈竊惟古者山川都㑹恒隨有徳者為發皇我太祖之肇基盛京義同於周文王之在豐我世祖之定鼎燕京義同於周武王之在鎬盛京為王業之丕基而福陵實靈祥之所由孕育綿衍今以前河稍更故道聖天子慎重所使特命王徃王其慎哉祗謁皇祖山陵敬恭將事宏仁孝之思審向背之勢必能相地宜因利便計丈數度髙卑揣逺邇物土方分司授職董其大要而責以成功以不負天子任使王其可以勝任而愉快矣王雖年少而器識深沉謙卑自牧嫻學問通事理余喜王之果足以當斯任也於是乎書以贈之送定邉大将軍平郡王西征序惟上帝眷顧我國家太祖太宗肇基盛京既創既承順天休命以造萬世無疆之丕基惟時英藩良弼㒺不一乃心力克宣乃猷董䟽附先後奔走禦侮之臣而甄其才以致其力用贊我王室式闢四方若川有舟實共濟之若木有本實枝幹之詩所謂維藩維垣維屏維翰偉哉隆古以来懿親之宣力未有若斯之盛也逮我世祖章皇帝定鼎燕京奄有九有惟時平郡王之始祖禮親王實統貔貅之旅以勤襄王事功績彪炳載在國史王其七世孫也王㓜而侍聖祖仁皇帝宫中躬承恩眷我皇父臨御凡事皆仰體聖祖之心祗承勿替况在宗藩尤所惇叙以養以教㒺不勤朂其身誘廸厥徳而王以孫枝之近眷顧尤隆雍正六年皇父特命王同我兄弟讀書内廷以培其才又二年知王之可用也爰命管理旗務及為宗正理益以明政益以練又二年知王之果可大用也遂有定邉大将軍之命而統西征之師夫凖噶爾自策妄阿喇布坦造孽據有波羅搭拉背我聖祖皇帝曲賜矜全之恩及我皇上赦過宥罪之徳跳梁躑躅至於今十餘年今其醜子噶爾丹側楞襲其㓙逆抗我顔行幸不可冄禍不可踵此葢天亡凖噶爾之日而王建功立業之秋也王器量寛宏才徳優長在書室中與之論文每每知大意而與言政事則若貫驪珠而析鴻毛也夫戰者孔子所慎王者不得已而用之所以止戈戡亂遏劉誅暴我皇上克承先志思維小醜累世負恩實天人所共憤王法所必誅而歴年以来董兵之臣率不能宣徳威而奏膚功用是以西陲重任畀之於王王必有以副皇父簡用之恩佐國家赫聲濯靈之大業相事宜慎權變和輯我士卒淬厲我将校恩威並行信義昭著克殱逆憝永息邉氛皇哉堂哉莫與京矣王以八月三日之吉禡旗啓行余與王敬業樂羣者六年於茲今之徃也其可以無贈然惟贈人以物不若以言之為切也贈人以頌不若以箴之為益也言而以箴宜贈王矣復念王日承皇父聖謨凡軍機要務制敵御将之方籌餉治兵之畧聞之熟而奉之謹以是始之以是成之總不出聖天子定算之中而更何俟余之以言贈哉故為王敬述王祖父為國宣力勲名赫奕之事於右及引書傳所言者欲王效法乃祖而以敬謹将事也王其勉之哉祗迓天之明命惟聿将其恪恭整我六師以伐不敬在此行乎在此行乎余自今數王至軍之日請勒為飲至之歌以俟之稽古齋文鈔序天地間有大本焉孝悌是也有大文焉詩書是也有本有文積於中而發於外有徳之言是也孝悌以立其本詩書以暢其支而因發為有徳之言英華暢達而不可掩能全此三者寡矣至若生帝王之家居富貴之地子道臣道交萃於躬夙夜匪懈篤念天顯尊聞行知究極於髙明光大之域非以道自勉者能乎哉吾弟少於吾甫三月皇父在潛邸時育吾二人於東西室及九歳讀書同受經於傅先生至十二嵗時吾隨侍皇祖宫中不能朝夕共䖏者葢半載及我皇父位登宸極妙選天下之英賢以教育吾二人凡八年於茲矣斯邁斯征日就月将以期不負皇父頋復燕貽之至意無時敢自懈也八年秋九月吾弟彚訂其序論雜文詩賦凡若干卷而屬序於余余曰吾輩所重豈止於文而已耶必若向所云三者皆克全之然後盡吾職焉吾弟在皇父膝下二十年愛敬懇摯從未有過愆與吾自孩提以至於今且孺且眈怡怡如也從諸先生敬業一堂既饜飫於詩書矣而發為文詞觀其言藹如考其意不外古聖賢名儒之旨所云三者翼翼焉亹亹焉日進而無疆豈止以文自鳴者哉余既以同氣之親相親相朂於平日晨夕之與俱筆硯之與共爾我形骸之悉化兹序其文其夷懌欣暢又當何如乎御製樂善堂全集定本巻七
