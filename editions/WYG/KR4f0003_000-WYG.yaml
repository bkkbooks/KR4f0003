body:
  text: 欽定四庫全書御製樂善堂全集序朕少讀尚書見二帝三王以及繼世之哲后君臣咨儆惟是身心性命之本原其敷政命官亦惟根柢道德而不規規於事為之末及考詩易四子之言凡論政者皆與書所稱同其指歸互為表裏其後博涉諸史則雖明盛之世所殫心竭慮者大概詳於事功而略於本原教化之升降治象之崇卑其分岐實判於此用是日有孜孜求所以取道入德之門䝉皇考示以明理立誠之大訓而略得其統貫又念修辭必本乎誠故凡見於古文詩辭者咸以是為宗而不敢有貳焉往者嵗庚戌曽録數年中所作序論書記雜文詩賦次為十有四巻置諸几案時就所言以自檢其行嗣是所作葢四倍前繼序以來躬理萬㡬兢兢業業惟恐一事失宜負皇考付屬之重思如曩時從容文墨之娯不可復得然少有餘閒未嘗不考鏡經史以自觀省爰取庚戌文鈔所載存十之三續作未訂入者存十之七總為一編共若干巻非欲以文辭自表著葢是集乃朕夙昔稽古典學所心得實不忍棄置自今以後雖有所著作或出詞臣之手真贗各半且朕亦不欲與文人學士争巧以轉貽後世之譏則是集之輯有不得已者記曰本諸身徴諸庶民曩予自檢所行以勉副所言者乃日用酬酢之常今兹所行事無大小莫非政教之平陂生民之苦樂相倚不可以中立者也因此益自警惕而克艱天位顧畏民碞庶㡬明理立誠之學参前倚衡永永勿替也夫乾隆丁巳仲夏朢日
