front:
  text: 欽定四庫全書御製樂善堂全集定本巻二十六
  hash: sha256:c37378ec059979602671a0ae2c67b12afff9603307e7a4e3ecf91afe342ac028
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0003_WYG_030-1a, image: WYG1300/WYG1300-0498a.png}
body:
  text: 今體詩石鼓橋門森矗兩蒼松翠護雕鐫舞鳳龍漫說晉臣精博物難稽周帝耀軍容銅駝已見藏荆棘石鼓依然鎮辟雍百里聲聞今試扣太平留此溯遐蹤聞軍營大㨗誌喜旭日揚輝氛沴消光天雨露九瀛朝行間効命票姚霍斗畔推車相國蕭沙漠忽聞收戰馬泮林佇見集飛鴞勒功一片留何處更過燕山萬里遥蠢爾西夷敢跳梁凶殘肆取武維揚淮山無騎聞清鶴大漠千師掃駭狼破竹功成歸有日采薇歌作嵗云陽從兹德水清無外天際長懸日月光轅門鼔角萬軍鳴執訊連連繋大營日照三山光四壘風迴千隊動雙旌已聞魚海全銷燧更看天河浄洗兵最是王師征不戰金甌永固萬方清閫外専征將帥雄㡬年區畫厪宸𠂻欣看㓂盡窮荒北可卜兵歸漢苑東萬里露章初奏凱千年麟閣定論功賡颺誌喜葵忱切咸五登三祝聖躬景陵寳城山上産石芝一本彩芝四本恭紀二律瑶光星耀麗重霄瑞産芝英玉露調最是顯承通有赫可知陟降本於昭日暄寳頂金幢粲風拂明樓玉節飄千載嘉祥綿國祚由来虞舜繼唐堯扶輿積氣炳貞符芝葢繽紛護鼎湖上瑞兩逢得未有靈根五本自来無光天雨露謳歌切大地㤙波浩蕩濡總是覲揚同一揆休徵草木慶昌圖賜哈宻𤓰恭紀玉琯灰飛候璇璣斗紀辰陽從一氣轉㤙自九重新異品遐陬至名𤓰賜賚頻分餐消永夜獨喜沁清神霜刄絲絲剖氷瓤片片陳青門應讓美朱火漫誇珍堆處盤添冷嘗来齒潄津中宵詩思潤轉盼是三春恭和御製冬至齋宫詩二章原韻五雲糺縵䕶齋宫晴旭纔升暖綺櫳氣轉初陽迴玉律天開子月應祥風百昌新慶昭蘇景萬彚均沾槖籥功可識泰禋綿福履一人誠敬早潛通日朗瑶宫瑞色新履長納慶協芳辰精禋共識皇心恪齋宿羣瞻聖敬純和氣初融丹禁曉葭灰乍動玉衡春宸居此際乾乾意為懇蒼穹佑兆民再擬冬至齋宫三首瑞靄氤氲滿太清九華髙曜鳳墀明齋宫晝静爐烟直廣殿風和梅蕋生氣復一陽璇象轉福凝五位泰階平春回大地鴻鈞普始識天心饗聖誠亞嵗芳辰景福臻歡聲陌上九重聞琯中鼓動迴元氣臺上豐亨兆五雲金闕祥光浮雉尾玉爐斜篆裊煙紋賡歌拜手葵忱切長仰經天日月文帝御齋宫敬且莊泰壇寅祀亞初陽斗邊看日方移晷谷口占風又協祥郅治平成過夏后聖躬雍肅邁周王至誠已自通天貺萬夀應知卜算長橘朱橘團團嶺海濵年来包貢逺通閩玉盤盛得珊瑚色為識江南霜信頻離離不譲洞庭南玉液瓊漿珠顆含未免一籌輸土物春前進到九頭柑凍雲凝雪出岫雲嵐凍飛空雪霰凝漫天寒欲逼大地氣難騰淅瀝朝逾宻氤氲日始升地爐熏不暖梅谷踏何曽過屋馳蒼狗敲簷落細氷誰能分白黒乍不辨村塍列嶂眉如洗平湖鏡似菱陽和期尚逺觱發候相仍錦繡簾重護玻璃窻暫凭喜看三白瑞預卜九秋登冬早聞雀聲㡬日晨窻鳥亂鳴似来報曉最關情霜凝凍翅看雙落冷逼寒喉辨數聲乍似庭中吹急管忽思春杪聼遷鶯想伊預識陽和近為見南枝梅蕊生恭讀御製丁未長至日詩敬依原韻鴻鈞氣轉中黄鐘六出飄飄喜應農臺上雲霞看紀瑞天中顓頊正司冬陽迎葭管方萌動禮薦蕭馨倍祗庸知是履端逢景運太平天子福重重村墟夜舂霜落園林時届冬稻粱全獲罷三農田家作苦無休息更聼村墟半夜舂萬籟全收夜已分寒舂聲急隔窻聞髙齋識得豐年景篆裊爐香獨自焚冬日寄蔡聞之先生一綫陽迴節近春先生獨卧病兼貧釡漂白水薪為桂簾捲寒風雪作銀未識命車期㡬日已經伏枕過三旬藥爐静對無餘事應有新詩付錦鱗書齋十載接輝光屈指暌違一月長試問鑪錘何忽忽可知嵗月亦堂堂腰圍定减冬前帶髮際應添鏡裏霜佇待春風重坐卧新知舊學總商量詩思詩思竟如何都於静後多繭絲抽更細春水皺生波得意全由此忘言亦任他古人多達者誰是破詩魔奉和二十一叔父用蟬聨體賦得松風雪月天花竹鶴雲煙詩酒春池雨山僧道栁泉原韻右二十字宋太宗試進士趙昌國題也叔父取以自詠創為蟬聨體屬予和之予愧非所習勉强奉和觀者得毋以效顰笑耶龍鱗含秀色偃盖欲拏空不畏嚴霜偪偏宜細雨濛貞堅有本性瀟灑與誰同天籟還堪聼笙簫愧下風浴日紀堯淵生雲傳禹穴何如孟婆風泠然亦可恱飄飄散幽襟裊裊起蘋末莫漫向春園吹攪梨花雪千山瓊瑶堆萬樹青葱沒砌面足虎鹽波心冷石髮凍鴉呌不已樵客歌獨歇誰與把筆人孤吟對寒月良宵值三五皓魄正髙懸海上初籠樹空中恰印川征人榆塞外才子綺樓前對景情偏别盈虧欲問天蒼蒼標正色浩浩逺無涯氣結山河秀光分日月華問曽傳正則補欲憶皇媧聞說空桑法曼陀更雨花薜荔繚為墻芙蓉盖成屋人疑是仙源客来探丹谷凌晨採春蘭裛露掇秋菊為恐脚踏殘短欄縛湘竹幽篁令人逺隔亭看約畧檀欒清影圓森踈餘粉落冒露振青竿韻風鳴紫籜伶倫十二管吹集雲中鶴振翮盤霄漢清標逈不羣九臯空外響午夜月中聞緱嶠随王子瀛洲駕太君千年遼海上鄉里隔浮雲因風勢欲牽出岫轉悠然乍可同蒼狗猶然䕃一蟬梳空紋似浪映日白於棉樓上分明看還疑谷口煙野燒致偏竒停車一望之初從山脚起俄向樹頭披最是村郊裏愛看濃淡時右丞雲水幅佳景妙於詩終朝静裏吟聊試拈毫手即景自怡恱裁句覓對偶但期合古人未許甜俗口不學李青蓮百篇酣斗酒甕裏香醪熟盃中湛露新麴紅傳綺席蟻緑獻佳辰錫嘏尊三爵言歡歴再廵兕觥方上夀天子萬年春麗日烘窻暖條風拂面宜愛看民析候更值物華時鳥語呼名急花嬌放朶遲寒氷已觧凍料可泛前池夹鏡抱花源曲欄圍瓊戸凌曉逺浮烟俯波倒映樹水心舟響檝岸上人接武最愛夜深時隔窻聼㸃雨霏微迷逺近徙倚小亭間樹潤蒼龍甲花明織錦斑塵氛歸閴寂澗水落潺湲更向天邊望珠簾隔萬山列嶂碧崚嶒乗間一眺登峰青髙旋髻泉迸逺拖繒誰識丹梯路羣觀白玉棱飛来小鷲嶺㑹遇浄名僧招提搆靈境滿樹蟬聲噪中有老尊宿拈芳坐深窕鐘魚共朝昏物外恣尋討却笑紅塵客勞勞洛陽道人歌行路難誰肯蓽門守學士錦輪飛將軍鐡馬走終日逐紅塵為客成白叟何為祖離亭更復折楊栁㶚岸千條色章臺萬縷煙待看飛絮日正值暮春天摇綠棲新燕成隂噪晩蟬最憐横古渡漁父釣清泉滴瀝復琤琮幽人詩料供尋源迷半嶺擘峡走雙龍入眼心方㓗烹茶興更濃瓦盆聲叩罷翹首望髙松立春前五日以詩代書問蔡先生病早起披衣喚小僮新裁柔翰走詩筒問師冷日迍邅景憶我春風坐卧中最是能安天與命况於所遇病非窮寄詩正值韶華近可與宜春帖子同臘月十九日立春氣轉鴻鈞萬物新寳旛綵勝總宜人韶光破臘都逢霽玉歴週年兩立春暗數元正纔㡬日須知殘嵗只餘旬朝来喜啜盤中餅明庶風飄送暖頻玉河氷泮靄靄春歸帝里新玉河觧凍泛清淪東風細拂紋如縠暖日晴摇色似銀隄上愛看初綠栁汀邊凝望未生蘋朝来添得流澌擁還恐遊波礙錦鱗玉河春栁春栁碧如煙春流宛轉沿低垂金鏡畔斜拂玉橋邊眉細波中畵腰輕風裏旋章臺千萬樹羡爾沐恩先探春花寳粟堆枝翠葉飄年年長自報青韶隐辭殘臘偕梅蕊逗漏陽和先栁條無事冶容争麗景别餘芳氣散疏寮庭前試問春来未坐對方知春信饒牡丹芽消息東皇淑氣調嫩芽新發䑕姑梢芳菲已許詩人賦麗艶猶遲畵筆描風信頻吹還未綻露華暗潤不須澆莫驚秃兀看来熟㡬日如霞映綺寮奉和二十一叔父癸丑元日早朝原韻昭蘇萬物樂春臺初日天門曉景催雉尾風摇雲影動龍鱗色煥曙光開蓼蕭禮異周詩咏湛露恩從漢殿来深喜圭璋成特達髫年書史共追陪花信風欲識春来處先看花信風未摇枝上綠已綻蕊頭紅長飬元功普吹嘘大造同何須催羯鼔列繡杏園東雍正癸丑二月七日經筵恭紀風光駘宕鼔春和講幄宏張俊彦羅稽古直探謨典秘談經逺邁漢唐多爐烟裊裊香凝座鵷列珊珊響振珂羣仰九重敷化雨從知大地沐恩波二月八日随皇父駕幸圓明園恭紀五首金輿赤羽鳳城隈上苑宸遊向日開最是東皇偏有信都於此日送春来和風披拂物華妍細泛松篁勝管絃緑野隂濃供勝覽紫騮一路不須鞭韶光先已到楓宸芳籞迎陽景倍新聖德體元七字裏是日御聨有節届仲春欣長養之句由来化育即皇仁栁隄冉冉纔舒緑桃塢菲菲已吐紅從識御園春信早不關二十四畨風平湖解凍泛龍舸打槳中流一字過謾憶荷塘紅十里且看春漲綠千波千里鏡誰歟巧製過工倕玩景何須出綺帷視逺惟明元在我鑑空無礙却慿伊光如水月初圓際了若湖山盡歴時聞道離朱能燭眇還疑千里未曾窺清明奉命恭祭景陵感成八韵猶憶髫齡際趨承御案前可憐逾廿載瞻拜鼎湖邊錫類皇仁切蠲辰孝享䖍應期春二月奉命九重天晴旭輝征䄂和風拂錦韉松榆深石路殿宇鎻雲煙盛禮陳今日深恩隔往年孫枝思祖德迴首淚澘然憇慈雲寺曉跨征鞍日漸斜暫教小憇梵王家雲深古殿苔衣潤風入髙松天籟譁語僕且閒從繋馬問僧何事亂鳴鴉比来塵境都消盡不用曼陀更雨花漁陽漁陽古名郡沃野遍桑麻士俗能知禮民風喜不奢長途来百里懐古憶三撾恰值清明日迎神晩出衙州民以清明日鼔吹迎城隍神謂之出廵盤山盤山山色翠空濛我欲登遊霧半封寄語山靈還訂約他時擬上最髙峯草色次第和風日日殊裙腰嫩合翠勻鋪芊眠大地春方半㸃綴寒村景不孤撩眼畵圖分别墅惹人詩思滿歸途凌晨却欲遲征馬恐踏芳郊破露珠春社社日慿誰報梁頭燕語新纔看如畵景已是可憐春風軟遊絲重晴烘花氣醇賽神村鼔響酣舞太平人賦得獨倚修篁看鶴籠萬竿寒雨鎻寒烟瑞鶴籠来不計年漫憶松梢餐玉露且從竹外飲秋泉風霜縱幸離身畔鳥雀難堪噪耳邊看鶴不如看放鶴一聲嘹唳碧雲天盆魚圓池蓄水不須寛依藻文魚自覺安待到夜深㣲雨滴跳波還似躍層瀾緑荇青萍可避隂一泓滿貯足浮沉箇中也有相忘樂不羡滄浪萬丈深賦得買夏欲論園夏日慿誰買名園畧可論青山列圖畵修竹是庭軒氷椀寒生簟香醅緑滿樽泉聲鳴石砌鳥語報松門消得三庚永渾忘九陌喧支公應問價欲告已忘言蘆塘放鴨新蒲㦸㦸纔生緑夏水油油欲縐波㡬隊看他輕放去消閒不作右軍鵞老鴨湖中欲去遲迴頭着意顧雛兒沙塘蘆岸蒼茫意一幅徐熙落墨時隐映蘆洲是鴨洲一羣唼喋逐波流勝他霜信勞長路饑餓瀟湘夜雨秋風車湯時竒肱國来朝所乗車御風而飛異物原非貴風車亦可稱輕輕隨籟動冉冉似雲興聖德寰區普遐方瑞應徵来賔非限逺奉朔自相仍謾說鸞凰翼何勞騄駬騰夕轅指帝里朝軫發竒肱列子應慚㨗工倕不擅能還輸西旅貢魯壁未曾登魚米樹一名康洋樹出宜興其結子似米則年豐似魚則多水農家以此占年云春入靈根枝葉抽嘉名聞道數興州求魚緣木須防澇聚米成林定有秋砌荚饒他能識朔庭萱空自解忘憂那如望樹占年好嵗嵗農家社鼓稠賦得船痕半載書春水弱無力春船行覺遲饒他乗興日是我讀書時桂棹逍遥去芸編左右披綆長堪汲古何用釣竿垂彈琴峡居庸關水流石鏬聲若調琴彈琴峡口聼彈琴清韻悠揚入聼深漫數成連工奏曲不須鍾子始知音調髙流水誰能和響薄焦桐更耐尋却笑陶公空掛壁何如大地是琴心朱草地祗格則朱草生賢人出聖德光天壌宸修格地祗瑞呈朱草出祥應紫雲垂㦸㦸抽莖宻離離擢榦竒朝芳珠露潤午秀恵風吹不數椿知嵗休誇蓂應時彚征占有吉濟濟助無為鶴跡曲徑苔迷路幽棲鶴作隣舞階猶惜影歩月不生塵印出留深跡翻將叠軟茵松門未曽掩幸得接嘉賔御製樂善堂全集定本巻二十六
