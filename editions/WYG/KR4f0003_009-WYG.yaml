body:
  text: 論唐太宗論當隋煬之時天下瓦解羣雄睚眦窺伺名器扵是太宗以英雄之資備仁義之徳復得髙祖之賢為之父易曰包䝉吉納婦吉子克家盖髙祖以柔中之徳賴太宗以陽剛之體發而用之以安天下固宜唐室之興也勃焉然太原興兵長安立帝不必詭行詐偽以兾利也不必尊江都而立代王也宜正其罪名聲大義以討之即位之後勵精圖治損己益人愛民従諫躬行仁義用房元齡魏徵之儔君臣相得不敢怠遑用致貞觀之盛令徳善政不可殫述可謂三代以下特出之賢君矣雖征遼之役志滿意盈然既失之後即復魏徴之碑勞其妻子深自損責其扵改過亦已敏矣夫賢君不世出成康以降數百年而有漢文帝漢文以降又數百年而有太宗要之以虚心待物損上益下用致天下之盛太宗與文帝率用是道文帝質美徳純過扵太宗然致治之盛豈能及貞觀哉人或論太宗有魏徴而身脩國理魏徴既沒而驕滿之意生者是不盡然惟其有太宗之君然後有魏徵之臣使太宗中人之主則雖有魏徵其亦如之何哉獨心無知道之實而身有好名之念屈己從諫而不免以術馭人故不能致天下扵熈皥耳然後世有逆諫而惡賢驕奢而自滿者方之太宗則又不啻倍蓰矣長孫皇后論夫閨門王化之始也詩三百而必以闗雎為首禮嚴大昏書重釐降易上經首乾坤下經首咸恒盖知正家之道必本扵閨門閨門正而后家齊國治也王者立后上法乾坤必求令徳有以禆成内政安貞載物然後協厥坤儀為天下母故太任太姒秉㳤徳而昌周眀徳馬后克恭儉而光漢古今所稱不可誣也文徳皇后長孫氏者實閨門之令望也仁孝恭儉少好讀書贊成内政禆益𢎞多訓諸子常以謙儉為先太宗亦敬其有徳常朝回怒曰㑹殺此田舎翁后問為誰帝曰魏徴扵是后退衣禮衣而稱賀扵上曰臣聞主聖則臣直乃陛下之聖故也妾敢不賀扵是帝喜而徵言無不聼夫唐太宗豈實欲殺魏徵哉然雖無此意亦微有不樂諫之心皇后一聞此語即借賀以諷諫之徵益寵信而帝善益彰然後知正内之益所不可少而有乾之健必得坤之貞以順承之也易曰牝馬地類行地無疆盖馬隂物也隂之徳利柔順然必利貞而行地無疆然後輔乾以行澤及天下若徒柔順而鮮貞則又何能助乾道而沛膏澤哉若長孫皇后不預朝政雖帝問之亦終不對可謂知安貞之義者矣其資送公主諷諫以安直臣得疾不事道釋之教尤為賢眀名垂百世嫓美周姜宜哉唐肅宗論天寳之亂眀皇幸蜀肅宗留靈武其秋即位尊帝為太上皇君子曰肅宗之立非禮也雖云依衆人之情順眀皇之命而速取大位開後世幸亂之端豈非悖扵子道哉及其削除大難㝎天下迎上皇還西京奉養晨昏親修子職可謂善矣然聴嬖幸之言遷上皇西内以兵守之又非人類之所為矣世稱其克復之功目之為中興然而慚徳實多當是時子儀効力扵外李泌謀之扵内故平逆亂易如反掌迨反正之後肅宗之志荒矣始則興復方隆而建寧身死後則身沒未㡬而良娣被弑身為人子而不保其父為人父而不保其子為人夫而不保其妻三綱淪矣夫何足論之有唐徳宗論世之論徳宗者以為有三失焉一曰事姑息二曰任閹宦三曰好聚斂而不知其致亂之由則在扵用小人而忌君子也觀其即位之初用崔佑甫為相而天下清寧屢有善政却李正己之幣而賜其本軍非務姑息也杖中使邵光超非任閹宦也詔罷四方貢獻非好聚斂也故翕然稱治㡬扵貞觀而盧杞一用三者皆反之馴致泾原之亂豈非治亂興衰之眀騐與在奉天時朱泚圍城救兵不至扵是始信陸贄言聴計従下罪己之詔而軍士感泣懐光再叛帝幸梁州中路失贄至扵痛哭用其謀社稷復安至扵復國之後鳥盡弓蔵以讒見逺懼藩鎮之禍而繼以姑息念窘窮之敝而加以好貨中使用事天下衰微是猶弱病方愈而懲其不能飲食加之以飽食酣飲豈不殆哉原其本末則始之清眀由用崔佑甫其亂由用盧杞其復故都由信任陸贄其後復㡬至扵亂由不卒用陸贄而貶斥之一人之身所為如是盖能戒之扵有事之日而不能謹之扵無事之時也其致亂頋不宜哉唐憲宗論自天寳之亂天下分崩民人塗炭藩鎮強梁權移宦寺肅代徳宗屢致播遷國勢陵夷叛臣棊布迨及憲宗以英武之資用賢能之相聴言納諫約已安民翦除藩鎮易扵發䝉扵是平夏滅蜀朝江東從澤潞致魏博㝎淮蔡来成徳奮五世不振之威拔數傳擅命之冦威福在上政由人君發號施令㒺有不臧雖有彊鎮順従朝廷奉命唯謹號稱中興不亦宜乎及其天下平定四海無事乃進言利之臣信方士之說志滿心驕禍起所忽惜哉使憲宗克永其終任裴度而行其道斥皇甫鏄程异之徒加以休養生息為萬世業則貞觀之治復興未可知也唐穆宗論自古亡國敗家未有不由子孫昏弱乖先王令典以致喪亂唐自眀皇末年不修太宗之業外用小人内寵妃子天下大亂職此之由延及憲宗獨能奮前世之威烈監扵成憲削平藩鎮天下歸心至扵穆宗復不能修憲宗之政逰畋聲色放心嗜欲宰相蕭俛段文昌杜文頴輩又無逺略扵是朱克融作亂扵盧龍王庭凑倡逆扵成徳魏博諸軍以次叛亂數十年經營而得之者皆不復有而唐竟以此亡豈非後嗣不肖不能守父祖之業而以致喪亂哉歐陽公曰憂勞可以興國逸豫可以亡身觀憲宗之延英論事汗浃御背與穆宗之躭湎好色其勤逸何相逺哉褚遂良論夫天下之治亂係扵人臣之邪正而人臣之邪正又在人君之用與不用也當有唐之興也太宗以英武之資得魏徴佐之言聴諫從厯有年所用致貞觀之盛天下安寧㡬扵三代迨及髙宗昏庸淫欲内政既傾天下亦亂雖有褚遂良之忠正而無私攻君之惡適足受其斧斤耳又何能輔弼匡救以安天下哉由是觀之正士忠臣世不乏人而人君信用與不信用實相為感召也是故有堯舜之君必有臯夔稷契之臣有桀紂之君必有飛㢘惡来之臣堯舜在上則雖有飛㢘惡来之徒必竄之扵逺方桀紂在上則雖有臯夔稷契之臣亦屏而不用雲從龍風従虎其氣相感其理固不易也故太宗居帝位而魏徴用髙宗居帝位而遂良棄使魏徴及髙宗之世則亦不免有廢黜之患矣致使忠臣陵夷女后用事奸臣竊福國家殄滅非髙宗之咎其誰之咎哉遂良以公滅私憂國忘家當太宗之時即數著忠諫及武后欲立時帝召大臣遂良曰今日之召多為中宫上意既㝎逆之必死乃請已獨諫既進上果言后事遂良極諫不聴乃置笏殿階叩頭流血上怒出為都督既而長孫無忌䓁皆得罪遂良死扵徙所嗟夫遂良可謂忠矣君有非也乃諫之既不聴又諫之又不聴又置笏殿階叩頭流血而諫之卒致顛沛流離死扵徙所豈非髙宗之過哉然遂良雖貶黜流離一至扵此而忠名垂之千古浩氣森扵史冊身雖沒而可見太宗扵地下為唐名臣志存社稷偉哉郭子儀論自古大臣出將入相為國安危者必有忠誠之徳經世之才有以扶危㝎傾安邦守國然後立非常之功萬世之業漢之孔眀唐之子儀信其人也二公皆以忠正老成為當世人望加以非常之才功盖天下是故亮沒而漢亡子儀存而唐復古今所稱不可誣也當天寳之亂眀皇幸蜀肅宗嗣位河南河北兩亰皆為賊有蜂屯蟻雜不可爬梳而子儀以􅃋方之兵平㝎中原収復兩京唐祚中復其有功扵唐大矣及天下畧平大難略㝎讒臣伺間奪其兵權然朝命夕至無纎介扵心單騎見敵感以誠信非篤扵君臣之義動天地而泣鬼神者能之乎事上忠御下恕待人和馭将誠故朝恩以小人而知化承嗣以傲狠而拜使囬紇以蠻貊而慕誠靈耀以據汴而衛幣勲名顯爍千古不朽惟其忠義篤誠根扵心故也陸贄論治有不生扵治之日亂有不生扵亂之時有國家者宜正其本而辨之扵早也吾讀史至唐徳宗之時謂朱泚之亂不生扵姚令言而生扵用盧杞復唐之功不在扵用李晟而在扵信陸贄天下之治亂社稷之安危在扵人君用一人由是觀之用人可不慎哉當奉天之難天下反者十四五藩鎮擁彊兵虎視中原而朱泚兵勁將彊圍城累月其破圍解難冒矢石觸鋒刃以救帝復國者固李晟渾瑊諸将之功而經營大計調和天下使諸鎮人人思慕唐徳者非陸贄之功其誰之功與余故曰復唐之功不在扵用李晟而在扵信陸贄也贄為人剛方嚴正而有經世之才其奏疏皆可行可法措之扵天下則有治安之效大抵以仁義為夲根貨財為末務論深切扵事情言不離扵道徳至扵君子小人之分忠厚苛刻之別推誠任術之判未嘗不反復為徳宗言之故在奉天之時悉聴其言而藩鎮畏威梁州􅄪幸道路相失號痛如失左右手及天下略平大難略定乃置扵閒散者數年雖命為相不能信用又聴裴延齡之讒而貶扵逺州盖君子小人之分若此其難雖贄反復言之而身亦不免扵廢黜也順宗即位復欲用之詔未至而沒惜哉李晟論唐室之亂始扵藩鎮彊梁虎視天下相連為朋河北諸鎮為尤甚盖自肅宗之時僕固懐恩懐不逞之心欲結彊鎮以賊将為節度遂世襲以為已有而不奉命朝廷其後涇原之亂徳宗幸奉天諸鎮雖有戮力王家以拒朱泚如李懐光者而稍有不合則復叛而歸泚扵是藩鎮之勢益横而天子之權益弱惟李晟則不然晟以數千之兵破朱泚解重圍復居二冦之間卒以收復西亰身居寵貴為唐宗臣功亦偉矣而張延賞之徒讒言一行則流涕目瘇人徒議其怯而不知此其所以為純臣也使晟如懐光之徒受讒則叛豈其兵力才武不足為與亦眀扵君臣之分忠義篤而邪私不能動耳世稱郭子儀忠厚誠信為唐名將故其麾下諸将如李晟馬燧渾瑊皆有不世之功而晟尤其傑出者與裴度論憲宗首即大位即有削平藩鎮之志用賢能之相時若杜黄裳李絳裴度諸人皆在相位而出將入相功烈顯著者又推裴度為首焉當是時憲宗方望治扵度而度亦以治平為已任國有賢相外冦拱手理固然也方吳元濟之欲為亂也自請襲節度使朝臣皆務姑息欲與之帝曰吾用度一人足破二賊乃聴其謀猷専任責成扵是成徳魏博淄青三鎮皆歸朝廷天下方翕然望治以為武功既成度相天子居廟堂煥文治眀良之遇何如也不知志滿驕生小人乗間方士鼓其邪說利臣中其膏肓而裴度出為河東節度使矣穆宗時三鎮叛亂復以度討之而小人沮之扵内使無成功敬宗聴韋䖏厚之言用以為相而復出之文宗有優崇之典而無信用之心度亦遂優㳺緑野而無志天下事矣嗟夫君臣之間若此其難哉以裴度之忠誠正直加以經國之才歴事四帝獨憲宗初年信用㝡篤以有成效餘則或用之不専或出之扵外皆由小人在朝而正直之人日以踈逺以憲宗知度之深功烈顯著猶不能保其終况扵穆宗敬宗文宗哉李絳論唐自肅代以降威令不行藩鎮跋扈憲宗初即大位即有削平之心用賢相聴直言而繩愆糾謬靖恭匪懈者以李絳為首絳繼杜黄裳裴垍為相憲宗欲治之心方殷常以太宗之治自任而絳亦以魏徴自况故君臣相得魚水交歡言聴計従無所違拂是故寵莫如吐突承璀則逺而出之扵外信莫如佛氏之教則斷而斥其碑樓朋黨之疑一言而開貨財之好一言而解行之數年内安外靖承宗束手元濟就擒雖云裴度之力亦由絳開之扵先也余嘗論太宗之扵魏徵憲宗之扵李絳其用與不用係夫治與不治未始不同軌焉何也太宗用魏徴天下大治米斗三錢夜户不閉而魏徴既沒則有東征之後天下罷敝公私困乏憲宗用李絳藩鎮畏威不敢横肆民財充足天下乂安而李絳一出則聴言之心稍怠迨及平蔡而志滿心驕愈不可制矣由此觀之以太宗憲宗之英眀猶賴賢相為輔况扵中材之君哉李徳裕論唐自眀皇以後為國大害者外則有藩鎮彊梁抗横天子内則有宦寺秉權威福已出武宗即位用一李徳裕而河北三鎮效命昭義軍拒命即以兩鎮兵討之仇士良屏息而致仕後復籍其家何其威命之行至扵如此哉盖由賢相用事垂紳正笏不動聲色而天下自畏其威也當是時武宗方信任徳裕期以必治而徳裕之才亦足以制服諸鎮故諸鎮使者至京必面諭之曰語汝使與其使大將以求官何如自結眀天子以是三鎮不敢有異志為國輕重者㡬數年功烈顯名肩扵裴度然而不能免扵朋黨之習因公以報私挟勢以復怨君子未甞不惜之以徳裕之才加之公正無偏雖古名臣何以過哉唐總論治天下之道當以正風俗得民心敦士行復古禮為先故其末也人思之而不忘後世子孫賴之以安唐承五代之末髙祖創業之後休養生息易武以文太宗以英武之資加之以忠貞之輔聴言納諫用賢録能興學校勸農桑行租庸調之法為子孫萬年之計可謂謀之詳矣髙宗以柔暗之君承父餘烈初即位時頗有善政末年嬖武后身沒而祚移唐室子孫誅殺殆盡中宗循其覆轍為婦所弑方之髙宗殆不如矣睿宗以眀皇為之子復辟之功不與焉然父以子貴故眀皇討賊而睿宗入即大位鍳建成之亂立嫡以功繼以傳位可謂知權者矣眀皇即位欲治之心方殷用姚宋為相二十年間政治㡬扵貞觀後寵楊貴妃用李林甫以致禄山之亂而乘輿播遷天下分裂遂始扵此肅宗用郭子儀削平逆黨復唐社稷然遂以賊黨為節度使而河北三鎮之禍終唐之世莫能定矣代宗徳宗皆以中材之君好務姑息而内復有宦寺之禍順宗即位數月傳國冢嗣憲宗有平一六合復祖宗功業之心扵是杜黄裳裴垍李絳裴度諸人相繼為相河北三鎮效命不敢横肆然末年惑扵方士之說志復驕滿故有陳𢎞志之禍穆宗不克負荷三鎮再失敬宗即位三年而為宦寺所弑文宗受制家臣鬰鬰而沒武宗用一李徳裕而藩鎮屏息宦寺斂足以享國日淺不遂其志宣宗以刻為眀多用智術然納諫不懈盡心民事不敢少怠懿宗驕奢無度元氣已壊迨及僖昭而唐遂亡矣嗟夫觀太宗之立法垂猷為子孫計者豈不詳且深乎然而終至扵亡者盖所謂得之難而失之易也總之眀皇以前内亂為多禍多興扵女色眀皇以後外亂為多禍多起扵藩鎮又加之以宦寺内訌然而僖昭數遷京城數危而羣雄相視不敢去臣位雖朱全忠篡位而奉正朔稱天祐者尚數鎮可不謂太宗之餘烈乎書曰監扵先王成憲其永無愆亶其然乎御製樂善堂全集定本巻五
