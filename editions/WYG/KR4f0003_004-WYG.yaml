body:
  text: 巻一論立身以至誠為本論讀書以明理為先論休休有容論信而後諫論寛則得衆論修道之謂教論敬以直内論上下交而其志同論君子以虛受人論家人上九有孚威如終吉論懼以終始其要无咎論物不可以苟合論巻二論嘉言罔攸伏論有言逆于汝心必求諸道論夙夜基命宥宻論春王正月論晉荀林父帥師及楚子戰于邲晉師敗績論晉侯及楚子鄭伯戰于鄢陵楚子鄭師敗績論作三軍論三月公會晉侯宋公衛侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于溴梁戊寅大夫盟論諸侯同盟于平丘公不與盟論巻三論愛親者不敢惡於人敬親者不敢慢於人論以仁育萬物以義正萬民論為萬世開太平論動亦定静亦定論治天下在得人論傅說論周平王東遷論宋襄公論晉悼公論宋伯姬論巻四論漢武帝論漢元帝論韓淮隂背水陣破趙論西漢總論漢光武論李固杜喬論東漢總論蜀漢興亡論東呉總論東晉總論北魏世祖拓䟦燾論巻五論唐太宗論長孫皇后論唐肅宗論唐德宗論唐憲宗論唐穆宗論禇遂良論郭子儀論陸贄論李晟論裴度論李絳論李德裕論唐總論巻六論後唐總論張承業論宋太祖論宋宣仁皇后論吕端論韓琦論明道程子論程明道告神宗當防未萌之欲論北宋總論宋理宗論岳武穆論文天祥論南宋總論元仁宗論許衡論說復性說巻七序貞觀政要序韓文公文集序杜子美詩序朱子資治通鑑綱目序大學衍義補序送五弟奉命往祭闕里文廟序送平郡王奉命往盛京脩理福陵前河道序送定邊大将軍平郡王西征序稽古齋文鈔序巻八記皇祖聖祖仁皇帝恩賜御書記瀛䑓記豐澤園記田字房記時應宫記樂善堂記四餘室記二希堂記䟦恭䟦世祖章皇帝御註孝經恭䟦皇祖聖祖仁皇帝御製避暑山荘三十六景詩恭䟦皇祖聖祖仁皇帝千叟宴詩恭䟦性理精義䟦朱子大學章句書魏鄭公十思䟽後書新唐書兵志論後書朱子戊申封事後巻九雜著讀二南讀鹿鳴至天保六詩讀􅆁鄘衛風讀秦風讀無逸讀吕刑讀秦誓讀董江都賢良三策讀楊漣劾魏忠賢二十四大罪䟽擬程明道請修學校尊師儒取士劄子擬胡安定置經義治事二齋記擬尹和靖六有齋記巻十表擬上頒聖祖仁皇帝御纂易書詩春秋講說朱子全書性理精義等書謝表擬闕里文廟告成賀表頌九符贊十臣贊箴虛受箴銘樂善堂銘巻十一賦耕耤賦四時勤政賦東郊迎春賦喜雨賦秋陽賦燈花賦鳯凰來儀賦重修闕里文廟告成賦巻十二賦萬壽日慶雲見苗疆賦為善最樂賦良玉比君子賦指佞草賦松竹四時瀟灑賦帝賚良弼賦天爵賦相馬賦九日登髙賦五日角黍賦六藝賦日方升賦瑾瑜匿瑕賦水輪賦白鹿洞賦巻十三賦文戰賦望嶧山賦迎長日之至賦景陵瑞芝賦五絲賦稼穯惟寳賦南風之薫賦書同文賦秋河賦荔枝賦多稼如雲賦聖德合天地賦鳥求友聲賦麥秋賦夏雲賦學問至芻蕘賦巻十四古體詩古風十五首新竹海子行圍同聞之蔡先生五弟讀杜子美秋興詩分韻得肉字關山月題李白泰山觀日圖限韻喜雨四言詩讀昌黎集銅鼓歌讀貞觀政要傅修期公莫舞歌蠲租樂擬樂府黄石授書讀司馬温公諫院題名記芝蘭曲髙其佩指頭畫廬山瀑布觀穫擁罏讀書歌煖硯歌臘八日自鳴鐘題宋宣和清明上河圖用駱賔王帝京篇韻題戴天瑞指畫山水圖新蟬巻十五古體詩古硯擬蘇子瞻逰赤壁詩題王原祁秋山圖郊圍見西成有象即事志喜南苑觀魚馴象歌白馬行德壽寺古鼎歌沍寒行髙其佩指頭畫馬冬夜煎茶讀西山先生大學衍義飼金魚開圃王𤓰新荷題静憇軒鵲營巢讀杜詩翠雲硯歌冬夜偶作沈石田秋林獨歩圖五弟有葫蘆筆筒用十年矣屬余題句題白居易飬竹記望雪行丈室燒香曲剪燭詞祀竈畢啖糖餳屛風謡水仙玻璃鏡春夜偶成相風填倉日催耕鳥素几謡玻璃窓巻十六古體詩長春二月十一日晚烹雪水偶成春蔬雨前茶古意樓松王叔明山水圖大理石牀歌春暮西厰騎射移碧桃髙其佩指頭畫虎水竹村有鳥二十章采松花新漲讀蘇子瞻題司馬君實獨樂園詩即用原韻觀刈麥雨後聼溪聲熱讀書樂秋蘭投壺蓍簮吟擬杜工部東鄰棗樹歌鬬蟋蟀巻十七古體詩題唐岱重溪煙靄便面讀白樂天集擬栁子厚始得西山宴遊詩相馬吟猛虎行擬桃花源中人送漁郎出源擬漁人復至桃花源不復得路聼鶴鳴芸香冬夜偶成換燭詞弔宋末張陸雙忠遣興擬杜工部洗兵馬行傳聞冰牀帝京嵗暮八咏擬樂府讀陶詩春水泛舟尋春見山桃始開曉起聞雀聲馬上吟詩好所見曉陰過通州浮橋灌麥讀范文正公神道碑用宋陳傅良原咏韻鳩喚雨玉帶生歌雨工陶琴蠅拂子藺相如巻十八古體詩繰絲曲北風圖冰椀拱極城松風青玉簟王明君雪浪石騎秋雨静夜吟唐寅山静日長圖關山月櫂歌行古意神絃曲秋夕讀髙青邱大全集蘆白花壯士行織錦詞灌園虞美人曲弔孟黶李夫人歌題髙其佩指頭畫八駿圖秋夜詞讀申屠蟠傳謝人送墨美人磨鏡圖鷗捕魚倒掛牧牛詞題馬賁畫班媫妤戱擬禽言巻十九古體詩古風十三首蘇卿節侍中衣鄭公笏叚太尉笏侠烈行秦吉了藏雪烹雪用前韻冬夜聞空鐘射雉行學仙謡向火寒月過曲澗花香逰流杯亭日知閣諸勝充隐秋夜遣興夜坐憶遠緑珠題二十一叔父山静日長小景鶴媒歌雉媒歌馮媫妤神仙曲海市覺生寺大鐘題晉戴逵剡山圖恭瞻萬壑松風圖感而有作行宫遣興雨中舟歸放鯉舟行折芳圖巻二十古體詩夜雨齋中焚香雨中聞雁種松暮春曲西海捕魚採芝詞自題照縛雞行春蠶食葉聲秧馬聞蛙五日芒種銷夏花石綱野田行姑息行夜卧聼雨憶平郡王伐棗歌郭河陽關山積雪圖探雀兒㯶拂子豐碑行遣興燕引雛食蓮擬古七首馬賁牧牛圖中樞歌青青水中蒲三首鴈奴謡丹青樹度竹鐘聲古别離唐寅秋林髙士圖新月七夕詞弋鴈篇見桃下栽松感而有作饑鶴行羽林執㦸郎巻二十一古體詩題劉松年武夷九曲圖憶聞之蔡先生少年行雨同五弟月夜舟歸遠將歸城門歌廢宅行蓼花風有所思月夜蘆洲雲䑓歌除架秋原草漁舟唱晚秋浦泛舟髙其佩指頭畫魚有初行八月三日作仲秋曲夜聞覺生寺鐘桑條韋遊西海南苑雨中即景䨇栁樹海子外行圍鷹搏兎南紅門捕魚寄衣曲瀚海石子歌濬沼題唐岱秋山不老手巻賦得霜花撲曉韉題李思訓寒江待渡圖風篁笙奏雀噪冬夜對月書懐遊法海寺即景法海寺題壁冬夜讀韋詩蠟珠謡村賽曲霜曉炊煙嗇夫詞鶴氅裘草色萍始生石徑松雲漁荘晚霽野寺殘陽野店風帘過覺生禪房巻二十二古體詩熏香謡漁鄉曝網松陰午憇温泉荷花聞雞起舞曲題林朝鍇蒼松霜隼圖六月十四日聞蛩卧月題趙文敏中峰懐净土詩畫巻陌上桑封鮓行疾風勁草七夕篇古風細栁營行折檻行寄衣曲詠塞上達蘭海蘭松木筆格觀刈月夜泛舟招鶴行秋江曲送梁學士假歸省親慕容垂放燈曲待月秋日泛舟西海題朱貞女傳鶴唳行鳴雁行奕金籠鸚鵡曲秋日過廣通寺西山下故宫曲瀛洲亭明窓秋影驄馬御史歌江臯曲秋日同二十四叔父五弟逰玉泉諸名勝即事誌興用爽氣澄蘭沼秋香動桂林為韻十首題趙孟頫洗馬圖巻二十三今體詩御賜書經傳説彚纂恭紀二十二韻暮春喜雨恭和御製三月三日得雨原韻題十八學士圖賦得春風傳我意白鹿洞花影栁塘送春夏雲賦得秋水長天一色水中樓影新秋夜雨九日乾清宫侍宴恭紀寒夜聞霜鐘題仙子圖逰玉泉山見秋成誌喜恭祝皇父萬壽雍正己酉仲冬闕里文廟上梁前二日慶雲見上躬詣太學致祭恭紀二十四韻留侯郭汾陽己酉冬十一月二十一日皇父御書立身以至誠為本讀書以明理為先一聨恩賜懸掛書齋以寓訓誨至意恭紀臨池栁行圍春日雨後海子外行圍青雲店民家見梁上䨇燕偶興楊栁風顧孝㢘䝉聖恩特賜進士詩以賀之賦得鷺立蘆花秋水明九日講武恭紀九日登髙霜隼下晴臯壽五弟帝京雜咏辛亥二月朔皇父賜御書對聨恭紀辛亥仲春上幸豐澤園演耕耤禮上躬四推命臣等終畝恭擬應制十韻西厰習射即事佛手晚眺丁香花巻二十四今體詩燕山八景詩闕里祭器新成賜觀簠簋鉶登豆爵六色恭紀八韻恭祝皇母聖壽賦得一雨便如秋雍正九年六月上以近畿三省雨澤愆期豫籌賑恤之䇿甘霖叠沛恭紀十二韻志喜賦得七月流火秋露如珠秋日播麥新生將獵南苑檢㸃所擕書籍校獵阻雨辛亥秋九月出南苑行圍以穡事未竣不果獵而還讀楊忠愍集御賜詩經傳説彚纂恭紀十韻恭瞻皇祖恩賜御筆感賦鏡中燈雍正九年十二月二十日皇祖實録御訓告成皇父陞殿恭受禮成羣臣慶賀恭紀賜烏銅罏恭紀平郡王修理福陵前水法告成還京賦贈三十二韻孟春十日夜偶成十六韻玻瓈盤恭讀皇祖御製避暑山荘三十六景詩并閲圖感成長句五首東作賦得花隨春令發題蔣南沙相國畫屏五景春日寄朱可亭先生五十二韻巻二十五今體詩三月十三日隨皇父駕幸圓明園得詩六首賦得好雨知時節栁溪垂釣聽松賦得泉和萬籟吟濯纓泉恭和御製詠竹原韻從軍行送邵通叅奉命典試江西顔魯公祠堂讀項羽紀讀武侯出師表裁衣寄從軍者送毅菴鄂相國奉命經畧西陲賦得鶴舞千年樹活水冒雨尋菊輓戴九臯弔睢陽䨇忠恭讀皇祖聖祖仁皇帝御題耕織圖四十六景詩敬和原韻輓蔡忠烈公巻二十六今體詩石鼓聞軍營大㨗誌喜景陵寳城山上産石芝一本彩芝四本恭紀二律賜哈宻𤓰恭紀恭和御製冬至齋宫詩二章原韻再擬冬至齋宫三首橘凍雲凝雪冬早聞雀聲恭讀御製丁未長至日詩敬依原韻村墟夜舂冬日寄蔡聞之先生詩思奉和二十一叔父用蟬聨體賦得松風雪月天花竹鶴雲烟詩酒春池雨山僧道栁泉原韻立春前五日以詩代書問蔡先生病臘月十九日立春玉河冰泮玉河春栁探春花牡丹芽奉和二十一叔父癸丑元日早朝原韻花信風雍正癸丑二月七日經筵恭紀二月八日隨皇父駕幸圓明園恭紀五首千里鏡清明奉命恭祭景陵感成八韻憇慈雲寺漁陽盤山草色春社賦得獨倚修篁看鶴籠盆魚賦得買夏欲論園蘆塘放鴨風車魚米樹賦得船痕半載書彈琴峡朱草鶴跡巻二十七今體詩奉題二十四叔父裕德軒三十韻螢芭蕉逐凉立秋夜作小園閒咏十五首秋日寄髙安朱先生凉州詞破秋荷燈槐市清河送平郡王西征秋社賣菊翁夜聼落葉聲始裘賦得野徑尋梅見小春櫽括蘇子瞻後赤壁賦即用賦字送桐城張先生暫假歸里西厰騎射萬年松御賜端硯恭紀歸鴉十宫詞帝京雜咏題宋徽宗竹枝䨇雀題呉梅村集十一月十三日恭遇皇祖忌辰感成長句橄㰖茶癸丑冬至上躬祀南郊迴鑾㳟紀冬至後一日同二十四叔父五弟逰西苑試射巻二十八今體詩題唐岱畫頁夜坐水雲榭讀王安石傳幻景四咏冬夜憶平郡王冬夜食哈宻𤓰龍翰傅先生䝉恩簡署司㓂詩以賀之逰蕉園賦得自鋤明月種梅花與唐岱百衲琴題易祖栻墨竹巻雪事八咏題董元山彴圖題鄒一桂花卉十二幅甲寅元日立春雪消春曉上林花氣清明前三日御試命和唐人韻口占應制榆莢雨春雲題唐岱仿古十二幀甲寅三月上耕耤廻鑾迎駕㳟紀讀董仲舒傳同五弟舟過萬壽寺小憇御園從耕㳟紀六韻積書巗蜂衙賦得沙留鳥篆斜轆轤聲蟬始鳴巻二十九今體詩烹茶石笋過雪上人禪房賦得得雨溪聲壯雨後池塘閒歩頒冰題元祐黨人碑夏日園居即事夏日寄龍翰傅先生雨中舟行看山避暑夏日寄二十一叔父索詩畫賦得人立藕花風六月晦日作詠史十首竹裏流螢雨夜聞梵聲新秋秋熱秋英前寄詩索二十一叔父近製承惠尺幅兼辱和章仍用原韻志謝雨夜聞蛩陰陽石晴郭河陽峨嵋霽雪圖軍装八咏晝漏洞庭始波鬥蟋蟀贈從軍者秋畦秋中秋前一夕對月澄江如練聞鴈暮過御河橋呉殿懐古瀛臺觀木變石水始氷板橋霜跡刻漏題焦秉貞人物畫册十二幀巻三十今體詩冬月盆菊冬日同五弟逰西苑即事甲寅冬至上躬祀南郊㳟紀四律蜡日坐冰牀度太液池誌興冬夜燈花探春春曉隔花宫漏過淋河清明日奉命㳟祭景陵感成五律逺煙王原祁雨景畫書開元遺事後雨中訪僧不遇題趙松雪竹院鳴泉圖題趙伯駒仙山樓閣巻夏興三十首賦得岸痕新雨過清簟看棋鄭宅茶夏日園居即事有至自軍中者詩以慰之兼憶如心居士荷珠題髙其佩指頭畫雞平湖雨渡八首晩晴野塘月色水底霞天新凉題唐寅畫箑秋信題丁雲鵬羅漢巻曝書雨題石屛二絶萬壽寺方丈小憇秋曉重乳燕過玉蝀橋三首臣等謹案御製樂善堂文集定本三十巻乾隆二十三年協辦大學士尚書臣蔣溥等奉勅重編我皇上詩文總萃富有日新雍正庚戌之秋始訂為文鈔十四巻乾隆丁巳取文鈔所載十之三益以乙卯以前續著十之七彚為文集頒行宇内至是復以初刻巻帙較繁特詔内廷諸臣校閲刪訂省去制羲一巻得㫖刋布愈有以見日進無疆之學與聖不自聖之心並昭示無極矣乾隆四十年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
