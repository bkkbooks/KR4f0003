front:
  text: 欽定四庫全書御製樂善堂全集定本巻二十三
  hash: sha256:92c67c33c33938027992eb3e1f8092cb5b56540b9ab444296e357186a6d05722
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0003_WYG_027-1a, image: WYG1300/WYG1300-0471a.png}
body:
  text: 今體詩御賜書經傳說彚纂恭紀二十二韻帝治布寰瀛天心佑永清奉三宏建極得一允居貞禮樂觀明備詩書恱性情石渠掄碩彦天禄聚羣英謂是典謨語由来齊治程先朝曾纂輯今日重脩明諸子收精粹羣言費品評孔門傳伏氏漢代著康成自合抽絲細非如聚訟争紫陽經校定仲黙㡬研精多士承明命儒臣殫悃誠午窻几上列乙夜案頭横㡬嵗青藜照逾時全壁呈奎文光有蔚聖語奥難名非僅筌蹄得將俾天地平恵民符保赤卜相法調羔佑起明良盛栽培宅俊宏千秋傳治典萬國仰躬行喜荷縹緗賜㤙叨雨露榮臚陳明國是往復繹歌𢋫識淺難窺秘心䖍等捧盈從知文治化海宇慶同聲暮春喜雨正是三農望雨時甘霖應候為頻施緑添香稻抽初頴紅綻名花壓故枝澤被園林新似染膏流村落滑如脂黄雲㑹見田疇盛大有人歌擊壌詩恭和御製三月三日得雨原韻知時甘雨動春荄潤物流膏澤孔皆綠野空濛生意滿平疇霡霂兆情諧豐亨景象占多慶晼晩風光喜更佳自是天心馨至治嘉祥允慰一人懐題十八學士圖風虎雲龍自景從畵圖冠佩盛雍容緱山無客招王子盡向瀛洲傲赤松賦得春風傳我意轉蕙催􅕴瑞靄紛十分春色占三分泠泠入律渾難識習習過條静不聞岸栁待梳青碧縷池波欲縐綺羅紋吹嘘到處皆生意傳我窻前大塊文白鹿洞李渤結廬後綘帷開紫陽經綸歸性命道德煥文章剖析危㣲㫖從容禮法塲祗今傳鹿洞几席有餘香花影花散清隂傍砌移半疎半宻影遲遲鵲飛空自周三匝鷦羽應難借一枝輕䕶錦苔方掩映低臨文石更參差香紅競逞尋常事那比風前月下姿栁塘送春惜春無計可稽遲花信更畨欲盡時惟有栁枝低拂處烟絲依舊戀清池緑栁煙濃度鳥聲流光荏苒最關情年年春事成功後消得長條㡬送迎夏雲出岫還成岫從龍更似龍何當化霖雨沛澤潤三農賦得秋水長天一色天涵静碧水涵虚本色今朝見太初决眥空明無下鵠印心澄徹有遊魚已包物象三千界不數玻璃萬頃餘試想滄浪垂釣客一竿相對意如如水中樓影清池㶑灔映長空蘸影樓臺入水紅軒爽龍盤金鏡裏觚稜鳳翥玉壺中仙翁宅近人難到帝子居遥路未通眼底景光天外想畵圖一幅水晶宫新秋夜雨西風驅溽暑細雨送㣲寒洗竹枝逾緑經楓葉未丹乍披襟颯爽不覺夜闌干秋色今多少来朝仔細看九日乾清宫侍宴恭紀繡錯仙枝煥彩霞重陽侍宴佩茰華牋分御筆親標韵席撤皇恩别賜𤓰一德賡歌仁夀世太和景象聖人家獻詩爵躍追天保宴畢歸来日未斜寒夜聞霜鐘夢醒不成眠鐘鳴欲曙天一聲清夜氣到處警官聨繞闕華紳肅趨朝玉珮傳披衣更危坐無逸誦終萹題仙子圖紫芝瑶草滿丹山特向髙峯取次攀披荔不須霞作帔帯蘿何用玉為鬟緑華去後留條脫洛浦逢時觧佩環行地暫辭鸞鶴駕五銖衣袖接仙班遊玉泉山見秋成誌喜天未風吹溽暑清家家銍艾慶西成宜人爽氣山前景載我扁舟畵裏行田父村頭閒共語牧童牛背笑相迎年来屢見三秋稔擬報農祥慰聖情恭祝皇父萬夀太平天子應昌期五十欣逢獻夀時華渚波澄虹爛縵瑶光霄燭月琉璃野農芹曝精誠㑹仙仗衣冠拜舞隨正是太和充宇宙春暉照耀萬年枝雍正已酉仲冬闕里文廟上梁前二日慶雲見上躬詣太學致祭恭紀二十四韻化洽文明世風登熙皥時車書九有共禮樂萬方綏至治乾坤應仁㤙草木知崇儒欽往聖重道禮先師特舉臨雍典頻行釋奠儀宫墻新棟宇殿廡整罘罳文廟以雍正甲辰年重修軒爽盤青鳳觚稜卧赤螭桷成輝玉磶杗立焕松楣上瑞方呈日卿雲恰應期非烟籠紫閣似霧匝丹墀掞藻流光遍懸華曵曜竒欎蓊承日麗糺縵布天垂文運重離炳嘉祥衆目窺守臣封表進大吏露章随喜氣三宫滿歡聲九陌馳龍墀涣大號鳳詔凛如絲聖德誠光被宸𠂻益慎持命期勤翠輦卜日展鸞旗詣學行殊典𢎞文答景禧因加登選額㤙㫖明年㑹試加至四百名壬子科鄉試十名加一名用勵作新思藝苑薫風普膠庠膏雨滋唐虞風更洽洙泗道逾彌玉燭綿皇祚金甌鞏帝基萬年綏福履端拱樂無為留侯博浪金椎中屬車圮橋遁跡得竒書坐謀帷幄追秦鹿立定中原覆楚狙烏喙事成多變詐鴟夷功遂棄簮裾復仇當日因韓出滅項興劉亦緒餘郭汾陽朱邸方酬盖世功蒼蠅猶惑曙雞中淮隂須讓全身䇿諸葛應輸破敵雄涇覲惟聞一老卒宋盟祗用數家僮中孚可信豚魚格博得朝㤙泣令公已酉冬十一月二十一日皇父御書立身以至誠為本讀書以明理為先一聨㤙賜懸掛書齋以寓訓誨至意恭紀文明雅化敷重譯咫尺奎章賁玉除妙義直須十四字至言已勝萬千書天顔有喜龍鸞動緗案承㤙雨露舒從此就將當益奮敢違提訓負居諸臨池栁皇州春色滿夹㟁栁先知漸吐鵞黄色低臨鴨緑池每當韶景麗偏沐好風吹入水分斜影含煙潤細枝波光摇上下帯縷漾參差魚唼疑牽荇鶯梭欲織漪絮飛洲㸃雪花落水添絲㶚㟁空含雨章臺競逞姿何如上林苑嵗嵗渥㤙滋行圍春郊萌動沐陽和嫩草新抽翠欲波回首鳳城佳氣繞林風時送牧童歌芳圻剪剪草痕生桞浪聼鶯鶯未鳴獵騎雲馳心更惬平原千頃不曾耕春日雨後海子外行圍雨後觀新栁垂絲帶玉珠村村生意足處處早春殊馬健方堪騁鷹雛未解呼萬家烟火裏簔笠快何如繡陌連芳嶼韶光十里繁綠深楊桞㟁紅暗杏花村時雨占年稔新晴愛日暄遊觀回勒晩殘照落柴門青雲店民家見梁上雙燕偶興春来吳楚方成别社到幽燕又見歸掠水塘邊相對語採芳簾外故低飛欲尋謝宅迷長巷不借盧梁愛短扉一任處堂巢自稳等閒竈突事應稀楊桞風江南二月麗晴暉楊桞風和乳燕飛堤上馬嘶芳草去湖中㠶帶夕陽歸柔條漫著遊人眼弱線頻牽過客衣待到清明寒食後池塘輕絮又霏霏顧孝亷䝉聖㤙特賜進士詩以賀之薄海同歸雨露培宣尼寧獨鑄顔回得君初不緣多遜及第今還勝栁開青𤨏班聨宵漏永彤墀臚唱慶雲来㑹看五色生花筆長日揮毫視草臺賦得鷺立蘆花秋水明風起蘆洲鷺翿斜欲飛還竚水程賖凌波雪羽輕翻節倒影羅紋皎奪花宛在伊人深白露㡬分秋色淡明霞遥看景物蒼茫意擬共鷗盟荻浦沙九日講武恭紀四海遍雍熙三秋閱虎羆代當全盛際節應大蒐時日月中天麗旌旗曠野麾軍容森甲胄坰牧物黄驪爽氣浮仙仗卿雲映御帷虎賁争蹻蹻戎御盡師師拂劍霜華動彎弓月影披馬嘶黄菊野鴈過白雲陲組練生光焰衡鑣中式儀九宫羅畵㦸六甲載雲旗舞鍔遊絲裊穿正閃電馳古来歌七德今日炳重離聖治輝千載天威震四夷鑾輿歸紫極扈從詠周詩九日登髙節物推遷秋氣深重陽今日此登臨東籬露潤花將放北塞風寒鴈有音氣爽天髙秋颯沓山青水碧樹蕭森松梢鶴韵和清瑟竹裏泉聲雜古琴吹㡌還須窮絶壁整冠且復盡前岑地寛自覺塵埃逺境静全無俗慮侵白石卧雲苔漠漠青巗引徑洞沉沉已從蘭若聼僧梵更雜寒村送旅砧觀海何湏登泰岱到山已足散胸襟歸来觧却茱茰佩閒看東岡月上林霜隼下晴臯九臯秋氣肅沙浄水痕明蒼隼低青岫孤飛下碧泓摩空盤勢矯收羽削風輕墉上無人射溟東㡬度行攫拏藏利爪爽豁湛圜睛萬里悠悠意金聲寄一鳴夀五弟繡線添端始桑弧慶履長雲書卿矞爛琯度褓襦香音羽調分候天心復一陽慧根資豈弟醇意發文章著紙霞朝麗揮毫玉夜光鴒原欣得侣鴈序愧先行願挹層霄露言斟初度觴同携瞻紫極靄靄萃千祥帝京雜詠雪瓣初收放曉晴西山一帶湛虚明玉屏重叠玲瓏様若個神工造得成嵗臘欣逢蚤立春銀旛綵勝逐時新漫言春色知多少寒谷陽回自此辰兒童隊隊趂閒行市口新張賣畵棚不惜金錢多買取歸来弟妹笑相迎古禮原稱老婦祭於今禮拜祗諸男雲車龍馬昇天去户户争傳二十三大官清曉布王言濟濟鵷行錫賚繁領得天庖鮮羙味親朋㑹食說君㤙君王錫福溥㤙施鳳翥龍翔莫並竒頃刻漏聲傳玉箭聨翩御筆下彤墀紛紛争向地爐邊添滿松枝颺碧煙熰嵗成風傳自昔一家烘煖話團圓送舊迎新未得眠一畨守嵗列華筵却將舊學商量過培飬新知勝往年辛亥二月朔皇父賜御書對聨恭紀夹鍾應律普條風浩蕩春熙造化同雨露澤来三殿上壁奎文降九天中漫言北海書稱健可識山陽句獨工聨句係唐人趙嘏詩最是萬㡬無晷暇㤙頒宸翰荷無窮辛亥仲春上幸豐澤園演耕耤禮上躬四推命臣等終畝恭擬應制十韻大地陽和淑景韶濳蘇土脉應風條洪鈞普扇百昌序大造均舒萬物調翠輦臨耕旗閃爍金輿載駕玉鎪雕行行西苑停鸞輅泛泛天池盪畵橈帝耒四推膏壤沃皇躬一墢甫田遥先期已見寅恭懋終畝還思教澤饒種布期生連理穗壠開願長九岐苖追思聖祖觀耕地却值吾皇演禮朝豐稔嵗功九有遍太和景象萬方昭放勲乆頌堯功茂恊帝重瞻舜德超西厰習射即事行行西厰路猶賖習射非關玩物華怪底今朝寒料峭平明宿雨濕桃花拂栁穿花過小溪紫騮不用錦障泥東風可是能裁剪飄灑香紅散馬蹄西海清流漾碧鮮相將此日盪蘭船溶溶新漲春蕪合始識分来自玉泉佛手天龍一指稱禪伯接引猶聞爪甲香瓶鉢罷持忘色相珊瑚閒撇愛清凉靈根疑長兠羅樹慧質原生選佛塲何事全身藏丈六玻璃盤内笑拈芳晩眺沉沉暮色迷烟鬟髙樓半出松篁間樵牧歸来晩燒起駕鵞飛集斜陽閒窻開蝶逐花片入簾捲燕啄香泥還極目芳菲将九十楊栁春風為掩關丁香花細葉纎英不染塵㣲風時度暗香勻兩般顔色分枝麗四出瓊瑶著樹新淡洗露華披寳粟斜翻堦影卧花茵縱令百結猶須觧那鎻芳園荏苒春衘製樂善堂全集定本卷二十三
