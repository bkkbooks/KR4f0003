body:
  text: 雜著讀二南夫閨門王化之端生民之始致其貞淑輔佐君子然後夫倡婦隨內以間邪僻而養中正外以施女教而化閭閻易首乾坤書重釐降而我夫子之刪詩復冠以二南其㫖深逺矣蓋二南所以著周初風俗之盛由閨門而逹之邦國推之天下者也謂之風者其體製别於雅也繫之於周召者古者陳詩以觀民風各以其地别之故作於岐周封域之內者則謂之周南召伯巡行南國採風而得之者則謂之召南然周召之政教即文王之政教也文王之政教本之關雎得內助也終之麟趾關雎之應也於是及于江漢逮於汝墳則國中莫不化其政教矣施於南國而南國諸侯化則鵲巢之詩作匪特人也且及於物焉則騶虞之詩作推而至於行露摽梅則南國之人莫不化其政教矣室家之道修則天下之理得夫婦之義正則室家之道修男敬身以率其婦女敬身以從其夫有關雎麟趾之意然後可行周官之法度其語豈或爽哉讀鹿鳴至天保六詩嘗讀易之泰象曰天地交泰解之者曰隂在上而陽居下君下交臣之義也又曰天地之體不可交而以氣交君臣之分不可交而以情交古昔聖王所以維持世教平章百姓使萬邦協和黎民於變者亦賴有此情以相維繫耳故禮以節之樂以和之飲食以薦之賓主以親之歌咏以侑之使愜其情而不流焉其在詩曰我有嘉賓鼓瑟吹笙人之好我示我周行燕賔客而欲其示以大道則君臣交警之意亦寓于其中矣使臣奔走於王事故作四牡以勞之曰豈不懷歸王事靡盬所以逆探其念父母之心而恤之備也皇皇者華教使臣曰其咨事而為諏乎咨難而為謀乎咨禮而為度乎咨親而為詢乎欲其備五善而事無違行也常棣之華燕兄弟也疏其所親而親其所疏失其夲心者也故其詩曰凡今之人莫如兄弟又曰兄弟既具和樂且孺猶恐人之弗喻也又曰是究是圖亶其然乎既樂兄弟且逮友朋焉曰相彼鳥矣猶求友聲矧伊人矣不求友生人君以情接其賔客使臣兄弟友生者如此故其臣作天保之詩以答之其詩曰羣黎百姓遍為爾德蓋既頌且規焉樂而不淫上下和穆醉以酒而飽以德吾於鹿鳴之什見之孔子曰郁郁乎文哉吾從周言其化行於關雎麟趾而施及於天下禮明樂備豈非文武周公之餘澤哉讀邶鄘衛風孔子刪詩三百篇以周南召南為正風以下十三國為變風而以邶鄘為變風之首均諸侯也聖人列衛於首何哉魯衛為王室之懿親既登魯於頌矣則其次莫親於衛又有康叔武公文公之賢是以聖人登之邶鄘衛三國也而所言皆衛事何哉蓋衛之子孫稍并此二國而一之耳既并之矣又存邶鄘之名者土風各異其詩蓋作於二國之遺民者也邶首柏舟鄘首柏舟衛首淇澳賢侯貞婦有愷悌之德無邪僻之行作為詩以自見所遇不同而終歸於正然君子讀緑衣終風之詩而知衛之無以為國矣繼以墻茨偕老之刺興桑間濮上之音作而國社以亡由是知閨門為王化之首而男女之際生人之大欲存焉可不大為之防哉張子曰周之興也商民後革及其衰也衛風先變蓋衛即商之地書所謂沫土詩所謂沫鄉也其民為商紂所漸染日汨於酒色而不知故雖康叔武公之賢凱風之孝子北門之忠臣北風之智士干旄之大夫簡兮之賢人考槃之隱者亦莫挽其頺風而至於淫蕩而不自禁以是知惡習之易染而難革也讀秦風秦襄公以兵送平王東遷王封之為諸侯能逐犬戎奄有岐豐之地君子於是知平王之庸委舊都以與人而周竟以不振也岐豐乃二南興化之地其民質其風淳其土厚而水深秦之興教之以猛驅之以利其彊毅果敢之資足以成富強而諸侯畏之故其詩如車鄰駟驖小戎無衣諸作莫不美其車馬之盛戰陳之勇而無室家之思論秦風者或哀世道之衰或嘆強秦之敝而余獨怪平王東遷之謬至於此極也夫以秦民之質秦人用之尚能鼓彊毅之氣成招八州朝同列之勢豈其以天王之尊守祖宗之法而反不能興起於仁義厚集其國勢以懷天下哉故定都立國者當審其居重馭輕之勢自上臨下之方而祖宗一定之基切不可苟變也邵康節謂夫子定書以秦誓綴周魯之後知周之必為秦也刪詩亦然齊桓晉文之後惟秦駸駸始大周亡而秦興夫子早見其兆矣余則以為不然魯宗國也秦誓悔過之辭也故載於書至於秦風之後尚有陳檜曹豳四風何所見秦之代周乎錢天錫引吳椘詩無傳而秦風卒不削以證邵言之不謬蓋夫子刪詩其存者則間存之其無者不求以補之也吳椘之詩夲不列於周太師之所採則夫子亦置之不論又豈可以此而汨聖人刪定諸經之義哉讀無逸尚書自二典三謨以至商周之誥皆古先哲王明臣良輔相與咨警一堂以為久安之圖後之言治者舍是無他求焉然取其近而切明而審天子臣民皆當奉以為規則銘之於座右者則無逸一書又為最要無逸者周公以成王初政懼其知逸而不知無逸故作是書以警之也始言稼穡艱難重務夲也次言前王之所以享國長久與後王之所以罔或克夀戒怠荒也次言太王王季文王之抑畏卑服者欲其法祖也又言嗣王無淫逸逰田而以萬民惟正之供者欲其無荒寧而省賦斂也又言古之人猶胥訓誥胥保惠胥教誨者欲其納諫也又言小人怨汝詈汝則皇自敬德者欲其謹已而無責於人也終言嗣王其監於兹者言雖有盡而情則無極故丁寧反覆欲其永監也自天命之精微至畎畝之艱難無不備具豈獨成王所當奉以為龜鑑乃萬世之龜鑑也或曰蘇子瞻謂周公作無逸上不及湯下不及武王以為成湯武王非聖人此固非經㫖矣然所以不及成湯武王者抑亦有說乎曰成王守成之君也無逸為守成之君而作也與守成之君言守成之事則欲其法守成之君故殷三宗皆繼體之君文王雖維新周室亦繼王季而為諸侯也故不及成湯武王者蓋謂湯武伐夏滅殷固不可與守成之君一例耳詩咏豳風書陳無逸周公之教戒維殷成王之敬勤無怠八百之基定矣讀吕刑武王命康叔之言曰惟乃丕顯考文王克明德慎罰又曰用肇造我區夏越我一二邦以修是明德慎罰者文王之所以造周而修及鄰國也武王敬明乃罰成王辟以止辟乃辟是武王之代殷興周成王之繼志守成亦在慎兹祥刑也文王以之維新周室武王以之保有四海成王以之嗣受厥命其夲皆在於慎罰用綿八百之基而過夏殷之歷穆王用吕侯為司寇命之作刑以詰四方其有意於乃祖乃父之慎刑乎論者以為穆王老而耄荒車轍遍天下而財用不足作贖刑之法以斂貨然孔子採之於書者亦取其諄諄教誡官伯族姓哀矜惻怛以民命為重耳其言惟敬五刑以成三德罰懲非死人極于病則與大舜明刑弼教之意何異然虞廷之贖止於鞭撲而此則及於大辟故令人疑以為斂貨也讀者知其五刑竝贖之非取其矜恤民命之意則幾矣讀秦誓孔子刪詩書以商頌魯頌次周頌以費誓秦誓次周書商即周所代以王者魯則宗國而父母之邦也其登於詩書均宜至秦則西戎又非夲國夫子何取於秦而收其誓於尚書之末哉或謂伯禽征徐奉王命以討亂著其是也龍鄭之役無王命而擅兵著其非也或謂秦代周有天下夫子逆知其然而存其誓也二者皆非也何也豫奪是非者春秋之權也逆知後事者誕妄之說也二者于書何有哉登秦誓於書者取穆公悔過之篤而諄諄於良士也孔子曰過而不改是謂過矣子貢曰君子之過如日月之食焉聖賢之誨人改過昭昭甚明今夫布衣里巷之徒自信其志以為可行及遇差慝明知其非而不悔又遂之者皆是也况以千乘之尊自貶其志而從人之是豈非易之所謂見善則遷有過則改者乎且致戒於截截諞言之不可用黃髮無愆之不可棄休休者好善容賢如此其篤有利於國家者如此其至冒嫉者妬賢嫉能如此其甚有害於國家者如此其極故夫子收之簡末以繼典謨訓誥之遺其垂訓也大矣或曰春秋譏秦晉用兵之失起釁於龍鄭即一事而聖人於書則嘉之於春秋則譏之何哉曰書之意主於勸善其詞恕春秋之意主於懲惡其法嚴聖人何容心哉讀董江都賢良三策漢承秦敝文教未興髙祖撥亂返正文㬌休養生息至於孝武表章六經興學校之政首舉賢良方正之士策之於廷而董江都以宿學碩儒實對其問首策陳天人相感之理二策言修明教化興太學以養天下之士三策勸帝法天盡性知仁義重禮節安處善樂循理蓋內聖外王之道修己治人之方無不偹於三策之中而所謂諸不在六藝之科孔子之術者皆絶其道勿使竝進武帝用之以罷申韓蘇張之學尤為有功於聖教使武帝信任仲舒大究其用則將有光於文景而賢相若蕭曹輩俯出其下又豈有窮兵黷武之禍舟車緡錢之失哉而擯之江都以終其身君子讀其策想見其為人蓋不為江都惜抑為武帝惜也世之論者謂漢儒通曉經術宋儒深於理學夫窮經即所以明理而理學未嘗不衷之於經術漢之董子宋之程朱又豈可以經術理學限哉程子曰董仲舒有儒者氣象可謂的論矣讀楊漣劾魏忠賢二十四大罪疏自古寺宦之亂人家國者多矣其始未嘗不為小忠小信以結人主之知使外言不得而入人主信之不疑然後攬權肆虐無復忌憚而君上之操柄失矣縱復疾其所為欲引外廷之助以除之而近在肘掖禍起蕭墻望夷之事甘露之變良可寒心豫讀楊漣劾魏忠賢二十四大罪疏而知其不為趙髙仇士良之所為者亦幾希耳而熹宗略不加省専意庇璫吾以為熹宗之黯直甚於彼二主耳蓋二世文宗猶能知其為不善而欲去之熹宗則始終信任之靡他且屬懷宗以信任忠賢吁惑之甚矣然使熹宗而有欲去忠賢之心忠賢其遂甘心以受熹宗之斥哉是知人主不可不延納賢良以自為助而宵人在側附者如蟻大權已歸雖欲去之豈可得乎故熹宗之用忠賢也王心一首言之侯震暘繼言之周宗建又繼言之文震孟因講學之疏而直陳其奸劉之鳳因內操之疏而指其不測至楊漣二十四罪之疏上而忠賢之奸佞畢露蓋不可一日而容於天地之間矣使熹宗觀此疏而赫然震怒大振乾綱申春秋無將之誅比漢法不道之律則忠賢之羽翼猶未成而忠賢之流禍固亦未甚酷也至楊漣左光斗輩駢首被戮而毒流縉紳元氣凋喪余謂明室之亡不亡於崇禎之有流賊而亡於天唘之用魏璫然則楊漣此疏明室存亡之所繫也而不用且加誅焉甚矣熹宗之黯也擬程明道請修學校尊師儒取士劄子臣聞天得一以清地得一以寧聖人得一以為天下貞故天地之大無不覆幬而春夏秋冬分其序山川河嶽效其靈天地惟以一元之氣主之而已矣聖人之德無不光被而三公六卿分其職百司庶吏效其勤聖人亦惟恭已南面而已矣何則大本已立而所任者得其人也古昔聖王之治天下少則習之業長則才諸位是以人君南面正位而人稱其官天下以治萬邦以寧與天同意者也有宋五星聚奎實主文治而教化未興郅治未隆者蓋事不師古未得其道耳臣愚以謂使賢者在位能者在職必先於取士取士之道在於興學校而學校之興又在於尊師儒請條其事陳之於左記曰司徒修六禮以節民性明七教以興民德書曰天降下民作之君作之師又曰若有恆性克綏厥猷惟后三代而上未有不明道重師以覺斯民者也秦漢以降聖學不明異端蜂起各守師說簧鼓於世是以上無以持一統而愚民不知所遵守為今計者莫若尊明正道選天下之賢才擇其學業大明體用醇備者以為太學之師其餘以為天下郡縣之師不數年間郡縣州里皆有英俊之士矣此興學校之必在於尊師儒也古者王公以下至庶人之子弟自八嵗而入小學教之以灑掃應對禮樂射御書數及其十有五年然後入大學而教之以窮理正身修己治人之道是以國有學鄉有校黨有庠凡所以教民於幼稚以成其德而正風俗也漢唐以後學校為具文無教養之實願陛下申命有司俾州縣各立學校鄉學則散處於鄉以教八嵗以上之小學擇其最者以教大學成人之士取民之俊秀者充弟子員則民知禮義廉恥而賢才可得矣師儒立而正道明學校修而人才衆然後使郡縣各以其學之子弟舉其賢者貢之京師萃之太學以考其才任之以事以觀其績察其善否而黜陟之則天下之英俊皆登於朝而取士之道得矣此取士之必在於興學校也夫如是則賢人在朝風俗隆美使天下後世謂陛下為有宋致治明主子孫承之萬世永賴臣不勝欣幸擬胡安定置經義治事二齊記學校為養才之地所以淑其性情俾歸於道德明禮義廉恥之習興孝弟慈讓之行以備國家異日之用古者百官得其人萬事得其理未有不由於斯也今天子聖神宰輔賢明建中出治使天下郡各立學學有教授之員以誘迪秀民膺斯職者宜體君相牖民覺世之心彰古聖成德達材之教講明正學陶冶羣英方為無忝余承命來是邦為多士師敢不殫盡心力以佐休明謹就學中立經義治事二齊其有學識開通潜心義訓能辨同異不乖正道者入吾經義齊相與講求至是而浮泛剽竊持其偏見者不與焉農田水利會計邉防事之不可不治者也明於此者入吾治事齊相與究切實用而拘牽不通與夫俗士功利之談不與焉蓋明經所以立夲治事所以逹用夲不固則用何由精而用之所以能達端惟夲立是賴二者雖不可以分而教者當各就其性之所近多士尚體豫意窮經者必因經以明事治事者必因事以求經體用兼修夲末一貫而不為空言則豈惟不負教者諄諄之苦心將見才成德立濟濟彬彬異日立朝廷之上引經執禮守正不阿贊治分猷天工能亮者皆吾黨之士也多士勉乎哉擬尹和靖六有齊記余嘗思古之學者為己今之學者為人春秋時文人學士徇物喪已孔子已深切言之至於今更有甚焉其背馳聖道毫不為己固不待言即世所稱為建功立績思效時用以自見者原其心勢利而已矣夫學也者古以養德今以飾名古以利人今以欺世思反其初其在內外兼修存存不已乎善夫先正橫渠先生之言曰君子言有教動有法晝有為宵有得息有養瞬有存夫言期其有教則必不敢為悖道之言動期其有法則必不敢為非禮之行晝有為宵有得則無一日之玩愒也息有養瞬有存則無俄頃之滑湣也以是持已則內外兼修存存不已之道也於以反其初不難矣人之生也其性無不善而其情有善有不善吾亦人也吾安知吾性之果能制吾情乎吾安知吾情之果能若吾性乎情可制也性不可流也何以防其流而使之若哉有吾六有之法存焉六有者非吾言也橫渠之言也非橫渠之言也有言有動以晝以宵以息以瞬者所同有也日從事於六有之中而私與邪莫之有焉則所謂有其有有其有然後天良存恐吾之志不終也因以名其齊御製樂善堂全集定本卷九
