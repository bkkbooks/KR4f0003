front:
  text: 欽定四庫全書御製樂善堂全集定本跋
  hash: sha256:93e48ebd4b6955fbe4ab0a7fcb5d2a05f2bc8b473a8cde669b88d90a306b4b59
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0003_WYG_035-1a, image: WYG1300/WYG1300-0541c.png}
body:
  text: 乾隆元年冬皇上萬幾餘暇取前後所著散體古文詩賦彚為一集而命疇昔侍學之臣跋之臣爾泰以雍正十年入侍既嘗承命敬序樂善堂文鈔今年秋復敬序日知薈說聖性之誠一聖學之廣淵聖治之淳懿皆備於前文所稱述而熟復是編益信先儒所稱天下無二道聖人無兩心洵深探本源之論也夫道之體於身者為德施於事者為治而見於言者為文道以久而益明德以久而益懋治以久而益光即文亦以久而益粹惟二帝三王能一以貫之故德為聖人之德而非大賢以下所能幾也治為聖人之治而非三代以後所敢望也文成典誥後賢後儒力追而終莫能及焉然其所以致此者則惟誠之不息而已臣始入侍我皇上之學已大成而惟日孜孜未見有晷刻之懈也及登宸極布德明教敷政寧人無一不與民心相應萬邦欣戴如天地之蓋容而猶欿然自以為未足文與治之日新皆由於聖心之誠一可見矣伏讀前後御製序文所時切於聖心者於樂善堂文鈔則因文以檢躬行於日知薈說則即文以考治法而是編之序言之尤深切焉體道不息而與時偕行將見聖德聖治直接武於三王而是編之傳布於寰區皆以典誥奉之矣是則臣心所厚幸也乾隆元年嵗次丙辰仲冬月少保大學士臣鄂爾泰恭跋臣聞文以載道而道本於身故必實能明道而文始可貴必實能身體而道始能明我皇上躬濬哲之姿夙承庭訓緝熙光明聖學淵茂臣自雍正元年䝉世宗憲皇帝恩命得侍左右於今十有餘年伏睹我皇上稽古遜修研精經術於六經四子之書儒先之緒論諸史之成蹟博觀約取剖晰精微舉天人性命之理政治之所從出皆有以得其大本大源之所在所學之正如此寒暑晨夕矻矻孜孜熟復尋究融洽貫穿進進不已與道大適學之精且専又如此故發之於文日新富有麟炳矞皇充溢緗帙曩者親定樂善堂文鈔十有四卷臣既承命而敬序之矣御極以來敕幾清宴乃合前後所著選定編次為樂善堂全集臣受而讀之其義藴之宏深則經緯天地無乎不包其辭藻之贍博則鎔鑄古今無乎不備仰泰岱而知衆山之卑觀河海而知行潦之細誦聖言而知百家衆說之凡淺巍巍乎煌煌乎洵宇宙之巨觀也臣仰惟皇上聖學髙深固非擬議所及而竊謂其所以發而為至文者由至道之藴積者深也夫道豈獨為文而已聖賢本是道而垂彛訓帝王體是道而成治功皇上本皇極之敷言既已見諸行事中外欣欣文德誕被矣而猶夙夜孜孜因言考行所謂聖天子建中和之極金聲而玉振之者誠在今日而是編也天德王道合為一焉乾坤之容日月之光與詩書相表裏而世為天下則又何疑哉臣校録之次伏讀御製序文竊有以知聖心之所存兹奉命綴言簡末仰至文之炳蔚而拭目以觀至治之日升海內臣民涵泳聖澤偕登大道區區蠡測所及蓋不能自己云乾隆元年嵗次丙辰仲冬月少保大學士臣張廷玉恭跋臣福敏叨陪侍從謬側細氊廣厦之間十有八年於此矣親見我皇上以天縱之聰眀殫日勤之學問自六經四子以及諸史百家無不登其堂入其室嚌其胾味其腴於道則宗二帝於法則統三王於學則承孔孟凡作為文章以及偶爾吟咏皆藹然以萬物為一體而與天地同流御極以來以仁心布為仁政四方萬姓莫不喁喁向風從欲丕變向也見之文章今也行之政事洵典謨之繼響雅頌之嗣音匪徒有其文確有其實也夫聖神之德作式萬邦今天下臣民皆以躬逢聖世為至幸而臣不惟逢其盛且近其光不惟仰瞻殿陛之間而且侍從左右積嵗積時至於如此之久蓋視天下臣民為尤幸也臣聞傅說之告髙宗曰知之非艱行之惟艱魏徴之告文皇曰始之非艱終之惟艱皇上舉平日所常言無不見之於實政則其知生知其行安行行既與知一則終必與始一如天不已應地無疆斷可知矣臣又聞古人言禮樂之興俟以百年王者之仁要諸必世我國家定鼎以來列聖相承於今百年正禮樂大興之㑹而我皇上好生之德洽於民心立之斯立動之斯和漸仁摩義捷於影響臣雖衰朽無能未克仰贊髙深猶得優遊禁籞曲沐慈仁與海㝢羣黎共逰升平盛世作為歌詩以詠王化之成豈非至幸中之尤幸也歟臣區區至愚不勝厚望焉乾隆元年仲冬月太子太保左都御史臣福敏恭跋欽惟皇上躬天縱之資單心稽古夙夜維勤粵自冲齡研精六籍旁及諸史百家以逮有宋大儒之書靡不薈萃貫通得其大本大原之所在致知格物誠意正心修身齊家治國平天下之道一以貫之矣臣竊惟二帝三王之學備見於尚書所謂上天垂文象有節度者是已其軼見於他書若帝堯戰栗之戒帝舜南薰之歌成湯之銘帝甲之針片義單詞類皆闡發道妙昭兹來許後之賢君如唐太宗宋仁宗間有文詞表見要亦隨其所得之淺深以著為篇章善乎唐臣李漢有言文者貫道之器也不深於斯道有至焉者否也我皇上味道之腴聲律身度夙承世宗憲皇帝明理立誠之大訓純亦不已緝熙光明以聖賢之所得者治其心即以聖賢之垂訓者顯諸文包藴天地鎔鑄萬有而渾然默契於聖人制作之原臣自辛亥入直禁庭親炙聖顔敬聞緒論庚戌以前所製序論書記雜文詩賦十有四卷臣皆得而伏讀之數年以來聖德日新極深研幾文益充邃茲者繼序乘乾敕幾餘暇取前後諸編親加刪定合為一集微臣恭與校對自懼爝火之照末由上測髙深第就臣管見窺之舉凡天地四時之行雨露風霆之變山川草木之麗名物象數之繁帝皇王霸心術事功之分井牧農桑禮樂兵刑之用仰觀俯察援古證今千彚萬狀不可端倪而悉貫之於道至若涵泳性情流連光景無非萬物一體之懷流露於翰墨間在易之賁曰剛柔相錯天文也文明以止人文也皇上學貫天人參贊位育觀文以察理修辭以立誠自臨御後薄海內外蒸然向風蠕動蠉飛無一物之不得其所良由聖心與道為際而本身徴民悉以驗其言之實效向之藴涵蓄積者已一一見之治法矣臣幸依日月獲窺聖學淵微集古先哲王之大成謹拜手揚言推原於道德文章一貫之㫖臣以知天下臣民由宸章之炳煥求皇極之㑹歸帝光所被與天無極而臣得附名簡末竊嫓於景星慶雲之先睹可不謂厚幸歟乾隆元年嵗次丙辰仲冬月吏部左侍郎今授江蘇巡撫臣邵基恭跋臣竊惟帝王御世有心源而後有治法然必基於學以成而文其學之散見也在昔唐虞授受危微精一為言心之祖未嘗以學名而千古之聖學苞焉二典之垂三謨之作為帝王言治之極未嘗以文著而千古之大文煥焉則夫文章之與政事通而治本於學學本於心一以貫之而已矣欽惟皇上聰眀天亶秉睿哲之資切就將之學世宗憲皇帝嘗以眀理立誠宸章錫訓聖敬祗承孜孜夙夜上探四子六經之淵微旁涉諸史百家之浩博精究於身心性命大周於天下國家細及於日用行習彚三才萬物之理莫不探本索原兼綜條貫而一發之於文自闡道眀教之篇以至體物緣情之製無格不具無盛不臻大矣哉合作者之聖述者之明而一之故學為聖人之學而文為天下之至文也臣詩正新進小臣甲寅入侍內廷仰覩我皇上學問髙深日新嵗益敬讀樂善堂文鈔自庚戌以前凡十有四卷年來復數倍於昔爰於萬幾之暇總彚全編親定成集臣以在籍䝉特㫖宣召侍直南書房恭與校對自惟扣槃揣籥之愚何足以殫測海窺天之識竊見聖主臨御以來至德覃敷千載未有倫比凡行政用人仁民愛物之際羣生沾濡太和翔洽雖在萬里之表四海之遙號渙言傳罔不暨訖因以知盛治郅隆實本於皇心之純一而緝熙光眀之原基於學古之日者舉堯咨舜警之憂勤禹儉湯仁之典則文謨武烈之覲掦穆然如見心源治法之相接而陶鑄羣言發皇睿藻亦遂與典謨渾噩炳焉同風所由統自古聖君哲后之緒金聲而玉振之用集制作之大成也詩曰訏謨定命逺猶辰告書曰皇極之敷言是彛是訓臣知天章焜耀倬雲漢而麗星辰傳示萬世永永無極而臣蒙被厚恩身侍禁闥親覩日月之光摹繪萬一謹附於拜手揚言之次是則臣之殊榮也夫乾隆元年嵗次丙辰仲冬月侍講學士臣梁詩正恭跋臣聞乾坤之容無從仰繪而川流敦化所以為大未始不可明言皇上以生安之聖學倍懋於儒生蓋惟聖而始盡學之能事也唐虞授受論學而未顯言說命首揭之不及政事惟曰學于古訓乃有獲而萬有悉包舉焉尼山木鐸諄諄勉人亦諄諄告君大哉學乎此先聖後聖所同揆者乎臣沐世宗憲皇帝殊恩草茅之身偹員禁近親炙於聖德者深而竊窺於聖學者略稔謂不博於文禮不可得而約也故自通經貫史而後諸子百家以及詩歌騷賦靡不究其條理窮其㫖趣所以灼見性天而正大之情充周洋溢全體太和昭融於翰墨之下機動神隨自然合度今者紹承大統惟日孜孜無刻不以敷政寧人為念間於萬幾清宴取向所作各體文詩賦彚為全集而以臣謭陋復得䝉恩與於校對之列乃拜手稽首而為言曰凡物皆性凡人事皆天道而不眀乎性與天道之㫖則見物不見性見人事不見天道矣故舍本狥末者騖華而不既於實而稍窺理域則又簡棄乎文辭以為非所急皆蔽也六經之垂顯萬世之道開萬世之文道與文有二乎哉皇上既敦敏夙成又承先皇立誠眀理至訓一以貫之於文見道即於道見文斐然外見者皆粹然內藴者也類萬物之情以通神眀之德禮樂之陶淑仁義之漸摩偹於其中矣臣願頒之學宫播之天下以教育乎多士俾知青宫養正之年崇髙之地不自暇逸而學古以獲治平之本勉勉我王綱紀四方疇弗仰聖人而思聖功哉乾隆元年丙辰仲冬月編修臣顧成天恭跋樂善堂全集自頒示海宇凡在臣子操觚誦習訓行近光殆如仰曜靈者求暉於暘谷導積石者向若於崑崙矣我皇上聖學日新冲懷謙抑近復以全集卷帙綦繁命臣等重為釐定編節恭聆之餘無任惶悚以臣等淺識膚學何由窺溯巔涯顧聖德下濟之謙至於如此敢不勉竭區區祗承盛意爰敬謹校閲數過精益求精擬為三十卷恭呈乙覽上復親加裁定重付剞劂較之全集存者十之五六云伏惟鴻製昭垂萬世發乾坤之祕奧煥奎壁之精英又何庸臣等頌揚贅述惟是恭繹初本御製序文有云自今以後雖有所著述或出詞臣之手真贋各半臣等日侍禁籞朝夕見聞竊於此有未能安於心而已於言者皇上臨御二十四年以來求衣問夜勤政健行每幾務餘閒即濡毫摛藻詩或數篇或數十篇文則煌煌巨製或數千百言為時不逾晷刻脫稿渾若天成御製詩初集四十四卷久已風行天下户誦家絃今二集且將編次告成矣篇什之富為古今大家所未曾有其他紀功書事碑版之文以及序記論贊無體不偹皆詣極精微兼綜謨誥若平定金川伊犁諸碑勒石學宫駿烈大文並燭天壤尤為有目所共覩此在廷諸臣流汗俯首竭管蠡之見且不能窺測髙深而尚有能贊一辭者乎然則前御製序所云乃大聖人謙尊之德自然流溢於毫楮閒亦與刪訂斯編同一淵乎若谷之心云爾臣等榮與編校謹拜手稽首識於簡末乾隆二十四年嵗次己卯上巳東閣大學士兼管户部尚書臣蔣溥協辦大學士吏部尚書臣劉統勳禮部尚書臣嵇璜吏部左侍郎臣董邦達户部左侍郎臣劉綸户部右侍郎臣裘曰修禮部左侍郎臣介福兵部左侍郎臣觀保署刑部左侍郎臣于敏中刑部右侍郎臣王際華工部左侍郎臣錢維城內閣學士臣錢汝誠恭跋御製樂善堂全集定本跋
