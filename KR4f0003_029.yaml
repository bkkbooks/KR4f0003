front:
  text: 欽定四庫全書御製樂善堂全集定本巻二十五
  hash: sha256:d64b0cc50380fd1007adbcf69f45b53d8491547b8291a74c445aa75478e8374b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0003_WYG_029-1a, image: WYG1300/WYG1300-0488c.png}
body:
  text: 今體詩三月十三日随皇父駕幸圓明園得詩六首春園初見百花開日午欣隨御輦来纈錦蒸霞呈麗景東皇雨露好栽培最是蓬莱浩蕩春東風如剪物華新裙腰草合平於毯滑笏溪流色似銀邇来甘雨潤苖新走馬天街絶㸃塵試䇿金鞭回望處翠條如染拂行人黄繖當中映午暾太平天子幸春園靈臺靈沼同民樂夹道齊呼萬嵗尊寒食常年桃已謝今年寒食正開花天工有意供宸賞特教東君駐物華御爐香煖恵風晴日映墀頭喚上卿不是物華供玩少殿顔勤政意分明賦得好雨知時節漠漠春雲布濛濛時雨飛㸃空方霡霂入夜轉霏㣲正助資生德從知造化機東郊明曉歩坂上麥苖肥栁溪垂釣傍岸青青一帶遥玻璃鏡净拂烟條持竿不為貪鱸鱠天水空明萬慮消花嶼南頭曲水東石磯晩坐綠隂風臨流暫作垂綸客興與漁郎却不同聼松凉風過院裏踈響度庭前乍覺蛟龍吼徐聼絲竹傳春濤盈峡漲沸茗滿壺煎入夜心偏静慿參天籟禪賦得泉和萬籟吟野逕無絲竹飛泉亦可聼千條流澗白萬古韻松青自是饒天籟多緣借地靈跳波珠絫絫激石玉丁丁樂奏簫韶曲圖開十二屛何當鋪翠毯終日對清泠濯纓泉碧映一泓清當年誰濯纓滄浪衣帶水到此亦成名恭和御製詠竹原韻琅玕敲雅韵蒼翠布清隂逺映山光入低臨階影侵寒梢蓊雨潤勁節颯風吟仙苑供宸賞還同松柏心藻砌紛青籜芳園滿緑隂最宜時雨洗不碍嵗寒侵宸暇方遊豫皇情暢詠吟年年常近日清節與虚心從軍行三邊烽火照軍營十萬丁男夜練兵但使腰間懸寳劒丈夫何處不成名關山月冷夜黄昏指日應擒吐谷渾誰憶樓頭新少婦一聲横笛正銷魂沙漠風髙列戍連寒侵行帳不成眠狼山夜半聞新警披甲争聼號令傳辭家萬里路迢遥龍虎軍中夜擊刁底事成功如約早将軍聞是霍嫖姚横戈結伴共遊盤日乆翻忘行路難却恨此方無鴈到慿誰傳信報平安夜戰洮河馬不嘶無邊殺氣與雲齊偷閑一枕金戈卧半是人膏半是泥二十三畨月缺盈君王㤙重致身輕轅門試射誰穿的十萬軍中最有名戍兒約計看刀環對鏡新驚髮半斑不是親擒生頡利何顔復進玉門關送邵通叅奉命典試江西天門旭日耀晴明帝簡儒臣典試榮虎觀暫教違問難龍門旋見擷瑶瑛征輪正愛山花繞歸路應看朔鴈迎一載春風頻坐卧可能不動别離情昭代文明重棘闈雄州遥指四驄騑三秋瞻斗龍光射一月蒐才紫氣圍堂上頻呼添蠟燭日中俄見擲珠璣迢遥驛路回鞭日好載公門桃李歸豫章佳氣欎葱葱牛斗光芒映彩虹帝遣文星司玉尺人欽精鑒詠敦弓驊騮遇主鳴方健鵰鶚摩天勢更雄宗𣲖西江還在否慿君一振古人風放榜懸知聚彩霞歸輿歴歴雪初花縱横禮樂文章盛来往山川道路賖日照金臺迎畫幰風吹滕閣送仙槎天街十月陽春早光霽重看捲絳紗顔魯公祠堂草長華清作古原魯公祠宇至今存松圍四面濤聲颯戸守千靈道貎尊一片忠誠光日表㡬遭貶斥别君門平生浩氣消奸氣盡節從容且謾論讀項羽紀鹿走荒郊壯士追蛙聲紫色總男兒拔山扛鼎興何暴齒劍辭騅志不移天下不聞歌楚些帳中惟見歎虞兮故鄉三户終何在千載烏江不洗悲讀武侯出師表燎滅中原鹿又亡獨留㣲燼熾炎方三分已是輸全局七縱猶然保小康此日欃槍須北指當年魚水憶南陽魏宫草樹終摇落千古丹心表兩章裁衣寄從軍者玉關天氣凉六月已飛霜驚理篋中素寄與逺行郎長短尚如初寛窄想非舊那堪孤燈下縫紉聼寒漏中庭度金風緘刀著手冷歎息厚裝綿行將寄雪嶺裁衣何所願願郎早樹勲郎為萬户侯妾作郡夫人送毅菴鄂相國奉命經畧西陲清秋霽日照征鞍上相臨戎劍氣寒詔㫖欽承三殿宻機宜默運寸心殫馬騰士飽来裴度鶴唳風聲避謝安欲别先生何所贈臨風握手勸加餐書文一軌泰階平蠢爾戎夷敢弄兵天子運籌頻下顧相臣經畧此西征風翻武帳三台入日耀軍門萬㦸明佇看對颺歌虎拜邊烽永熄玉關清賦得鶴舞千年樹太液池邊千嵗松飛来白鶴愛隂濃雪衣斜掠披風態丹頂髙昂舞月容閬苑有書傳秘信緱山無處覓仙踪翩翩還就三清路翠葢徒看攫老龍活水滑笏流波不暫停鵁鶄鷗鷺滿沙汀眼前觧得空明理清濁何勞辨渭涇冒雨尋菊秋雨霏霏碧蘚滋閒情今日歩東籬不知冷夜寒朝裏開到西風第㡬枝我愛秋来菊蕋開天工偏為洗塵埃倚欄閒咏衣衫濕應是纔從籬畔回輓戴九臯都門握手别清儀生别重添死别離蒿里應懐埋玉恨龍堆想見致身時魂還故宅三秋冷名列新編萬載垂惟我思君勤懇意裁詩洒淚不勝悲弔睢陽雙忠蚍蜉援絶守孤城遮蔽江淮九死撐可惜絶繩無復續翻教越俎共捐生一時慷慨多全節千古春秋有令名籩豆生光祠宇在雙忠浩氣焕丹楹恭讀皇祖聖祖仁皇帝御題耕織圖四十六景詩敬和原韻浸種氣布青陽造化功東郊俶載萬方同溪流浸種如油綠生意含春秀色籠耕宿雨初過曉日晴烏犍有力足春耕田家辛苦那知倦更聼枝頭布榖聲耙耨九重宵旰厪民依課量隂晴總不違縹緲雲山迷樹色緑蓑扶耙雨霏霏耖新田如掌水潺湲扶耖終朝那得閒手足沾塗渾不管月明共濯碧溪間碌碡帶雨扶犁一夕周作勞終畝敢辭休縱横碌碡如梭轉膏壌勻鋪惣舊疇布秧二月春風料峭寒原田鱗疉入遐觀最憐舊榖生新頴欲布秧還仔細看初秧栁暗花明春正深田家那得冶遊心老翁䇿杖扶兒笑却喜初秧擺緑鍼淤䕃短杓盛灰淤畝勤髙原下隰望中分鳴鳩喚雨聲聲好嶺外旋看起白雲㧞秧勻鋪緑毯滿平川萬井風和花欲然移自南疇向西陌㧞秧時節日長天挿秧甫田萬井水瀰瀰㧞得新秧欲挿時槐夏麥秋天氣好及時樹藝莫教遲一耘新頴鵞黄逺似波揠苖助長槁如何惟應芟薙勤人力自鮮苞稂害穉禾二耘壺漿饁婦大堤行最是畦邊莠易生勞苦再耘還再饋可憐農叟望年情三耘朱火炎炎日午長三耘曝背向林塘那無觧愠傳風信天遣㣲薫動緑芒灌溉抱甕終輸氣力㣲桔橰輪轉迅如飛池塘水滿新禾潤樹下乗凉待月歸收刈桐風瀟洒露珠晞滿野黄雲映落暉是處腰䥥收穫遍擔頭挑得萬錢歸登場登場此日望西成大有頻書慶帝京䆉稏滿車皆玉粒比隣亦覺笑顔生持穗塲圃平堅灰甃成如坻露積最關情殷勤婦子争持穗好聼千家拍拍聲舂碓木末金風陣陣吹松明火燒隔踈籬何来舂相深宵裏可是村謳唱和時簏秋成那得暫遊盤顆粒精粗欲别難周折不辭身手瘁猶餘一掬㡬回看簸揚郭外人家茒舎深門前揚簸趂風林莫令飄墮成狼戾辜負耕夫力作心礱相將南畝苦胼胝望嵗心酬庶免飢石磑碾来珠顆潤家家鼓腹樂雍熙入倉霜㸃楓林似火然千倉滿貯賜從天輸官不假徵催力喜值如雲大有年祭神擊鼔吹豳報屢豐朝看索饗萬家同更期来嵗如今嵗苖碩不知願莫窮浴蠶曽讀豳風七月篇遲遲日景麗光天新蠶未起先宜浴盆滿明波人滿川二眠女桑摇綠葉參差曉起人慵欲採遲雙燕入簾長晝静再眠恰是仲春時三眠淑景頻催喜載陽㣲行歩歩採條桑三眠三起新蠶老篝火看時夜未央大起春光荏苒去堂堂無那黄鶯一日忙箔上吳蠶方大起氷絲色映綠筠筐捉績蠶筐髙下架頭紛食葉聲煩似雨聞捉績欣看光練練一家婦女共辛勤分箔栁絮飛時晝下簾桑柔蘩細食徐添却慿纎手為分箔未暇朝餐日過檐採桑墻畔青條著雨滋繁隂初覆葉齊時春深八繭蠶争餧稚子携筐上緑枝上簇覓樹尋枝手足疲柔桑采采飼蠶飢今朝報道新抽繭老幼羣欣上簇時炙箔重簾不捲畏風寒猶爇松明向夜闌皚雪霏霏堆滿箔殷勤弱女把燈看下簇獻繭由来重女功繪圖今見列璇宫聖人不為丹青玩玉榖珠絲此意同擇繭弱繭何時成綺紈拮据冀免一身寒八蠶獨蛹還須擇几上分明取次觀窖繭春日遲遲執婦功何心戀賞牡丹紅繭成好向村頭窖荷鍤携兒緑䕃中練絲煮繭炊烟颺短籬絲腸纍纍練成時探湯試展纎纎手那聼枝頭呌畵眉蠶蛾蠶蛾絲浄方生子送向溪頭任所之黙祝明春盛今嵗隔年生理計家資祀謝年年勞苦事耕桑及早還將租稅償今日蠶成䖍祀謝西陵功德戴無疆緯蠶繅輪捲遍千家午静人慵鳥語譁浸緯欣看供織作阿香軋軋轉雷車織織女工夫午夜多何曽已自著絲羅銀蘭照處方成寸却早循環擲萬梭絡絲秋惹深閨無限情可堪蟋蟀送寒聲玉關萬里征夫逺惆悵新絲絡不成經砌下風飄待女蘭新絲經理欲成紈安排頭緒分長短約伴同来仔細看染色經緯功成尚染絲晴光萬縷燦離離天工奪處關人巧棚上還看五色施攀花簇簇堆成錦繡紋攀花鬪巧最精勤堪憐織婦空勞勩著體無過大布裠剪帛溪尾如藍秋水清裁衣寄逺重關情金刀欲下躊躇意絲縷皆從素手成成衣戔戔束帛費縫紉只為祁寒事切身聖意憂勤圖畵裏宵衣永庇萬方人輓蔡忠烈公公諱道憲號江門閩之晉江人為長沙司李獻賊攻長沙吉藩及撫藩監司相率遁衡州公攝太守事為死守計總兵尹先民叛附於賊城䧟百計脅降公不屈怒罵愈甚賊遂錐其胸斷其手割鼻舌毁齒寸磔以死事聞贈太僕謚忠烈先是公就擒時有從役九人隨公不去賊先殺五人以懼公公不動及以次斬及凌國俊國俊者九人之一也國俊請葬主而後就戮賊許之後與公同祀長沙牧民身不典戎曹為守孤城展六韜振鼓縱能摧賊銳倒戈先已樹降旄夜臺有路丹心炳帝闕無門白日髙沅芷澧蘭芳不歇招魂只合誦離騷御製樂善堂全集定本巻二十五
