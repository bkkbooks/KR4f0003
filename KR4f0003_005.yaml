  text: 欽定四庫全書御製樂善堂全集定本卷一
  hash: sha256:908c06893475dae9e14a57781da7fd8f934eeb6825bce13570b17ac978badb8a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0003_WYG_005-1a, image: WYG1300/WYG1300-0286a.png}
body:
  text: 論立身以至誠為本論夫誠者萬物之原萬事之本天所賦物所受之正理也故在天則為乾元坤元而萬物資始資生在人則為能盡其性參天地而贊化育然人咸具是理而鮮能全之故日蔽於私溺於習而天理幾乎失矣聖人者出作君作師修道以立教教人由誠之之道以馴致至誠之域故曰立身以至誠為本豈非實理本於生初在人之自勉乎蓋至誠聖人也誠之者擇善而固執之者也既能擇善又能固執則可進於誠矣而身立矣夫立身不外於言行而言行不可以外飾言必期於有物則言可為天下法矣行必期於有恆則行可為天下則矣誠故也立身必先於忠孝而忠孝不可以僞為視無形而聼無聲則養志承歡可云無忝矣公忘私而國忘家則盡忠補過可稱匪懈矣誠故也其要在克己己不克則私欲潜滋何以能誠其功又在慎獨詩曰相在爾室尚不愧于屋漏先儒有言曰學始於不欺暗室良以獨不慎則發念行事終為小人之歸耳然則克己慎獨者求誠之切務也歷觀古來聖有安勉而皆本於誠書曰欽眀文思安安堯之至誠無間也又曰元德升聞舜之至誠上達也仲虺之誥曰以義制事以禮制心丹書曰敬勝怠者吉義勝欲者從此湯武之勉而誠也勉而誠與至誠無異堯舜湯武莫不稱之為大聖故曰及其成功一也然則欲誠其身當擇善固執克己慎獨以馴致於至聖之域以之參天地贊化育不難矣讀書以明理為先論天地之間萬事萬物莫不有理理者天之經地之義民之行也是故日月星辰之朔望躔度隂陽寒暑四時之推遷往來皆天之氣也而有乾健於穆不已之理主宰乎其中山川河嶽百榖草木之麗乎地以生者亦莫不賴坤元載厚之理以為之根柢人性之仁義禮智賦乎天之正理也因之而見為惻隱羞惡辭讓是非之情及變化云為萬有不齊之事由是觀之天下事物孰有外於理哉故聖人之教人講學亦曰眀理而已矣蓋理者道也道之大原出於天其用在天下其傳在聖賢而賴學者講習討論之功以眀之六經之書言理之至要也學者用力乎明理之功以觀六經則思過半矣所謂眀理者眀其所當然與其所以然所當然者父子當親君臣當義夫婦當别長幼當序朋友當信之謂也所以然者父之所以慈子之所以孝君之所以仁臣之所以忠夫之所以率婦之所以從長之所以愛幼之所以恭朋友之所以責善輔仁之謂也知其所當然然後信之篤而不誤於岐趨知其所以然然後喻之深而不能以自已至於一事一物亦莫不眀其表裏精粗與夫善惡是非之宜夫如是然後理眀而有所持循此大學眀眀德之功必以格物致知為先中庸擇善之目必在於博學審問慎思眀辨而先儒講論亦必以講眀為踐履之本先聖後聖豈有二道哉雖然眀理要矣而既眀之後則又在於行之之功苟或知有餘而行之不足則雖精義入神亦無當實用盛德至善竟何有於我哉故致知與力行相須為用而致知則在所當先何以言之知都㑹之壯麗而欲往觀之必先悉其所由之路而後行焉悉其所由之路是眀理也身往由之是力行也苟不知之悉而往行之則有失徑迷途之譏為學之功亦如是蓋知仁為萬善之本必不逞私欲而為利己害人之事矣知義為萬事之宜必不自昧其羞惡之良而為偷安苟合之事矣此講學之必以眀理為先也故書之稱堯曰欽眀稱舜曰文眀堯舜天下之大聖也而其所以成大聖者則以明為本焉彼不務眀理而徒以記誦詞章自耀者是猶舍璞玉而貴碔砆而彼不知而冥行者是猶去燭而夜行均為惑之甚矣雍正七年皇父駕臨上書房親灑宸翰恩賜御聨題曰立身以至誠為本讀書以眀理為先余兄弟盥手祗領謹懸座右爰以寶訓著論二首庚戌之秋手録文鈔即以此辨冕全集非敢云闡揚聖教特以紀過庭慈誨並志書紳微悃爾休休有容論蓋嘗讀秦誓至其心休休焉其如有容焉未嘗不喟然嘆興曰懿哉賢人之為國寶而容賢者之利人國家至深且逺也可以為千古相臣之法矣古大臣之相天子也其容人有包荒之量其任道有馮河之勇果賢也不遺於遐也果不賢也不昵於朋也是其休休之心根於中休休之色見於外賢人爭為之用爭為之用即爭為國用也豈樹黨立朋者所可假託哉彼小人者冒嫉為心懷私修怨所致者奸人附勢者也所斥者直士抗言者也其訑訑之象見於顔面是以賢人逺去君子道消而國亦隨以衰微三代以下稱賢相者漢有蕭曺唐有房杜蕭何薦韓信以成王業曹參禮蓋公而民歌清靜新唐書贊房杜謂帝定天下而房杜不言功王魏善諫爭而房杜讓其直英衛善將兵而房杜濟以文夫蕭曹房杜非前古大臣之比就其所以稱賢則皆以有休休之量也李林甫盧杞韓托胄賈似道之徒妬賢嫉能固小人之尤矣即以李德裕之忠直未免有朋黨之失王安石之才學終有不容人之譏此容賢樂善之所以難也此秦誓所稱休休有容曽子特表而出之於大學之卒章以為萬世大臣之標準歟信而後諌論詩曰衮職有闕惟仲山甫補之夫仲山甫之補衮職也柔嘉唯則天子是若蓋其誠信素達於人君而人君鑒其誠諒其忠故諌無不從言無不聼雖宣王聽言之美亦山甫取信有素也故子夏曰君子信而後諌可謂知進言之道矣蓋君臣一德上下志通然後可繼都俞吁咈之盛而致治於熙皥故人君聼言之道固不可懈而為臣者亦當思所以善進其言之道焉夫人臣諌君非可易嘗也必能進思盡忠退思補過職業修於蒞官之後忠誠達於未定之前然後法語不傷於猛巽語不嫌於諛是故為人臣者必無恝而不諌之理但當素盡其誠使人君信之而已若素無忠誠之心則雖激於一時犯顔強諌而於國事終無濟也雖然信而後諫理也若事至於危急一日不言則民受一日之害一日不言則天下之害甚於一日斯亦可以待其信而不言乎故魏徴之與太宗信而諫者也陸贄之與德宗不必待其信而諫者也而後之人均是之者以贄雖不能信於德宗而其忠誠天下後世自信之也寬則得衆論昔周公繫泰之九二首言包荒解之者曰聖賢之心無棄物堯舜之道欲並生非包荒則不足以體天地之心而盡君師之道也夫子歷論堯舜禹湯武王授受之命而繼之曰寬則得衆蓋自古帝王受命保邦遐邇嚮風薰德沐義非仁無以得其心而非寬無以安其身二者名雖二而理則一也故至察無徒以義責人則難為人惟寬然後能並育兼容衆皆有所託命易貴包荒職此之故耳蓋寬者仁之用也仁者元之德也元者善之長也以是而推之則所以位天地贊化育者皆在是也泰山不讓土壤故能成其大河海不擇細流故能就其深王者不却衆庶故能明其德何則寬以容之故也誠能寬以待物包荒納垢宥人細故成已大德則人亦感其恩而心恱誠服矣苟為不然以褊急為念以刻薄為務則雖勤於為治如始皇之程石觀書隋文之躬親吏職亦何益哉孔子舉寬信敏公以眀歷聖之道而以寬為首聖人教人之意其深切而著明矣乎修道之謂教論道之大原出於天禀乎天之命以為性而因乎性之良能以為道故率性之謂道實天地自然之理也然性無不善感於物而動則有欲欲日以引而道或有所不行上天眷命作之君師使有以莭民之情而復性之善以行其道故曰修道之謂教非道之外别有所謂教也蓋人禀五行二氣之靈首萬物而具五性仁義禮智之德忠信孝弟之行皆備於我然聖者能之而賢不肖則有過不及之差焉古昔聖王之治民也漸之以仁摩之以義莭之以禮和之以樂薰陶涵養使德日進而道自修自十五入學迪以性之所固有老而靡他焉故仁讓之風周於十室而人民惇厚後世莫及蓋教之以孝友睦姻任恤之行而仁道行矣分貴賤定上下明賞罰辨等威而義之為教行矣鄉飲社㑹以及冠婚喪祭莫不有禮而禮之為教行矣師友以解其惑學校以導其趨而智之為教眀矣立此四教而使民日就月將無詭異之習詐僞之萌而信之為教得矣故君師之責修而道乃不虛三代以下致治之盛如漢之文帝唐之太宗宋之仁宗皆朝乾夕惕勤勞匪懈然不圖其本而務其末徒有惠愛之政而無教養之實方之漢唐則令主比之三代則庸君此無他教不能行則道無由眀於天下也夫天無不賦以性之人則天下無不能率道之人人君果能明德以新民修道以立教則朝行而暮效矣何難之有哉而昏庸之君自謂不能而不行英明之君自謂己能而不屑此三代之治不可以一日復而民之固有之道不可以一日明也夫正身以正朝廷正朝廷以正百官正百官以正萬民因民之善以立教即因我之教以復性而古先王所為牖世而覺民者在是矣其於復三代之治乎何有敬以直內論人之一心至虛至靈具衆理而應萬事備五常而制百行蓋人所得於天以主乎吾之一身應乎天下之事者未有大於此者也然放而不存日以昏昧衆欲攻之舊習錮之故雜慮紛紜而不能復完其至虛至靈矣惟當主一無適以全其無妄之體則吾心之虛靈不昧者庶幾復存夫子贊易所謂敬以直內者是也蓋心者一身之主宰而敬者又一心之根本聖賢之學無非欲人存此心而所以存之之要亦不過教人主敬敬者所以成始而成終者也苟存心不以敬則無以澄其源又何以制其流由是而致知必不能默㑹乎事理之當然由是而力行必不能篤實返躬以還其性之本然是故文王小心翼翼而孔子告仲弓以出門如見大賔使民如承大祭蓋深知敬乃徹上徹下之聖功偶離於敬便非聖人之學也學者當存己之心齊莊中正勿使有一毫之虛妄惰弛終日乾乾間邪存誠則所謂敬者卓然在我本心存存不放於外而萬事萬物之理可隨時而照察矣上下交而其志同論夫天下安寧治登上理必賴明良一德咨謀唘沃然後上下一心庶績允凝而萬方順則也易曰上下交而其志同可以覘治世之氣象矣蓋天髙而地下君尊而臣卑理勢之當然也君之不可下於臣猶天之不可卑於地然天地之形不可交而以氣交上下之分不可交而以心交故隂陽和而萬物順上下交而萬民化此天地之常經古今之通誼也上下一心君臣相得則治反之則亂合若符莭信如應響故堯舜之於臯䕫稷契成湯之於伊尹成康之於周召皆以聖明之君交聖明之臣而其致治之盛也勃焉三代下如齊桓之於管仲昭烈之於孔明苻堅之於王猛太宗之於房杜王魏雖未及上古君臣之以聖交聖然亦各以賢眀之資得賢明之臣為之輔同舟共濟言聼計從故其治亦得小康貞觀之風後世稱盛蓋上下志交則天下乂安民受其福理不爽也至於亡國之君莫不由君尊而臣卑志驕而意滿臣之忠言不達於朝廷國之大寶棄之於草野小人日侍左右而専事阿諛以取容雖有上下之分實無君臣之誼豈得謂之交哉故二世之寵趙髙桓靈之任趙忠張讓隋煬之用虞世基豈非交所不當交而逺所不當逺之禍乎故易之理無定而惟在於貞與君子交則謂之泰而吉與小人交則謂之否而凶書曰紂有臣億萬惟億萬心豫有臣三千惟一心夫紂之所與朝夕共處者豈無股肱心膂之寄哉然不交正人而所交皆小人故殷以之亡武王之臣皆周召吕散諸人一德一心故膺天祿而保祚無疆夫人君莫不欲得賢才以自輔然而庶事未康至治不見者蓋所謂賢非賢而才非才也然則果無賢才之可用歟曰彼所謂賢者乃善己者也所謂才者乃能以巧術奉上者也方是時草野之賢才深藏不出而已矣在位之賢才遜荒行遁而已矣間有碩果之存亦今日用之明日黜之而已矣又何能久於其朝哉誠能舉天下之賢才登之於朝而不疑誠以接之信以待之上下一心交修罔懈則天下有何不治而隆古有何不復哉雖然此特為為君者言之耳書曰臣哉鄰哉鄰哉臣哉古之大臣一日立乎其位一日盡乎其道陳善閉邪補衮職之所闕其用與舍惟君之命耳不謂君弗用而有懈惰之心夫如是然後上下相和得交泰之道而都俞吁咈之風日見於朝廷矣君子以虛受人論夫君子之進德修業也立身行己不可不誠應事接物不可不虛故易之中孚言立誠之學而咸卦則言受人之學中不可不誠又不可不虛程子曰廓然而大公物來而順應可謂得行己受人之要道矣大象之云豈有異乎夫天地之常以其心普萬物而無心聖人之常以其情順萬事而無情心普萬物故萬物之心即吾之心也情順萬事故萬事之情即吾之情也以萬物為心萬事為情尚有一己之私心一己之私情乎故天地之大無不覆幬聖人之德同其博厚髙明皆以誠積於中而順物無沮也君子希聖希天必當以虛中為本如山之虛如澤之潤則物有感而必通事無隱之不達虛受之心即可以成中孚之化矣夫以山之峻絶似可無借夫物之助矣而能受澤故益增其潤君子之謙牧善下方且自視未及培塿之卑也而能虛以受人之言則當日見其益矣彼小人者或豫智自矜而恥過作非或狎侮善人而不受其言或外從而內拂之獨何心哉家人上九有孚威如終吉論治國必始於齊家而齊家乂在於修身身修則孚與威自然而合待之以誠而不使之怨臨之以莊而不使之狎則家道永昌以之治國平天下將無所不可矣易家人上九之爻曰有孚威如終吉可謂得治家久逺之道矣蓋居卦終而有剛德得嚴威之道惟卦終故以象家道之成惟有剛德故能孚威以待下治家之道當慎於其始防之不可不密故初曰間有家謂及其志未變而間之也又當善乎其終待之不可不誠御之不可不嚴在上曰孚威信與威相濟則永得治家之道矣不但父子兄弟夫婦之間必如此而後得吉也凡家之中長幼尊卑皆當率是道以行孔子曰惟女子與小人為難養也近之則不孫逺之則怨夫惟以威御之則近而不至於不孫以誠待之則逺而不至於怨雖然所謂威者豈鞭撻箠椘之加而所謂孚者豈煦煦焉徒事姑息為哉自勝其私語言可愛行止可法而不蹈非禮則人自畏其威矣自勉以仁立愛惟親立敬惟長妻子好合兄弟既翕則人自感其誠矣此又反身之要而治家者所宜先也懼以終始其要無咎論易之為道大矣以在天者言之體天地之撰括隂陽之精而統備乎五行萬物之理以在人者言之君臣父子夫婦昆弟朋友之倫日用酬酢吉凶悔吝憂虞得失之事莫不具載而原始要終之道有操之一心而有餘者故易大傳曰懼以終始其要無咎乃總易之道而提其要以示人也蓋人之立志行己欲自踐於聖賢之域者其術固非一也然總而言之不外於戒懼一心何則人受天地之中以生其性固善然為私欲所蔽則心放佚而莫知自省以至有過行而入於凶咎聖人欲其思也乃教以成始成終之道莫若以懼為本故繫泰之上六則曰城復于隍否之九五則曰其亡其亡繫于苞桑夫泰之為卦上下交而其志同也否之為卦上下不交而天下無邦也然吉凶頓異者泰之上六治極當亂之時而志滿心驕不能戒懼故凶否之九五亂極當治之時而戒謹恐懼故吉此非懼以終始之大驗乎推之謙之六爻皆吉震之六爻無凶以能戒懼而得亨也豫上九之象曰冥豫在上何可長也謂不知懼則自吉而向凶也夬之九二曰惕號暮夜有戎勿恤謂能自懼則雖危而無咎也蓋易之要以貞為本懼則能守貞矣以孚為貴懼則能有孚矣危者使平易者使傾而終歸於懼以終始人能以此為法既懼之於其始以防微杜漸又戒之於其終以持盈守成則處事之要為學之法皆備於是矣物不可以苟合論天下之事未有可苟且以行者自小以及大自近以至逺莫不皆然故禮者所以辨上下定民志天下之事不正之於始必不能成之於終若不由禮而以苟合則吾未見其可也蓋自上古結繩以降堯舜以文明治天下於是焕焉稱治自兹以往聖帝明王為治莫不以禮為本然後漸之以仁摩之以義和之以樂而天下化成以之奉宗廟則有奉爵焚燎肅雍恭敬之儀以之接賔客則有宴享進退揖讓升降之等以之理民則有分田興學教齒教讓等威服用之文凡諸冠婚喪祭皆彬彬然有莭有文而從無苟且以從事者秦漢以降無聖明之君能復古禮惟以一己之便宜而行一時之權變故有宋大儒皆以為苟道蓋凡物之所以成始而成終者莫要於禮而易之所謂物不可以苟合者其義誠廣大而精深也且道心人心之分君子小人之辨皆在於是焉何則人之入於私而不能自振者皆由人心之動不能抑制遂爾因循苟且以至於不可救藥而天理滅矣至於君子正身修行不入於小人之域然小人或僞為善以誘君子君子不察而與之交終身為恥此尤不可不慎者也故豫推其意以戒後之人當懲苟合之失而造次必由於禮庶幾永終而無弊也御製樂善堂全集定本卷一
