front:
  text: 欽定四庫全書御製樂善堂全集定本巻十七
  hash: sha256:e17070aade38cb863242285b78e5c8d42f6196a9426979463bb1a03f7ee9848d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0003_WYG_021-1a, image: WYG1300/WYG1300-0423a.png}
body:
  text: 古體詩題唐岱重溪煙靄便面山容邐迤開屏障前溪後溪遥相望雨餘煙靄濕未乾流雲不捲青天上溪流宛轉抱花源茒舎㡬間面青嶂板橋架波通徑窄梵宫結搆層巒壯山水與我有宿緣每遇佳景輙歡暢名山萬里未曽遊對圖逸想那能忘唐生當今稱妙筆知我心胸愛清曠晴忩為我圖便面潑墨淋漓傳景狀千重林麓抹蒼翠一片煙雲作供養逺峯近態無不兼樵路疑聞牧童唱莫辭復為一拈毫添個輕舟雙槳盪讀白樂天集元白夙齊名並號能詩者後來趨向殊品格别髙下以此評其詩我愛香山社况復無䋲削體裁極閑雅吟咏攄性靈後人繼者寡弗弗紗牖風炎炎朱明夏把玩不能置博山香細灺擬栁子厚始得西山宴遊詩佳境天所儲常以供幽客我得遊西山追蹤謝公屐髙峯挿天漢嵌空叠翠碧其下森萬山朝拱歸一脉古磴長竒葩靈扄多仙跡得意亦何有會心聊自適盤桓撫長松清風生野席相馬吟知人固非易知己良獨難譬彼駕鹽車太行阻且岏惜哉騏驥良徒共駑駘餐一朝遇伯樂三鳴感多端秣甘飲清水飾之錦繡鞍西極崑崙墟東窮渤海漫追風四蹄輕飄飄如羽翰聊藉酬知音不顧汗血殚伯樂不世出騏驥空自殘誰憐伏櫪者執策一長嘆猛虎行東山無虎獸跡多西山有虎獸跡少白日繞林鳥雀驚耽耽後逐三子小秋風獵獵原野平饑膓未飽山中行鹿兒被獲供大嚼老鹿長逃不敢鳴將軍笑撚鐡絲箭不射虎腰射虎面可憐三子亦被擒穽裏同來入虎圏虎圏晨開鐡作門聊憑一息定驚魂乞生也向人垂首昔日威風今何有擬桃花源中人送漁郎出源日長山静春歸早千樹霞綃纈林表無頼東風吹落英沿溪為引漁郎道晉代銅駝荆棘中秦家宫闕埋煙草何緣㡬日共盤桓翻知多少紛争擾君有家鄉君自歸來路去路兩杳𣺌送君還復閉洞天洞裏花香春浩浩擬漁人復至桃花源不復得路憶昔入桃源萬古仙家趣桑麻滿平疇緋英纈千樹惜我覊世網未能驂雲霧洞口執手别殷勤頻屬付重來問仙源歴歴想前度雲水兩𣺌茫欲渉迷故路歸來日已西租吏守門户烹雞送租吏自愧初心誤聼鶴鳴白雲捲遥天澄潦收寒瀨入秋詩思清吟望中心快何來警露音清越振林外在隂無子和孤鳴何幽介是時田間雀喙啄羣喧噦兒童驅不起雜沓殊無頼忽聼九臯鳴清耳如梵貝㑹心豈在逺霜風度天籟芸香青油隔子屏風曲青簡繽紛三萬軸屈戍不閉午風凉吹送芸香香馥郁都梁五木不須焚芝印未結飄幽芬老蠧辭家墮䨇涙坐失書屋三千春可惜三仙未餐罷避舎有似雲中下冬夜偶成人苦冬日短我愛冬夜長皓月懸長空朔風飄碎霜重簾垂氍毺紅燭明深堂博山炷水沉和以梅蕋香敲詩不覺冷漏永夜未央招揺正指北黒帝方司辰三餘饒樂事華屋夜如春我屋雖如春廣厦安得均因念雪霜裏尚多僵卧人展轉不能寐閒敲詩句頻曠懐天地間人我本相因鴻荒始判初有如一家親後來生蹊徑肥瘠異越秦我願讀書者立達自其身烏雀集庭樹啞啞呌風冷無食哺其雛羣棲嘆夜永豈如青田鶴梳雪毛羽整不用稻粱資髙空盤孤影九臯一聲唳聼者發深省換燭詞燄燄瓊枝綻紅蕚蘭膏四下玉珠落熏爐甲煎篆煙消將炧幽光暗錦幙寸心不惜盡成灰斜倚雕䦨玉如削玉鏡臺邊新睡起春蘭秋菊皆相似獨有幽人悟火傳前燈未滅新燈是弔宋末張陸䨇忠午潮樂作檣旗仆蒼天不遺一塊肉海邊拮据兩孤臣有淚何能向天哭陸公負帝先沉海張公露祝天心改兩公先後死不同忠肝凛烈千秋在嗚呼委身事主不兩全竭心成敗斯由天趙武得生帝昺覆嬰杵當年難獨賢遣興隂凝北陸盛魄淵窮次紀觱發曉風寒霜花拂忩紙偶思弄翰墨排籖列十指一字不能作閣筆且已已因思寒暑易天道固如此暑雨與祁寒怨咨豈明理况復陽和近轉眼物華美譬彼養狙公不出三四耳失者何必愁得者何必喜我願世間人平等觀如是擬杜工部洗兵馬行長雲不隐闗山月沙漠龍堆多戍卒壯士横戈古戰場將軍飲馬長城窟長城水寒馬不嘶刀環入夢多歸思少婦樓頭咽横笛一聲秋韵臨秋吹吹笛聲髙復聲下驚起匡牀髙卧者側身吟望興咨嗟向天長歌洗兵馬謂天盖高聼自卑電光倐忽雷車馳雲師雨伯揚青旗隂昆水族功並施盆傾瓶注遐邇滋洗盡塵氛永息師男歸其家婦育兒九州安堵樂雍熙壯士勇力亦奚為欲挽天河安用之傳聞傳聞西師秋大㨗露布軍中踵相接零星困獸争逃生駾走喙息震且慴皇清赫濯揚聲靈共球萬國均臣妾何來小醜擾西北此敗驚心定安貼太平有象當偃戈喜動中心上眉睫男不戎行罷戍歸春風四海咸和燮天心仁愛定如是但看明年進降牒冰牀御河臘月層冰凍河干輻輳千人衆徃廻争欲倩氷牀空設輿梁恒不用細長明鐡當車輪架雕文木鋪重茵平湖舟駛不驚浪廣陌車馳那有塵客來不須勞問渡但向河邊鏡明處隐隐雷聲聼未休坐中疑向瑶臺去帝京歲暮八詠擬樂府并序四時灰琯知玉律無差九有春臺慶熙朝樂事十二月之佳景妙筆難描億萬載之休徵金甌永戴况乎天中旭麗輦下雲屯漢京兆之樓臺綺䟽繡幕宋汴梁之車馬香霧紅塵萬國共球望金門而獻嵗千方輻輳向玉闕以輸誠暖帶春風喜椒花之有頌寒辭冬雪堆柏葉以為盤韶景麗萬物以蕃鮮猶少蘇家三首芳辭申八詠而㸃竄非同王氏七人雖即事以興懐遜緣情而綺麗不拘成律各賦一章臘八粥臘月初旬纔八日都人醖醸年華出招提蘭若結常緣竈下火光然百室黍米棗栗雜胡桃煑粥朝餐如一律如一律異甘㫖貧家不似富家美華屋雕盤肉侑餐茅簷一椀充腸耳充腸飽腹却歡然人人争道新年邇祭竈鄉村臘廿四家家祭竈王城中二十三比户燈燭張傳言輦轂百神聚竈君奏事非荒唐竈君奏事向何方九天之上有玉皇年年此日竈君升雲旗龍馬宵翺翔且祝家事莫短長為乞明年安且康我聞作善斯降祥竈君直奏職所當天君自有定賞罸隂氏由來費黄羊立天燈金龍䕶柱長數丈四柱撑如巨靈掌綵燈左右列丹墀萬壽燈明丹陛上年年臘月二十四縛架懸燈聲擾攘百夫轝柱齊用力一一都聼銅鑼響燈上聨書細金字惟乞嵗嵗登豐穰瑶宫樂事與民同從識太平真有象貼門神家家嵗底貼門神門前一望景象春將軍鐡甲逞威力丞相冠帶容彬彬更換桃符粘福字等閒惡厲不敢親陳陳相因門板上新神還與舊神鄰神豈隔年舊習俗尚鮮新只願閭閻躋仁夀常見期頤百嵗人饋嵗刺繡新驚添㡬線團團繡得荷包面就中各盛金豆兒開匣争看文采絢亦有文房雜珍玩苕溪紫穎端溪硯易水松煙黒似漆倭牋蜀紙生東絹紅橘黄柑與鹿兔渇能生液饑堪嚥帝里豪華固如此三元令日人争羨試想村中老灌田此景何緣一聞見供天地新年淑氣靄百祥䖍供天地通萬邦由來帝里制更詳中宵華燭紛煒煌屏風設列庭中央盤堆果實羅酒漿主人前跪燒瓣香一年戶口安且康荷神之徳報所當今值除夕歸帝鄉更迎龍駕錫福長五更曉起未出房迎喜避鶴擇向方後趨庭院拜玉皇送神爆竹聲硠硠夙興歡喜謹立旁遥瞻爐煙縹緲光靄靄天門闢九閶熰嵗地爐然松枝續續煙縷起暖氣滿户庭熰嵗今宵是豈云借其煖詎為聞其香但願一家人和氣致千祥東鄰撥新灰西鄰燒硬炭煙熏靄如霧自夜達明旦明旦天未明三五燦踈星賀年人畢至喜氣迎新正松枝不用添留為今年計彈指又除夕仍復供熰嵗守嵗赴壑修蛇留半尾堂堂去勢誰能止萬户千門守嵗人守至明朝新嵗是今年還是舊年年倐忽更新萬象鮮人生㑹有百除夕高堂且復列華筵華筵開處羅老幼家僮歡喜忙奔走屠蘇遞飲亞元正少者在前長者後出門看天斗指寅由来一夕變冬春書傭總是為書役繞架更復呼長恩讀陶詩風雅乆失墜三百無人繼斯文蘇李徒權輿成五字子建嗣其音清辭發幽思卓哉彭澤翁别擅此能事自然無安排一以道已意至味寓澹泊字句絶詭異寄情五栁間瀟灑標逸致我今讀公詩數過不能置擬學眉山叟和咏良匪易春水泛舟新流滑笏如油綠栁帶廻溪曲復曲輕舠載我逍遥遊滿眼韶光看不足水清魚静舟子閒獨下青天白鷗浴尋春見山桃始開尋春在何處乃在山之陽曉風吹料峭著體如沾霜逺甸草未緑長堤栁漸黄乍見山桃樹參錯吐花房露顆裛幽馨日暄淡素粧呼僮折一枝歸挿膽瓶香猶憶去年時九十惜韶光轉眼春又到此意渾欲忘女夷回造化遲遲日正長曉起聞雀聲簷牙凍雀侵晨語似喚春眠覺行旅昨朝小園花正開不見飛向枝頭来今日寒郊草未緑却自成羣上林木曉寒喉澁不成聲何如且在林中伏馬上吟詩好馬上吟詩好即景堪驅用途長詩思長不復畏炎凍憶在書齋裏一作和者衆雖云足賞識轉覺苦吟弄何似自歌吟却去安排重亦有從行者且喜不成誦我得此中味願與識者共莫學東坡老但欲續殘夢所見東皇迴星軺和氣遍六宇應候百昌蘇黙黙春風鼔皇州景物饒廣麗洵天府臨風跨紫騮緩轡過郊墅壟上事春耕停馬問田父小立汗不乾向我情畢吐去年冬不雪今年春未雨野老望雲心此意良辛苦清晨負鋤出努力向日午畝耕次第完下苗何日舉我聞田父言仰望黙不語天心本仁愛自有元功補甘霖應在即如膏潤沃土佇俟西成時萬户倉箱貯眀月當三五流影遍萬方萬方同一照所在分輝光昨夜出東林映我讀書堂今宵行帳宿亦復明煌煌人處境地異月不改其常古來賢達者用貴物我忘清明重拜掃貴賤良俱然彌望村郊中士女車馬闐富室羅祭品髙堆白紙錢貧者伏路旁空餘涕淚漣生有榮辱争沒後廼甚焉何人能觧此便是無為仙試看古墓道亦復犁為田我從御園来夭桃花半放路過桃花寺遥從山底望未見一枝開春風疑兩様春風固如常前後亦湏讓曉隂曉看西北雲峯起奴僕蹙眉主人喜僕言長路多䟦渉雨積塗泥艱歩履爰命来前聼我言若軰徒知自為爾不見辛苦三農望嵗賖此日方資挿秧水過通州浮橋煙郊濛濛多白沙晨行更值寒風加馬蹄躑躅不能進回頭迷眩眼欲花却到潞河風日静浮橋横卧波中影南望飛鳬接逺汀何似江鄉呼舴艋灌麥大麥五寸長小麥三寸半地乾苖欲枯離披隴畆畔猶幸灌溉便近傍河之岸清晨課僮僕轆轤轉雙腕初看土濕濕漸覺流漫漫湏㬰苗盡起生意良可玩爾僕聼我言莫怨體流汗不見萬頃田農夫徧澆灌讀范文正公神道碑用宋陳傅良原咏韻入夏南風薰花木圍我廬我廬何所有挿架古人書希文古大臣不與伊葛殊特達圭璋器心跡天日如今讀神道碑更識為名儒中庸頼公顯程朱繼其餘廟堂而江湖憂樂與民俱天章十條陳忠懇豈區區仁宗稱賢主郅理亦可期參政僅九月不及大有為徒令范老子聲名播荒陲鳩喚雨我聞鳩喚雨又聞雀呼晴邇来鳩雀争相鳴勞勞對語頻入聼忩前栁色正深緑芳郊未雨遲春耕小雀得意呌不止嗟爾鳩兮胡不靈玉帶生歌玉帶生端人也事文丞相為文墨賔神工踏雲割寒玉追追琢琢虬盤緑曾為信國席上珍墨瀋猶疑血淚哭樂作午潮事已非玉帶生從信國歸海濵戰衂門生散玉帶生為信國伴嗟爾玉帶生我獨歎爾卓爾皓㓗胡為乎却笑禇淵犬不如雨工栁毅見涇川婦人牧羊問之曰此非羊雨工也葢雷霆之類毅回視之矯顧怒歩飲齕自異見異聞錄碧潭潭底開珠户烏龍晝卧當瓊樹神女割雲補錦裳閒却雨工睡元圃天上人間隔夜晨一朝還過九十春何日鞭渠令行雨大慰田間望嵗人陶琴壁上掛何物亦被琴之名猶然徽軫具而無疏越聲古来多寳器亡失糞土輕兹琴存十一特以陶公稱伯牙彈不得穎師奏難成人皆指上覔我獨虚中聽有絃絃有止無絃絃外鳴不獨學彭澤自取琴中情蠅拂子驅牛不可驅蠅可玉絲霜縷垂婀娜華筵六月風日炎獨將瀟灑登君坐濯濯騣凶鬯匕毛㓗且脩閒供揮拂隨右左王謝家風何足云愛渠亦復周旋我藺相如和氏匣中一匣水十五金城持易此城不歸趙璧亦歸狼虎强秦亦披靡嗟乎人寳玉寳豈可同年語相如自知趙二虎秦廷斮藺趙如何和璧雖歸藏外府君不見鴻門玉斗應劍碎子房依舊逡廵退御製樂善堂全集定本巻十七
