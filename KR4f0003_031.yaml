  text: 欽定四庫全書御製樂善堂全集定本卷二十七
  hash: sha256:e25c82328722f5add428605580a9b31bc9b08efcbb2e6d51835fbc2ecff8941a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0003_WYG_031-1a, image: WYG1300/WYG1300-0507a.png}
body:
  text: 今體詩奉題二十四叔父裕德軒三十韻聖治崇棠蕚天心重鶺原諸藩多俊乂吾叔擅璵璠麟趾祥符厚宗璜介弟尊性情恆靜正體貌更恭溫尚友希千載成文易百言夙嘗勤典籍頻自惜朝昏深領書中味渾忘户外喧銘辭方刻器裕德重顔軒邃爽宜涼燠幽間類澗村砌堆文石面柱立老松根謂我須題壁伊余似叩盆句羞青玉琢才愧墨花噴每憶髫童際親承聖祖恩漏聲傳禁切膏露自天繁辟咡依前膝含飴共夕飱七齡叔敏達十二我愚芚近嵗恩加渥書齋業共敦文章森義府翰墨煥崇垣緗帙循環誦瓊編次第翻數曽相賞析幾度易寒暄講學欣同幄延師更一門曉晡常並席嵗臘偶開樽聨騎趨香陌輕舟泛御園騄驪工步驟鸞鳳必騰鶱饜飫心方永從容道自存隔窗聞鳥哢傍砌長苔痕靄靄空雲動遲遲午日烜春風頻度處花信幾更畨願永名軒志還陳攻玉論君恩正如注砥礪待便蕃螢我憶去年秋飛螢幾點流忽於今夏夕熠耀最髙樓映月光無定隨風散欲稠為添詩客興莫照旅人愁夜靜千山寂天空萬籟收蒼茫蘆葦岸把卷有行舟芭蕉幾葉紛敷翠影亭却憐幽趣伴窗櫺因君不是塵中質笑我常來雨裏聽卉譜應添居士傳空階常演涅槃經月明風靜相忘處正是幽人夢蝶醒逐涼逐涼成獨往得意亦忘言坐久看花落心間識水源暑從塵外去風自靜中喧瀟灑吾何似雲邊白鶴翻立秋夜作瑟瑟金風報節頻飄颻梧葉落階新不嫌白日馳駒隙且喜輕涼上葛巾入夜漸長人未睡裁詩有興句無塵空庭小酌龍團坐孤鶴一聲隔緑筠小園間詠十五首曲徑通幽為隔塵氛逺應憐曲徑長紆回山勢抱邐迤竹垣藏鶴步苔痕合春歸花氣香板橋流水外别有讀書堂芳嶼圍棋乘興步芳嶼逍遙任所之已看苔作席最愛栁成帷漫煮蒙溪茗間拋賭墅棋東山稱盛事吟望寄遐思桃溪步屧山桃開也未杖䇿試探尋好景春來遍芳溪曲處深明霞千樹疊傍水一枝臨何必武陵路隨緣物外心竹塢春深間過山塢裏粉脫見新篁徑節當春緑踈竿泛籟長蕭騷寒雨夜倣佛輞川莊不肯裁為管無勞引鳳凰芳港聞鶯春色堂堂去鶯聲恰恰來緡蠻聼處澀風景暗中催長日慵攤飯新缸喜撥醅笙簧隨分有何必舞三臺春湖涵碧碧水漾平湖空明一鏡鋪鬚眉應可鑑塵壒杳然無點點浮青荇雙雙下白鳬春風浴沂水視此意何殊石坂烹雲敲火烏卿熾烹雲玉液清龍團曽未點魚目已旋生漫説腸堪潤應知眼倍眀披襟成小啜孤鶴一聲鳴廣厦冰壺天伏三庚永堂開六月涼深深屏隔暑疊疊簟含霜底事揮紈扇無勞問蔗漿氷壺供坐卧樂意自相忘鏡水荷香半夜芙蓉雨三間水月樓清香隨處度風景一時收幹密妨魚躍花深隱鷺逰詩情頻入座不必問漁舟月樓夕幌雨洗塵氛靜天空花鳥間月樓開一面夕幌捲千山牧笛耳邉過征鴻眼裏還桂香依舊發付與阿誰攀蘭橈獨釣秋湖魚怯餌把釣事如何緑水一竿竹清風幾領簔蒹葭塵外老星月箇中多夜靜獨歸去清光挂女蘿竹籬鶴步結社松為宅看家鶴守門偏知人客至不負稻粱恩宿月精神古梳風毛羽繁由來好僮僕不必貴乘軒蘆岸秋晴秋色知多少蘆花盡白頭戰風搖夕浦飲露亞寒洲生意知將謝隨時未肯休蒼茫煙水裏好去弄扁舟板橋霜迹隔溪亭子逈為架板橋通秋老碧天白寒流楓葉紅捲簾吟夜月著屐步霜風愛此雙雙迹扶笻過水東雪徑梅姿四時花木足最喜是園梅傲雪三冬裏因風幾朵開清香流玉骨冷潤滴氷腮獨有幽人賞巡簷杖䇿來秋日寄髙安朱先生新涼初到北忩清聞道先生體暫平漫説春風違坐卧應教霽月仰澄眀草長書帶階前思秋老荷衣檻外情遙憶匡牀間夢蝶懶聞蟋蟀一聲聲涼州詞關外風寒水不流戍兒望月唱涼州莫道涼州便絶塞還過萬里去防秋黃雲漠漠連白沙秋聲到處賽聞笳落日旌旗捲空碧隴頭莫上上思家戍久翻忘塞上塵笑提賭具向東鄰寶刀不敢輕輸與仗此區區報國身破秋破秋才旬日滿目便秋光樓逈輕嵐入林踈爽籟長鏡波方淡沱蘆岸轉蒼茫瀹茗煙生户開簾月上牀心如寥廓表境是水雲鄉敲句娛寒夕翻書趂晚涼風清塵不雜意適倦都忘箇裏無人會天邊雁幾行荷燈點點荷浮瑟瑟波麗華端不讓湘娥燈眀萬朵蓮心吐月印千潭法海多只是金英含綽約無須緑蓋舞婆娑御湖錦繡憑誰織來往輕舠一夜梭槐市漢羣儒會市禮樂之器於此揖讓論辨彬彬然文物東都盛聲名槐市揚學淵深璧水義府儼宫墻特逹圭璋器從容禮法場無勞評月旦此處定行藏清河送平郡王西征宗翰臨戎劍氣寒來廷屈指覲呼韓秋風慣拂征人面馬上何須回首看溶溶碧水向東流戎馬催程敢重留莫把渭城新曲子翻成水調唱涼州武略文韜藉指揮書齋倍覺有光輝六年此日清河畔君作行人我獨歸秋社秋社今朝是秋光逈不同庭前梧葉落梁上燕巢空村酒成新釀田禾颯晚風太平兼大有煙火萬家中賣菊翁秋光未到小籬東已有街頭賣菊翁滿擔寒芳霏玉露一簾清氣韻金風巧數花師奪女夷四時芳信總先知深紅淺碧渾餘事先買鵝黃第一枝夜聼落葉聲半榻秋寒清夢魂紙忩颯颯響聲喧渾如一夜風兼雨童子開門葉滿園霜後踈林葉已乾清宵風送打忩寒飄零今夜知多少曉起憑欄仔細看始裘霜滿園林葉作聲薄寒風度几忩清試開舊篋衣頻換才著新裘體更輕冷暖由來皆有定推遷何事重關情薰爐沉水從添未消得三餘樂事并賦得野徑尋梅見小春幽谷香凝氷玉腮尋芳才見一枝開雪封野徑行行逺春到山村得得來最愛輕盈含數點莫愁狼籍落成堆明窗雅助新詩興座上曾延蕚緑陪櫽括蘇子瞻後赤壁賦即用賦字赤壁我曾識巉巗今復逰千山木落葉十月夜登舟寥寂吾良樂風霜客不留橫江一孤鶴不與歲時流送桐城張先生暫假歸里丹鳳銜書下紫廷樅陽早已望台星新恩優渥榮旋里舊德綿長肅薦馨時以故大學士文端公崇祀賢良祠於本籍賜祭北闕絲綸方待掌東山絃管暫教聽即看穩步沙堤上揚拜從容對御屏西厰騎射霜林葉落雀羣空馳射平坡試駱驄猶憶三春陌上過玉蹄滚滚踏香紅萬年松徑幹挺森森窗前滴翠深依然臨水石即此是山林香氣濛春霧華枝覆午隂瓶梅與盆竹聊結歲寒心御賜端硯恭紀靄靄午窗明融融御苑晴恩波流浩蕩緗案沐光榮雅質傳端石髙標紀舊坑一泓秋水淡幾片碧雲清入席添詩興開囊粲玉英虬龍渾欲動藻采自然生學海慚無楫心田勉欲耕研精書史裏總是被生成歸鴉歸鴉集庭樹翅影帶斜暉傍晚羣爭宿逢人馴不飛逺村霜月冷古戍稻粱稀始信鄉園好枯枝猶可依十宫詞吳宫白苧輕盈屧響廊青龍舟裏換晨妝夜逰朝宴千年樂那管人間有越王楚宫渚宫春暖翠華遙簾幕風輕裊細腰不道君王深注意行雲行雨隔迢迢秦宫春鎖阿房靜管絃塵生舞袖為誰妍從來不識君王面忽過人間卅六年漢宫水晶盤淨玉腰酥舞態生憐可用扶底事天家萬乘富等間難獲晝明珠魏宫平生戎馬樂何曾銅雀成時幾度登不為夜臺聽不見悲歌一曲向西陵晉宫滅蜀平吳處上遊大開武庫甲兵收而今四海渾無事只駕羊車日夜遊齊宫步步蓮華步步春香凝羅襪不生塵何須洛浦遙相見已是人間有洛神陳宫結綺臨春户對開後庭花發引金杯景陽鐘曉方酣宴不信橫江木柿來隋宫海錯山珍雜綺羅鑾輿空待未曾過夜深欲識君逰處但看飛螢點點多唐宫沉香亭畔晚春妍玉樹煙濃院宇連何事宫娥羣戲劇應緣分得洗兒錢帝京雜詠九點煙中古冀州萬年天府壯宏猷矞皇禮樂三千盛襟帶山河百二稠天上樓臺懸日月人間車馬富王侯太平有象光遐壤况是神都處上遊髙標象魏五雲端帝座重重瑞靄攢自古幾朝稱景運如今此地是長安文章二馬應慚盛吏治三王未足觀總是太和薰郅理天街十月不知寒輻輳千家日月旁九衢風送玉塵香歡騰履義行仁里春暖瞻雲就日坊駝背伊歌翻續續象奴蠻曲喜洋洋六龍幸處陽和豫夾岸平鋪軟土黃玉蝀橋頭望禁林重重樓閣聳千尋兩行煙栁春光媚幾頃澄波緑意深池水皆成瀍澗澤宫牆常透市朝音大家真是同民樂不異薰風解阜心題宋徽宗竹枝雙雀兩兩珍禽翠羽修緑筠深處舞風流筆端多少江南意何事終成塞北逰題吳梅村集梅村一卷足風流往復披尋未肯休秋水精神香雪句西崑幽思杜陵愁裁成蜀錦應慚麗細比春蠶好更抽寒夜短檠相對處幾多詩興為君收十一月十三日恭遇皇祖忌辰感成長句浩蕩洪慈被九州一人常厪萬年憂絲綸允協衣裳治冠劍今驚歲月流自隔音容周一紀敢忘恩澤永千秋朝來更憶攀龍日仰首髙空淚不收橄欖茶吹雪磁甌絶點瑕新烹異品味尤嘉山厨漫説玫瑰露髙閣初嘗橄欖茶興入盧詩風滿腋書澆邊腹響鳴車武夷應喜添知己清苦原來是一家癸丑冬至上躬祀南郊回鑾恭紀星雲糾縵燦神京玉路喧傳警蹕聲長至履端儀告偹泰壇寅祀禮初成龍輿喜見千祥集象輦旋看百辟迎最是一陽初復處永綿多福洽皇情顒若誠通顯肅將天心消息復微陽和鸞九奏鳴韶濩奠璧三躔紀奉常候氣羲和應告瑞書雲太史正占祥今朝納慶宸𠂻豫寶祚綿綿日月長鴛鷺千官擁六飛午門鐘響散晴暉陽回御座衣裳暖風動龍旗日月輝靄靄上林暄玉樹依依青瑣敞彤扉近光兆庶瞻香霧共道君王迓福歸冬至後一日同二十四叔父五弟逰西苑試射駿馬紫藤鞭宫城九陌連平池鋪玉鏡晴雪晃金錢歡賞娛今日追陪憶往年東瞻宸極近靄靄羃祥煙輕風搖苑樹碧宇散晴光氣復初陽暖人迎化日長緣堤看凍栁繫馬坐氷床到此同携手臨風樂倍常蕉園成古剎喬木隱伽藍貝葉飄花雨香雲護寶龕隨緣逰勝地泯念禮瞿曇何用僧雛引由來此路諳太液無勞渡羣欣步屧行龍宫隔岸聳玉蝀跨波橫不見潛魚躍空聞寒雀鳴平田豐澤北指日試春耕豐澤園北有田上演耕藉禮於此燕角敦弓徑輕楊翠羽修中時驚月落發處迅星流更步三梁閘因登百尺樓淑清遲勝約聊待再來逰瀛臺東北有淑清苑是日偶未到迎薰亭子畔山勢鬱崚嶒松柏開三徑岡陵列幾層石龕穿洞入雲竇捫蘿登蠟屐肩輿勝都輸蓮社朋乘興到瀛臺詩情入目來水心飛棟宇人世入蓬萊雪覆孤桐直風吹虛閣開舊時聽講席亦復滿塵埃煙光凝逺岫晚景向西斜舊熟神仙境重逰山水嘉風聲送歸騎月影照棲鴉漫憶十年事心清一碗茶御製樂善堂全集定本卷二十七
