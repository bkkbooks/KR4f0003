  - {type: page-break, offset: 0, content: '', id: KR4f0003_WYG_015-1a, image: WYG1300/WYG1300-0371a.png}
body:
  text: 賦耕耤賦幷序皇上御宇之五年青帝司方之二月春風普扇陽德方亨天子乃耕於千畝之田禮也臣聞聖王務本耕耤以勸農功明主孝親親推以供祀事我皇上孝以事親勤以率民二載甲辰既耕加一兹又躬行耕耤之禮急粢盛重民食致誠匪懈其典則隆洪惟我皇上道洽天人化霑草木誕敷文德廣運聖謨渥澤周於羣生至治昭乎天壤乃猶頻興重農之典時勤保介之咨追厥唐虞播種之踪為彼率土民人之勸萬衆觀儀上農終畝迨厥秋成登於天廩薦之皇天供於祖考臣知皇天祖考鑒皇上之精誠歆皇上之大孝必錫嘏降祉永保無疆明德惟馨聿懐多福臣不勝踴躍懽忭之至謹拜手稽首而獻賦曰繄惟重華之命稷兮播榖實繼乎禹功必烝民之粒食兮始風動而時雍親耕肇於姬籍兮意往聖之皆同我大君之首出兮屢三推以勸農豈玉食之是享兮惟簠簋之䖍供秉耒耜以率先兮符澤物之元功於是春陽初布青帝司方嘉萬物之昭蘇值千卉之勾萌農祥既見土脈方昌協風應律陽氣滋彰皇帝乃順月令撫嘉辰念民力飭甸人當前期而致敬用有事於青春於焉載師清畿封人浄路常伯獻儀掌舎設枑爾乃青壇蔚其聳立華蓽森其崔巍雲移翠幕栁拂青幃啟千畦之平壤欣四塗之腴肥逮夫元辰既届曉色方鮮天子則御藻冕佩蒼瑌被龍衮鳴和鸞載青旂揚朱旃接㳺車之轔轔施梁輈之戔戔爾乃稷宫将近樂具班陳天子乃降御輦饗農神祈嘉榖焚燎薪禮成而退有事耤田衣被襏襫趾履陌阡王侯衛後虎賁導前太僕秉轡牽牛奉鞭乃厯廣塲撫御耦執縻手底不辭瘁乎三推載耒御間試躬親乎千畝王公卿貳或五或九白叟黄童歌呼奔走維誠敬之聿昭知樂愷之孔厚於是黛耜方輟紺轅遂旋雨㢘纎以灑潤風縹緲而浄天侍從偕來睹天顔之有喜馨香上達卜慶兆於豐年夫元鳯下親耕之詔永平垂開耤之篇魏主望公田而發趾晉帝帥羣后以祀先尚傳為古今之盛事並書之史冊而爛然况乎我皇至仁大知既事治而府修亦成天而平地修稼穯以勤民謹神倉而蕆事所無逸以知艱重明粢而将癸三春暖兮播百榖四野寧兮進䨇穗也哉乃為之歌曰田之興兮稷之功澤萬物兮助鴻濛我皇展事兮千耦其同和協天人兮一哉皇𠂻既耕既耨兮我稼其豐爰播爰植兮麻麥幪幪又歌曰思樂甸畿千頃其耦鸞輅載臨躬耕其畝登於秋廩斯箱斯倉薦之宗廟供之明堂神之格思綏祉無疆一人有慶永奠萬邦四時勤政賦惟聖人之建極兮法天運以自强歴四時以勤政兮亦日就而月將堯兢兢而舜業業兮萃芳軌於我皇禹惜陰而湯浴德兮繄日進以無疆道既立而化淳兮羙光天之徧育如雲日之為瞻兮統要荒而臣服大哉帝德輝光被乎八埏允矣皇風恩波沃乎四瀆爾其一日萬㡬宵衣旰食誦抑戒陳無逸昧爽丕顯夜以繼日既勞謙而匪懈亦健行而不息勤問夜於未央雖寸晷而猶惜若乃春居東以首嵗夏居南而執衡秋居西而司藏冬居北而主成春動也物以之起夏任也物以之生秋收也物以之結冬凍也物以之貞聖人推本萬物之理而欽象四時之行政刑準之以有度治教由是而皆平燠寒應候而時若雨暘順序而咸亨此吾皇四時之勤政而用致九有之和寧者也又若政要書屏箴規刻珮日移崇政之餐汗浹延英之背彼古事之云遠睹今兹之盛代厪夕惕與朝乾用持盈而保泰信日昃而弗遑豈臣鄰之可貸聖主圖治以勵精庶政分司而用乂於是喜而歌曰九鼎奠兮泰階平皇風普兮庶物亨萬邦惟懐兮歌永清帝心猶戒兮無荒寧朝夕兢惕兮象天行錫極敷言兮惟至誠拜手稽首兮於王庭萬壽無疆兮久道成東郊迎春賦震宫初動兮青帝司辰勾芒節届兮木德惟仁條風入律兮鳥歴紀新展東郊之盛禮兮觀畿甸之迎春既備禮而備儀兮亦有則而有倫葢欽承上帝而敬授於下民者也爾乃迎春東郊既著於月令青珪禮神亦載於周禮斗柄東指而萬物生地氣上騰而蟄蟲啓出土牛以示農駕玉輅而䖍祀於是服蒼玉載青旂宗伯前導王公後隨有嚴有翼不疾不遲樂奏而凝寒頓減舞進而陽和自滋於是歡迎白叟笑舞黄童夹道霏微而灑雨平林縹緲而摇風喜鴻鈞之氣淑知大有之年豐自南自北自西自東此皇都迎春之令典而萬國莫敢不來同者也於是勅庶司决獄訟非終必赦惟祥是用象暖律之發生乃省刑而寛衆又若降制詔勞三農助萌陽勸田功法恩光之普扇布仁政以胥融於斯時也户裊綵旛簷飛輕燕栁緑綺宫梅榮芳殿和風拂兮簾惹遊絲暖日長兮鶯啼睍睆金屛麗而帖冩宜春寶扇開而漏傳玉箭溥禁裏之春光煦閭閻而皆徧乃為之歌曰迎東郊兮肅以將舞雲翹兮歌青陽乘時布令兮德施長億萬斯年兮紀春王喜雨賦客有駕輶軒乘雲軺展軨乎南畝縱轡於東郊遨遊容與徘徊逍遥爾乃白雲起乎空谷甘霖降於崇朝震雷㸌㸌飛電熛熛乃往田舎而息焉有二三老人逡廵而前曰斯雨之降時則時矣膏澤之濡普而施矣抑誰之功乎請吾子明言以告之客奮袂而起曰猗歟休哉盛世之民也飲其德而不知其力坐吾明語子方今龍飛九五聖人在位德配乾坤功參天地精誠通於神明政教化乎萬類故上天眷命俾雨暘時若而萬方以治乃致含哺鼓腹耕田鑿井者實不知帝力之賜也老人曰聖人之德某既知之矣請吾子賦雨之澤及蒼生者可乎客曰若夫金烏收景層陰蔽空雷殷殷以振響電灼灼以摇紅鼓河伯之驚濤涌海若之幽宫㵼天池之巨浸走萬里之長虹逺迷三島近失千峯迴生意於衆卉消渇望於三農此則雨之方作而其勢最雄也乃其雲開雨止霽景澄鮮山宛宛其染翠木蓊蓊其逞姸鳥嚶嚶其鳴樹草芊芊其含煙栁暗歸鴉簷喧乾鵲槐影濃兮庭宇清花陰轉兮簾櫳薄纎歌動兮高樓紅袖飄兮綺閣緗帙開兮芸編博山焚兮繡幕莫不欣膏澤之滂澍喜霤聲之頻落此又雨之既足而萬方共樂者也至若烏犍耕白水之涯黔黎藝緑野之畝白叟歡呼黄童奔走土脉既滋兮禾麥如雲灌溉不勞兮田疇以阜爾倉爾京爾荷爾負此又二三子所終日服事而知利我之孔厚也於是老人倚杖而歌曰雨玉不可食兮曷若嘉苖滿目屯黄雲雨金不可衣兮曷若五風十雨利耕耘惟天降康兮稽首蒼旻惟皇感天兮永眷日勤千秋萬嵗兮樂吾之君秋陽賦有畏炎公子駕輕車乘駟馬停驂乎曲畛展軨乎廣野見秋陽之髙曝看流光之徐下乃油然而喜曰此其蓐收司乎三秋祝融謝於九夏故炎者變而為晶畏者化而為愛也懸清大夫過而揖之曰公子之樂秋陽者徒以昔之炎爍今之清明也愛其温和而畏其歊蒸也不知寒暑相遷而陰陽相生請為子賦秋陽之功而萬物以成可乎懿夫坤兊司方商金届時潦收寒渚波浄横池肅肅兮爽氣森森兮梧枝萎芳蘭之茁茁燦黄鞠之離離於時日出扶桑耀乎東方六螭爰騁兮光熒熒而閃閃九道發輝兮氣灼灼而煌煌商飇助其清暉閶闔翼以髙翔明無幽之不照朗無微之不彰爾其金門朝啟玉漏初宣千官鵠立百辟鵷聨晃朗兮照帝座而明衮扆熠焴兮浮鳯繖而映龍旃合璧兮彩焕抱珥兮祥連魯戈返舎兮彼詭誕之徒爾漢世再中兮亦荒唐之空傳豈若炳煥彤庭靄貢金之來萬國焜煌玉闕恍會海之致百川哉又若六街三市甲第崇嶐庭懸肆堵席列千鐘當秋日之清爽兮喜拂筵之金風愛蜿蜒之六龍兮惜光景之融融縁隟通輝乘虛炫彩園林掩映以潔清庭宇當空而爽塏散菊圃之叢金霏桂苑之珠彩信照耀之無私而盈虛之莫改亦有黄雲滿目稼穯在望多黍多稌千倉萬箱朗旭髙懸兮舒農甿之炙背肅霜惟時兮届榖麥之登塲歌堯年兮大有樂舜畝兮盈筐至若榆關罷戍玉塞晏兵萬里寒光兮生鐡㦸三邊曙色兮動危旌喜烽烟之久息俄懐鄉之念生爍彼琱弓耀兹寳鉞莫不壯戰士之雄心蕩邊氛於窮髪乃其林泉曠達隐士髙人此日兮何日幽蘭兮可紉霜零我園兮秋早露泫我徑兮清晨羡朗日之一照旋洗垢而滌塵是察察而皓皓者庶比潔於秋是於是公子撫掌而歌曰秋容淡兮秋日明冒萬物兮晶以熒惠我百榖兮登西成吾欲繫之兮以長繩燈花賦夫何三冬之夜永兮聼玉漏之丁丁耿宵寒之不寐兮羌讀史而論經對銀燈之熠爍兮何用夫隨月與囊螢松風蕭蕭於户外兮爰閉窓而掩櫺獨兀坐於幽齋兮頼詩書之是娯引短檠而置前兮瑶篇卷而復舒注膏油以續餘燼兮光燦爛而晃如何生意之忽發兮開花朶於斯須曽不根而自華兮熖炯炯而扶踈蕚蓓蕾而金輝兮葩晶熒而錦敷丹艶灼灼兮火蕋煌煌離精發瑞兮内隐外光飛蛾嬉其來往兮恍如蛱蝶探擷乎春芳乍蔽乍虧兮若續若離匪青匪緑兮参錯葳㽔可逺觀而不可近玩兮花無葉而有枝歴四時而皆榮兮又如火蓮冬秀乎雪池爾乃釵綴玉蟲兮枝堆寳粟光炫縑緗兮影摇帷幕度長夜之迢迢兮喜銀釭之續續静對而意蕋欲生閒吟而筆花交錯方作伴於形影兮信有佐於誦讀若夫庭燎通晨九華達旦雞踏蓮花之巧龍銜火樹之艶麗乎未央之宫燦乎承明之殿斯金闕之壯觀豈書齋之清玩又若帝城三五上元佳時鼇峯千仭金蓮萬枝縟綵與繁光共絢銀花與寳炬争竒固游觀之雜遝非静賞之所宜乃為之歌曰幻非幻兮色可親實非實兮報先春朗瑶室兮席上珍照芸編兮日月新鳯凰來儀賦以聖化感孚泰平瑞應為韻惟聖皇之建極兮膺九五之寳命沛仁恩於四海兮教化洋溢乎萬姓天不愛道而地不愛寳兮百福畢致而延慶乃威鳯之翔集兮符一人之神聖嘉彼休徴應我王化向畿輔而髙鶱覽德輝而載下惟羽族之三百實超羣而莫亞聖德惟純祥禽潛感稟鶉火之靈曜資和氣之融暖信鹿後而麟前亦雞喙而燕頷必梧桐之是棲非琳瑯而不噉爾其九苞六像兮五色紛敷戴仁纓義兮蹈信惟孚負禮向智兮順德不渝晨鳴賀世兮飛鳴郎都行鳴歸嬉兮止鳴提扶是皆斯禽之神異掩餘瑞於瑶圖者也若夫黄帝阿閣之巢雝雝喈喈帝嚳六英之舞萋萋翽翽虞廷來儀而神人格岐山和鳴而聖道泰孰若當郅治之休明集王畿而遠邁曠千古而一覩昭德感於聖代是以六府治九功成金甌固泰階平上瑞騈臻歡聲徧乎閭里嘉祥叠奏喜氣達於寰瀛乃為之歌曰鳯凰來兮皇之瑞集天畿兮拱帝位帝德光被兮靈祥萃聖心彌寅兮勤自治敬天貺兮罔或肆又歌曰吉士藹藹鳴鳥協應曷由臻兹我后德盛萬有千載遐荒安定重修闕里文廟告成賦丕鑠惟清聖祖神宗既承顯之式榖允精一而執中欽明文思克讓允㳟洋溢潏沕萬國來同皇上御極是法是則煥天下於文明登九有於衽席重道而先聖是欽崇儒而素王惟式天鑒孔昭佑我一人謂闕里之經營既久斯尼山之廟貌宜新藉締造於昭代貽制作於聖君天子乃命司空勅匠作爾經爾營乃量乃度走羣靈而驅八神鳩工徒而諮衆略劚無閭不注之巉巗伐泰嶠嵩髙之参錯良材川委大木神輸授模定式審方辨隅陶埴鍜厲之俱備丹青圬冶之咸臚凡工倕與匠石莫不奏技而待須爾乃日嘉時良爰動鼛聲鍤徒奮力􅚽人充盈既陾陾而薨薨亦登登而馮馮大冶耀兮金煙霏屑噴兮瓊英斧斤丁丁兮觀捄度之胥法繩墨綿綿兮看約椓之咸平矯枉兮既直削腐兮用貞曉畚橐橐晝杵訇訇俄而确輝玉磶杗煥雲楣豐融曼衍掲嶪陸離祕殿聳兮盤鳯傑閣矗兮卧螭何巨麗之方建乃卿矞之呈竒曜藻流光兮欎蓊而承日麗懸華曵紫兮糺縵以布天垂斯固天文與人文並燦聖居與聖澤偕丕者也若乃級層階於東西拱修廡於左右大成殿大成門實御筆之親書聖時門𢎞道門更睿思之口授圭瓚爼豆之式新犧牲幣帛之加舊添配祀之羣賢増執事之奔走色瓦頒自尚方御碑摹以重鏤丹楹列乎瓌材采桷掲乎纎繡則其為狀也邈穹窿以宏壯亘砰磷而窅㝠殖殖兮其庭噲噲兮其正宏卓爍以輝赫兮若燭龍蜿蜒而鬇鬡紛攅羅以崴磈兮若巨鼇贔屭而峥嶸斯翼斯棘兮屬閣道之駊騀如松如竹兮衛鈎陳之縱横倣巖廊而布象準魏闕以為程磢磑既堅知為髙之基下綺疏交映悟立誠之牖明至夫既落既成乃祭乃饗命皇子而徂征昭一人之敬仰牲牷肥腯黍稷豐穰衣冠肅㳟進退雍容籩豆既旅樽罍斯崇以間兮笙鏞於論兮鼓鐘神既安兮和冲降多福兮隆隆葢尊聖之典無以尚統前後而莫有或同者也於是為之歌曰堂皇靈宇天子是新既輪既奐乃㻞乃璘杏壇葱欝檜幹繽紛宣聖是安佑我後人歴億萬禩丕焕斯文御製樂善堂全集定本巻十一
