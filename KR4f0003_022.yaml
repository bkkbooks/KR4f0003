front:
  text: 欽定四庫全書御製樂善堂全集定本卷十八
  hash: sha256:22297f7215f67dd983146b53d9e6d29ec252843974f985c08fdb9a66415dd9b6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0003_WYG_022-1a, image: WYG1300/WYG1300-0431c.png}
body:
  text: 古體詩繅絲曲吳天風軟春光暮吳蠶三眠絲欲吐日上茅簷火馭遲白絮紅塵夾兩路中婦晨起中心忙乾桐曉炊付阿香繅車軋軋轉幽澀一年衣食慿繭腸釡中絲斷愁不斷良人戍逺交河畔北風圖我聞古人精藝事繪月有色水有聲更聞繪風殊妙手庭中六月常清泠筆法墨法超象外逸氣獨擅箕星精天中候屆遲朱明暑風拂拂翻可憎陶令北忩不知快列子御行我未能安得劉裒北風圖懸我髙堂之素屏圖豈有風作卧對能移情我今靜觀圖便挂滿堂覺有清風生冰碗浮瓜沉李堆冰盤晶光雜映琉璃丸解衣廣厦正盤礴冷彩直射雙眸寒雪羅霜簟翩珊珊坐中似有氷壺仙氷壺仙人浮邱子朝别瑶宫午至此古人點石能成金吾今化氷將作水拱極城九重城闕雙丹鳳萬國車書歸禹貢嚮明麗照鞏金甌百二山川作提封梯陵度索盡拱極此城獲名獨標衆南過都城十里遙斜日秋風拂塵鞚䇿驄城下懷古迹兒童十言九不中由來太平久息兵窮黎不聞呼楚痛還見城頭磨盤石盡是當年防盜用流寇近畿肆劫掠明代君臣鄒魯鬨皇清受命定遐荒小大共球奉一統弱婦春深惟飼蠶丁男雨足事耕種堡上健夫夜熄烽城中秀士朝絃誦禮綱義維被遐邇建極堅牢逾鐡甕迢遙萬方朝拱人筐篚都由此城送松風繞宅栽蒼松虬枝盤碧蓋濤聲萬壑傳颯颯引清籟六月不知暑妙境殊可會飄颻葛衫輕揮霍麈柄快我得松風趣珍重如球貝人間恐無價持向何方賣青玉簟贈君青玉簟薦君玳瑁牀珠簾繞四圍布設庭中央去去夏云半滿眼秋水光晚雨滌暑清肌膚生微涼夜靜人未眠撲牖花氣香間身藉琅玕曠逸懷瀟湘王明君萎紅飛碧春風老琵琶抱出長安道長安北去達王庭四絃彈破知音少君王不是憐妾面未畫時應賜一見君王不是憐妾身猶勝獨閉漢宫春四絃嘈嘈絃絶聲高絶絃續絃馬上音調青山緑水皆聽取生女應須辭父母此日穹廬號閼氏不愈老作巫山女雪浪石石在定州中文廟宋蘇文忠知定州時所留雪浪齋物高廣二尺餘蒼質白理承以石盆有亭覆之雪自天上降浪從海面生何時相薈萃却與石為名雪浪本非石石以齋名稱如今齋不見此石猶峥嶸定州廟貌敞左墄對右平巍然踞其間萬古凝堅精不共桑海變稜稜瘦骨撑誰言承有盆謾説覆有亭須知雪浪齋亦以木石成尤物貴特立此理不須驚欲喚眉山老新詩還共賡騎秋雨江南諺一夜騎秋雨遍地是黃金雨工騎龍不肯下油油雲陳鋪平野魄淵瞞人獨三旋今日新秋前日夏江南老翁笠底笑作農年久知天道但得騎秋甘雨淋今年遍地是黃金靜夜吟玉繩迢迢向西轉長空月上浮雲捲十二時中秋思多都付幽情作排遣博山吐盡香霧深螢光點點流踈林空庭萬籟俱閴寂獨有詩人靜夜吟唐寅山靜日長圖我非山中人愛説山中話行遇好山水自覺中心快豈能長留玩聊且娛眼界山靜日長圖相傳伯虎畫為愛景物幽持向壁間挂峯巒翠欲滴樹石紛古怪縛茅為屋宇飛泉流數派中有常住人看經不行邁伊余勞逸殊徒此償詩債靜對轉增慙烹茶洗慸芥關山月關山月如彎弓看月不與鄉里同鄊里關山豈異月關山月下多戍卒怕見清光似鏡明月明却照沙場骨棹歌行江南少婦能棹歌棹歌一曲凌江波欲知幽情有幾許脈脈離愁春水多春水復秋水蓮花復蓮子蓮子獨苦心魚書失雙鯉失雙鯉可奈何收珠翠疊綺羅待郎歸日舞婆娑郎不歸時空棹歌古意春老金條脫塵生玉鏡臺分明陌頭望不自陌頭來明月入髙樓上有綽約人只見樓中秋誰知樓外春熏爐炷水沉拜月衣裳冷拜起步階隂桂香弄寒影青青楊桞枝淡淡和風吹忽見一枝折無情復阿誰神絃曲鼕鼕鼓娑娑舞紙錢飄風神欲下叶神不能言巫代語椎牛刳豚汝莫後叶疾病銷除還福汝石馬汗流神已回老巫腹飽酡顔開今日西村病者死明朝更向東村來秋夕讀髙青邱大全集碧潭秋水清寒山月華白水月兩澄明中有靜觀客披襟樂容與爽籟生几席偶讀青邱詩尚友獲莫逆短作紛珠璣長歌戞金石不事追琢巧渾渾含光澤伊余豈能詩對此仰高格撫卷吟寒空中心聊自適蘆白花蘆白花狎洲渚一片蒼茫迷處所翻風著意作金聲坐中有客懷秋緒懷秋緒逸興賖渚邊獨立弄蒹葭逢春戟戟且得意秋老煙波君莫嗟壯士行生肉亦能噉悲築亦能擊不學三軍師只學萬人敵少小長幽州生憎繞指柔今朝受君惠明日報君讐易水送荆卿秋風拉瑟聲一去不復返咄哉壯士行織錦詞睡鴨盤盤翠雲吐漏添細把丁東數鳳梭千擲素腕疲寸錦難成愁不語明明寒月照流黃三日一匹臨秋張并刀象尺分明度莫教裁破雙鴛鴦裁破鴛鴦作春被惆悵空幃獨徙倚年年織錦却徒勞良人逺道寒無袍灌園種樹圍小園種菜數畝餘緑畦足野趣且復得嘉蔬春風千頃浪秋雨一犁鋤四時供盤餐青青藿與茹今朝桞隂下課僮轉轆轤吸彼井華水灌我珠玉畬芳坂潤新緑勃然生意舒自饒塵外味何必山中居虞美人曲露泠泠濕啼眼空憶帳中歡幽情不能綰芳心全是恨心抽烏江江水至今流至今流非漢土虞美人兮猶楚舞弔孟黶孔悝之難子路死於石乞孟黶後乞奔楚黶在衛子路之子仲子崔以復仇請於夫子子曰行矣子崔遂入衛使人告於孟孟曰君子不乘人於暗明日戰於西郊蒲弓木矢以往死焉蓋傷子路之賢而成子崔之孝也事見金管集古有俠烈者輕生等辨髦嗟哉彼孟黶乃以義為高心傷戕善良大讐不可逃捐軀執蒲弓舍命齒霜刀由也非合道孟也豈行超委贄瞶輒間已是附猿猱君子慎所事生死如雲霄李夫人歌夜風吹開琅璫鎖繡房燈暗蘭膏火分明記得擁衾時是耶非耶帳中坐翩珊珊來何遲死憐更比生憐癡金雞嗚嗚月如練相見何如不相見題高其佩指頭畫八駿圖苜蓿平川數十里幾株楊栁秋風裏兩駒並馳若驚鴻一匹齕草間且喜卧者有二立者一老馬磨癢如龍視就中紫騮獨稱神滚地煙塵幅上起奚官無事但立望兩人容與踈林底古人畫馬用秋毫鐡嶺老人用十指腕下生風何足云指頭隨意傳神髓懸之高堂秋意多哂余興在南海子秋夜詞桂風吹送西陽疾海風吹送氷輪出千山暮色轉蒼蒼清絶蟲聲上瑶瑟睡鴨香凝暖霧深更長夜靜涼生衾羅帷銷光霜簟老忽驚凄切鳴寒砧零露漙漙白於水池邊曉看芙蓉紫讀申屠蟠傳多士清流太皎皎由來尾大難為掉漢綱陵夷何足云言高致􅍔不為少飄然惟有申屠生孤鶴盤空絶羣鳥林下鴻名播士林逸氣凌凌光日表嗚呼邪正原不容薰蕕臭味豈同道宋室洛蜀標名字室中操刃相攻討金人三緘實可師處士橫議身難保梁碭春深山水間鈎黨吏不尋門考非但容身叔世間中庸品行誰能紹謝人送墨徂徠老松辭山阿元霜夜搗萬杵多丸成渾似懸璧月硯池鼓浪騰風波古來作者難屈指前朝潘生近曹氏嗟君此墨從何得錦囊贈我光生几秋風颯颯透書帷霞箋未拂含淋漓此物宜歸青玉案勒文竹石垂無涯太學碑前紀功德燕然峯畔標鴻績不然臺中草諌章直令萬里流王澤何來髙齋供染毫吟詩獨自裁風騷從來所寶慎所用珍重還欲方瓊瑶美人磨鏡圖阿嬌階下燒銀水瘦玉春慵日晏起夢醒芳情却惘然纎纎手把芙蓉洗璧月光沉鸞影破畫眉插鬢誰為佐欲擬磨成舊樣明照出新愁更無那鷗捕魚蘆花叢裏風獵獵秋浦波寒人鮮涉雙鷗飛下浴澄明飢腸未飽波上行却顧波中探長嘴銜得遊魚出深水幾番吞吐恣果腹魚何苦兮鷗何喜爾鷗爾鷗喜莫亟江邊有人施矰弋倒挂畫欄翠柱春宫曉顧影憐恩異凡鳥緑衣倒舞不曽翻只妬能言秦吉了蟬鬢新梳短夢闌手握香稻添朝餐更呼小鳳聽分付間言莫向人前訴牧牛詞題馬賁畫老牛角彎環小牛角繭栗歲初祭耒罷村村驅犢出東坡草半芽西坡草未長草乏牛苦飢牧兒愁惘惘不是愛憐牛南畝功正稠牛肥好耕種黍苖青油油獲黍輸官租莫漫償私債官租苟不足還將此牛賣班媫妤媫妤辭輦後廢處長信宫蓋古貞女之流唐人諸作率比之怨女思婦夫憂愁幽思則有之而借問承恩者雙蛾幾許長又何以云乎深宫人靜秋英馥永巷遙連三十六昭陽絲管風送聞且喜君王歡意足妾居長信猶金門妾生一日皆君恩君王安樂妾願畢區區辭輦安足論千秋萬嵗長如此莫中披香博士言戲擬禽言提壺盧提壺盧提壺逺向村南沽快哉快哉提壺去來婆餅焦焦婆餅婆去餉孫村路永田中稻苖新發穎秋成有食好光景爾莫憂婆焦餅郭公郭公山中樹中一朝西北來金風徘徊四顧家室空身寒腹飢呌不止生不如杜鵑死泥滑滑雨淋漓行不得中夜啼我在枝頭猶自可道路難時須憶我得過且過得過且過有身不愁室家破日頭出來枝上坐得過且過布榖布榖風和日暖春水緑趂時耕作應須速汝莫學富家翁晏起早眠食肥肉御製樂善堂全集定本卷十八
