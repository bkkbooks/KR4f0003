  - {type: page-break, offset: 0, content: '', id: KR4f0003_WYG_016-1a, image: WYG1300/WYG1300-0379c.png}
body:
  text: 賦萬夀日慶雲見苖疆賦惟皇清肇三韓而定業鞏盛京以立基既應天而昌運亦撫民而順時世祖白旄黃鉞仁義興師於是乎撫有四海宅燕京而嚮離於皇聖祖作則生知正義育仁以馭世制禮作樂以定規六十一年之湛恩渥澤逮我皇而克享其雍熙丕鑠皇德聖祖是式精神通於神眀聲色允其恭默勤政亶乎八年至仁孚乎萬國擊壤者歌何有之帝力含哺者順無為之帝則昊天曰眀鑒我皇情何祥弗應有瑞畢呈乃撝謙而自牧更持虛而若盈或歸親而不居或讓美而弗稱斯固一人之大德巍巍蕩蕩而難名者也嵗在上章月惟淵獻帝澤均施皇風普扇坤輿載闢紅苖允致其共球版籍初登六里亦安其服甸乃宣布化誨之初辰實誕降吾皇之聖旦鴨保寨之大吏初臨地良坡之苖民同忭池河營之猺獞咸臻萬榮江之老幼共見異地而王命頒陳同時而卿雲燦爛歸誠之愚民稽首何異華封之祝三宣意之將吏傾心允似嵩髙之呼萬氤氲捧日劈碎錦之千重縹眇麗天幻榮光於萬變為樓為閣拱黃道以旁敷非霧非煙被清風而不散五文絢彩於璇霄十色流虹於碧漢此重譯之來不聞奏於越裳七旬之格不聞歌其糾縵者也况於嘉時正午恰當景命之辰歷未及申允愜綿長之碩彼夫升堂於黃帝之時起河於伊耆之代入房於殷湯之宫浮洛於周成之載穆天子之王母為謡漢武帝之泰山紀再或一色而無文或旋聚而忽分豈如歷三時之久當聖夀之辰現新附之地昭歸化之民又何足稱函關紫氣帝鄉白雲哉乃為之歌曰於赫聖治兮格於蒼天嘉瑞聿昭兮於彼苖田格愚孚頑兮王化普宣祝我聖夀兮億萬斯年為善最樂賦居空齋以探索兮繹書史之幽深感前芳之美則兮羌遺豫以嘉音渺管蠡之窺測兮天與淵其難尋惟茲善之具備兮信足悅夫吾心伊吉甫之清風兮謂有物斯有則民咸秉此天彞兮孰不好是懿德私與欲其相爭兮天良因以窒塞致倏忽之鑿竅兮感渾沌之戕賊譬望舒之圓滿兮蟾蜍乃以侵蝕智者覺以先反兮愚窮年而終惑解迷途之往轡兮回余御於中逵駕言騁乎義路兮謂先聖其可師紛既有此內美兮胡為汨以外務也何既知而弗由兮夫唯己未克之故也味宣聖之教淵兮禁視聽言動之非禮既天君之泰然兮百體從而受紀斯已善之可樂兮樂孰能以愈此彼友朋之輔仁兮亦示我以周行日相親於理道兮羌容與而相羊發我蒙而針我疾兮善日進而無疆嗟蚩蚩之庸衆兮昧虗靈其如狂忽背禮而棄義兮乃智力之相強薋菉葹以為美兮謂蘭蕙其不芳彼是非之顛倒兮夫何樂善而日將緬東平之修美兮為炎室之宗臣帝問王以何樂兮王惟樂善之云髙宫崇隆以入天兮綴珠玉而為珍詞士紛其侍座兮姱女翩其奉巾露雞臛熊以為羞兮華文黼繡之錯陳何耳目之不移於玩好兮乃惟德之日新吾將從此以尋樂兮庶澡浴乎眇身良玉比君子賦焜彼太璞有韜其精藴茲良玉爾晶爾瑩潤林薄兮凝秀輝岡巒兮挺英伊美德之莫匹吾將配君子之潔清爾乃涅而不緇素有餘也廉而不劌堅如初也圭以為瑞軼碔砆也珮以致飾章衣袽也庇蔭嘉穀用𢎞敷也氣比白虹光發舒也文質彬彬德均如也君子比之於焉自鏡溫潤其形密栗其性一塵不雜無疵纇之可尋全體胥瑩有光華之交映夫何大璞之不完而匿瑕之為病哉指佞草賦銅龍曉啓玉漏初傳氤氲曙色縹眇祥煙朝萬國之球璧列百辟之班聨爰有靈苖曰指佞草非時不見實天地之無私應候而生允皇王之有道則見夫峙丹陛而蔥菁秀彤墀而縹眇金莖露灑潤貞幹之稜稜玉殿香凝靄斜枝而裊裊無心而應獬冠之觸何殊有佞則知金鏡之洞已早至若元愷登而憸壬化眀良慶而庶績熙雖間生於堯代實藏用於眀時對右平兮左墄承日照兮風披千官劍珮三殿威儀則屈軼亦呈其瑞而已矣又安得夫邪佞而指之松竹四時瀟灑賦以題為韻觀鴻濛以元探步庭砌而從容伊植物兮不齊固賞心兮莫同或春榮兮秋萎或冬枯兮夏豐則有蕭蕭翠竹落落蒼松徑枝戞玉貞幹蟠龍歷寒暑而妍媸莫易冒氷雪而緑蔭偏濃得天地之正氣乃吾心之所宗若夫蜿蜒拏空扶踈繞屋不羡五株之封兼有數竿之緑三友稱號仍須林氏之梅三徑標名更待陶家之菊呈彼秀姿動豫雅意匪賦性之或殊實秉氣之獨粹森森挺翠鄙木主與花奴矗矗凌虗笑桃三而李四於是潛意清心凝神搆思而賦曰偉坤元之播育何磅礴而無私羌松竹之清徑獨秉性之不移峙泰嶠而雲霞並繞蔭淇澳而風雨咸披伊何人斯移植助我興兮猶夷暮靄朝煙之際輕風淡月之時栁絮因風每遜榮於冬日芙蓉貼水難競美於秋朝况乎飄風弗弗暮雨瀟瀟嗟柔紅兮嫩緑或墜瓊兮隕瑶惟枝篠之挺出恆葳㽔而莫撓故曰逞妍者易摧仗節者不改宜賞之以吟哦樹之於爽塏照晨暄之煦嫗潤宵露之沾灑惟四時而如一是松柏之所以乃帝賚良弼賦昔在髙宗踐丹扆之位居紫極之宫志恭默以思道心殷憂其如忡何精誠之弗懈允帝載之潛通神悠悠其若往夢忽忽而凌空於是陟崑崙歷元圃遊碧落之庭升玉清之宇謁乎上帝既拜且舞乃致詞曰惟川有水惟舟濟之惟鼎有羮惟鹽梅偹之帝集命於臣武丁將俾三無而治之臣恐德弗類請賚良弼以二之帝乃命巫咸册之曰若有人兮山之窈雲峩峩兮波渺渺清眀兮其躬怡恱兮其貌資汝武丁以佐有道俄而曉鐘催曙漏箭停傳乍回清夢恍憶前緣爰徴繪匠造進廷前肖乎獨見之容訪其惟似之蹤而説也乃在傅巗之野傭築之中既威儀之不忒知經緯之靡窮置之左右相於厥躬允啓沃之是賴資誨諫以折𠂻金之礪兮差可比木之繩兮將毋同是知天之載兮無聲無臭誠之通兮無感不就惟髙宗之聖敬日躋斯上帝之賚賢若授彼神道設教之言蓋執理而疑誠不似密而實漏哉天爵賦帝渾沌之苖裔兮全衆美而尊安伊沖氣之絪緼兮胚渾司乎五官處方寸之福田兮闢靈臺其洞寬宏泰宇之坦途兮施耳目之屏翰蹈中正而為轍兮何姦匪之能干紛既有此內美兮乃上帝之鑒觀帝用嘉其完備兮詔天君其聽焉若曰豫有四德厥首惟元廓然無我順應無偏是用錫汝莫或不全在事有宜在理有義應酬裁度發強剛毅是用錫汝外以制事節文之詳厥惟有禮清眀在躬中立不倚是用錫汝以綏福履人為物靈惟智盡之是非臧否洞然不疑是用錫汝以揆厥時惟是四德服行母怠惟信之功大小咸在是用錫汝動罔或悔心官既受此五爵於上帝也乃再拜而言曰皇天無私兮賦德在躬五典有秩兮委任實隆期篤守而莫忒兮副簡命於蒼穹庶天職之常保兮弗憧擾於朋從相馬賦伯樂過冀北之野見羣牧焉在坰之野在阜之岡惟騂惟騏有矞有皇長嘶兮于林之下低飲兮在水一方或伾伾而繹繹亦袪祛而彭彭雖騏驥之在望恐駑駘之相妨於是舍舉肥用心鏡不觀其外附之毛獨察其內秉之性窺其心兮不趨於險相其目兮惟視乎正以之御兮則既佶且間以之馳兮則進退惟命是蓋獨擅駉駉之場而所謂馬中之聖者也於是飽以甘芻浴以清水既範我之馳驅可不加夫鞭箠星角目兮電發鐵踣蹄兮風駛耳鳳聳以雙峻鬐龍騰而孤起蜿蟺堤陌之間徘徊閶闔之裏是雖斯馬之迥異亦因斯人之知己於是呼造父招王良騰六合噴八荒朝稅駕於咸池暮返御乎扶桑顧羣駑而若遺繼後塵而難望蓋養之者有方用之者有矩節其力而不勞因其時而不苦不然者何異於撲緣之拊而東野之舞哉九日登髙賦嵗九秋之暮月兮天肅霜其寂寥羲和倐忽而躔在房兮又值重陽之令朝何景物之慘悽兮羌草木之蕭條悴繁緑於寒渚兮萎柔紅於荒郊命駟馬余阻征兮駕言往乎山之椒凌髙巒而遙瞪兮度回壑以逍遙既流眄於平隰兮見落日之還臯鴻雁翩翩而來賔兮聼霜翮之翛翛至若龍山髙會飇館傳觴楚臺馬戲沙苑鴻翔咸宴凱而吟詩兮仰清風之髙遐何好事之傳説兮獨稱落帽之孟嘉今視古其猶昨兮羌節物之堪誇聊容與而徜徉兮請採佩乎茰華五日角黍賦嵗辛亥月天中客有以角黍請賦者主人曰唯唯昔在三閭大夫抱孤忠而無二矢靡他而莫移悼方正之不容羌殷憂之日離搴芙蓉兮木末採薜荔兮江湄浴蘭湯兮詎潔乃浮遊塵外而自投於汨羅之涯蓋仲夏之月而正陽之期也於是楚人哀之截彼竹筒貯茲糯米塞以楝葉縛以綵緹望水濵而相投亦社祭之變禮今角黍之制乃出於此也客曰此夫人而知之矣更請進焉主人曰伊五月之為卦實下巽而上乾惟五陽其既盛乃一隂之是旋覩菰葉之裹米方隂陽之包連此亦扶陽抑隂之意而聖人之大道存焉若夫煮龜之骨為葅烹鶩之羮以薦百索之號徒傳九子之名空擅既無取於懷賢悼古之風更無涉乎扶陽抑隂之善雖養口體之微亦不可以不辨六藝賦居髙齋以逺紹娛情志於典墳藉義府之息遊望宫墻其聿新伊六藝之為懿雖宿儒而必親余下學其何知敢玩愒而不遵矧夫禮緣情以制物樂平情而返初射必先乎正直御必範乎馳驅書貴六文之不忒數窮大衍而有餘於身為終始之伴於道為行邁之輿請為言其美備俾達者其聼諸原夫禮儀三百威儀三千既安上而治民亦緯地而經天其制之也必傳道之聖其行之也必守道之賢郊廟有饗祀之典朝寧有聘會之虔尊尊則衣冠拜舞親親則酬酢蕃駢尊卑賴以等殺進退恃以周旋是蓋禮之大者而其細尤莫能以盡焉粵自軒轅雲門定樂溯源必本於中和相濟必分其清濁以歌則管聲噦噦以舞則鷺羽翯翯五音六律之交宣八風九歌之相續審音兮既換羽而移宫吹律兮復度商而揣角入耳兮􅏥心以釋傾聼兮欲心以平雖宜觀於韶舞必先放乎鄭聲以宣民志以和民情惟樂舞之至正斯風俗其可成若夫敦弓既堅四侯既均可緣此而觀德亦因之而序賔在澤在宫必有一定之制少算多算難紊不易之倫騶虞之節兮天子所用貍首之風兮諸侯是陳慎其所舉取制於中聖王合射以眀教男子蓬矢而桑弓在昔宣尼曰執御矣平心正體兮在茲自下奉上兮以此四黃既駕兮總轡分鑣兩驂不倚兮過都越鄙追電兮逐風發豝兮殪兕鄙組舞於東野羡辭乘之王良愛蘧瑗之過闕馳造父於康莊孰謂御為賤役非君子之所方哉至若畫始羲皇字肇蒼頡史載觀於蹄迒易稱代乎繩結百官以治兮宣猷萬民以察兮仰哲逮書契之大眀快苞符之盡泄於焉籕斯造乎前驅羲獻繼乎後乘文皇飛白張顛草聖顔栁法嚴蘇黃筆徑雖歷代有作者要悉歸乎心正乃若司天之職推步萬端黃鐘定其分至玉律辨其暑寒既參天而兩地亦稽坤而考乾下至內府外府之嵗會郊人㕓人之定田無一則何以成十有百則至於纍千參伍而其法備錯綜而其數全豈若商鞅近功始按人而立稅𢎞羊心計算舟車與緡錢蓋所以裕國計敬昊天惟損上而益下乃自古而云然懿茲六藝用藉尋求若行逺兮駕車若溯川兮泛舟嗟不學兮面墻期佩服兮優遊庶不忒兮我心用黽勉兮前修日方升賦伊蒼旻之懸象兮焕二曜之重眀麗中天以臨照兮終萬古而健行分宵旦之行藏兮仰瑞應於升恆維光華之烜爛兮百昌欣以向榮偉魄淵之繼照兮請仰觀旭日之方升眀萬彚其伊始兮符天心之生生方其玉繩罷繫斗杓收指望舒隱曜以西馳啓眀藏輝而逺徙覽東方其生白眄海水而煥紫滄溟罷浴駕羲御以遄征火馭載臨邁天衢其自此璇圖不忒兮正羲仲之寅賔玉律無差兮合容成之步晷銀虯渴兮燭龍翔陽鳥飛兮曜靈揚出渤澥兮經若木歷暘谷兮拂扶桑瀛海磷磷洗寶輪而皎潔咸池炳炳拱神鏡以汪洋玉衡隱約兮低度瑤華烜赫兮含章照彼鮫宫添輕綃之晃朗射兹龍窟增寶藏之輝煌則見金門初啓玉漏停傳天雞喚兮報曙寶鼎列兮生煙陽侯執轡兮炫彤墀之璀璨后羿揚麾兮催青瑣之班聨雲旗縹眇兮映百川之會海霞車陸離兮靄萬國之朝天此出震一人之有慶嚮離敷治以無偏者也至若六街香霧九陌紅塵曙色方升晉謁之驄駉駉晨光乍爛計偕之車轔轔瞻祥光之錯落覩瑞靄之氤氲此王路馳驅之士鸞翔鵲起而欣欣者也又若幽人曠逸竿甫逾三學士清嚴甎未倍四梳翻雲髻兮曉景透乎香閨經開貝葉兮晨鐘鳴乎古寺舟橫野渡兮驚月落而烏啼獵合平原兮喜黃牽而蒼臂草木向曙以敷榮飛走和鳴而得意此又臨照無私恩光遍及於萬類者也斯時也後天一度而輝燭於大荒出地咫尺而宣耀於無疆夜光無所施其用火齊無可耀其光杖何為兮誇夸父戈何為兮稱魯陽蔀何用兮其豐繩何施兮其長考盈虧兮何與驗中昃兮無妨若太極兮始判而將分如元會兮方流而未央又何必記合璧於伊耆之代舉抱戴於晉帝之堂侈談王字之瑞徒稱五色之光哉客有興寄泰山之嶠神逰日觀之峰覩初陽之煒煜攬皓氣之沖融開懷抱暢心胸鄙熊曜琅琊之迹追青蓮登眺之蹤將逰心乎太始觀造物之元功瑾瑜匿瑕賦爾其林薄生光岡陵煥美矚寶氣之爛然知太璞之在是命彼良工呈其巧技既剖既琢成文成理雖連城之比價亦微瑕之在裏磨為器允稱夫圭璋調之音甚和乎宫徴若精求其瑕輕棄其瑜則以分寸之䀶翳纍徑尺之瓊琚譬夫水至清無魚人至察無徒故求全者舍細謀大者略小不瑣瑣以求眀不察察以致考瑾之玼弗以否而混臧瑜之瑕掩其裏而揚表用成韞櫝之材為彼希世之寶尺有所短寸有所長伊尺璧之為貴詎點瑕之足妨程材以辨器舍疵而取良願寄言於銓才銘座右而莫忘水輪賦削竹為管揉木為輪假廣川之利潤代膏雨之宏恩因時制宜奚必資乎匠伯澤民利物乃有待於梓人爾其東作云興西成在望大田多稼或懷旱魃之憂密雲不雨每厪旻天之貺雖抱甕之勤奚為即挈瓶之利亦讓於是轉岸上之飛輪汲江中之巨浪方來旋去詫機軸之周環已納而吐欣洪波之奔放劃如雷鼓之聲翩若飛鳬之狀揚清激濁兮大澤旁通救患分災兮連畦滋暢鄙桔橰之小惠殊轆轤以致功匪疾匪徐兮運旋而不竭突如來如兮灌注而莫窮盈科而進兮施有次第轉轂而輸兮用無始終流洋洋兮比潤甘霖苖薿薿兮同舒律暖垂稻穗兮壠畝勻黃築場圃兮篝車載滿是知輪者木之體既巽順而有功水者坎之盈亦剛中而有信相資以濟引重之象何殊因物而施救暵之功以迅敬陳澤物之竒勳用備風人之雅訓白鹿洞賦流鄱陽之洪浸峙五老之竒峰星分軫翼以上耀境接吳楚而旁通諒地靈之所聚實間氣之攸鍾吾聞山蒼蒼其含翠水渺渺其如油松濛濛而黛蔚石磊磊其雲浮伊眠鹿之町畽乃是創而是修架修椽以為屋聳髙構而成樓聚羣英以逰息惟古訓之研求陸有登鄒之屐水有泛泗之舟想前修其未逺知遵路之所由是地也李氏為之開先晦翁為之善後講一理之淵源致四方之奔走既道藪而學淵亦書左而史右綘帷捲處月霽階前書帶抽時翠迷洞口緬遺迹於匡廬仰先賢之啓牖此嚮風者所以爭先而至今長垂為不朽也御製樂善堂全集定本卷十二
