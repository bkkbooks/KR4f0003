  text: 欽定四庫全書御製樂善堂全集定本卷十五
  hash: sha256:52360b08933562dae98e7f5584d46a96a550bb75ddf84ce3bfbc9e7696c01e64
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0003_WYG_019-1a, image: WYG1300/WYG1300-0406c.png}
body:
  text: 古體詩古硯雀臺舊瓦埋煙草追琢為硯誠堅好端溪紫石石質良金文鸜眼成文章何如天然古硯省磨礲淋漓墨海變雲龍他山之石無所用隱相呵護煩神功翠濤剡剡露精彩恍疑寶氣浮晴虹藏之七十有二代以為金泥玉檢充東封擬蘇子瞻逰赤壁詩赤壁赤壁何崔巍清流蹙浪如銀堆我來擕客弄小艇一輪秋月光徘徊座中洞簫吹莫哀酡顔恰有新秋醅眼前好景不易得何妨磊落玉山頺君不見紅樓綺閣管絃髙富豪子弟爭逰遨又不見鼓鐘歌舞府中宴日食萬錢殊未饜惟有清風明月不外求幾人江上為勾留東方既白且歸去得間還擬重來遊題王原祁秋山圖屋壁淋漓懸尺素琅琊妙筆寫煙樹草堂空對夕陽間伊人宛在知何處蒼蒼暮景遙空白雲山滃翠迷咫尺簷前弗弗起飄風獨與髙秋留本色郊圍見西成有象即事志喜去冬雪盈尺占之利東作今春雨如膏可卜豐登樂一自入夏來雲漢光煜爚崇朝歇甘霖祝融扇炎灼聖皇念民艱憂勤倍咨度對越保無斁昊天鑒誠恪未幾三日雨霑濡遍村落庭除景色佳苔痕茂參錯那知郭外田良苗助長若承恩獵南苑平野秋風掠氣爽馬蹄輕天髙鷹眼矍合圍出紅門更覺郊原廓行行歷野店去去穿林薄中林施兔罝歇驕奮噬搏田事亦云畢農夫罷秋穫眄彼場圃間黃雲堆漠漠婦子利秉穗老幼飽藜藿從識天人理應響如鳴鶴宵旰聖人心頓起下民瘼太平徴有象永言志其略南苑觀魚霜寒秋水澄鏡光天一色潑潑巨壑魚潛躍咸自得獵罷解征鞍網罟頗諳識觀魚寄我情豈為貪口食鯤鮞夙有禁留以繁生息為語捕魚兒取之不可極馴象歌皇靈赫濯昭八荒西極咸池東扶桑于闐盤况求王章嵗嵗奉貢來九閶厥貢惟象象云馴龎然巨體性孔良金羈錦襜飾身首正朝分立金門旁玉輅金輅髙數丈駕縛安穩行堂堂升平儀衛匪異物屹然排仗威遐方我聞象形如珂雪又聞象力絶羈纕生花拄地曽耳聼究竟未見嗟荒唐辛亥九秋獵海子路西却過馴象房因緣一覽愜宿願長準大武誠昻藏蠻奴五六踏其背隨所使令如驅羊或俯厥鼻一叩地特作鼓聲鳴鏜鏜仰天時亦戛長韻鼻孔嘔啞吹笙簧渴來吸水盡巨甕俄然噴出如西江作樂昔曽效率舞占星聞説散瑶光狻猊獅子稱善吼山林詎足供廟廊白馬行秋陽皎皎秋風起千山萬山收紅紫南苑平蕪曉色寒逰絲白日長空裏我從前嵗罷秋圍經年未到南海子重來歷歷憶舊逰真教見獵心猶喜黃羊麋鹿滿平郊捷射爭誇馳騄駬就中白馬夙我隨德力相諳已久矣神姿崷崒隅目熒峻骨昻藏騣凶鬯匕上指罽織鞍穩革鞚牢牽來不騎且熟視翹然長鳴向我前意氣稜稜蹄股峙舊聞天馬老能行雄逸何用加鞭箠合圍少試秋草原驍騰未改舊時美一馳射中雙兔兒再馳殪彼一封豕亟命解鞍休息之秣以甘芻飲以水勞爾汗血歷有年愛護馴良宜若此豈令老却青絲絡鹽車伏櫪終厥齒但使長逰坰牧間一年一度一騎爾德壽寺古鼎歌龍宫巍巍紫氣軒輝耀榱甍焕崇垣寺名德壽菴羅園剎竿髙挂珊瑚幡停鞭卸轡山門前一滴欲尋曹溪源東瞻紫霧明朝暾清涼頓覺隔塵喧香浮寶殿謁世尊兀然古鼎吐雲煙何人鎔冶工雕鐫金翠斑斕歷嵗年上文雷回下雲紜狰獰狀類獅子蹲籕書斯篆迹難分世次那辨癸與辛蝌蚪盤屈蛟龍奔周彛虞敦恍猶存葆精凝潤疑瓊璠寒光欲流不可捫日月照射輪朝昏濯洗全資雨露恩在昔盛事傳橫汾此鼎神異邁等倫我欲負之千蹄犍移向帝闕鎮厚坤充以大武佐魚豚萬斤木火為之燔有實大亨養聖賢沍寒行陰凝北陸元冥朝皚皚天表飛瓊瑶小池凍疊層冰裂博山獨擁獸炭燒重簾暖閣有如此愛日負暄聊徙倚沙漠龍堆雪蔽脛念彼萬里從征士高其佩指頭畫馬平川苜蓿煙濛濛一株老栁秋陽中二馬昻藏趂西風連錢蹀躞傑且雄一匹摩癢一匹卧驚鴻脫兔凡馬空當年畫馬稱韓幹安排筆墨成欵段何如一指運千鈞墨汁淋漓法不亂自今繪苑傳竒觀不在毫端在指端冬夜煎茶清夜迢迢星耿耿銀檠明滅蘭膏冷更深何物可澆書不用香醅用苦茗建城雜進土貢茶一一有味須自領就中武夷品最佳氣味清和兼骨鯁葵花玉􅙧舊標名接笋峰頭發新頴燈前手擘小龍團磊落更覺光炯炯水遞無勞待六一汲取階前清泄井阿僮火候不深諳自焚竹枝烹石鼎蟹眼魚眼次第過松風欲作還有頃定州花瓷浸芳緑細啜漫飲心自省清香至味本天然咀嚼回甘趣逾永坡翁品題七字工汲黯少戇寬饒猛飲罷長歌逸興豪舉首窗前月移影讀西山先生大學衍義晴窗披典墳望古興遐想眷惟希元翁體道粹涵養著有衍義書妙藴資尋倣大含亦細入渟泓包萬象孔曽緒不墜千載揭昭朗讀書思其人髙山欣景仰飼金魚彎環碧水滿方塘文魚翕忽朱鬛張間坐石磯拋飯饊百千爭唼樂徜徉維河有鯉潛淵藏見人輒避奔如狂暫自為計雖云良終入鼎烹供客嘗金魚何幸鯉何辜試言其故客聼諸金魚有智鯉不如不知以近為逺兮以實為虛君不見呢呢喃喃梁上燕絶塞秋鴻遭羽箭開圃開圃種新蔬墾闢堂隙地壠畦繡錯分種植從其類寧同抱甕勤未使桔橰智灌溉苟及時煙甲抽次第蘿蔔白玉花蕨芽青線穟曉露帶如珠朝餐足佳味豈云佐盤飱聊以觀生意王瓜嘉祐本草作胡瓜拾遺録作黃瓜今以其最先出名王瓜非月令王瓜也老圃種王瓜鬻市爭及先長無二寸蘆管圓髙價直欲索千錢豪家富室張錦筵相誇早啖王瓜鮮曽無幾日王瓜老味全色足方美好豪家富室偏不買貧人每食王瓜飽天非愚富却智貧都由人眼尚鮮新新荷晴暾照蘭沼蕩漾波光淺貼貼小緑錢水面八九點已足泛杯盤尚未擎青繖芳心不肯舒半為蘋蒲掩題靜憩軒非靜不能憩非憩何由靜心與境相忘一泓止水定小軒僅容膝頗足適幽興臨窗俯碧池波光入眼淨爐有香可焚牀有几可憑即景裁短句豈復論聲病喜得大自在而無俗慮競安佚非素懷聊以適吾性鵲營巢亭栁青青緑陰鎖栁下乘涼亭上坐飛來雙鵲搆巢居上下枝頭不避我一日復一日營巢亦將成傳説巢成始上梁上梁開户卜陰晴卜陰晴如其語舊年上梁南其户由來多是北風雨今年上梁户向東定知西雨兼西風嗟爾鵲兮識天工胡為世人昧所從不解趨避吉與凶讀杜詩大雅止姫周何人繼三百卓哉杜陵翁允擅詞場伯歌謡寫忠懇灝氣渾鬱積李韓望後塵鮑謝讓前席緬想浣花溪披讀仰髙格詩史非妄評良足娛朝夕翠雲硯歌松花江之涯有石質堅色緑磨而為硯不減端溪爰以翠雲名之而歌以詩松花江水西北來搖波鼓浪殷其雷波收浪捲灘石出髙低列翠如雲堆蜀相八陳此其種江間水流石不動日月臨照皛光華波濤濯洗如璧珙長刀槎丫繩修蛇刀割繩縛出灘沙他山之石為之碬氊包車載數千里逺自關東來至此橫理庚庚緑玉篸長方片片清秋水爰命玉人施好手質堅不受相攻剖磨礲幾許研乃成貯以檀匣陳左右龍尾鳯咮且姑置銅雀舊瓦今何有自喜得此逈出羣錫以嘉名傳不朽冬夜偶作天寒鴉歸早月上人語靜融融地爐暖紙窗散清影白日雖苦短迢遙愛夜永敲句和殘更惕然發深省簾幕重重下獸炭旋旋然猶恐寒侵肌向火爭趨前懸知玉關外雪積層冰堅出征衆軍士皸瘃實可憐况當歲云暮家室情更牽所恃雨露厚兼賴主帥賢凱旋應指日永不戍窮邊梅月窗外橫漏滴響未了心間吟思生境靜俗情掃每從物理中略識清心道撥火且烹茶一杯供軟飽昔者諸葛公南陽一隱士攘魏兼和吳早定方寸裏一朝遇主知終身不易此鞠躬更盡瘁總為酬魚水設非劉王孫疇展經綸美沈石田秋林獨步圖壁上髙挂七尺練沈子石田之所作安排妙意神淋漓摹寫秋容氣蕭索梳空白雲起峯頭弗弗金風蕩日腳長林深樾何畏佳一氣怒號萬葉落何來瀟灑杖䇿翁獨步有似雲中鶴板橋石磴一徑通山腰茅屋看束縛逺山無皴樹無枝非復尋常具邱壑滿空煙霧如欲滴目極天邊更寥廓五弟有葫蘆筆筒用十年矣屬豫題句物貴朴質不貴竒用貴長久不貴暫譬如君子小人交或如醴甘或水淡何處西風蒲栁姿忽成雅製佐鉛槧日與湘東三品俱位置安排毋乃僣吾弟用之已十年資益吟哦恆不厭磨礲本自無圭角日事摩挲光泛瀲腰胸肩頂相稱停映射溪藤雲藻掞架筆何須紅珊瑚只此天成質無欠伊豫鴈序愧先行十有四年共筆研枯韻同拈工拙殊心中歡喜兼艷羡不辭復作筆筒詩已費苦吟一日半題白居易飬竹記瀟灑白少傅妙理寄清談自為養竹記竹性頗能諳森森抽枝篠千頭緑玉篸欲踈不欲密三昧還須探亦思覔幾個琅玕栽宅南望雪行今年三冬未見雪同雲苦被風吹撤夜觀望舒如鏡明曉看翔陽似冰潔秋麥全資冬雪培遙識農家望歲切我聞三白兆豐年望霰先集心如結上帝穹窿坐玉京青女滕六分行列如何不一駕雲車試剪飛瓊噴玉屑飄飄灑灑頃刻間利我三農都喜悅丈室丁東漏聲寒更長甲乙夜萬籟俱閴寂宵鐘響亦罷聊撥爐中灰向火消間暇鼻觀趣自永旋旋添蘭麝香灺不能眠靜中觀造化丈室有餘清寒宵正三五紙窗近簷階月色差可覩地爐獸炭暖夜永灰更聚手擘小龍團間向松瓷煮讀詩品古人心許杜工部篝燈一再披恍似促膝語燒香曲鏤銀匙子紅芙蕖雙金細筯頭珊瑚宣銅流金乳耳爐活灰冉冉雲翠鋪獸熖光騰紅映座分來細壅安隔火霜天如水月華寒玉檠三兩明珠墮小炷沉香灰半殘黃雲一穗裊帷幨靜參得意六根遣呼童且莫捲重簾剪燭詞漏聲丁丁催落日鼓聲鼕鼕喚月出朱扉半扄金屈戍蘭釭獨朗窈窕室雕欄匼匝護丹葩燼長光暗雲漿密並州霜鋒黑燕尾雙飛拈得金英起落花貼貼流水寒瓊枝却在紅紗裏祀竈畢啖糖餳糯花浮光細如絲菉豆磨末白如粉肅具盤盂為供養瓣香束楮申謝悃家家此日祭竈君得食祭餘身安穩燭光照盤堆錯雜甘如崖蜜供口吻破臘今知歲序周交年漸覺春光近挑燈且復坐匡牀清茗一杯潤舌本屛風謡錦純方寸虬蟠拏岌岌兩扇端不斜紙面木骨非炫華軒窗間敞為周遮朔風度雪松翻影當門瑟瑟蝦簾冷霜刀落燼銀蘭明一縷香雲坐夜永水仙女夷裁冰作仙骨色香淨洗水雲窟天風吹送洛浦春虙妃小步瑶臺月金鈿掠鬢玉簮橫向人不語如有情採芝皓腕渾不見倚屛却坐羞銀檠玻璃鏡斫檀紫翠蟠龍蛇錦簾半揭文繡斜中含冰月無點瑕水精雲母羞精華西洋景風吹海舶海門曉日搖波赤梯陵度索萬里遙價重京華等球璧虛明應物中何有妍者自妍醜自醜匡牀坐對寂萬緣我方與我周旋久春夜偶成開年喜陽和月明三五後挑燈裁短句間消清夜久敦敦書案前積册紛左右緬懷古作者杜韓期尚友汲深苦綆短奧衍終莫剖譬之水在器量物隨所受惟在適我心豈計悅人口我思天地間孰非造化功冬春相代謝循環嬗無窮一氣鼓大冶萬彚形色同如皇建厥極頒令自法宫垂衣端拱理四海聲教通陰陽無愆期百昌乃告豐象魏布始和八表扇仁風此理非臆談權輿自鴻濛側聞斗有柄四時異所指仰首望斗垣又見向東徙乃知陽德普萬物資於此大哉行健心妙矣於穆理相風長竿三丈繩絲直上揭飛輪如鳥翼雨淋日炙更陰晴風飄籟靜隨興息二十四番曽慣經三百六旬立亭亭朝看披拂送落月暮看颯沓呼羣星等間塵市罕得見未央宫裏明光殿御罏香靄午晝長飄揚每被陽和扇即今五兩春氣融豈是尋常雌與雄但使巽二欲吹萬那管東西南北風填倉日月正己過二十五陽和布作新春景東風次第催物華隔窗晴度遲遲影共傳此日填倉節不喫糜飯惟嚼餅青青早韭列盤香細細茆芹入齒冷食罷髙齋步幾回簾櫳深鎖爐煙靜更喜今朝風日佳豫卜黃雲堆萬頃催耕鳥條風天宇布百昌欣韶熙村原趣已佳緑水明千畦秉耒耕南畝提壺餉東災郭公何丁寧催耕田畔啼髙棲嫩栁梢低喚柔桑枝分明為一言東作當及時田老聞之喜胼胝非所辭田婦聞之喜饋饁職所司但願歲豐穰辛苦甘共之幾度聞此聲蚤起竭力為那似香閨中驚眠翻怪伊素几謡素几素几胡為乎不雕不斫不丹漆直方之中存本質深山大壑儲良材工倕裁製陳書室使我憑之不肯以汝佐尊斚不肯以汝供梳櫛惟有乘興賦詩時蠻箋藉爾快吟筆玻璃窗西洋竒貨無不有玻璃皎潔修且厚小院軒窗面面開細細風櫺突紗牖內外洞達稱我心虛明映物隨所受風霾日射渾不覺几筵朗徹無塵垢溪畔髙枝宿鳥飛門前小徑行人走秋添瀟灑看階菊春回消息憑庭栁一徑入望盡分明萬象為呈妍與醜依稀對鏡延清賞裁詩可似銘座右御製樂善堂全集定本卷十五
