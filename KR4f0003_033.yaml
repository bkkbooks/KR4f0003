front:
  text: 欽定四庫全書御製樂善堂全集定本卷二十九
  hash: sha256:f2b6ea4bc4ab99e1bc6e61d4fa54f3b61ba1e2d186a413642211b8394ac8b1e8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0003_WYG_033-1a, image: WYG1300/WYG1300-0524a.png}
body:
  text: 今體詩烹茶梧砌烹雲坐月眀砂瓷吹雨透煙輕跳珠入夜難分㸃沸蟹臨忩覺有聲靜浣塵根心地潤閒尋綺思道芽生誰能識得壺中趣好聼松風㵼處鳴石笋朝嵐濃處萬峯連紫碧稜稜滴翠鮮疑是仙家炊玉版却教洞口揚輕煙雷雨初過石溜痕逺峯秀矗兩三根化工造物原來巧翠映筠篁緑滿軒過雪上人禪房上人飛錫處過客息車時花現優曇色林深貝樹枝看門鶴影瘦聼法鳥聲遲最愛清凉地塵襟天籟吹山僧靜閉關白雲鎮封户金猊噴意香玉砌飄花雨法堂自鳴鐘方丈頻揮麈入座聼談禪林間日過午賦得得雨溪聲壯山雨昨朝過沿溪景倍多平添三尺水髙湧幾層波繁響鳴琴筑餘紋散縠羅昨來逰賞處乍喜放新荷雨後池塘閒步青鞋步屧過橋西細草輕莎㸃活泥顫雨蘆梢才卧起笑風蓮蕚乍開齊參差逺岫煙猶濕搖曵長條翠欲迷霽後園林風景别好供詩料任拈題頒氷金鎖開丹闕彤墀綴曉班政施依月令恩沐拜天顔職是凌人掌時當仲夏頒清泠泉灑沫朗照玉堆山惠逮鵷鸞侣凉生几席間清都懸月鏡溽暑避塵寰題元祐黨人碑元祐清流號濁流黨人鐫石石遺羞祗今欲補名臣傳猶喜殘碑姓氏留夏日園居即事園有山為郭齊因樹作墻開軒惟欲敞引徑不嫌長淡月梧桐影輕風蘿薜香無心瀟灑客勝地足徜徉消閒慿筆墨無慮即漁樵為愛塵氛逺寧耽景物饒清風滿襟袖夜雨聼芭蕉好謝緱山客煙霞不可招宿雨潤新葩紅蒸一片霞看雲閒藉草愛客緩烹茶坐弄流泉潔眠當皓月斜子西得意句分付與山家緑竹令人逺青松迥出羣山明眉乍畫溪暗帶如分古帖閒來搨名香手自焚晚凉急雨過星漢淡微雲為有披襟者林風拂面來芙蓉碧沼麗楊桞夏亭開愛鶴閒移榻呼僮淨洗杯往來依石徑半為愛蒼苔板橋波上跨步屧似乘船緑水平鋪掌青楊暗鎖煙魚多原不釣花落自相憐一幅江鄉畫慿將俗慮捐催荷清籟急挂樹夕陽低信步過橋北乘凉到水西添丁鶴生子營户燕銜泥更擬扶笻去裙腰翠欲迷梧竹影縱橫軒忩倍覺清草青階砌合荷放鏡池平洗硯臨流碧攤書卧月明誰家彈百衲流水一聲聲夏日寄龍翰傅先生軒楹閒敞午風凉為想髙齊靜趣長松柏蟠龍塵自逺精神秋鶴病無妨竹牀拂簟醒殘夢石鼎烹茶泛乳香試問何人施肘後早教霽月映書堂雨中舟行看山輕舟細雨雜微風十里青山杳靄中桞岸遙看新洗緑荷洲還似乍添紅潤含螺黛峰頭滴曲轉芳屏徑裏通何似水亭閒倚榻一簾煙景坐空濛避暑避暑消長日渾忘户外喧午冝開北牖晚稱卧南軒帶月蟬聲靜臨風樹影翻凉秋彈指到何用苦歊煩夏日寄二十一叔父索詩畫庭院清凉竹柏新懸知詩畫倍通神胸中早貯千年史筆下能生萬彚春臨几興來鋪越練當忩茶罷試龍賔瓊瑶乞并縑緗惠景仰還期步後塵賦得人立藕花風徙倚眄蓮塘凉颸引興長披襟清暑氣撲鼻送花香露滴珠璣顆波明錦繡粧餘芬迷蛺蝶幽夢睡鴛鴦出水青羅蓋臨風紫玉裳誰能勞步屧竚賞水雲鄉六月晦日作夏令今朝盡西風眀日迎誰知銷半嵗都為過三庚榴火臨忩暗荷香入座清夕陽蟬噪急已帶早秋聲林中閒避暑石上坐烹茶緑樹引清籟紅雲叠綺霞葛衫輸羽扇蛩響雜池蛙入夜清懷永微吟愧八義詠史十首樂毅君臣知遇甚分明七十齊城智力勝可惜惠王承父烈却教名將避青蠅屈原千秋遺恨楚江濵宗社將傾敢惜身何事承平漢文代長沙偏欲學斯人董仲舒建章奏對䇿天人帝眷名儒禮獨親誰使江都終老去千秋史論恨平津李廣平生義勇隴西聞命蹇終難與䇿勛回憶灞陵遭醉尉那知渠是故將軍蘇武囓雪氊廬心似氷故鄉逺寄鴈書憑難堪持節旋歸日秋草蕭蕭老茂陵李陵生降迹似負恩深誰信區區報國心他日王庭對蘇武空教泣下數沾襟東方朔畢生玩世事詼諧朝隱端知是逸才却被何人入仙史虛誇阿母宴蓬萊田千秋髙寢郎官能悟主應時一語便封侯試問兩宫猜二際長陵封事為誰休蕭望之不知廷尉是何司飲藥空教灑淚悲最恨老臣遭毒陷顯恭叩首只移時王章當年相對泣牛衣此日忠言觸􅍔機漫道忤時緣激烈三王譽早播京畿竹裏流螢琅玕清韻肅熠耀夜光浮翠影千竿靜踈星幾㸃流眄林何用燭應節已知秋猶憶隋隄畔王孫徹夜逰雨夜聞梵聲霏微蕭閣坐秋霖㸃滴簷牙入夜深何處山僧散花雨却教仙梵雜潮音不捲珠簾户半開經聲還共雨聲來明朝為憑朱欄看階砌青青㸃嫩苔新秋松舍螢光㸃蕉忩蝶夢成風從今夕爽月比舊時眀蛩響緣階急蟬聲向晚清新凉才可樂莫漫動秋情秋熱踈梧葉落早知秋轉覺如蒸暑氣流翠竹盡閒天籟寂晶陽髙暴午雲收頻揮葵扇凉颸動漫徹氷盤碧玉浮借問炎熇能幾日祝融返轡肯重留秋英誰道西風急能摧衆卉殘石欄紛翠纈蘚砌簇金冠入夜香偏細凌晨露未乾化工工㸃綴轉覺勝春寒前寄詩索二十一叔父近製承惠尺幅兼辱和章仍用元韻志謝露潤霜毫句倍新松筠瀟灑鶴精神一天爽氣髙懷邈尺幅霞箋錦字春幸作開筒吟句客猶慙據案論書賔生綃惠我王維筆三逺由來不染塵為愛園林秋景新敢從芳藻覩丰神寒潭月影空中畫落葉風情幻裏春響奏階前蛩促織書排天外鴈來賔阿咸近日尤無似杜老空勞灑玉塵南華秋水一泓新撫景悠然覺爽神已愧徴詩裁下里還叨步韻咏陽春心情近似天邊月花竹聊充榻上賔桂露滿瓶熏手讀恐教仙藻汚凡塵雨夜聞蛩一枕新凉雨未休王孫何事獨添愁吟殘衰草空階寂呌徹寒宵半榻秋清夢乍回銀漏永踈梧漸隱玉蟾收聲聲入聼增吟興倣佛深更互唱酬隂陽石荆州狠山有二巨石一燥一濕俗名隂陽石每天時不調鞭隂石則雨鞭陽石則晴見荆州記異石含精祕能為造物先凝靈原藉地應候忽知天旱潦無煩慮隂陽各異鞭楚民應擊壤嵗嵗樂豐年晴浮嵐散天宇爽籟拂秋晴光漏微穿牖霞殘淡抹楹才添池水漲乍覺逺山眀蕭閣塵氛淨新凉著體輕郭河陽峩嵋霽雪圖積翠林巒濕未乾迢迢蜀道接長安石門氷雪塵氛淨驢背風霜客路難梵宇凌空知日近翠微開霽倚雲看河陽一幅風流筆三十二峯春正寒軍裝八詠胄虎皮䝉鐵葉貝齒飾黃金猶憶絶纓㑹能收壯士心鎧細鎧攢金線蛇鱗鎖玉環唐夷已穿破未入玉門關刀隴戍悲風起將軍髮上指敵來知何處欲試匣中水弓三秋塞草長鼓臂挽弓强臨風懸滿月百步殪豺狼矢飲石稱神力中環能制勝誰道天山遙只須三箭定麾纁帛曵流虹陳列長蛇勢指揮王者師立使風波濟矛畫幹凌風直屈盧立月寒沙場恆作伴應為苦羈單袍三軍溫挾纊天府製將來何似家鄉寄伊人手自裁晝漏晝漏聲催午籟長踈梧翠竹隱秋光目隨野鶴神同逺詩寄髙岑句亦涼霜信排空寒淰淰蘆花亞浦颯蒼蒼知心一片南華水㶑灔含風蕩夕陽洞庭始波嶽陽樓下楚江分天淨長空水蹙紋最是洞庭秋意好西風眀月弔湘君一天秋色晚雲低碧漲寒江逺欲迷棹破煙波三百里好風吹送嶽陽西楚水巫山秋意多輕颸一夜洞庭波誰知帝子無寒暑八月風涼試縠羅鬬蟋蟀飬鋭欲相爭盆中鼓翼鳴庭莎鋪翠褥甓室列堅城霸氣撐雙臂雄心突兩睛可憐一朝忿微物也捐生贈從軍者秋風吹塞草壯士往從軍大節羣推汝平生此報君朔雲天際暗寒袂路岐分迢遞交河道笳聲不可聞秋畦秋畦零白露生意詎嘗停殘賸菠根赤新抽韭葉青架除通户牖葉脫豁軒庭曵履經行處寒螀入晚聼秋瘦竹修梧接桂叢風簾半掩翠蓊濛晴光乍向踈枝漏寒影頻從隔岸通白露潤涵文几上凉颸潛入綺疏中披襟試向階前看糝徑還添幾片紅中秋前一夕對月豐隆知節近此夕密雲收連日隂雨是夕忽晴規滿疑金鏡輝遙勝玉鈎入波光不定度竹影偏流為愛中秋景先期獨倚樓澄江如練霜滿江城葉落時洞庭秋意許誰知逺澄潭影天光合淨叠風紋練色披河伯波濤徒自詡天孫機杼未曾移曉來漁笛衝煙散恰似并刀欲翦遲聞鴈嘹唳長空鴈陳過行宫月影上松蘿寒更半為抽思永秋韻無妨入耳多瑟瑟風凉愁欲斷寥寥天末逺相和蘆花浦溆明如鏡清怨瀟湘意若何暮過御河橋太液風漪正作秋殘荷踈葦冷颼飀愛看好景瞻天近漫憶春光付水流玉蝀橋頭催曉騎五龍亭畔起沙鷗歸來無限低徊意月照桐忩影半鈎吳殿懷古在南苑中明時行宫也苑內有晾鷹臺射鴨池煙桞殘蕪鎖敗垣空庭寂靜晚鴉喧晾鷹南望髙臺迥射鴨旁臨廢沼存想像朱廊曽響屧空傳金屋最䝉恩客來指㸃前朝事極目寒暉散古原瀛臺觀木變石異質傳何代天然挺一峯誰知三徑石本是六朝松苔㸃猶疑葉雲生欲化龍當年吟賞處借爾撫遐蹤水始氷漫坐氷牀罷泛舟沿溪初看碎瓊流芙蓉倚岸凌霜晚鷗鷺成羣憶夏逰何處水亭珠箔卷誰家古渡釣綸收蕭踈楊桞眉難畫一片清光上綺樓板橋霜跡回溪霜月落略彴帶餘寒曙色暄猶潤晨行跡半殘憑添驢背冷未許屐牙乾此趣何人㑹清吟倚石欄刻漏刻漏迢迢霜月凉曲屏銀燭燦輝煌句排七字更忘永時到三餘趣轉長砌竹迎風敲緑玉忩梅和影弄明粧年來消得冬宵味半是煎茶半爇香題焦秉貞人物畫册十二幀每幀二絶句雕䦨曲曲倚雲娥嫩日烘晴勝事多賭擲鞦韆携伴侣緑楊影外舞傞傞小板塗朱貫綵繩嬋娟天上踏雲登桞風拂處人吹過環珮聲搖最上層簾幕周遮重復重春情難綰倩雲封蛾眉兀坐低無語金鴨燒香鎮日濃户外辛夷已放齊花光掩映碧欄西簾櫳不閉虗堂敞飛集黃鸝恰恰啼平臺文石淨無塵小立凝眸景物新春到人間饒富麗桞煙花雨總宜人遲遲春日上回廊庭院深沉午晝長徙倚東風不歸去撩人花氣撲衣裳珮環聲響出簾帷結隊雙雙蓮步遲紅紫隔垣紛潑眼臨風小語立移時望裏重重綺作疏閒庭風暖午晴初能言鸚鵡窺人語報道春寒已盡除亷纎細雨密如絲㸃滴檐聲落玉墀消遣餘寒香閣裏花箋閒劈自題詩緑忩髙啓對迷濛雲影垂垂滿太空花好不禁遭劇雨落紅明日掃晴風曉風淡淡爽于秋笑語聲喧緑水洲貪採蓮花歸櫂緩一輪紅日上山頭髙荷朵朵映波紋大葉田田散緑雲清露滴盤珠萬顆拗花傾濕藕絲裙亭外無人夏日長名姝逭暑倚匡牀臨風試舞翩躚態消遣閒看小女郎髙桞隂濃暑不生小亭終日有餘清筠簾捲處風吹到送過凉蟬斷續聲璚忩深閉靜無聲隔斷凡塵院宇清閒賭圍碁消乙夜祗聞腷膊響楸枰漏滴銀壺箭響時手談無語罷碁遲燒殘紅蠟斜明月階下梧桐影已移聞道瑶池阿姥家瓊宫璇室鬪髙華就中儼亦成瀛閬幾隊仙姝倚立斜翠壁撐空石氣寒回廊屈曲倚㠝岏姮娥鏡檻粧初罷寶鼎香濃爇未殘晚凉庭院與人宜手把生花拗一枝羅袖髙擎香不斷輕風有意往來吹踈籬巧樣織山屏㸃綴花枝映畫櫺多種芭蕉聼夜雨風旗舒緑覆檐青月户團圞中有人文疏繡桷綺堂新琵琶一曲聲清脆大小珍珠散落勻松風謖謖拂香幃閒撥檀槽響徹扉驚起棲簷雙白雀空中鬪舞繞林飛一剪貂茸覆緑雲溫房暖室地爐熏任他簾外寒威重金盞仙醅注十分華燈懸處影瓏玲瑟瑟踈林朔吹生啓户月髙天宇逈雪峯數㸃映空明御製樂善堂全集定本卷二十九
