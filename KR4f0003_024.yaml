body:
  text: 古體詩夜雨齊中焚香虛齊坐清夜斗室如方丈容膝且自安忘機心宇曠忽驚灑窗雨因風送微響喚醒吟詩耳焚香助清賞細細沉檀煙篆絲裊直上簾垂避輕寒靜聼閴萬象更深香影殘夢與蝴蝶往此中樂趣多户外非所想雨中聞鴈蕭蕭夜雨飄風鳴新寒料峭著體輕空中鴻鴈三兩橫音徹虛齊凄以清上苑景物爭明媚倐爾變作三秋聲蘆荻蒼茫漫含思瀟湘煙雨空復情沙暖鴛鴦逺浦淨明朝從看春光榮種松園中足桃李錦繡爭春容一朝朔風撼寂寞芳條空欲儲嵗寒景當春乃種松抽枝始落落含氣方濛濛風雨小亭側乍見出窟龍漫言少丰韵莫嗤乏丹紅君子苟相顧徑節在三冬暮春曲暖雲晴日烘春老殘紅埋徑消芳早緑楊十里暗朝煙得得催晨鶯語巧荏苒風光已似奔輕寒料峭金猊溫抽毫為寫留春句時向窗前惜曉暾天津暖漲明如鏡指日應看芰荷盛西海捕魚平湖蕩漾春波長萬頃玻璃映日朗唼浪修鱗水面遊爭駕扁舟蕩雙槳漁人那曉生意多不捨鯤鮞盡收網網罟紛絶流時作求魚想嗤彼貪利人吾寧號清賞勸君解網放羣魚篙撑緑水中流響花片飛香幾處漂宿鷗眠起冲雲上剌剌新蒲欲出波逺岸煙光含莽蒼樂哉此遊逸興多鱣鮪洋洋任觸榜殘照西山返棹歸别舟笑我成空往採芝詞自題照何來瀟灑清都客逍遙為愛雲烟碧筠籃滿貯仙巖芝芒鞋不踏塵寰跡人世蓬萊鏡裏天霞巾倣佛南華仙誰識當年真面貌圖入生綃屬偶然縛雞行縛雞莫縛牝留以蕃孳生縛雞莫縛牡留報長短更牝牡皆有用金鼎將誰烹君看羣雛長頗足供胾羮口腹恣叨餮所欲難滿盈何如留有餘長以佐生成春蠶食葉聲吳天三月春光蕩吳蠶三眠蠶更長陌上新桑葉葉抽晴窗鎮日風雨響喚起深閨未畫眉携筐急就飼朝饑流水潺潺箔間落爽籟瑟瑟簾前吹日長莫厭耳根閙蠶飽絲多足相報但願今年官絹輸却免門前租吏到秧馬清和四月新秧緑一壠分來千壠足桐馬平馳碧浪輕鬃鬛森森稻苖束北人使馬南人船兩蹄踏破橫塘煙畦東畦西來往速插罷儂家幾頃田㦸㦸青針波欲沒載驅終日何曽歇草壁髙懸睡老農好與吳牛同喘月聞蛙竹影搖夕凉清光入窗牖霜簟含風漪文室周旋久抱枝蟬噪寂蛙鼓羣如吼昆蟲各任時日月雙丸走一徑繞溪行叢葦蓋數畝千百沸成羣噂沓不住口我聞雷鳴夏汝蛙功何有徒供小兒輩垂釣出淵藪轉眼墮笭箵因鳴受災咎九夏能幾時胡不以默守五日芒種南風薰薰麥苖緑稻針出水如新浴五日天中節物佳却逢芒種農功促平湖㶑㶑欲生煙角黍蒲尊雜管絃老農炙背溪田裏那得閒從競渡船暮歸偶自街頭走買得靈符貼門首但願神貺沛曼陀指日西成看大有銷夏銷夏慿何事清吟興欲催心閒日晷永綺思方悠哉天際凉颸動檻外山花開倐看明月上入我户牖來即境自怡恱拈韵無安排何須逐曉凉步屧登髙臺詩成哦幾過清夜閒徘徊此樂足銷夏非云誇别裁花石綱江南花石新編綱舳艫銜尾達汴梁延福五位爭工巧地狹更廓皇城墻深壑嶄巖極險邃難妨馳突燕山騎徽廟精思百藝能如何獨昧經邦智野田行驅車古城道寒煙濕秋草欹倒繚墻垣悲風白楊老白楊樹下誰家園苔迷碑字棘生門年年墓道無人掃空餘麟卧石虎蹲生時富貴誇得意不惜萬金營幽隧叨榮已結上公儀殊恩更賜東園器熏人勢焰今安在百年事業歸桑海老松秃兀祗餘根子孫劚倒旁人買姑息行君不見明皇開邊用邊將祿山秉鉞臨牙帳又不見代宗無智用承璀三郡河北幕府開子嗣弟及殊未已自此朝廷事端起德宗為政事姑息封拜無能振披靡瓊林大盈榜庫新涇原兵至玉石焚由來悖入亦悖出坐看宫闕生埃塵嗚呼姑息真無濟令人却憶貞觀世夜卧聼雨憶平郡王朱明届候天方永如烘暑氣焦塵境座間揮扇手欲疲林下乘風吹不冷今朝一雨洗煩囂入夜濛濛萬緣靜楊栁隂中罷暮蟬梧桐枝上收清影時有匡牀髙卧人一杯芳潤澆苦茗夜凉霜簟好安眠芭蕉響滴殘夢醒醒後悠悠動逺思思在龍堆連雪嶺如心居士在軍營年來王事勞馳騁即此清凉夜雨秋行帳殘燈懸耿耿天心仁愛當偃師坐看絶塞狼煙靖百萬健兒歸故鄉净洗兵戈只俄頃猶憶去年煙雨中緑簔共泛滄波艇清宵蝶夢亦偶然人生何必嘆浮梗借有好風吹送詩知君應在三秋領伐棗歌老翁持斧林中過伐取供人輪與軻我遊棗林惜生意謂翁計拙如之何輪菌枝茂葉婆娑結實應比尋常多年年秋成但賣棗管足朝餐與晚醝何忍急取目前利坐令大樹投斧柯老翁揖謝言難采低價還愁人不買縱令留樹計久長只今枵腹誰能待郭河陽關山積雪圖層巒積翠數千里磴道盤空連玉壘鈴䭾風霜得得行長途跋涉間關裏世人馳利未肯休風卷紅塵撲馬頭河陽一幅炎凉景不徒妙筆誇風流探雀兒小雀出卵才數日老雀將雛雛六七兒童縛木作髙梯巡檐探得雛兒出雛兒無知不憶母老雀殷勤抱辛苦翾翻羽翼未長成嗟汝何時離哺乳棕拂子驅蠅棕拂子綘絲縷縷垂如何有用物壁間閒置之髙堂珠箔圍四面氷盤清暑神安怡座中恍似蓬萊島蒼蠅郤避將安施亦如太平羣蜂息海宇不用驅除為我願棕拂長如此莫資談柄頻頻揮豐碑行夕陽返照輝道周驅車古路西風秋路旁豐碑何其稠森森插笏盤龍虬誰能細考姓氏留但聞土民說所由明代貂璫威福擅司禮還兼御馬圈秉筆曽標封事題內操更教昆明戰沒後養子不掃墳羣埋此地多無算當時威焰劇熏人只今草掩流螢亂我聞此語識興亡秦漢唐宋皆殷監私昵何曽念履霜竊權頓令愁飛霰勒石猶誇爵里髙千年青史誰能逃辛勤汗馬創業勞大半拋擲由若曹遣興數日忽成月數月忽成年年月何曽異秋枯復春妍而人於其中胡為感變遷浩浩東海水舊時為桑田清風拂我面明月照我前馥郁芰荷香淡蕩楊桞煙即境自怡恱饑餐困便眠薰風送蘭香清芬透紗牖烈烈夏日炎誰能户外走霜簟含清潤北窗髙卧久心如止水澄物來隨所受漫云苦煩歊靜觀暑何有日昨䇿輕駟適從街市過見彼逐利者流汗肩相摩豈不畏炎囂辛苦出無那歸來竹窗下月影含松蘿回念市㕓人塵境甘消磨九夏尚如此三冬當若何輕舟泛晚湖一棹煙波緑荷芰襲衣香鵁鶄傍人浴天地一畫圖俯仰供清矚何必蓬萊洲雲霞覔仙躅黃昏蛙鼓鳴還似雲山曲我聞古人語詩以道性情題韵隨手拈易如翻手成乃有追琢者格律嚴為程捶字苦幽澀結響務鍧鏗情性轉拘迫未得天趣并廣厦避煩暑心閒塵境清即事攄别裁得句還獨賡譬彼蒼松枝風來自在鳴燕引雛營巢屋梁頭抱卵雛兒長捕蟲飼其饑雙燕心悒怏羣雛長大巢居難䙰褷弱翅凌風單引飛庭院愁欲墮願借已力為羽翰嗟汝老燕胡不悟謾教飛來又飛去羽翼成時㑹逺揚可似烏鴉能反哺食蓮平湖參錯芙蓉紫看罷蓮花食蓮子輕舟棹入碧洲灣猶有新紅才出水出水新紅未吐花晚風輕度香雲霞幾回流賞冷衣袂蚤秋消息知非賖笑對氷盤珠玉净清芬恰與幽懷稱莫教入口嫌苦心從識生成有本性擬古七首離離山頭花青青墻上草夭夭松下桃芃芃阪田稻雨露苟不及指日成枯槁空谷有佳人幽閒而靜好憶昔出門時蛾眉未曽掃日夕侍舅姑小心奉栗棗夫君久不見出身事君早只戀洛陽花不返洛陽道日暮掩柴扉脈脈空房老露蟬掛髙樹聲入西北樓晚景可憐生傷心樓上頭羅衣掩秋扇風度寒颼颼伊人天一方逺戍并凉州家居有如此氷雪况遲留深悔失斟酌却令覔封侯織成鴛鴦錦裁成鴛鴦被鴛鴦本同心同生亦同死嗟哉末世人其心不如此朝愛芳草青暮憐野花紫野花得意時芳草正委靡堂堂復堂堂羲和何奔忙三日不見君見君髮半蒼五日别故人故人天一方世事如飄蓬聚散那有常中庭羅酒漿烹豚刲肥羊滿酌金屈巵笙簫奏兩旁勸君且飲酒莫負好時光天地一逆旅光隂乃過客如何百年中更促駒過隙勞勞長安道役役洛陽陌車馬爭春風管絃擁上席但見庭中花那見路旁柏柏樹日以老落葉無人掃朝夕牧兒來拋磚擊神道冬至羣芳歇松柏乃青青衆人賞後凋松柏轉傷情傷情亦何為見賞嵗寒時嵗寒不可回良材將安施不如同枯槁免使獨樹竒君子苟相顧莫信桃李姿玉繩橫長夜斗柄向西指寒風拂象牀爽氣生蘭戺美人傷獨處拜月更衣起去年月圓時良人同妾視今年月滿時出門求金紫金紫亦難求得之何足喜不如早言歸與君長共此馬賁牧牛圖平川苜蓿含煙緑牧童羣集雲山曲烏犍逺放晚風凉偷閒笑語相徴逐但願禾稼如雲收足供租賦免賣牛安得太守如龔遂腰間樂勸解吳鈎夕陽在山尋歸路煙氣濛濛暗林樹河中一幅景物繁監門圖繪意略具中樞歌秉鉞託干城坐謀稱媪相奏對百官前供奉金華上諛詞飾進報功勳中樞威焰天下聞健兒自衛弱攻戰董兵權重唐監軍嗚呼徽宗猶不悟自恃可用唯宦豎草竊雖平內寺橫坐令宋室成南渡青青水中蒲三首青青水中蒲如劍森池沼下有雙鴛鴦同生亦同老青青水中蒲間以芙蕖花自問無顔色相對重咨嗟青青水中蒲忽萎秋風裏終始不離波嗟君不似此鴈奴謠臨秋霜信排空書雌雄一失為衆奴飛隨天際不敢後為恐羣鴈相招呼蘆荻蕭蕭白花亞成羣分偶眠秋夜寄語彎弓美少年當時何不連雙射丹青樹終南有佳樹其名曰丹青孤幹挺百尺上結車蓋形青赤葉相間望若錦繡明崔黃好手筆一一畫難成抽條應春和呈祥藉地靈鳥雀不敢巢映日獨蔥菁梁棟未試用徒傳竒樹名不如松杉質猶足架軒楹良材苟終棄空勞造化生度竹鐘聲月窗清映檀欒影細吟輕籟孤梢靜蕭踈透響送霜鐘招提何處山僧醒韵雜琅玕度綺寮㸃滴寒更發深省玉露頻敲淅瀝微斷續如傳青籜冷今宵參破耳根禪乍回殘夢清懷永古别離古别離天上牽牛織女星一年一見徒含悲銀河清淺欲度難何况白槐虧蔽之人間有怨婦七夕夜半嗚嗚啼空抱心事不得訴仰窺雙星欲寄詞鵲橋嵗一駕猶有交㑹期那似良人戍隴上生去未必生還歸唐寅秋林髙士圖寒溪引入仙鄉深一川風景含秋林霞衣雲帔結知心徘徊稱意羞華簮或浮輕舠或卧岑把釣蘆岸垂絲沈有來童子斜抱琴髙山流水彈清音拏空松柏虬龍吟白鷗為伴浮碧潯商山遺跡復見今籃箊晚籟寒窗侵生綃一幅重南金唐君妙筆何森森乘槎他日擬追尋祇今卧游瀟湘滌煩襟新月七月哉生明露坐寥天濶碧梧影漸稀清映蛾眉月古鏡吐微芒銀鈎光出沒况當早秋夕素娥逾皎潔對此新光流逸想隨時發盈虧始何年照耀無休歇古來對月人胡為流波忽際兹玉輪生胸懷正清越無須秉燭遊何用上探窟對月不暢吟轉瞬三五闕七夕詞孤桐泣露䦨干濕絳河迢遞離懷急雙星契濶動經年寶婺生塵掩雲笈歡娛却被離恨牽天雞喚曙良宵殘誰家弱婦髙樓上何處金針玉指穿弱婦穿針羣乞巧那知箇裏光隂老萬里逺戍祁連城十年不返長安道長安月夜臨風歎空羡雙星渡銀漢龍輈旋轡鵲橋收天上人間腸共斷弋鴈篇三秋月如水風雜喧菰蒲羣鴈自北至飛飛集平湖穩向沙汀宿夢與秋波俱誰與弋鴈者巧計突澤虞潛身葦岸側持燈照鴈奴鴈奴嗷嗷呌羣鴈驚眠初避射各分飛旋顧矰繳無無端回幽夢共疾鴈奴誣喙啄更爪擊忍辱聲嗚嗚雌雄各安眠孤身痛始蘇弋者還復來噤口不敢呼隨意恣弋取滿載尋歸途我聞傳此事把筆長嗟吁嗟吁意何為覽古興懷紆諌官君耳目讒者百計圖一朝誅斥盡旋亦亡其軀干刳周代殷員沈越滅吳自閉其耳目古今嗤至愚嗚呼興亡事視此竟何殊見桃下栽松感而有作園中種樹羣芳滋幾年榮長紛葳㽔或列山側或傍池同䝉雨露爭參差阿誰位置失其宜山桃下植青松枝蜿蜒未放拏空竒甘為蓊蔽嗟何辭春日抽條緑葉彼勢髙獨占陽和私葱蘢待到嵗寒遲吁哉已過煦嫗時我欲借問場圃師種植顛倒意何為青松磊落龍鳳儀山桃弱質人所嗤胡居松上茂䕃垂因循坐令虬枝萎自古掄材還若兹坐對感慨抒幽思安得槖駝妙手移或棄山桃付芟夷良材俾沐三春曦他年梁棟誠堪期饑鶴行松隂顧步霜翎拂徘徊本是山林物秋澄鏡浦魚深潛饑腸獨立金風疾雲間萬里青田遙雙翅新剪難冲霄主人稻粱恩未報仰唳長空天泬寥羽林執㦸郎香衢走馬雄風生蹴踘場開連夾城朝遊玉埒春如畫夜醉青樓酒似澠青樓留宿金貂脫拚却一生花底活野老吞聲哭忍饑兒今執㦸黃金闥御製樂善堂全集定本卷二十
