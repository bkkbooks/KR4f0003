body:
  text: 記皇祖聖祖仁皇帝恩賜御書記憶自年十二時隨皇祖聖祖仁皇帝駕往熱河避暑朝夕隨侍皇祖萬幾之暇輒流覽書史或親灑宸翰從旁竊觀心慕而未敢以請也皇祖顧諭曰汝愛吾書乎賜長幅一復賜橫幅一扇一皆持以告我皇父寶而藏之其年冬龍馭上賔哀痛沉篤每展閲御筆手澤猶存涕涔涔下乃肅容拜手而為之記曰嗚呼皇祖之孫百餘人其中聰明才識好學博聞年長於孫臣而任事於朝者彬彬濟濟孫臣年甫弱齡性復鈍魯顧特被恩寵逈異他人者豈非我皇祖推愛我皇父之心比諸孫有獨摰乎今雖八載聖訓慈顔宛然如昨豈徒杯棬之慟已哉昔歐陽修作宋仁宗飛白記謂仁宗德澤涵濡於天下者四十餘年田夫野老猶悲歌思慕况得望清光而承恩寵者尤相與流涕不置我皇祖君臨天下六十餘年聖德之廣大化澤之𢎞深享年之有永過於仁宗萬萬歐陽修不過受知近臣為僚采作記尚流連咨嗟慨想而不能自禁况孫臣日侍晨夕誨愛特深親侍皇祖之揮毫躬受錫豫其流連咨嗟慨慕更當何如因書以志不忘云瀛臺記入西苑門有巨池相傳曰太液循東岸南行折而西過木橋邃宇五間為勤政殿自勤政殿南行石堤可數十步階而升有樓門向北匾曰瀛臺門內有殿五間為香扆殿殿南飛閣環拱自殿至閣如履平地忽緣梯而降方知為上下樓樓前有亭臨水曰迎薰亭東西竒石古木森列如屛自亭東行過石洞竒峯峭壁轇轕蓊蔚有天然山林之致蓋瀛臺惟北通一堤其三面皆臨太液故自下視之宫室殿宇雜於山林之間如圗畫所謂海中蓬萊者名曰瀛臺豈其意乎豐澤園記西苑宫室皆因元明舊址惟豐澤園為康熙間新建之所自勤政殿西行過小屋數間蓋皇祖養蠶處也復西行厯稻畦數畝折而北則為豐澤園園內殿宇制度惟朴不尚華麗園後種桑數十株聞之老監云皇祖萬幾餘暇則於此勸課農桑或親御耒耜逮我皇父纘承丕業敬天法祖世德作求數年以來屢行親耕之禮皆預演禮於此乃知聖聖同規敦本重農用躋天下於熙皥之盛若瀛臺之建於有明飛閣丹樓輝煌金碧較之此園固為美觀而極土木之功無益於國計民生識者鄙之行一事而合於天心建一園而洽於民情身率先而天下丕變吾於是乎知皇祖皇父之為首出之聖也田字房記流杯亭之西南有田字房焉丁未四月十八日皇父萬幾之暇燕接親藩逰豫於此是地也西山逺帶碧沼前流每當盛夏開窗則四面風至不復知暑其北則稻田數畝嘉禾生香藹聞於室蓋我皇父重農之心雖於燕閒逰觀之所亦未嘗頃刻忘也古昔聖王臨朝視政之暇必有怡情娛覽之地故靈臺之詩美文王也卷阿之詩頌成王也今田字房所以命意重農者豈徒怡情娛覽已哉至若黛掃山顛風來蘋末麥畦浪起栁岸煙開馴鶴從容而起舞文鴛匹偶而泳逰蝶裁五色之文蜂喧萬花之谷物華景麗則思飲和食德熙穰於光天化日之下而怡然以樂其或凉飇四起鴻雁來賔白露如珠緑雲改赤千家之砧杵遙聞百室之倉箱盡實則思遺秉滯穗誰遺寡婦之利而悄然以憂時引儒臣坐而論道或率諸王公子弟修家人之禮講燕好之歡所觸目而㑹心者我皇父之同憂同樂憩息於斯較之靈臺卷阿意更深長矣謹為之記時應宫記夫天一生水坎精發祥凝靈聚液流為江海江海乃天地間物之最巨者也江海之有神自三代漢唐以來莫不祠祀惟謹有宋大觀四年詔天下五龍神並封王爵龍神之尊自是始厥後春秋犧牲之祀代有常典皇清受天命禋事上帝后土懷柔百神江淮河濟五嶽四瀆之祀載在太常犧幣之數俎豆之器既豐既隆神歆以格雍正二年天子以為龍神之位既尊宜特修宫觀以致䖍禱乃於西苑內豐澤園北建時應宫所以致誠明神俾雨暘時若稼穡以成者也夏六月霖雨彌旬幾至於潦皇父步行往禱其日即晴又明年黃河清百餘里此非神人效靈河海清晏之明驗乎夫以天子精誠通於神明以之事天饗帝罔不昭格而况於龍神乎信哉誠之能感物也是為記樂善堂記凡人之性未嘗不善仁義禮智全備於我所謂得天地之正氣而為人也然有智愚賢不肖之分者氣拘之私誘之遂日以蔽錮而昏昧有能復其性者鮮矣人能自強不息以復性為功已有善念擴而充之人有善事喜而從之則本性呈露而有馨香之德矣是故明德之馨勝於􅎟稷芝蘭鮑魚與之俱化未有樂善而不能修德者也余有書屋數間清爽幽靜山水之趣琴鶴之玩時呈於前萊圃數畦桃花滿林堪以寓目顔之曰樂善堂者蓋取大舜樂取於人以為善之意也夫孝弟仁義乃所謂善也人能孝以養親弟以敬長仁以恤下義以事上樂而行之時時無怠則能因物付物以事處事而完所性之本體矣是故大舜聖人也猶存虛受之心聞一善言若决江河漢明帝嘗問東平王在國何事最樂王曰為善最樂余雖不敏然賴皇父之明訓師友之切磋於大舜之善與人同雖有志而未逮而東平王之為善最樂則不敢不勉焉是為記四餘室記康熙壬寅三月皇祖聖祖仁皇帝特命豫隨侍宫中承歡侍顔之暇每得追陪諸叔父諸叔父推皇祖愛育之勤咸善視豫而二十一叔父尤肫然有加也及我皇父踐阼謂諸叔父年尚少養之宫中擇師以授之業二十一叔父克遵聖訓勵志向學每返諸身以達於事皇父嘉之用是於雍正八年三月封為貝子未數月又晉封貝勒叔父曰天子友于篤愛之心有加無已顧自慙謭劣特受褒異中夜以思惕然而懼乃以四餘名其室而屬豫記之且曰吾所謂四餘者除惡樹德以餘慶捨巧用拙以餘智知足安分以餘樂存理遏欲以餘壽也豫惟人生於世不能無好惡則樂其有餘者不能盡適於正視軒冕冠裳如饑之於食渴之於飲趨權附勢以自求媚者欲其貴之有餘也倉箱以貯之扃鐍以固之不受命而貨殖者欲其富之有餘也髙其堂華其屋錦繡其土木鏤刻其梁棟者欲其宫室之有餘也絲竹之亂於耳青紫之蠱於目者欲其聲色之有餘也叔父服膺正學好尚既端若富若貴若宫室若聲色皆不足動於心惟慶智樂夀則好之而欲其有餘而所以求其有餘者又皆本之於秉彞矩之以聖學以實其功可謂得立身之本矣豫嘗繹其言而有㑹焉書曰樹德務滋除惡務本德與惡不兩立樹德至於滋長則惡之本盡除矣惡之本除則身心泰然何慶如之孟子曰所惡於智者為其鑿也又曰如智者亦行其所無事則智亦大矣捨巧用拙以蘄餘智者孟子之意乎晉人王昶曰知足之足常足矣知足則安分知足安分求樂之道也宋人王昭素曰養身莫若寡欲君子之求夀也非偃仰屈伸若彭祖噓嘔呼吸如喬松也惟存天理遏人欲而已矣然養身求夀之道亦豈外是哉叔父以此四餘名其室優而游之以求於心饜而飫之以得於己慶無疆而智靡窮樂日生而夀嵗增於以養德修身對揚一人之寵命雖書史所載若河間東平何多讓焉是為記二希堂記吾師梁村蔡先生以二希名其堂而屬記於余且曰士希賢賢希聖聖希天此古人之言也或者謂余不敢希天故曰二希然余之意固非若是也嘗慕宋儒范希文真希元之為人因名堂以志之余曰美哉先生命堂之意也君子之立志也必以聖人為可學而至故孟子願學孔子顔閔諸賢皆曰姑舍是昌黎亦曰世無孔子不當在弟子之列而諸葛武侯之自比也則以管仲樂毅卒之學術事功逺超於管樂之上先生以漳浦名儒追紫陽之正學表率鼇峰因以所得於道德文章者發為經濟事業嘉言讜論日陳於朝雖古之名臣名儒亦無多讓然猶曰稷契伊周之所以致君而澤民者非余所敢望也請希其次其次曰范氏希文孔孟程朱之所以傳道而繼統者亦非余所敢望也請希其次其次曰真氏希元夫希文之事業非稷契伊周之事業乎希元之道德非孔孟程朱之道德乎希希文而至希文希希元而至希元漸而進之稷契伊周之事業孔孟程朱之道德孰得而限之乎先生之立志蓋可知矣抑余又聞吕本中及朱子論宋朝人物推范文正公為第一而朱子之後惟西山之傳得其宗則先生之有志於希二子乃實見以為不可幾與孔明志希伊吕而自比管樂之意異蓋孔明以語於人故慮其或為時俗之所驚而卑之毋髙而先生自名其堂以志尚友之切則義固各有所當也故抒所見以質於先生而因以為記云跋恭跋世祖章皇帝御注孝經惟上帝眷顧我皇清克馨其德太祖太宗丕顯丕承逮及世祖提仁義之師救溺拯敝奄有四海天下已定韜黃鉞捲白旄歸馬投戈討究先王之道播聖人之訓以休中外以育萬民念孝經一書為孔子明倫治世之大法而自漢以來去聖日逺古文今文之互異注疏訓釋之未精乃集古名儒嘉言懿論考訂採輯間出宸斷名曰御注孝經備一經之體要明至性所周浹俾夫搢紳之士農野之民皆有以知孝為百行之本而愛敬尊親篤摯有加雖古聖王木鐸之徇路辟雍之鼓徴曷以加茲我皇祖聖祖仁皇帝上諭十六條以敦孝悌重人倫為首及我皇父嗣登宸極迪光繼述衍聖諭廣訓之書於敦孝悌重人倫反覆開明惟恐人之弗知知之弗行而行之弗切以此見我皇清聖聖相承莫不以孝治天下依人性之本然以成淳美之俗而開宗明義則自我世祖御注孝經闡發天經地義民行之確然而不可易肫然而不容己者以昭示奕葉垂之無窮爰盥手而謹書於後云恭跋皇祖聖祖仁皇帝御製避暑山莊三十六景詩曩年十二時䝉皇祖聖祖仁皇帝推愛我皇父之肫摯特令孫臣隨侍宫中朝夕承歡不離左右其年四月隨駕往熱河避暑凡三十六景之地無不周覽聆聖訓被賞賚不可勝紀孫臣時雖少然受皇祖深恩嘗思久侍慈顔長領訓誨謹身約已庶無過尤以報髙厚之德於靡窮昊天不弔其年冬龍馭上賔我皇父哀毁過禮食不甘味時同兄弟問安必勉怡顔色以舒皇父之憂退而自號哭於廬次澘然不絶蓋恐傷我皇父之心而每念我皇祖哀慟思慕實不能自已也數年來皇父屢命往祭景陵冠劍猶存音容安在一望山陵魂飛魄越雍正七年冬敬讀皇祖御製避暑山莊三十六景詩兼披圗畫回思曩時承歡侍顔䝉恩寵而被誨愛者如在昨日興言及此淚欲霑衣夫以皇祖天亶之聖卓越古帝王深仁厚澤六十餘年浹於民心載在史册固非言詞所能贊揚於萬一孫臣在諸孫中最為鈍魯然天地之澤靡不均被而有得之最深者焉孫臣得皇祖之澤最深者也敢恭紀於後以志思慕之誠久而益篤云孫臣謹書恭跋皇祖聖祖仁皇帝千叟宴詩古昔聖王誕膺天命表正萬邦建中立極漸仁摩義胥天下之民躋之仁夀之域者必其身為繼天首出之聖人然後能斂福以錫民而受非常之慶帝堯在位一百一年帝舜三十登庸三十在位履至尊者又五十載時若禹臯陶稷契夔益諸臣同心同德白首黃髮賡歌喜起於一廷之中而擊壤老人含哺鼓腹耕田鑿井於光天化日之中者莫不忘帝力於何有用登世運於郅隆而後世頌其巍巍蕩蕩三代以降淳風寖微惟殷中宗嚴恭寅畏天命自度肆享國七十有五年髙宗不敢荒寧嘉靖殷邦肆享國五十有九年周文王受命惟中身厥享國五十年然其時君若臣以至庶司百職及耕夫野叟同登夀域共宴一堂者自古無聞焉洪惟我皇祖聖祖仁皇帝久道化成深仁厚澤六十一年官稱其職民恆其業羣生霑濡德被乎方外所謂繼天首出之聖斂福以錫民而受非常之慶也康熙六十一年春皇祖於乾清宫開千叟之宴命年六十以上者乃得預惟時在位之臣自大學士以下至翰林御史凡七十人庶司百職及致仕之員近畿之民又六百六十人雅歌賦詩和樂夀愷皇祖命子姓孫枝百餘人執爵獻酬濟蹌在列逺追饋酳之義弗限三爵之儀孫臣時年十二歲得與有事之榮覯茲盛典皇祖又作為歌詩命儒臣依韻迭和為圗以夀世傳之無窮雍正七年冬得詩與圗而披讀之竊見我皇祖如天之德如天之福與春陽秋露同其煦嫗甘雨和風同其潤澤合朝野臣民老耆期艾而錫之以寵光介之以繁祉方之帝廷賡歌之景象華封頌祝之休風規模宏且逺矣敢恭紀於後以志太平之盛事云恭跋性理精義夫欲致天下於熙皥振風俗於隆古煥禮樂於三代興孝弟於十室者必本之於崇王道而王道之崇則又在於尊儒學古昔聖王之治天下也設為庠序學校以教之每嵗孟春遒人以木鐸徇於路戴記司徒修六禮以節民性明七教以興民德凡所以重教化之道致天下於文明者也我聖祖仁皇帝崇儒重道仁民育物興學校舉孝弟勵風俗崇禮讓凡古昔聖王所以治天下之道靡不畢舉而又諄諄勉勉默契夫堯舜之授受孔孟之心傳謂有宋諸儒上繼絶學下開來裔實有功於世道人心乃因性理大全之書刪去冗雜摘取精要命儒臣斟酌損益而親為折中之乙夜披覽歷久成書勒序簡端以詔後世偉矣哉自三代以來未嘗有也雖漢明帝之幸辟雍唐太宗之講太學不過取美於一時又何能開示天下後世為儒學之宗主接堯舜之心傳實政鴻名輝爍於振古哉採羣儒之精華而去永樂大全之泛自明德以及新民格物以至平天下先其本而後其末探其源而考其實周子太極圖通書明天地鬼神之奧張子正䝉西銘發萬物一體之微至於皇極經世律吕新書皆自成一家言則總載之以成一卷而集羣儒之言分門别類又各於其類為之辨世次先後學問淺深寧純勿雜寧精勿濫讀是書者必先究心於論學之篇立志以端其本主敬以養其中致知以窮理力行以踐實然後玩味乎治道以明治民立政之方沉潛乎全書以見天地之所以顯鬼神之所以幽造化之所以運行而無窮聖功王道之所以燦然而可循確然而不易夫如是則我聖祖仁皇帝造物育材之心化民成俗之意欲天下後世之共臻於理學之盛者不虛矣跋朱子大學章句六經之文備衆理該萬事集羣聖之精華以立言君臣父子之大倫往古來今之大法莫不於此取則焉所謂煥天下於文明而聖人之所以垂世而立教其意蓋深逺矣六經之外則有四子書大學為曾子所述反列於孔子論語之前者以聖經亦孔子所製其言由近以及逺端本而肇末則又實為入聖之階梯云自漢以來此篇載於禮記而莫知尊重至宋程子始登之於四書朱子從而解釋之蓋孔曽之道絶於漢唐紹於周程張朱五子孔曽之書亦幽而不顯於漢唐之間逮程朱表章然後赫然昭著而大行蓋道傳斯學傳非程朱無以傳孔子之道故孔曾之書亦非程朱莫能盡發其精藴也傳有之古之人自十五而入大學教之以明德新民之事夫格致誠正修身明德之功也齊治平新民之事也內聖外王之道豈外乎此由近以及逺自小以至大言簡而味長理明而詞約誠兼備六經之㫖而又便於初學者可不知所致力哉蓋人心惟危道心惟微明德者明道心而遏人心也推而及物則新民也允執其中止至善之謂也堯舜之道不外乎是而朱子所以解釋此書又理明詞逹得歷聖傳心之要尤學者所當體驗而服膺也書魏鄭公十思疏後人臣責難陳善繩愆糾謬必本之以忠誠將之以公正匡救將順補衮職之所闕尤以格其非心為先務焉蓋君人者天下萬民之主而一心又人君出治之主也心一正則事事無不正矣唐太宗三代以下能納諌之賢主也其朝亦多諫諍之臣而必以魏鄭公為首者以其能格君之心也鄭公之奏疏多矣而必以十思疏為冠者以其就發謀出慮之始而俾知所致謹也夫木本水源之譬非謂人君之一心為理天下萬事之本乎固其本而浚其源非欲正其心以為出治之源乎思者心之發而未見者也心之將發未及於事則有此十思焉又何入於邪徑而不光明正大之有哉易曰君子見幾而作書曰惟幾惟康鄭公之所謂思即謹幾之意也謹幾而心正矣心正則天下之事無不正矣故貞觀之治多鄭公之功豈不偉哉書新唐書兵志論後治天下者以德不以力故德盛者王德衰者滅湯東征則西怨南征則北怨武王東征篚厥元黃惟恐後豈以甲兵攻戰為取天下之具哉德盛而王天下莫不順之故黎民歸之如父母尚有以其子弟攻其父母者乎然自秦漢以來風俗日偷人心日下則有以甲兵得之以甲兵守之者矣其因時一切趨利苟便雖可用於一時終無傳於後世惟唐立府兵與租庸調相表裏其制頗為近古子孫廢之遂至於亡以此見祖宗之法制不可以變更也唐初取兵於農分畨入衛四方有事命將出師事成兵歸於府將歸於朝故民無怨心將無兵權及其後也府兵之制廢而為彍騎彍騎之制又廢而為方鎮方鎮盛強天子微弱竭天下之力以養兵而方鎮用之以抗衡天子欲其不亡豈可得乎夫養兵所以禁亂及其弊也足以為亂不養則不足制變於一時養之則坐食而驕故規制不可不善也則為開創之君者固當深謀逺慮以立法於永久而為子孫者兢兢於修德愛民以制治保邦又當謹守祖宗之法以無授權於他人而資亂階焉則幾矣書朱子戊申封事後朱子立朝四十餘日前後所上凡七十餘疏皆切於事務不畏犯顔雖古名臣以極言敢諌著稱未有過此者焉至於戊申封事直指本原痛陳時事皆洞中窽要若倉扁緩和之能起已錮之疾而惜乎其時之不用也嗟乎此殆所謂正心修身齊家治國平天下之本為先生封事中第一憊精竭誠不遑自顧以告其君者乎其大本急務之說與中庸九經相表裏而大本則有一曰正君心急務則有六曰輔翼國本選任大臣振舉綱維變化風俗愛養民力修明軍政及末又以時之弊政與古不合者反覆陳之纍纍數萬言而其文之灝氣流行變化開闔使人讀之鼓舞激發沉吟紬繹而不自禁蓋大儒之啓沃宏矣夫學術與事功二者本相因而傳道之言與濟時之言二者又一致濟時有大小而傳道有全功能為濟時之言而身非傳道者有之矣未有身膺道統之寄而功不見於時者也先生傳道之人也則其有濟時之言也固宜御製樂善堂全集定本卷八
