body:
  text: 表擬上頒聖祖仁皇帝御纂易書詩春秋講説朱子全書性理精義等書謝表伏以承先啓後實維首出之君覺世牖民共仰生知之聖亶聰明以作元后紹庭敢懈於淵𠂻一道德而同民風建極不忘於典訓王言用布祖製聿頒億萬年道運丕昌共覩文明之式煥五百載心傳若接咸遵刪定之維新至道光昭湛恩汪濊臣等誠惶誠恐稽首頓首上言竊惟羲皇畫卦以開天性命之精始著堯舜傳心以明道危微之義乃彰三百十一篇之詠歌教惟淑性二百四十年之筆削法在尊王是以窮本溯源不外諸經之旨然而循流竟委又有翼道之書故周程自濓洛以揚徽而張朱起關閩以建幟首尋聖緒刋落陳言他如同時之儒與夫私淑之士莫不抱遺經而叩其終始望先聖而溯厥淵源然而易道幽深孰識由來之理數書辭佶屈或參當日之方言箋注紛紜詩義因之而漸晦傳辭糾錯麟經反致于難通議漢儒者曰無明道之功訾宋儒者謂鮮詁經之實惟知經自經而道自道豈解經載道而道傳經雖宋儒極力以廓清而明季復多端以煽惑未有經明道顯開通萬世之津梁作聖述明昭揭千秋之模楷如今日者也兹蓋伏遇皇帝陛下雲日為瞻羮墻如見治薰蒸為淳古允邁百王學緝熙于光明式敷五典昭格上帝時時以聖祖之心為心涵育下民事事以聖祖之政為政事惟師古道在率先念聖祖仁皇帝探賾鉤深既同韋編之絶執中建極實承道統之傳扢雅揚風何異宣尼之刪定屬辭比事盡芟衆説之支離至羣儒皆已表彰而朱子尤加尊禮謂其言精而義盡允宜身服而力行幾經乙夜之勤猶分萬幾之暇俱加纂輯重獲編摩雖開雕備續於昔時而頒行有待於兹日我皇上繼承志切誘迪心殷永維先志之宜遵嘉與薄海而共守遍頒直省俾鋟版於學宫廣勵師儒使鏤心於經術近自畿甸逺暨寰瀛聲名文物之邦益霑聖化嶺徼遐荒之地共覩皇猷洛閩綿澤於無疆洙泗流芳而不竭從此遵道遵路悟斷潢絶港之差學者是訓是行識宗廟百官之富自天雨露育成濟濟之人材特地恩波釀作熙熙之大化臣等識同窺管學謝雕蟲占畢徒呻每望洋於學海近光有志賡復旦於堯天叨與賜書凛遵聖訓伏願治如雨化學以日新蘊周情孔思以修文法放勳重華而御世默成太極豈惟歌詠怡情逺接心傳自爾是非立辨以引以翼存陟降之小心作君作師布雍熙之大化則會其有極歸其有極無不同之車書自西自東自南自北無不被之聲教矣臣等謹奉表以聞擬闕里文廟告成賀表伏以帝治崇儒九有仰乾行之健皇猷重道三無炳離照之光辟雍振鍾鼓以和聲樂華層吐膠序集圭璋而制器禮葉旁敷元和洽而泰階平文教昭而王道坦宫墻藻曜指檜影以增歡爼豆祥開望杏壇而色喜儒林雀躍文囿翬飛臣等誠歡誠忭稽首頓首上言竊惟分野奎婁原屬文昌之宿儲精泰岱實稱禮樂之邦非造化所獨私實生民之厚幸聖而拔萃開萬世以儒宗集厥大成等百王而未逮是以尼山木鐸響嗣千秋繡紱神區宅安萬古牲牢過魯昭漢祖之遺徽麟鳯升歌著唐宗之芳軌然而祖述憲章之美上律下襲之隆既莫造其堂階又孰知其閫奧音聞絲竹壁雖完好於魯共像設冕旒宇僅葺寧於明代未有廟堂式廓應景運而維新典禮優崇際昌期而悉備煌煌巨制恰應珠聫璧合之期奕奕𢎞模適當復旦卿雲之日人文與天文並燦聖居與聖澤偕新如今日者也兹蓋伏遇皇帝陛下胞與無私羮墻有慕節儉以先天下階茨遵茅土之風仁孝以育兆民堂構美丹黃之雘太平有象郅治難名弛張寬猛咸宜樂利貽夫四海雨暘燠寒時若懷柔暨乎百神頻行釋奠之儀屢舉臨雍之典觀書則政惟由舊講易則義偹畫前既化雨之旁施亦恩波之普被稱先道古奚襲乎三老五更綱舉目張悉協夫周情孔思帝謂至人之廟貌宜增美於重熙纍洽之餘天眷元后之精誠不屑循夫玉檢金泥之舉藉經營於昭代貽締造於一人既革故而鼎新益光前而裕後經始甲辰之夏落成庚戌之秋璆鐡琅玕寶藏競輸精於魯望楩楠杞梓楚材爭矯首於秦封大木掄自工師髙敞煥龍文五彩色瓦成於內府陸離瞻翬翟交翔默呵護於鬼神如松如竹顯監司於卿尹其正其平凖魏闕以定規倣巖廊而布象域顯文明之氣雲呈卿矞之華青鳯盤乎觚稜赤螭卧於榱桷聖時𢎞道新顔從入之門立體通方務塞竒邪之徑儀物重修古制祭器特頒上方允為前代莫覯之休宜在生民未有之聖臣等志存入室學僅面墻溯流以窮源粗識先河後海正誼而明道謹思義路禮門宗廟百官之美富難窺唐虞三代之隆平幸際伏願岡陵鞏固磐石奠安髙以下為基若築室之必根於堅磢誠以眀為牖如容光之旁燭於四隅無反無側無黨無偏元愷升而僉壬悉化有馮有翼有孝有德珠囊挈而玉燭常調行舉言揚隱致慰於猗蘭之操耿光大烈永垂庥於闕里之居臣等謹奉表以聞頌九符有序粵若稽古典墳厥初生民低處者巢髙處者穴取草木皮革羅鳥獸漉水物以為衣為食君臣父子上下長幼男女夫婦莫有倫紀聖人伏羲氏作始畫卦以通神明之德類萬物之情造書契以治百官察萬民政令行民用遵約束時則有龍馬負圖之應逮黃帝軒轅氏宰制羣動垂衣以治作甲子天用錫以日月合璧五星連珠造律吕播其八音而鳯凰巢阿閣與蚩尤戰于涿鹿之野有雲氣止於帝上其後復有聖人曰堯治歷象置州牧四嶽明俊德以親九族協和萬邦時則百獸率舞廷生五色瑞芝舜承是道重華協于帝建學飬老敕命賡歌卿雲復旦鳯凰來儀上下草木鳥獸魚鱉咸若暨禹湯文武祗德建中無逸執競時則有錫洛銜鉤鳴鳥流烏之瑞揆古聖帝王罔不得天嘉祥為受命之符亦罔不在德其惟時敘罔不克加抑畏用兢業於有邦以答天之眷命自時厥後由漢迄明英君誼辟天亦默相厥德視其所履以為協應其有矯誣諛佞詐作符瑞以欺中外以惑蚩蚩氓天弗與民弗信也洪惟我皇清聖聖相承宅中圖治以撫四海德威並行汪濊暨訖天用錫以洪庥敬戒不怠用培我丕丕基雍正三年三月太史奏日月合璧五星連珠皇帝曰惟豫丕顯考聖祖克聖克仁克膺天佑豫一人是賴有司其擇吉薦牲以告景陵羣臣固請升殿受賀不許嗣是嘉禾瑞繭慶雲芝草醴泉甘露河清鳯儀之瑞先後疉奏我皇上祗承天眷弗敢自居或則歸美聖祖或則不以宣示且曰朕所喜者豐年為瑞及汝諸臣宣力四方斯朕志也臣謹按王者必世而後仁天人叶應嘉祥駢臻必俟仁而後益顯故生民公劉之詩作於周召清廟明堂之什成於沖子我太祖太宗肇基新命我世祖聖祖克成先志永綏兆民功崇德溥纍洽重熙勝於成周我皇上歸功聖祖蓋本於世而後仁之義然非皇上以聖承聖覲光揚烈恩澤覃敷民飲其和天歆其治應感之符必不若是速也且周之盛時雖宅豐作洛撫有千八百國而幅員尚小孰若我皇清東至于海南盡交趾西屆哈密北之七十四部籝齎槖負致誠貢獻者嵗嵗不絶自京邑大都以至山村僻壤耕鑿順則各勤所業武夫戰卒有老不識兵戈者由斯以談天之眷我皇清於周有加焉記曰聖王在上天不愛道地不愛寶人不愛情考之今時洵合其語天子猶謙謙自牧敬德弗遑修我人事撫我蒸黎方將上溯堯舜欽明文思溫恭允塞之德中考湯武表正萬邦敬勝義勝之徽以措諸政令以為萬載規敬迓天庥永永無極敢敬擇其符之顯奕者有九各繫以詞以效頌祝之忱云爾合璧連珠昊天有命眷我皇清奄有九有暨乎八紘以養以恬灝灝和寧曰惟聖祖文思欽明皇帝纘之濬哲丕承天鑒孔昭厥符惟禎自古在昔黃帝握歷璧合珠聫昭哉藝極旃蒙之嵗單閼之月聿見嘉祥其祥長發宿躔營室位在娵訾雙璧輪囷五珠迤邐星臺告瑞太史書呈帝曰休哉惟皇考實膺爰陳於詞爰告於陵有謙其躬有讓其𠂻惟皇孝思格乎蒼穹豈惟民哉屆於昆蟲黃河清銀漢煥光河精發祥九曲彌亘浩渺汪洋宿列崑崙流經積石匪澄伊黃浮天浴日曰既清止休符顯奕徐邳淮泗千里靜碧馮夷息浪河伯安瀾五老上告紫蓋繽翻滌而濯矣既清且泚漉其濁矣既迅且駛鏡流瀰瀰素波漣漣上映下徹天水相鮮疇克澄其源疇克致其然貺自蒼旻景福永綿以光我萬年孝陵神蓍景陵瑞芝煌煌神蓍奕奕靈芝百莖九光神物應期帝命東皇分植兩陵無節而秀不根而榮潤以仙露燦于寶城於皇世祖開物成務逺至邇安金甌鞏固皇帝敬承羮墻見慕齋戒神明建中飭度是用産蓍以應嘉祚於皇聖祖握符夀世育之以仁正之以義皇帝敬承同歸一致乃文乃武以葆以藝是用産芝以昭上瑞芝既蒼矣蓍既長矣貞符彰矣夀而臧矣暨萬邦矣嘉禾有猗者禾在彼中田爾農來思越陌度阡芟之奕奕柞之澤澤五榖既播三時無失載甲載坼載長載褎載穟載實載碩載茂帝實顧矣稷實助矣風披擭矣雨灌注矣綏我屢豐言呈其瑞休我皇風言多其穗逺自滇南近兆帝藉匪雙伊九匪寸伊尺先民有言食為民天百榖用成自古有年瑞繭帝念民依惟農與桑孰飢莫食孰寒莫裳雕鏤必黜爰勤三農纂組是省用紓女工旻天維顯聿降瑞繭瑞繭維何萬蠶同簇曽不經緯曽不杼柚苑窳致力西陵效勤神功默相嘉繭乃成爾純爾素匪紅匪紫爾質爾實匪錦匪綺言徴其應言發其祥祐此蒸民成以報章太平之澤五十衣帛夏凊冬溫太和充溢甘露奕奕吳都沃壤甫甫有苖有禾有絲有紵其農于田侯主侯旅其賈于市侯笑侯語維時之泰飲帝之和含哺以嬉渥澤孔多上天錫瑞降兹甘露零我吳都佑我休祚其凝如脂其甘如飴湛湛瀼瀼如珠之垂曰既零止天下寧止曰既溥止萬邦安止以兆嘉祥降福孔穰醴泉坤元載物厚德安貞孕祉育祥乃效厥靈有醴者泉載甘載旨莫尋其源載清載泚惟泉之功養而不窮我皇之心濬哲宏通惟泉之㵼流膏潤下我皇之澤物無遺者惟泉之源用之日新我皇基命浩浩淵淵惟泉之發挹之不竭我皇虛已聞言若決在易井六勿幕元吉勞民勸相中正作繘闕里慶雲巍巍宣聖上律下襲祖述憲章斯文舄奕我皇膺命心契聖時以養以教作君作師爰新闕里慶雲式煥糾兮縵縵郁兮爛爛乃映杏壇乃覆檜幹金枝蓊鬱玉葉璀璨惟帝之誠致雲之卿以彰我文明以賁我太平房山鳯凰四靈之一厥惟鳯凰感我聖化遊我帝鄉帝鄉之南聿有房山雍雍喈喈來集其巔亦集爰止惟皇之祉藹藹吉人維君子使六象其體六府是修九苞其文九夷來柔明明上天鑒我帝德朝陽叶應文明萬國贊十臣贊張子房卓彼留侯家世相韓嬴殄韓宗心瘁力殫東得力士擊之博浪匿遊下邳受書圯上乃得其傳乃遇其主謂沛公英仁是殆天所與帷幄運籌千里決勝魚水之歡諫從言聼既遂其志亦遁而肥優遊赤松煙水鴟夷眄彼渭濱同歸一轍渺矣風清泠乎氷潔諸葛武侯南陽之藪有龍而蟠金玉其音碩人之寬昭烈下賢三顧彌虔風雲蒸變乃出其淵東聘吳都綸巾羽扇嶪嶪樓船煌煌火焰摧曹和孫克定益州乃集其勢乃成其謀白帝託孤實肩巨任盡瘁鞠躬王臣之藎七擒六出八陳千井集思廣益淡泊寧靜察變以明動物以誠姦回丕革宫府肅清諸葛大名星輝雲爛惟公一身存亡繫漢髙伯恭渤海之疆篤生偉人元氣所蒸厚德無垠元伯夙譽陽平早庸清平自守讞獄惟公乃抗雷霆乃蹈虎尾尤恐兹心負翟黑子忘身濟物卒感主明數千人命賴以全生才本於學知發於仁敦仁力學品乃大醇黃中內潤文明外照百齡純嘏六朝光耀魏鄭公隋失厥政豪傑並爭孰驅而除孰創以成有唐文皇龍凖日角杜斷房謀偉哉降嶽九有同軌仁義施治爰有鄭公鹽梅之器繩糾謬愆獻納忠讜安國利人浩然盛養屢陳直諫事君以誠十思十漸防患未萌維山巖巖維松植植猗歟鄭公古之遺直郭汾陽河之曲賊厲其屬矯矯汾陽疾馳搴其纛藁之城淪於思明皤皤汾陽偏師挫其萌乃搴乃挫祿山喪謀卒帥虎臣克復神州滅安殱史旋定河中吐蕃夜潰代宗復國繄惟公之功招之即來麾之即去往説葛羅仗此忠恕靈耀衛幣承嗣拜使朝恩歎為長者懷恩麾下亦愧從於不義惟誠感物惟明保身孰克當此維公之云陸宣公維山有玉惟璞藏之既斫其璞不圭璋之維水有珠惟蚌孳之既剖其蚌卒棄置之卓哉宣公明珠美玉施之不窮守之彌篤弱齡侍從歌詩宴遊興元戡難乃展厥猷獻納論思興利除害舉直錯枉靖內安外曽史之行管樂之才經綸奏列不待安排事急則需事緩則舍德宗猜刻庸主以下君用則行君舍則藏宣公忠藎邦家之光維公一言自知甚確不負天子不負所學韓魏公奕奕相州維天之中孕祉育靈間氣所鍾爰生魏公金堅玉潤相厥明時輔成景運弱冠登第聿見嘉祥雲輝日下五色呈光大材不器小用亦效西夏寒心兩宫諧孝齊范駕富宏展經綸臨事決疑正笏垂紳皎皎易汙嶢嶢易缺維公德量山崇海濶材既軼世學亦通方光輝事業燦爛文章肫然而仁毅然而醇猗歟魏公古之名臣范文正公嶽嶽希文學修行淑本仁祖義正直明肅陶鑄人材心宏誨育成兩大儒橫渠明復公之心事天光日照諌垣氣凛西夏威耀進憂退憂江湖廊廟天章論對十事聿陳長沙之策敬輿之文參政九月譖毁交聞志未大展千載經綸公有至性內行克敦周友恤族率祖率親義田之舉大惠宏仁有宋人物公尤彪炳維雲之卿維星之景司馬溫公仁英繼統韓富當朝諧孝兩宫伊韓之勞爰有溫公維持左右直斥守忠議禮匡救熙寧元豐新法聿行惟公上言辨之甚明宣仁臨朝自外召之爰立作相心乎好之維士與民萬口如一僉曰休哉相我君實既遇其時亦伸其志有猷有為補偏救弊惟公一生悉本於誠言可對人達於生平德化遐宣膏澤普沐於何見之社祭尸祝耶律文正公一代之興必有偉才元室肇造公實鹽梅幼齡質異長究儒宗律歷術數靡不精通誠以事君公以律已糾謬繩愆救惡將美育才舉士立法垂猷元政之成維公之謀均稅均科慎選守牧不去君旁國用充足懼法之涼錫民以福懇欵陳忠為百姓哭有元諸臣公為賢相允如公言治天下匠針虛受針天地之心普物而發聖人之情順事而達其情其心無彼無此厥故維何惟虛而已矧兹下學亟宜自勉胡不虛已以受萬善天賦以性我受此中五常百行善量無窮黽勉終身猶懼有闕矧其自足善心斯遏告我以過乃我之師訑訑聲色誰則我規捨已之非從人之是如圜斯轉如影斯徙曷虛爾中曰克爾已爾不克已自滿則圮相彼溝澮雨集則潰過而不留其涸可待瞻彼渤海浩浩浮天厥惟不滿克納百川既虛而虛復實而實允為中孚豚魚皆吉銘樂善堂銘秉彛惟民氣具理存聖愚曷異善惡是分其善維何仁義忠信知誘物化遂亡其正惟危惟微人欲天理操之則存舍則已矣曷惟其操是曰樂善動靜弗違斯須弗間我既受中我則蹈之我有秉彛我則好之聞人之善我則友之非徒友之又克有之雞鳴而起孳孳不已至樂因心其味孔旨樂正好善鄒孟稱優東平樂善厥德允修嗚呼念哉善可樂哉樂而不倦天性其培誠能好之萬福之根反是則殆衆禍之門爰作斯銘服之無斁朝斯夕斯果行育德御製樂善堂全集定本卷十
