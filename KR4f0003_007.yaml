  text: 欽定四庫全書御製樂善堂全集定本卷三
  hash: sha256:8e108a02a11a8d7dd49983bab266f361289fb3ef2b4dd19672e579832ecfc1da
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0003_WYG_007-1a, image: WYG1300/WYG1300-0301c.png}
body:
  text: 論愛親者不敢惡於人敬親者不敢慢於人論書曰立愛惟親立敬惟長始于家邦終于四海古昔聖王之治天下也修孝悌忠信於一家之中老吾老以及人之老幼吾幼以及人之幼然後化周天下而風俗醇美故書之稱堯曰九族既睦平章百姓詩之美文王曰刑于寡妻至于兄弟以御于家邦聖帝明王之致治保邦惟推此心以及天下親親而仁民仁民而愛物舍是無他也孝經所謂愛親者不敢惡於人敬親者不敢慢於人蓋孔子教治天下者以大孝也夫人君以天下養其親豈非大孝哉然非徒養之又必以得其歡心為貴而欲得親之歡心則在愛之敬之而已矣雖然徒愛其親而惡於人徒敬其親而慢於人未足為孝也必上而愛親問安視食欲其身之康強而無他也則推而以及在下之民皆欲其豐衣足食以享太平之業內而敬其親視於無形聼於無聲欲其親之歡心而無間也則推而以及在外之臣工皆敬之以禮而弗敢狎侮夫如是則可謂能推已以及人不惡於人而人亦不惡矣不慢於人而人亦不慢矣愛敬之道尚有大於斯者乎蓋愛敬者仁義之用也愛親敬親者推施之本也盡愛敬之道而由近以及逺所謂以不容己之心行不容己之事得乎其本焉故也否則不愛其親而愛他人者謂之悖德不敬其親而敬他人者謂之悖禮彼薄於所親而於人貌為愛敬則所謂傷禮敗倫之大又可謂之不惡於人不慢於人乎夫子推言其本而大其施是在君人者推此誠心以及於萬類焉斯已矣以仁育萬物以義正萬民論天以隂陽五行化生萬物陽以生之隂以成之生仁也成義也陽以時出布施於上以主嵗功隂入伏於下而時出佐陽是以陽開隂闔春溫秋肅而萬物生生不息於乾覆坤載之中此天地之大用也聖人法天而立道輔相天地之宜以左右民亦必仁義兼施德禮相維然後能致大順大化以成參天地贊化育之功故通書曰以仁育萬物以義正萬民以見聖人與天道無二也蓋古昔聖王制治保邦其養民也為之分田樹畜五畝之宅樹之以桑使之饑饉有備祁寒有禦網罟佃漁以取山澤之利衣服宫室以安其體舟楫服牛乘馬以逸其身仁以育之者至矣又恐養而不教則近於禽獸於是制庠序學校以教之使知父子有親君臣有義夫婦有别長幼有序朋友有信有不率教者為鄉遂寄棘之法以糾之為嘉石圜土之罰以懲之終不移而後附於刑其以義正之者又如此於時之民泯知識而順則者遍於作息耕鑿之倫被聲教而暨訖者届乎東西朔南之逺是以黎民於變而教化大行不然者仁育而不義正則民即於慆淫義正而不仁育則民苦其嚴急二者本相資以為用也後世人君施一二善政於民曰此仁育也然其實惠於民何有焉甚者以刑殘民以罰困民曰此義正也則民反受其毒而生靈苦病矣故仁育義正君人者治世之大本位天地育萬物皆由是以達之耳為萬世開太平論夫天下和平萬世永賴者以聖教之昭大道之行可以垂之於天下後世也去聖久逺道喪文衰故民有相爭相怨之弊士有偷惰苟安之習無奮然而起以拯天下之溺開萬世之業者惟賴聖王盡己之性以盡人之性明明德以新民使天下禮明樂備雍雍然於光天化日之中為千載之規範然後謂之貽厥孫謀萬世永賴可也蓋民受天地之中以生仁義禮智咸備於我首萬物而最靈惟溺於私欲無明善復性之功故尊卑上下智愚賢否強弱衆寡不能秩然而受範然其本心之良未嘗盡泯聖賢者興因其固有之良而施其禮樂刑政之法聚之於庠序學校董之以孝友睦姻使民咸歸於善大道燦然於天壤雖有後聖者出不易斯道此張子所謂為萬世開太平也然其所以開太平者亦不過窮理克己修此身以治人而已是故堯舜禹湯文武周公衍道統之傳有敬德勤民之功孔子孟子雖不得用於時亦修道明倫垂世立教其為天下後世計至深逺也彼管商申韓之學徒以刻薄詐僞之私陷溺天下後世之人心而已太平之開尚何望哉張子謂為天地立心為生民立命為往聖繼絶學為萬世開太平目雖有四其理則一而已耳何則天地之心即所謂大哉乾元生物之心也人能體天地生物之心去私以行健仁心以愛民斯亦開萬世之太平也為民立命即教養之謂也苟能養之有道教之有法禮樂刑政平中明允而可以為千載法斯亦開萬世之太平也繼往聖之絶學即道統之所由以傳也果能修身體道闡精一執中克己復禮之學以紹先聖之微言開後來之志士斯亦開萬世之太平也故曰其事雖殊其理則一也有志於聖賢者當用直內方外之功知行並進使體立而用行德崇而業廣則所謂開萬世之太平者當不為虛語矣動亦定靜亦定論天地之大德曰生終萬物始萬物而萬物莫不生長收藏之各得其時然其所以大生而廣生者亦曰易簡而已矣聖人體天以治其心以修其道以合體用而貫顯微然其所以聰明而時乂者亦曰定性而已矣定性者豈不思一事不慮一物兀若槁木而已哉動亦定靜亦定乃其所以為定性也善乎易之咸九四曰貞吉悔亡憧憧往來朋從爾思貞者定也定則吉而悔亡矣憧憧往來者不定也不定則朋從爾思朋從爾思凶可知矣程子亦曰天地之常以其心普萬物而無心聖人之常以其情順萬事而無情無心無情者非無心無情也無私心無溺情也惟無私心故心普萬物無溺情故情順萬事非動亦定靜亦定之謂乎君子之學廓然而大公靜之定也物來而順應動之定也靜定故主一無適虛明洞徹而內邪無自而生動定故順理而行措施咸當而用志不紛於外內外兼修本末俱備入聖之功豈外是哉治天下在得人論夫人君受天明命表正萬邦必當使天下熙皥治登上理澤被蒼生仁及庶物然一人之聰明有限堯舜之聖猶待臯䕫稷契之輔以亮天工而熙庶績况未及乎堯舜而可不以用人為急乎古之聖王自公卿大夫以至百執事皆稱其任賢者在位能者在職故天下治而華夏安百姓樂業風俗淳厚惟其用得其人而已歷觀三代以下願治之君必求賢良之臣故漢髙祖之興漢有張良蕭何故也光武之復漢有鄧禹馬援故也唐太宗之興唐有房杜王魏故也宋太祖之興宋有曹彬趙普故也即繼世之君使天下富厚治幾三代者如漢之文帝則有周勃申屠嘉宋之仁宗則有韓范富歐陽故當時大治後世頌聖而人君亦享其安康詩曰濟濟多士文王以寧書曰惟后非賢不乂苟人君知用賢為貴上焉者待以師傅之禮隆其體貌推以誠心聼其謀猷専其職任俾有以行其道而盡其才雖中才之人亦待之以禮朂之以誠使之黽勉以任百執事之職則天下有何不治而政事有何不舉者乎若曰用賢非難而得賢為難則是自畫矣夫以人主之勢心之所嚮天下景從雖珍禽異獸逺方難致之物外國絶域之所生心苟欲致之亦可以致也况賢人君子未出寰中也其心亦未嘗絶世也而獨以為難不亦惑乎今夫為巨室必求工師雕璞玉必使玉人焉有治天下而不求賢才是何異夫却行而求前乎使人君好賢之心若渴聚天下之英才任以朝政信之無疑又使各以其所識舉之朝廷如是則天下之賢咸登用於朝大臣有臯䕫之風牧民有龔黃之績庶司小吏各稱其職百僚師師中外相維雖有一二小人苟容於朝亦如裴矩之佞於隋當太宗之時則化而為敢言者矣由此觀之人君一用賢而其效如此彼昏庸之君妬賢嫉能親小人而逺君子者其亦惑之甚矣孔子曰去讒逺色賤貨而貴德所以勸賢也蓋賢人君子正己不屈若人君聼讒君子將救禍之不暇又何能盡其謀猷乎近色則心昏貴貨則志鄙尚能用君子之言乎君子亦將飄然而逺去矣此又用人之最要而人君不可不知者也傅說論昔在髙宗舊勞於外爰知小人之依舊學甘盤乃切求賢之意用能恭默思道帝賚良弼而嘉靖殷邦論者謂髙宗素知傅說假以夢寐乃聖人之神道設教耳夫髙宗苟知說可相矣以人君之力何難於擢用而為此詭詐之行哉誠以精誠通於神明純一不二與天無間故夢寐之間帝賚之以良弼亦如舜之見堯於羮墻文王之卜得吕望孔子之夢周公此皆非機心巧術之所能為乃聖人至誠感通之妙道也說以版築之人一朝履相位左右殷宗首以從繩從諫進說用能啓沃王心納誨輔德迹其交勉之言皆經世綜物之要克副鹽梅舟楫之任君臣相得益彰豈不堪與帝廷之賡歌比隆哉或謂君奭之篇稱武丁甘盤而不及傅說者何也蓋成就君德則盤先於說綏民治世則說多於盤且周公推本髙宗求賢之美而歸其功於甘盤耳至若招俊乂而列庶位暨海邦而仰皇風紹乃辟於先王對天子之休命則舍說孰克當其任哉周平王東遷論夫武王營洛邑使周公居之以監殷頑民非有意於遷也卜居九鼎以象天下之中以撫殷民而已其後平王遷居洛邑而周室遂微雖未即亡然終以不振矣故蘇子瞻曰周之失計未有如東遷之謬信哉是言蓋王都者本也本搖而末安者未之有也今平王舍其本而求其末欲求其安其可得乎詩曰古公亶父來朝走馬說者謂古公遷岐而興周當是時太王一小侯耳迫於狄難不得已遷岐以立國也盤庚之遷復殷之舊也迫於河患非捐所有以與人也今夫有盜賊之患者必隆其牆焉防其户焉斯盜無由而入矣未有一遇盜而棄其宅者也平王之東遷也一遇盜而遂棄其宅者也棄其宅而求安此平王之所以謬也羿浞之亂也少康能興之厲王之中衰也宣王能興之是皆不棄其舊物而有所恃以為安者也東遷之後諸侯不朝政歸盟主雖有天子之名而無天子之權非平王之過其誰之過哉故曰周之失計未有如東遷之謬者也宋襄公論夫修內者王修外者霸湯武行仁義而王天下齊桓假仁義而霸天下修內者本於心物來則應事畢則止修外者以一人之智力應天下之萬事故一日少懈而智力窮焉此齊桓之所以九合諸侯一匡天下功盛業熾而終不免於意滿心怠身沒國危何則修外而不修內也若宋襄者內不修德外不修政至愚而可嗤至陋而可憫者也夫齊桓用管仲而信任之城邢救許存衛圖伯之日如是其勤也協比諸侯輯寧東夏垂二十年內外無患然後問包茅之不貢而楚受盟定伯之功如是其難也而宋襄欲以頃刻霸天下甫納孝公而謂霸統在已矣邾曹來㑹而謂諸侯歸已矣至於用鄫子執滕子圍曹邑其暴虐無道已甚矣而欲求諸侯於楚不求之已而求之人盂之㑹執之自楚薄之㑹釋之自楚辱亦甚矣為宋襄者當修己睦鄰養威植德以圖後舉而不自量力伐鄭致楚泓之戰猶狃於迂論以為不鼓不成列不禽二毛身傷而死亦可憫矣夫襄公無所樹立而列於五霸之中諸儒多論其愚謬而不言其所以霸及其所以敗者余嘗考之左氏傳宋襄公之為世子也讓國於目夷目夷不肯既即位以目夷為仁使為左師以聼政於是宋治則知宋之所以治與其所以霸及其所以敗皆由目夷之用與不用也使目夷聼政而信任之則宋治用鄫子目夷常諫矣圍曺盟鹿上伐鄭目夷皆諫矣而皆不聼於是前有被執之辱後有身死之恥由是觀之用一賢而一國治失一賢而一國亂不惟國亂身且死焉豈不可鑒也哉桓公用管仲而霸文公用子犯而霸秦穆用百里奚而霸楚莊用孫叔敖而霸宋襄始用子魚而霸後不聼其言而死霸天下者猶當以用賢納諫為急則欲行王道而正身以正天下者豈可不以用賢納諫為急乎晉悼公論自晉文倡霸後之子孫世嗣其業然靈成景厲四公之時楚勢漸張晉霸不振靈公政墮柄分無抗霸業之志成公力弱事淺無霸諸侯之權景公心勞謀舛無馭天下之略厲公外彊中乾無服人心之道至於悼公乃能以幼冲振霸略其入國也施舍己責逮鰥寡振廢滯匡乏困救災患禁淫慝薄賦斂宥罪戾莭器用時用民欲無犯時以定國本其圖霸也舉不失職官不易方爵不踰德師不陵正旅不逼師以靖內而撫外忠厚而不迫堅忍而持重有長慮却顧之思無逞志快意之舉是以無滅談滅遂執曺衛之失而諸侯從之不令而來豈非霸業之盛方之桓文為己過哉然稱霸者獨許桓文為盛而不言晉悼者豈其蕭魚之後霸業遂衰大夫用事之故歟且不討孫林父寧殖之惡而盟之以定衛剽則桓文必不若是也豈非中行偃貽之患哉蓋其始之盛也以用知罃其後之衰也以用中行偃用知罃則討宋魚石九合諸侯服鄭弱楚而悼公亦清明而無失政用中行偃則伐秦遷延不討衛賊悼公亦怠終而不振余故表而出之以明君天下者必自擇相始宋伯姬論春秋乃聖人經世立教之書忠臣孝子義士莭婦之事未嘗不大書特書屢書而不一書所以奬人為善之意深矣故紀宋二姬屢見於經豈非以守節不渝貞義昭著足以為天下婦人之軌範乎然紀叔姬之守義善終又未若宋伯姬之遇災而守莭不渝之難也其處變不改其常遇災不失其志實足以為天下後世之標準也今夫安居無事之日自許其身為賢聖不以死生患難動其心者豈鮮也哉及事變之猝至橫禍之突加失其志易其心者多矣男子猶然况婦人乎而伯姬年至六十火炎其宅必待傅姆之畢至其心以為越義求生不若守義而死遂逮於火巍乎泰山不足以為髙暴虎馮河不足以為勇若伯姬可謂大勇矣是以聖人筆之於經以戒後世之處變者此義若行天下豈復有亂臣賊子哉伯姬非特天下婦人之軌範亦天下男子之軌範也御製樂善堂全集定本卷三
