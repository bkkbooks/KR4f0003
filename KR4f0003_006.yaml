front:
  text: 欽定四庫全書御製樂善堂全集定本卷二
  hash: sha256:2cf8554156a68850ee34294d46965ee993043f63b5c3b9fab0582547650b90bb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0003_WYG_006-1a, image: WYG1300/WYG1300-0296a.png}
body:
  text: 論嘉言罔攸伏論人君表正萬邦富有四海萬幾庶政日陳於前誠有所不至明有所不周差之毫釐謬以千里古先哲王之眀目達聰咨嶽咨牧者亦期嘉言之罔攸伏而已蓋天下之智有不同而天下之理無一定故恃一人之智以為智不若兼千百人之智以為智人君雖明足以照萬邦燭萬事然天下千百人之智又何能盡兼萬事之至賾至動參錯不齊者又何能盡明所賴人臣陳善閉邪補衮職之所闕使嘉言讜論日聞於前然後明微燭隱政無不通而明無不照然人臣之能盡言者由人君有以啓之耳苟人君孜孜黽勉樂受盡言則人臣亦何惜而不言哉故大禹之祗承于帝曰后克艱厥后臣克艱厥臣帝之答禹曰允若兹嘉言罔攸伏君難其位而好聼正言臣難其位而思盡正言此野之所以無遺賢而萬邦咸寧也夫君如舜臣如禹而一時君臣之所共勉者惟在各艱其位而受盡言舜又不敢當以為惟帝時克則後世之欲圗治者舍是豈有二道哉三代以降推漢文帝唐太宗宋仁宗為令主然文帝仁厚儉約有餘而一時無大儒骨鯁之臣宋仁宗有韓范富歐諸臣而不能盡其用惟唐太宗以英武明智之資得房杜王魏為之臣終日陳言繩愆糾謬太宗屈已從之貞觀之風逺過於文帝仁宗者職此之由由是觀之納諌聼言顧不亟哉桀紂幽厲始皇之亡也其時之嘉言無聞焉豈果無嘉言之臣哉龍逄有嘉言而桀殺之比干有嘉言而紂殺之厲王設監謗之巫始皇有妖言之禁夫舜禹君臣兢兢焉惟恐嘉言之伏而此數君者方遏之絶之又從而罪之欲其不亡豈可得乎尚論者所以遊心於都俞吁咈之世也有言逆于汝心必求諸道論人君以一身撫馭天下臣民之衆雖有聰明睿智之才而耳目所不及思慮所未周則或壅蔽不明必賴忠正之臣讜言之士明辨事理之是非以啓其聰而開其蔽然後正心以正朝廷而天下皆化於正雖其言之逆心亦求諸道而已矣今夫草茅巗穴布衣韋帶之士白首窮經服膺聖學將以興治教於天下效忠悃於吾君凡天下之事知無不言言無不盡雖履尾批鱗而不顧如是者固有猷有為有守之純臣也然不可常見也吾觀古來之臣欲言數事而進對之際十去其七八者多矣非天威咫尺難於盡言乎然猶不可多得也人君出一言而百諾承之行一事而爭先頌之諂諛之日進佞巧之日精其心惟在持富貴保寵榮於天下之治亂安危固不存於心也人君何賴焉故為人君者當納諌求言其言而逆於心者必察其𠂻情求諸正道而虛心以受之鋭志以從之如是則嘉言正議日聞於耳而於天下之事理臣工之賢佞民情之疾苦風俗之厚薄明若秉燭易如指掌以之出治理民何難之有哉即以太甲一身論之不惠阿衡之時伊尹作書以告矣而王維庸罔念聞是逆於心而不求諸道也是以有永圗之戒既克終允德而復位則惟伊尹之言是聽是逆於心而求諸道也是以為守成之令主不求諸道則亂求諸道則治聽言者當知所鑒矣夙夜基命宥密論周自后稷公劉太王積德纍仁至於文武而新天命撫有四海然繼續其先明以承前業者則又成王之宏深靜密之德有以夙夜基天之命也蓋王者受天命以臨天下其所以潛通帝載儼然若臨者固無時而間也然不宏則體有虧不深則用易竭不靜則不能定性以立極不密則不能使沖漠之中萬象森然畢具故宏深靜密則寬裕而有容粹精而不雜宏深者乾道變化各正性命陽之德也靜密者坤厚載物德合無疆隂之德也合是二德而夙夜無怠以承之非至德其孰能若是乎不顯亦臨無斁亦保者文王也我其夙夜畏天之威者武王也夙夜基命宥密者成王也其畏天保命則一也是以文武以之得天下成王以之守成命延祚八百子孫永賴豈不宜哉春王正月論春秋為尊王之書始自隱公不曰王春正月而曰春王正月者其意深矣蓋春者天之所為也正者王之所為也欲王者奉若天時諸侯上遵王法示大始而欲正本也是故以春生之氣貫四時以王者之命正諸侯以正月之月統一嵗王者所行必上本於天不承天以制號令則無法故以春居王之首諸侯不尊天王則無正故以王居正月之首政者正也政莫先於正始故以正月為一嵗之首所以教後之王者上承天以制法度下建極以制諸侯則政行而教舉矣至於體元調元之説既失之穿鑿胡氏行夏時之説雖以伊訓證之而夫子乃從周者况春秋所書春正月無氷春二月無氷若用夏正則無氷不足為異矣冬十月隕霜殺菽若夏之冬則不應尚有菽矣周之改月改時何待論哉晉荀林父帥師及楚子戰于邲晉師敗績論夫戰而言及主乎是戰者也春秋善救困晉師之為邲之役也為救鄭也救鄭而春秋不書又不言楚晉戰于邲而使晉主之以罪晉者何也陳人弒君而晉不討春楚子圍鄭晉又不能速救以至鄭與楚平至夏六月而後使林父帥師救之斯緩矣故救鄭不書責緩也至於林父之罪則在不能制馭其屬畏失屬亡師之罪從韓厥分惡之言知難而冒進是棄其師也而又鼓于中軍首為棄甲曵兵之舉故後誅先縠不去其官此稱敗績特以林父主之所以著其失權惶惑敗衆亡師之罪也晉侯及楚子鄭伯戰于鄢陵楚子鄭師敗績論稱及以戰者志乎戰者也君傷則不言師敗績者君重於師也是故鄢陵之戰書晉侯及椘子戰主乎晉也書楚子敗而不言師君重於師也鄭伯伯也序於楚子之下者凡戰先主兵者椘主兵而鄭從之也稱師以敗者君無傷則師為重也而抑椘子罪鄭伯幸晉勝之義一舉而備矣蓋自齊桓沒後椘勢方張橫行列國憑陵諸夏若非晉文城濮之一勝則楚害有不可勝言者晉文沒而楚復盛自荀林父邲之敗楚之陵駕尤甚十三國盟蜀儼然主列國之盟晉之靈成景公屏息而不敢動至厲公乃能一敗之於鄢陵可謂幸矣不然者楚將倚鄭為援長驅中原周之宗祀其幾不為荆蠻所滅乎然文公自城濮之勝主臣一心用垂霸業厲公勝於鄢陵而遽自驕縱以殞其身以是知范文子之言可謂逺慮君子也作三軍論周自平王東遷政令不行禮樂征伐自諸侯出于是朝覲之禮廢尊王之典衰而會盟征伐一歸霸主順者安之逆者伐之王綱陵夷而天下之事不可為矣魯自隱公至於襄公凡九世而襄公之世三家始専政所謂自諸侯出十世希不失者也三家之専政始於作三軍三軍者魯先公之受於天子者也魯頌曰公車千乘公徒三萬則三軍為魯之舊明矣而云作者蓋魯已廢三軍為二軍至是忽以私家之乘補公室之伍而為三軍聖人謹書其作毁而季氏險戾無君之罪畢著矣蓋季氏専魯已數世至於宿而遂懷竊國之心故乘襄公幼弱託於增兵備敵而作三軍三分魯地而十二分其民季氏得四叔氏得二孟氏得一而歸其五於公以事大國徴師承貢則季氏沛然有餘而公室用多二家力少其勢不得不毁又顯令於國中入季者無征入公室者倍征則二家之民屬公室者如陷坑阱急思自脫故一旦盡奪之公民咸順焉而公莫可如何也方作三軍時公年始十三故叔孫雖知其不可而不敢固爭至於毁之則四分魯國之地與民季氏得二二子各一不獨君若贅疣而二子亦不得不屬服於季氏矣其毁中軍亦乘昭公初立叔孫身死家亂而急奪焉故余嘗謂宿之隂鷙狡譎乃萬世亂臣竊國之渠魁而三軍之作毁則田氏篡齊三卿分晉之前轍也故特發其義以補先儒所未備云三月公會晉侯宋公衛侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于溴梁戊寅大夫盟論自平王東遷王室卑微諸侯放肆會盟征伐一歸伯主而政在諸侯矣及其末也大夫擅權政歸私室會盟約誓出自諸侯轉不能保其無寒出自大夫則可必其守信此溴梁之盟所以遍刺天下之大夫也孔子曰天下無道則禮樂征伐自諸侯出又曰天下有道則政不在大夫凡所以傷周之衰陵夷至於諸侯專政又陵夷至於政歸大夫風愈下而俗愈卑天下之事不可為矣故溴梁之會諸侯皆在大夫主盟聖人謹書之以為諸侯相盟已非正矣而又至於大夫専盟使君若贅疣焉則人心安有不亂世道安有不衰者乎自此之後晉移於六卿魯入於三家齊權屬崔髙衛權歸孫寧皆溴梁之會有以啓之也故曰溴梁之會大夫不臣也諸侯同盟于平邱公不與盟論春秋為本國諱臣子之於君父理當然也然內屈外直則諱之外屈內直雖受辱不諱也曷為不諱人以無禮加之適足以見彼之無禮耳故黑壤之會公不與盟則諱之屈在公也平邱之會公不與盟則不諱屈在晉也同不與盟而一諱一不諱焉聖人之意可見矣蓋平邱之會德則不競矜兵甲之威以肆脅持之術非若黑壤之正也受邾莒之譛而不見公非若彼不相朝聘公實有罪也是則晉恃兵力貪財賄而以無禮加兄弟之國於魯何有焉且王臣無下盟之禮公不與盟正可以免盟王臣之罪耳况平邱之會晉之甲車四千乘徒欲示威於衆至自言雖以無道行之必可畏也而終不能禁煩言之嘖嘖方之桓文衣裳之會蓋亦末矣晉之君臣乃施施然安於不競無憤恥自強之志而齊人不盟鄭人爭承叔向皆以辨給幸而勝之晉伯之不振自是而益甚矣御製樂善堂全集定本卷二
