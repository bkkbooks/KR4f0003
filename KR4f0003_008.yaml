  text: 欽定四庫全書御製樂善堂全集定本卷四
  hash: sha256:da4168792b5ab8e233e5a8614192d5ef30ba84be623e0de0900d22b435972851
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0003_WYG_008-1a, image: WYG1300/WYG1300-0309a.png}
body:
  text: 論漢武帝論世之論武帝者以為窮奢極欲好兵黷武與秦皇無異貶之矣然余則以為猶有可嘉焉何也人莫難於知過莫難於悔過莫甚難於改過武帝即位以來內多欲而外施仁義繁刑重斂崇尚方術內侈宫室外伐四夷中外疲敝逺近困乏實無以異於秦皇而秦皇身死國危為天下笑武帝歿後稱為世宗上配太祖子孫承之厯數世者豈非輪臺悔禍之功哉蓋武帝英眀之主其向之所為者固溺於一時之私而不自知及其翻然改過旋乾轉坤視昔之所為恍如二人非英俊眀智其能如是乎至於興太學舉孝亷修祭祀改正朔定歷數協音律考禮儀則又有功於後世者雖然與其知過而能改孰若無過之為全哉况天子一時之過即天下無窮之害也使武帝而無前非加之以休養生息用賢進能雖古之賢君亦何以過哉漢元帝論自古亡國之君或失於剛暴或失於柔懦剛暴者其亡速柔懦者其亡緩亡速者一知其將危而濟之以寬和猶或可救於末路亡緩者日甚一日淪胥以漸雖有賢者亦無以善其後矣故剛暴之亡國也或聚斂誅戮之已甚衆叛親離而祖宗之德澤未泯身雖亡而國祚有不絶者焉柔懦者或權臣或國戚或宦寺或女謁大權一失威福下移身雖苟安於一時而至子孫未有不亡者是柔懦之亡國又甚於剛暴也元帝之失失於柔懦當即位之初蕭望之劉更生周堪張猛皆正人也使元帝早能英斷收攬乾綱誅殛恭顯為國除害豈不與宣帝比隆哉顧乃信宦寺之讒望之死而更生廢堪貶黜而猛自殺望之之死僅得恭顯輩免冠一謝而已小人亦何所憚而不為哉雖質本仁柔性好儒學貢薛韋匡迭為丞相然所謂仁柔乃姑息之愛婦寺之仁也所謂好儒乃徒事文墨嫺典故之儒而非篤學守道直節不阿憂國忘身之儒也漢業之衰不自元帝始哉吾故因元帝而備論剛暴與柔懦之失著於萹韓淮隂背水陳破趙論兵以正合以竒勝所謂出竒無窮者乃由謀審志决雖外見危形而實立於不敗之地若韓信背水之陳是也蓋以數萬烏合之衆深入逺鬬以當二十萬守險待敵之兵若以正合必無幸矣信謂驅市人而戰之非置之死地則皆走其自審可謂眀然使置之死地而無必勝之道是以其卒與敵也故以精騎二千伏趙營側然後誘趙以背水之陳趙方以信為失計故空壁而出而二千赤幟已入趙壁矣既背水為陳以固士卒之志又伏其營以乘其隙趙人果空壁而出而營拔於漢動其本矣還顧則本既動搖以戰則我有固志奮死之卒彼軍雖多亦無如之何矣所謂謀審志决外見危形而實立於不敗之地也白起自言其破楚敗魏潰韓乃計地利軍勢自然之理不足為神與信之破趙參觀則知兵法之竒變皆握必勝之謀知己知彼而非嘗試以徼幸眀矣西漢總論自秦失其鹿海內擾亂英雄羣起以爭天下項羽滅秦以暴易暴而髙祖用賢任能豁達大度平定海內卒踐帝祚傳之子孫為三代以下享國長久之首雖天命有歸亦髙祖之英眀足以為開創之賢主也觀其以張良為謀主以蕭何為相以韓信為將而終以滅楚豈非知人善任之眀驗乎獨即位之後刻薄少恩有功之臣鮮能全者雖帝之失亦諸臣之身無兢兢於當世之禁云惠帝天資仁厚乃遭吕后之虐耽於酒色以自戕其身若無周陳之忠宗藩之强則漢室之祚幾何不為吕氏所竊哉文帝入繼正統寬仁恭儉愛民務本身衣弋綈帷帳無文繡約已師儉為天下先南越自立以德懷之丐奴入盜令邉備守専務以德化民培養漢祚帝有力焉景帝遵父之政與民休息亦稱小康然聽鼂錯之言遽削七國又怵七國之强而殺鼂錯周亞夫以方正功臣被殺則景帝不無少恩之譏云武帝內多欲而外施仁義窮兵黷武疲民弊國宫室苑囿盤逰怠敖神仙方術開疆擴土凡害民之政無不行焉獨其崇儒重道求賢納諌為可稱耳孝昭以幼冲之年辨霍光之忠可謂眀矣使天假之年得儒學名臣為之輔則周之成康不是過也宣帝起於閭巷知稼穯之艱難褒賞名吏信賞必罰官稱其職民安其業可謂賢矣然好刑名而雜霸道趙蓋韓楊之死為纍多矣至於元帝優遊不斷賢望之堪猛而不能用惡𢎞恭石顯而不能退漢業之衰始起自帝孝成荒於酒色委政王氏哀平短祚王莾乘勢遂篡漢位夫自古國家有盛必有衰理勢之必然也然所以亡其國者亦在人君之自取耳使元帝不任恭顯成帝不任外戚剛眀以蒞政則漢祚之傳孰絶之哉天不祚漢遭漢中微國統三絶而孝元皇后以夀考為之宗主使新莽得肆其姦慝以成篡盜之禍幸而文景之化在人百姓未忘漢故光武起而天下響應遂成中興以是知人主朝乾夕惕愛民培國不敢少遑者所以上承祖宗之重下植子孫之福豈特一時稱賢君而已哉漢光武論自古中興賢主夏有少康周有宣王漢有光武尚矣考其所以興皆由英眀大度用賢任能寬以愛民仁以撫下天下歸心用復舊業豈非天順民歸受命而帝者乎當王莽之亂也漢家宗室幾絶廢斥王侯以翦漢祀城邑為墟邱隴發掘其禍甚於羿浞之亂奔彘之辱而光武乃以布衣仗義奮袂大呼天下響應鄧禹馮異寇恂耿弇吳漢輩皆一時之傑光武得而用之用平赤眉張步之亂成隴蜀之功戡亂誅暴平定海內卒踐帝祚功烈不讓於少康周宣矣及天下平定口不言兵尊儒重道褒賞循吏西域遣子入侍却之不受又非好大喜功者比而保全功臣恩昭九族則又逺勝於髙祖可謂賢矣是以培養東漢二百年之祚眀章繼之休養生息至於靈獻董曺之亂甚於王莽而建安之位號依然豈非光武垂教立則有以培其風俗庇其子孫哉石勒絀光而尊髙非尊髙也彼蓋見夫當時若項籍淮隂輩咸勇智絶倫髙祖皆得而蕩滅臣伏之故不得不俯首北面光武仁心厚德與勒異趨亦豈勒所能窺測哉曺子建之論漢二祖卓識閎議信百世所莫易也李固杜喬論東漢自光武眀章孜孜學術培養氣節故雖數傳稍衰矣而袁安楊震何敞朱穆張綱傅燮諸君子皆靖共正直臨患難死生而不易其摻若李固杜喬者尤疾風徑草之卓然傑出者也蓋梁冀擅廢立之權利於幼弱二公與胡廣趙戒共爭之既而廣戒順冀而二公之志終不可移爭而不得繼之以死其為漢室忠矣夫權奸之欲擅國柄也必害其忠直不撓不與己合之大臣以震其餘梁冀之於李杜是也彼以為此人一去則在上之勢孤在下之望絶其餘皆軟靡易制貪位苟祿之人耳後世奸臣多效其為而人君咸不悟焉卒之一身孤立於上而左右前後皆彼之人豈不可哀也哉漢末忠臣李杜並稱者三李雲杜衆李膺杜密是也要當以固喬為冠東漢總論自王莽篡漢處非所據敗禮亂度以文奸言毒流華夏民不聊生由是人心思漢光武起於南陽撥亂反正平定海內克承丕業較之少康周宣中興之盛用力尤難成功尤大及即帝位守之以文興學校選亷能尚風化敦士行西域遣子入侍拒之不納方之漢武開邉致釁相去逺矣不任功臣以吏事使得終享福祿又逺過於髙祖之少恩獨廢郭后殺韓歆為盛德之纍眀帝以英睿之資加以好學重道親臨辟雍尊桓榮李躬為更老所以勸賢勵能崇尚聖教者至矣而友愛東海王則又常棣匪他之意始終無間也章帝寬厚長者愛民務本休養生息尊信東平王用第五倫為相而天下以治和帝幼冲嗣位行政無失能用鄭衆五人以誅竇憲然宦寺之禍基於此矣殤帝早世安帝庸昏順帝賴常侍之力以得反正外戚之禍息而常侍之亂起其後梁冀用事冲帝短祚質帝中毒桓帝有可為之幾而不能自强外有强臣內有常侍正士廢斥賄賂公行逮及靈帝黨錮之禍益烈獻帝猶寄生之君而漢祚移矣夫西漢以文帝培養元氣入民之深故光武起而民心歸之東漢光武眀章皆令主也愛養元元培壅國本亦未嘗不善也乃自和帝以後外戚常侍相繼而作羅天下之賢才置之網罟陷阱之中如是而民心不離天下不亡者鮮矣然董曹肆虐守臣位者二十餘年昭烈繼統延漢祚者四十餘載豈非祖宗培養氣節之餘烈乎開國承家貽厥孫謀者當知所尚矣蜀漢興亡論漢自桓靈以來王道中絶奸權乘釁曹操孫權公孫瓉袁紹迭起窺伺名器而昭烈以王室之胄懷忠義之志抱雄傑之才欲恢復天下掃除大憝然歸於陶謙依於公孫瓉寄居於袁紹為客於荆州其間遭危困被禍亂不可枚舉而英雄不得用其武狼狽奔走幾二十年既得孔眀於是待以股肱寄以心膂用其計謀而得荆州諸郡之地有涪城成都之險以成鼎足之勢然終不能克復天下僅得一州者固緣曹孫盛强立國既固不能卒滅亦以不専於圖魏忿兵伐吳之所致也使如趙雲所言居河渭上流以伐逆寇漢事未必無成卒至大敗於猇亭威挫勢蹙是亦昭烈之失矣延及後主信用孔眀成都大治守父之餘烈保土安疆七擒之威六出之鋭敵國畏之如虎逮孔眀歿黃皓陳祗用事殄民誤國而漢祚告終嗟夫治亂之理豈非係於人君之用賢與不用賢哉當昭烈之狼狽奔走以未得孔眀故也後主之克守前烈為敵國所畏者以孔眀在相位故也其用黃皓陳祗而喪國敗家者以孔眀既歿故也賢人為國家之寶豈不信哉東吳總論自劉氏中衰孫堅據江左之地虎視中原子䇿繼之與周瑜相友收合士大夫江淮之間人咸向之善於用人濶達有度弟權因之用賢納諌周瑜魯肅張昭顧雍陸遜皆被擢用於是成鼎足之勢開有吳之基兵强將勇敵國畏之曺操智計殊絶於人而大敗於赤壁曺丕纍興大衆臨江而阻蓋以英雄布列內外共展䇿力故也延及亮休物盛而衰禍亂內作孫綝小人為亂於內然亦外無邉患政無大闕降及孫皓苛刻用刑肆虐日甚任既非其人刑復非其辜使黔首有倒懸之苦而吳隨以亡雖有忠臣死節之士亦復奚救是故王濬之才非如曺操之雄也王濬所統未如八十萬之衆也而赤壁之戰孫權以之興石頭之戰孫皓以之亡者豈戰守之道險阻之利有異於往時哉劉禪以昏而亡皓以虐而亡天厭之矣於魏晉乎何尤東晉總論晉自賈后亂朝八王迭起劉石交亂中原人民塗炭元帝據江左之地繼而中興是時有王𨗳周顗為之謀卞壼顧榮賀循之徒分掌庶政祖逖劉琨各擁雄兵使元帝果有恢復之志親統荆吳之衆興除暴之師速誅劉石克清天下則晉業永安六合為一而乃遷延日月苟圖偏安識者於是知晉業之不復振矣及其晚年復有王敦之亂以致懷恨而崩眀帝少而聰敏躬殄大憝然歷年不久君子惜之逮及成帝內有蘇峻之亂賴溫嶠陶侃卞壺忠勤為國社稷無虞然勤儉愛民亦當世之令主也康帝享國日淺國家無事及至穆帝外有桓溫之跋扈哀帝短祚至帝奕遂為桓溫所廢晉氏之政於此遂衰簡文孝武孝安數帝不過庸庸無為尸位於上而已而內多粃政權奸數出至恭帝而司馬氏之天下改而為劉氏之天下矣嗟夫創業難而守成亦不易惟在人君用賢納諌則天下自安而國家永固晉氏君臣崇尚浮虛無用之詞風俗既薄天下澆然故王敦蘇峻桓溫王恭殷仲堪輩迭起為亂向非王導溫嶠陶侃謝安數君子則晉幾乎不國矣况能轉危為安光復舊業哉國勢之振莫過於劉裕之時裕不忠誠為國而思篡盜君子所為三歎也北魏世祖拓跋燾論北魏自拓跋圭以來國富兵强政和民安逮及世祖藉二世之資奮英雄之志南侵北討東征西伐使魏國地廣兵强者大抵皆其功也雖好尚異端壇受符籙是其所失然能聽髙允之言又從而美之尊祀孔子祭以太牢令公卿子弟入學徴世胄遺逸亦駸駸乎令主矣獨功業不終卒有宗愛之禍蓋亦平日任術好殺所致如悉誅境內沙門不太苛乎伐宋之後河南赤土無遺歸燕巢於林木不已酷乎吁天道好還可不戒哉御製樂善堂全集定本卷四
