  - {type: page-break, offset: 0, content: '', id: KR4f0003_WYG_018-1a, image: WYG1300/WYG1300-0398a.png}
body:
  text: 古體詩古風十五首天地有至德健順運萬善陰陽迭往來寒暑互流轉大生而廣生疇能體其撰根柢祗一誠神功何易簡羲皇初畫卦猶以結繩治後聖繼心傳法夬興書契豈徒充簡編即是傳道器君看六經中言言道仁義有苖蠢弗率大禹爰徂征三旬猶逆命豈云無甲兵伯益贊讜言感神由至誠惟昔號旻日克諧致蒸蒸文德既誕敷逺人亦來庭動物物不動今古無其情髙宗求良弼簡在通夢寐傅巗版築人一朝履髙位和羮作鹽梅朝夕資納誨阿衡豈專美嘉靖殷邦治惟此恭默思尚賢天所賜隆冬無溽暑盛夏無祁寒寒暑協太和往來相推遷蚩蚩彼衆氓努力籌逢年我當惜寸陰黽勉期前賢泰山不讓土河海不擇流為學亦如此取益在廣求見惡當自戒見善期自修三人有吾師近取乃日休孟山何岧嶤有獸曰騶虞賦性本仁慈舉趾惜蘼蕪終為王者瑞見乃盛世符南山有猛虎食肉如食芻饞嗜飽腹腸何論有無辜一朝獵者至咄嗟喪其軀仁殘天道顯視此何所殊銅鑑正衣冠人鑑别善惡人苦不自知針規已病藥疑事莫蓍揲疑謀莫龜灼但聼善人言萬事免乖錯秋聲何瀟灑翏翏刁刁然吹萬忽奔騰千里淡雲烟振羽階下蟲吟風樹上蟬物類本無情菀枯感變遷謾說蓬瀛洲居住不老仙三山阻且遙荒唐徒爾傳我有不老藥不用求金丹清心與寡欲可以延長年嗟彼名利人營營凋朱顔郭公解布榖王孫能促織區區禽與蟲因時亦有識人生性本靈充然備五德私利一薰蒸靈臺因窒塞譬彼瑶臺月忽被蟾蜍蝕克已萬理明處事乃不惑春風二三月花嶼爭芬芳出門踏青人車馬沸如狂芳甸布綺席繡陌遺琳琅幽蘭在空谷詎肯生道旁地僻人莫賞誰識王者香我來採盈把歸植讀書堂同遊不同趣對爾聊徜徉平原昔聚客毛遂乃下列備數入强楚碌碌何分别一朝脫頴出厯階騁辨說手招十九人從約自此决䇿士且垂名矧乃匡時傑燕昭用樂毅連下七十城惠王信反間全功一旦傾齊威察毁譽左右計不行烹阿封即墨戰勝在朝廷外間與內間一伺主疑乘所以為政者去讒心乃明屈原沉汨羅孤忠光日表賈誼過長沙臨流抒懷抱楚懷本庸昏漢文稱有道胡為志未伸悲歌賦鵩鳥絳灌豈子蘭洛陽英鋭早龍門作合傳孰謂善品藻鳯凰鳴崑邱惟食琳與琅九苞耀竒彩天宇恣翺翔豈比藩籬雀卑棲飽稻粱達人豈自枉鄙夫巧趨蹌尚父年八十猶自釣渭陽一朝遇西伯殊績展鷹揚是知賢路闢斯為邦家光新竹新笋已成竹檀欒影簾箔風翻翡翠林露灑琅玕籜猶然婉孌姿已具堅貞格蕭踈戞寒玉歷落吹竽籥長房漫騎龍公輸寧飛鵲撫摩留仙人棲托遲鸞鶴梁園幾萬箇盛事今寂寞森森階砌前添我興寥廓烟凝翠欲流枝篠紛參錯莫謂無姸華嵗寒猶可託海子行圍同聞之蔡先生五弟讀杜子美秋興詩分韻得肉字秋曉獵平原露重林如沐歸來息離宫繞砌開黃菊豈以漫遊荒往籍閒披讀維昔天寶初楊李竊威福道旁有餓殍朱門饜粱肉漁陽鼙鼓來驚破霓裳曲杜老時隨征殷憂積誠篤傷心秋興詩令我勞往復硬語蟠虬松蒼渾神味足錦江波浪愁巫山眉黛蹙何如屈問天空同賈賦鵩遙遙千載心文囿仰芳躅關山月玉門關外秋風清玉門關上秋月明戍兒歸卜刀鐶鳴離家見月幾虧盈天河淨洗兵不用早晚可得酒泉封燕頷將軍飛食肉每同甘苦均寒凍遙憶千家砧杵聲舊衣未解新衣送舉頭皓魄又重圓邊笳四面方吹動題李白太山觀日圖限韻供奉沉香亭遣調若鐘銑意在諷色荒不獨詞華擅五嶽峙胸中磈礧難消遣長嘯登太山日觀峯當面東望滄溟洲坳堂杯水轉陽烏浴未乾魚龍乘曼衍扶桑已三竿猶不聞雞犬遐觀小宇宙形勢天下選咫尺大羅天天帝端衮冕叩閽謁通明從容陪玉輦醉踏青芙蓉豈以佯狂免騎龍恣天遊白雲共舒展帝女賜錦裳聞說冰蠶繭長鯨不復回竒傳類詭辨何人寫丹青壁上裊香篆披時泰嶽雄收處滄波卷即此當卧遊悠然興不淺喜雨四言詩明明上天照臨有赫至誠克應無感弗格穆穆我皇乾惕朝夕鍳在帝心九有是宅皇帝膺籙丕顯丕承洋溢暨訖被乎八紘民安其居物樂其生爾耕爾桑以成以平瞻仰昊天昭回雲漢未曰如焚亦云微旱帝心用憂徹懸減膳亦保亦臨曰明曰旦有頒其絲有降其綸訪自三公延及百臣式陳爾言庶禆我身用沛恩施以答蒼旻有曀其陰有虩其雷雲既油然雨亦沛哉曰霑而濡曰滋而培自我京畿遍乎九垓民鼓其腹榖潤於田溝澮潺潺沃壤㳙㳙匪以灌而鮮匪以溉而妍聖帝是䖍致雨澤是宣雨而暘矣澤則洋矣遍農桑矣碩且長矣萬斯倉矣供明堂矣祝無疆矣讀昌黎集建安騁駢儷斯文體一變俳優務悅人靡軟風相扇自此八代間羣言紛汗漫起衰昌黎公鋭然負謗訕刓僞還淳古籍湜愧流汗渤海收衆瀾斗建失星爛尊聖衛藩籬幟樹先登岸因文道以見一語千秋贊銅鼓歌雍正庚戌秋九月廣西撫臣金鉷進銅鼓一云民間墾田所得名諸葛鼓相傳諸葛亮以鼓鎮蠻云因歌以紀之赤帝失御火不燔冠以苴履翻坤乾靖王後裔英且賢慨然奮義振中原南陽之藪卧龍蟠下車三顧意何䖍龍飛雲路見在田君臣相得魚水歡東使吳會騁辨言八十萬衆成灰烟西入益州奠本根鼎足峙立固且完永安宫裡龍髯攀調和宫府整而間命師南指定獞頑七擒七縱服諸蠻鑄銅成鼓永鎮旃風雨侵蝕年復年數易時代陵谷遷下巢蚯蚓鄰黃泉照臨無復資魄淵濡潤還沾雨露偏崇鼎貫鼎增斕斑獨於厚地全其天由來竒物終播宣一朝光氣騰荒阡施厥畚鍤瓦礫翻有聲鞺鞳非絲絃宛然銅鼓形不刓洗剔苔蘚光澤鮮驚看老幼何喧闐大吏表進九重前為陳檀案撒包氊聚觀羣下充庭軒試加擊伐聲啍啍大鵬搏風長鯨噴上有四蛤狰獰蹲旁有雙耳綬色緼龜文虬篆隱隱存覆之黃縑加束純方今舜目闢四門兩間並獻貞符繁不誇寶鼎出河汾詎數劔氣冲斗躔我聞置鼓召諫臣訪察民隱牧元元此應其兆無乃然坐見讜議日聯翩鏞鐘大叩張宫縣讀貞觀政要薰風何習習朱明屆長候北窗髙卧起洛誦勤時懋貞觀政要編覽罷再三復文皇治世功在漢文景右斗米值三錢太倉粟腐臭關東暨嶺南開門夜無寇論古緬遐思治功非幸覯文貞立朝端彌縫而匡救九重亦虛已勤政夜繼晝勵精圖至治俗用臻富厚二十餘年間中外稱明后徴沒明鑑昏志滿漸差謬東征無成功幸能自引咎復碑念前規厚賜撫其後猶不負初心終身無罅漏信順立丕基尚賢天所祐先哲留嘉謨後人當勉就傅修期昔有韜鈐士投筆願從戎終生美少年請纓志甚雄讀書貴有用躍馬馳邊烽所在戰必克豈是虛譽崇偉哉傅修期卓然儒將宗擊賊萬人前掃筆三軍中勇力駭豺狼流文貫星虹非云尚血氣詎是工雕蟲小戎賦良人溫然美玉同讀史撫青編芳蹤千古隆公莫舞歌昔人有公莫舞歌道項伯翼蔽漢王也然但言漢王有天命未及項王不聼范增之言及增不知幾而事項故歌以補之刳牛割猩殪封豕羞鉶實豆堆盈几錦繡筵開藏壁壘𠂻甲宋盟無乃是亞父腰下玦三視項莊劍氣寒如水公莫舞兮行且止以身為衛拂衣起增卻顧兮良色喜隆準果是真天子怒撞玉斗亦徒爾同雲集霰已如此蠲租樂擬樂府勾芒布令土脈濡荷犁早向東阡趨男耕婦織閒時無料理粟帛供正需食毛敢辭王稅乎春回蔀屋大澤敷小吏旁午捱門呼竊疑督賦驚農夫却宣王命傳蠲租傳蠲租蠲租樂新絲繅後新榖登换取金錢娛老弱黃石授書智勇非深沉難言天下事稍挫便拂顔斯為杯缶器留侯不世才佐漢膺重寄當其圯上遊與衆了不異何來一老翁猝然命納屣三進不為羞深折少年氣所授是何書乃擅帷幄議當時林隱人踪跡略竒祕郤令榖城石受祀永不替讀司馬溫公諫院題名記豐碑聳立高尋尺銀鈎鐡畫生光澤纍纍若若同時榮莫混賢奸一片石天風凜烈護剛堅表列平生勝竹帛他年元祐鈎黨臣義形石工傳安民豈知後世翻寶愛幾與諫院題名鄰君不見山可礪兮河可帶桑田滄海還相代此名一留不復敗芝蘭曲芝蘭者芝花如蘭非芝與蘭也見陸象山集碧空星耀明離離下映瓊圃三華芝玉英綽約如蘭猗幽姿特藉五雲竒九光攢簇寶蓋垂珊瑚玉樹紛葳蕤畝畹之間斂葱蒨國香得並芝房薦瑶草琪葩種獨擅採上彤廷露華泫髙其佩指頭畫廬山瀑布廬山髙髙插天瀑布千尺飛其顛擘開玉峽白龍走空濛萬古生雲烟七十老翁戲作此不用霜豪用十指丈山尺樹都不論壁間倣佛流寒水觀穫秋聲入園林凉風動髙閣偶出步郊坰斜陽照墟落眄彼隴畝間黃雲堆漠漠錢鏄已早庤銍艾聲參錯畦東與畦西是處竟秋穫手刈賽疾遲背負爭强弱遺秉與滯穗寡婦亦云樂吾聞四民中惟農苦莫若有年榖價低歉年委溝壑即今豐稔收租重主人索益信為政者仁民最先著擁爐讀書歌首山之銅出天然何人鎔冶精雕鐫鏤蟠刻螭無斧鑿天吳紫鳯紛騰鶱巋然不共桑海變萇𢎞血色生新鮮嗟豫好古忽得此寶之不啻珊瑚鞭豐隆布雲青女降凌空裁玉落地繁飄風弗弗起天末千里萬里沉寒烟有懷趙衰苦莫遇博山獨擁紅炭然溫懷續續吐暖氣性根理窟資探源我有會心非獨樂常思衣被天下大小無號寒暖研歌陰凝北陸寒風多燕山雪片紛相摩山積皓素池停波翔陽隱光倐忽過指頭冰凍真無那我方臨窗事研究空齊賞玩煩磋磨縱有翠濤端石可奈何呼童為添暖研火更濟之水隂陽和寒熱均調融墨氣安置几上平不頗浮光含潤露精彩佐我終日之吟哦抒長句歌暖研君不見當時此法無人傳乃令嬪妃呵筆於便殿臘八日索饗大蠟伊耆始夏曰嘉平殷清祀周家蠟禮舉嵗終文武之道均張弛秦復夏名緣祈仙權輿定臘實劉氏蠟八相沿訛臘八八日號臘何所指當年飲粥成風俗果糜雜和期相侈或傳此日浴佛節阿誰能辨非與是嵗在庚戌月己丑羲娥丸轉窮次紀哉生明後後五日作粥吾亦聊爾爾松榛棗栗杏胡桃黍稷粱豆堆纍纍水火既濟入鼎烹聲㵼松風萬壑起便啜數碗潤詩腸侑以新句加綺靡明窗靜賞送流年不隨獵騎平原裏自鳴鐘扶桑日出海門紅大秦西洋揚景風懸撞度索底貢同於皇聲教敷天通梯航山海來朝宗厥獻竒物自鳴鐘銅輪鐡絃凡幾重機軸循環運其中應時滴響聲舂容挈壺無所施其功精巧絶倫疑鬼工倕班流汗難追踪異哉兹物無始終周歷晝夜春與冬懸置几上勝金鏞晚報日昳曉嵎東我聞寶賢寶物雖不同咸賔亦足效球共考時定律佐三農此鐘之利貽無窮題宋宣和清明上河圖用駱賔王帝京篇韻大禹敷水土導河過龍門漭泱萬里間卓為羣瀆尊流經積石走函谷東過洛汭繞甸服土中自古稱洛都襟帶山河雄地軸維昔宣和全盛時寒食初過一百六淡烟輕雨清明天踏青嵗嵗侈華屋華屋朱樓金闕隈千門萬户天邊開飛花香滿宜春苑稱觴獻壽柏梁臺珮響千官入山呼萬乘來簮裾艷文藻雲漢儼昭回梯航萬里至輻輳日中市綺縠揚衯裶連袂如雲起栁陰暗沙堤花光明御水寶蓋蔡京車髙牙童貫里中樞甲第起崇墉相國髙堂列鼓鐘道君禮樂三千盛孱國山川百二重春入上林迎旭日雲開水殿躍飛龍龍樓鳯閣相輝映山城鼓吹春遊盛春逰處處多貴臣青驄駉駉車鄰鄰明月樓中邀上客紫薇花下宴嘉賔滿堂珠履珍羞錯從容欵曲金蘭親斜陽返照天欲暮汴水橋邊車馬度橋邊街市何喧闐萬貨千商夾道路路旁桃李紛芳菲逰人雜遝白馬肥朝催玉勒花間去暮拂金鞭栁岸歸頗厭錦繡服新裁白紵衣劇孟風未峻郭解力猶微五陵擅游俠戚里相因依平生但言慿義氣捨身許友未覺非郊畿靄靄帶晴雲稻田桑圃望中分村墟景象多幽趣㸃綴蚩蚩忘帝勳婦子嬉無節長幼略無文常樂升平烽火息霸陵閒却故將軍栁堤逰客艤船待一棹輕移山勢改嫣紅粉白夾岸矯蘭橈畫舫中流在中流競渡各紛馳渡口魚磯疊石為更有一川風景别身在蓬萊自不知蓬萊宫殿何繁華瑤島瓊臺入座賒仙人爐煉長生藥羽客丹成九轉砂靈素作安期遺我棗如瓜驅山走海丹青變筆底烟雲紙上見神思妙藝出清新偶然展軸驚萬人巧贍奪天工結構含精氣逺過顧虎頭不數陸仙尉仇子此卷何為哉燕雀嬉嬉畫裏來驅鄰自召强鄰侮繁華侈泰禍之媒牛車俯首受縛去冰天雪窖嗟徘徊即今歌舞地花發為誰開空留遺跡在慿弔費詩才題戴天瑞指畫山水圖玻璃貯碧無涯津田田荷葉出水新草堂坐對清埃塵忘機養得鶴性馴瀟灑更有松與筠逺峯掃黛青嶙峋有客有客來訪頻髙山流水無俗緣苔徑曲轉過栁樊主人不用迎出門筆墨渲染古來聞指頭蘸墨見此人吁嗟絶藝工且神一指乃能探其元無因得悟天龍禪新蟬今年天氣炎五月新蟬噪初聼聲尚澀漸覺羣喧閙飲露抱髙枝臨風曵長調傍晚響愈繁先秋未免躁榆枋恣往還决起安所好未能萬里遊且共鷽鳩笑御製樂善堂全集定本卷十四
