front:
  text: 庚戌年原序余生九年始讀書十有四嵗學屬文今年二十矣其間朝夕從事者四書五經性理綱目大學衍義古文淵鑑等書講論至再至三顧質魯識昧日取先聖賢所言者以内治其身心又以身心所得者措之於文均之有未逮也日課論一篇間以詩歌雜文雖不敢為竒辭詭論以自外於經傳儒先之要㫖然古人所云文以載道者内返竊深慚恧毎自思念受皇父深恩時聆訓誨至諄且詳又為之擇賢師傅以受業觧惑切磋琢磨從容於藏修息游之中得以厭飫詩書之味而窮理之未至克已之未力性情涵養之未醇中夜以思惕然而懼用是擇取庚戌秋九月以前七年所作者十之三四畧次其先後序論書記雜文詩賦分為十有四巻置在案頭便於改正且孔子不云乎言顧行行顧言書曰非知之艱行之惟艱常取余所言者以自檢所行倘有不能自省克以至於言行不相顧能知而不能行余愧不滋甚乎哉
