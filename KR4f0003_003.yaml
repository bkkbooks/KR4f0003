body:
  text: 六經之教皆以明仁義中正之道而感發人之善心也降及子史必依於經義足以備勸懲輔教化然後為後世所誦法故唐宋諸文家自言所學必原於六經仁義之㫖然則樂善不倦固敦行之要而亦發為文章之根柢與雍正十年冬皇四子以所為樂善堂文鈔示余而屬為之序發而觀之經旬涉月猶不能窮其奥美也其義理一本於五經四子而折衷於宋儒之言其文之意度詩之風格按以古人成法無毫釐分寸之不合而毎至忠孝友悌言之尤肫誠而愷切足以感發人之善心葢皇子之文乃樂善不倦之誠之積於中而發於外者也我皇上聖德天縱以仁義中正之道陶冶一世而皇子親承諭教近仰儀型朝夕觀感浃於耳目心志之間者尤深且切而又篤志好古深思力探於古聖賢人之言而近體諸身故發為文章充實光輝而不可揜如此乃皇子且自以為未足自序之文猶曰彚而成帙置之案左以便改正即文之不敢自是而望道之切可知矣又曰常取所言以自檢所行懼言行之不相顧也則進德之誠可見矣此古聖賢人樂善不倦之實功也余淺見寡聞不足以發揚皇子之文而區區之誠所欲効於皇子者惟是檢身之嚴宻見於自序之文者永矢而勿渝焉斯已矣雍正十年冬月穀旦和碩莊親王允禄序文以載道道之體於身者為德而發於言者為文故韓子論文曰行之乎仁義之途㳺之乎詩書之源又曰仁義之人其言藹如孝弟者仁義之實道德之根源也皇四子幼侍聖祖仁皇帝特荷慈眷朝夕訓誨且見我皇上視膳問安致愛致敬無事不與往聖同揆至性薫陶耳目濡染由是體諸身心發於言動者不待模擬自成方圓夫聖經賢傳所以勤勤亹亹牖翼萬世其道無他父子君臣之大倫而已皇子性資樂善於道德仁義之根源既得之聖祖之漸涵復申以皇上之諭教而又切磋於師友研極於詩書早夜孜孜日新其德故發為文章左右逢源與道大適衡以古作者之法中規中矩不失扶寸而事關人紀言之尤懇切而周詳使讀者忠孝友恭之心油然而生夫自古文人學士有一言之㡬於道其文必逾逺而存况皇子之實體於身而藹然溢於言外者乎皇子夙以樂善名堂因以標文集即此見平日心力之所注而所以為文之根源具在於是矣壬子八月以序屬余反覆尋繹深慶皇子之德業日進加益而自忘其學之膚言之不文也於是乎書和碩果親王允禮序我聖祖仁皇帝燕翼詒謀盡善盡美皇上純孝天亶當居藩邸時先意承志尤得聖祖歡心康熈六十一年爰命皇四子寳親王入侍内廷以示寵異是時王年方舞勺而予齒亦埒相對甚歡及皇上紹膺大寳余以冲年特承恩命忝封貝子晉封貝勒自顧無寸長足録惟以恭謹慎自檢束遂䝉恩眷每入覲皇上時遇王輙承奨許把握深談大有乳水之合癸丑夏月出所著樂善堂文鈔見示余為荘誦一過見其論記文序賦頌詩歌無體不備約數萬言因為舌橋不下作而言曰古謂立德立功立言為三不朽在古人非欲岐之也太上不易得得其次亦可以不朽矣而衡以聖賢之道則德其所内藴耳著之而為功宣之而為言莫不皆備於一身則三而一者也今王以樂善署其堂而復以名其集葢善即德也德備而功與言隨之如水之有本木之有根其條達流行有不期然而然者然而混混湯湯觀瀾而知其本也刁刁調調攬葉而知其根也則欲測王之德與功者又何不可於其言觀之哉今為取其文而讀之於其藹以和者見仁之德焉嚴以毅者見義之德焉暢情而不繁洞物而非察堅確而不移者見禮智信之德焉夫渾而名之之謂善得之於己之謂德王之樂善王之取善也葢善無窮而取善之心孳孳矻矻日有積而月有累故其發而為言得心應手自有行乎其所當行止乎其所當止之致斯其藴之也深而養之也素矣劉晝慎獨有曰枕善而居之不以視之不見而移其心聼之不聞而移其情也老子曰上善若水水利萬物而不争故㡬於道斯二説者可舉為王贈也夫文所以載道也言者心之聲也而非藴之養之則不足以資其本而培其根今王之樂善如此擴而充之於以優於天下而馴至於大舜之域其可涯量哉將見為德為功為言皆以一身備之裕如矣苟浮慕詞章徒以著述相引重又烏足以讀樂善堂之文哉雍正十一年癸丑五月上澣允禧序夫文所以載道也自漢唐宋明以來有道諸儒皆發為文辭以明聖賢之奥㫖作為詩歌以暢一已之襟懐令後世讀之者玩其詞繹其㫖稱揚傚法之恐後文之有功於後世豈淺鮮哉若夫稟頴異之姿而精研典籍日與賢師友稱先則古討論藏修弟之視兄雖所處則同而會心有淺深氣力有厚薄屬辭有工拙未敢同年而語也吾兄隨皇父在藩邸時朝夕共處寢食相同及皇祖見愛養育宫中恪慎温恭皇祖見之未嘗不喜皇父聞之未嘗不樂而乂念弟之在家不能常聚迹雖兩地心則相通吾兄純孝至悌可謂肫然無間矣及皇父尊居九五吾二人下帷讀書朝夕共處寢食相同者如舊同氣之歡豈語言文字所能盡載乎吾兄於問寝視膳之暇每有所得發為文詞日課文一首雖退居私室亦不敢自懈手披心繹欲力追古作者八年秋九月彚訂其序論詩賦雜文若干巻而命余序余曰載道之文真儒為之無實之文務名者為之務名者不求實得真儒則本之躬以見之言而可垂於後世今觀吾兄之文本平日所為講明踐履者積於中而發於外上不負皇父慎選天下英賢而教育之之心下不負十餘年窮經力學憤樂相尋之篤志處帝王之家居富貴之位書史所載未數數然也兄之樂善無窮而文思因以無盡凡古聖賢之微言大義修身體道之要經世宰物之方靡不發揮衍繹娓娓焉暢所欲言即至一吟一咏亦皆揚風扢雅温柔敦厚有合於三百篇之㫖豈揚華摛藻狥外忘内者所能髣髴其萬一哉又豈弟之淺識謭詞所能贊羙哉弟𢎞晝謹序文以足言而載道也内而極於天人性命之微顯而通於經綸事業禮俗百為之賾皆由根柢深厚詣極精微而後出之有原發之莫測所稱閎中肆外貫乎道而濟乎義臻於玉振金聲之羙葢徴聖垂文而作述以隆非偶然也彭弱齡猥䝉聖恩受讀内廷得侍皇四子朝夕講貫竊見皇四子問安視膳之餘耳目心思一用之於學考合古今徴論同異雖單詞隻義必條分縷析銖黍弗差毎為文筆不停綴千言立就而元思泉湧采翰雲生葢天資敦敏而又緝熈光明實為天人並臻其至者也積數年著作既富所裒樂善堂文鈔成彭盥濯讀之數過其研窮心性也則德成於天而明出自然微言探賾彌綸彛憲合心源道法一以貫之而無餘也其闡發經學也則深明博察探其奥而約其㫖糟秕羣言彪炳至義發前人所未及而開後學以津梁也至於史事有難評之迹千秋積未發之疑抉隐觧蔽往往出人意表葢舉治亂興衰之故是非得失之衡莫不包括隐顯變通會適標論立義足以超古而信今矣旁逮詩歌賦頌體製羙備寫天地之輝光琢元黄之麗藻雖組織辭令排比聲律然皆銜華佩實酌雅富言而非尋常之外飾雕艶所可擬於萬一者夫惟知之始能言之顧彭淺何能知高深之際而陳贊頌之言哉彭侍几席誦習之下每苦於室而難通也輙䝉片言提撕曠若發䝉而因端指示引繩授矩訓誨無倦所以培而植之者甚至顧以鈍質業不加修而識不加長受讀兹編所謂出有原而發莫測貫乎道而濟乎義者彭誠不足以知之惟畧陳梗概恭綴數言以為鼓吹休明之一助焉爾雍正十年嵗次壬子十月朔平郡王福彭謹序善者一心之主宰萬化之根原事理會歸之極則也然非實有所樂乎此則見之不真信之不篤而其發為文章著為事業者終不能篤實輝光可傳於後世皇四子寳親王性資純粹自幼為聖祖仁皇帝所篤愛特召育於宫中薫陶德教皇上切義方之訓廣延師保諮經稽史惟日孜孜所以培養德性恢閎學識者既厚且深矣爾泰以封疆之臣入㕘政事恭承恩命獲侍講筵竊見皇子動容出辭温肅之氣具備偶聆議論則窮本探原有經有緯未嘗不私慶皇子秉元善之德而誠心體道不獨文學迥出乎尋常也間出樂善堂文鈔若干巻以示開章二篇則曰立身以至誠為本讀書以明理為先此我皇上御書以訓勉皇子者而即首以命題所為念兹在兹以廸元德而會衆善者莫不基於此矣至於推闡經義尚論古人窮極事理辨析羣言實有特出之見超乎前賢思議之外其或敷揚功德吟咏性情可歌可誦使讀者忠孝悱惻之情油然而生葢皇子樂善之誠充積於中而英華外發有不知其然而然者昌黎韓愈所謂原於仁義而其言藹如者於是集見之矣竊考六籍所載言善者甚詳而樂善一語獨發之孟子與道性善稱堯舜之㫖更相表裏皇子誠由斯集而充之明善以誠身本之心而騐之事則精一危微之訓上接列聖之心傳者莫不於此會其極而世際昇平太和翔洽皥皥焉各相感於至善之中而可以被之賡歌垂之簡冊者其善為何如其樂又何如也鄂爾㤗謹序雍正元年皇上紹登大寳命廷玉隨侍皇四子皇五子講讀經書蚤夜趨承仰見我聖祖仁皇帝垂光錫祚舄奕綿洪我皇上敬承庭訓以裕後昆聖學相傳緝熈光大皇四子粹質天稟明敏博達而功力縝宻朝有課夕有程寒暑靡間有非專攻文學之儒所能希其萬一者自經史百家以及性理之閫奥詩賦之源流靡不博覽精擇講明而切究之每發一問立一義輙超出於思議之表而皆前人所未發覃心實學者之所宜辨析也含咀釀郁藴蓄富有時發抒其胸中所見著為論說詩賦諸體之作常不假思索一揮數千言立就清詞邃㫖首尾爛然數年來俱不下千餘篇皇子自加𨕖擇得如干首彚為一集以示廷玉廷玉受而循繹焉大抵意義淵深文采博贍而筆力之雄俊健㨗邁越等倫所闡明者聖賢之精藴宇宙之名理而所吐露者經籍之膏腴藝林之芳潤自昔以文章名家者莫能逮焉皇子之於文可謂才超而學邃矣抑尤願皇子之不以此自多也聞之文所以載道古聖賢修已治人明體達用之大要胥於是乎在匪直工其文詞以為觀羙也故曰非言之艱行之惟艱皇子以天授之才博通古今之學循循乎祗遹聖訓敬勤無斁誠於載籍之指要平日口誦心維者既能言之又允蹈之自此進德修業日新嵗益廷玉所樂得而揚其羙盛者詎有涯哉雍正八年嵗次庚戌仲冬月張廷玉謹序雍正元年我皇上紹登大寳特命朱軾侍皇子讀書時皇四子皇五子年甫十三嵗已熟讀詩書四子背誦不遺一字已乃精研易春秋戴氏禮宋儒性理諸書旁及通鑑綱目史漢八家之文莫不窮其㫖趣探其精藴由是發為文章實大聲宏彬彬乎登作者之堂矣雍正八年皇四子自訂其所作詩文為一集名曰樂善堂文鈔命軾為之序固陋如軾何足以知皇子之文伏念皇子以樂善顔其堂又以名其集讀者徒以文視文雖揚扢諷詠咨嗟歎賞烏足測斯編之涯涘乎凡人為一事而或作或輟者所樂不存焉耳皇子之於文窮年累月抽思探賾俛焉日有孜孜誠有味乎其言之矣然皇子之所樂者善也非文也如以文而已矣雖如宜僚之弄丸庖丁之觧牛得心應手亦徒虛車之飾耳於善乎何與哉樂善之説見於孟子所謂善者仁義忠信而已専言仁則為心之全德而義在其中兼體用而言則仁為體而義為用對忠信而言則仁義又為用而以忠信為之體苟存諸中者有一毫不忠不信求㡬於仁義可得乎易曰立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義陰陽剛柔之流行不息迭運不窮者誠也聖人之於仁義亦如是而已矣自聖人言之則為誠誠者天之道也自學者言之則為忠信忠信者思誠也人之道也思誠之功維何格致以啟其端克復以踐其實戒懼以立其本慎獨以謹其㡬循循於下學以漸㡬於上達久之而私欲潛消理與心融而樂生矣生則烏可已也烏可已則不知手之舞之足之蹈之天下娯心快志之事孰有過於此者乎欽惟聖祖仁皇帝德合乾坤功参化育我皇上欽明緝熈聖以繼聖本精一執中之心法發而為蕩平正直之皇猷萬方臣庶是訓是行矧皇子天稟純粹志氣清明晨夕侍奉之下其薫陶涵育於聖德聖訓者固已日新月盛莫知其然而然矣從此敬承無斁優游厭飫戒於思慮之未萌恭於事物之既接進德修業之功孰得而窺其所至哉軾嘗聞皇子之自言其文也曰詩歌賦古三百篇之流吾將以為山水以為樂音以養吾心焉耳㫖哉斯言凡知者之樂水仁者之樂山以及先儒樂觀天地生物氣象無往非善即無往非樂無往非樂即無往非養也書曰非知之艱行之惟艱夫無所得於中而强而行之則不勝其勞苟從事於窮理盡性而渙然有得亹亹不倦夫何難之有皇子勉之哉雍正九年辛亥十一月長至日朱軾謹序雍正八年夏六月廷錫䝉恩命得陪侍皇子講席竊見皇四子孜孜典學日就月將自五經四子儒先性命之精言以至史籍之紀載名人大家之文集靡不探索研究廣覽博辨務求理道之要歸事物之衡鑒文章篇什之榘度根柢融洽條貫浩然有得於中至討論服習之既久廼舉其所得者而見之文抒為論著形為歌詠大抵充實醇粹和平渾厚得天地中和之氣亹亹乎蓄之深而出之裕也所作積多彚次成帙題曰樂善堂文鈔命廷錫為之序昔文中子有言文必貫乎道學必濟乎義夫離道義而以為文鞶帨之工虛車之飾固君子所弗尚即援道以張其詞引義以暢其說薈萃經訓而祗以供文章之用是猶未免岐文與道而二之未得為文之至也二帝三王之道周公孔孟之傳見之貌言視聼日用動静之間施之禮樂政刑天下國家之大藴之為德行措之為事業無適而非道義之衍溢故其著於典謨垂於經傳精微廣博足以覺世牖民闡道立教而至文出焉朱子所謂有是實於中則必有是文於外其條理分明光輝發越而不可掩者非有所强而後能也仰惟聖祖仁皇帝神靈天縱聖學高深我皇上緝熙光明心傳相接羲軒堯舜之統緒近在庭闈皇子朝夕侍奉祗聆慈誨提命之所啟廸耳目之所濡染固已薫陶涵育於聖賢道義之中加以稽古居今考德問業味經史之膏腴擷典籍之芳潤宜其發而為文炳炳麟麟若是其盛也若夫體之身心騐之行事道義充粹於中而至文輝著於外則可以上嫓乎典謨經傳而與子朱子之言黙相符契又何文與道之岐而為二哉廷鍚因讀皇子之文敢敬繹其義為皇子誦焉蔣廷錫謹序我皇上至德廣運聖敬日躋丕顯丕承宏兹繼述經理萬物悉以我聖祖仁皇帝之所淵藴者發為久大之規啟佑後昆亦以我聖祖仁皇帝之所翼貽者著為纉承之羙覲光揚烈繼繼繩繩誠哉萬古之所獨隆者也諸皇子日承聖訓觀感最真莫不器識深厚德性温良勤敏問學不敢暇逸以故習復之餘遂多著述今皇四子自集其比年所得詩歌論賦選擇若干首為一集以示敏敏雒誦紬繹至再至三論著則機杼自出羅列萬象昔人所謂宏深淵博義理精到者何以加焉至詩歌諸體之作亦莫不畢臻其妙金相玉質和雅冲融求之近古實少倫比向非我皇上訓廸皇子之方實有承先啟後垂裕於無窮皇子之敬承聖教者實能親炙其光觀感而益善則奮筆抒詞之際何以洋洋灑灑邁百家而超倫類也哉夫言辭之中可以見道皇子之著述固已諸羙畢偹矣竊念自古聖賢之學非獨佔畢之為功葢將舉身心性命之理家國天下之故一一踐履而昭徹之夫而後發之事業者皆為有本之經綸著於文詞者亦皆親切而有味皇子其母以文之贍羙者為足多而尤以行之光輝者為可貴則修詞明道德藝交隆庶可不負我皇上之訓誨矣敏不勝區區期望之忱福敏謹序雍正元年世遠䝉恩特召入直内廷隨侍皇四子皇五子讀書相晨夕者九載於兹矣仰惟聖祖仁皇帝尊經典學久道化成我皇上聖以繼聖學貫天人萬邦作則凡所為詒謀燕翼建極以錫天下臣民之福者莫不是訓是行訓誨皇子尤為精詳愷摯皇子仁孝聰明遜志時敏自四子書五經性理綱目大學衍義諸書以及古文淵鑑名臣奏議之有關於學術治道者莫不講貫習復藴之為德行發之為文章不為雕飾藻繪之辭而皆有以合乎仁義中正之㫖八年秋九月皇四子自訂其前後所作論序雜文詩賦分為十四巻名曰樂善堂文鈔命世遠序之夫所謂善者在天則為元在人則為仁元者天地之心舉天下含生負氣靈蠢動植喙息之倫莫不有以若其性而資之以始仁者萬善之長愛恭宜别俯仰酬酢莫不由惻隐之心以發故在天曰元善由天而之人曰繼善賦之於人曰性善吾性高明廣大與天同體樂之者必至於浹洽暢遂烏可已而不自知然其要有三曰窮理曰克己曰虛心人倫物則之原未徹則好善之心不篤書曰惟精中庸曰明善言善否之介當精以决擇也然累於有我曷以克樂大學曰慎獨濓溪曰果而確言念之初生當謹持而充擴也己克則私去私去則心虛易大象曰君子以虛受人虛則誠誠則公公則人我之界胥忘咸之感以無心貴故曰天地萬物之情可見矣皇子以此内治其性情敦善行而不怠因之著為心聲情深而文明醇茂而雅則皇子勉之哉古之人無斁示我顯德行樂己性之善即樂天之善也樂人之善猶己之善也以名其集以裕諸心以措諸行若穀種之生生生而不息親之若芝蘭之臭聞之沛然若江河之决善孰大焉樂莫至焉徒文云乎哉雍正九年辛亥夏五端陽日蔡世遠謹序濓溪周子曰文所以載道也道無所不在而見之於文自天地之大至於品彚之細皆有以宣其義藴而發其精華垂之為經紀之為史所以明乎其大也著之為辭賦咏之為歌詩所以該乎其細也而兼綜條貫於其中者則莫非道也我朝列聖相承凝禧積慶毓秀之源既長且厚皇上睿智天成文思光被而庭闈之近所以垂慈育德者必諄諄於立誠明理之功焉皇四子以粹羙之姿仰承聖訓涵養深醇英華發越宜其施之簡墨者炳乎有光也基以淺學叠荷殊恩備員中秘洊歴臺垣今復得侍書皇子日近光儀而親講論皇子以所著樂善堂文鈔示基基受而讀之其氣象之崇宏則川渟嶽峙也其心胷之開濬則風發泉湧也其詞采之髙華則雲蒸霞蔚也其音韻之調諧則金和玉節也充實光輝包涵衆羙文也而進乎道矣抑周子有言聖人之道入乎耳存乎心藴之為德行行之為事業皇子循是而不已焉則尋流以溯源明體以達用凡仁義中正之規齊治均平之理體騐愈深發揮愈盛洋洋乎豈特為文章之大觀哉聖賢要道統㑹於斯德行事業殆將一以貫之矣雍正九年嵗次辛亥長至月邵基謹序文何昉乎自羲皇肇起卦圖虞書首陳謨典文明之運實由此開然尚書之文簡而該周易之文奇而法知非後人摹擬彷彿所可貌為形似者也至尼山輯為六經天下文章莫大於是郁郁之歎厥有由然此後踵事増華分門别派日易月遷而嵗不同矣若夫風雲月露草木禽魚觸境書懐因時寄興此逸士之文也鎔經鑄史含英咀華繡口錦心敲金戞玉此學士之文也割裂經傳摘取雅馴帖括自珍科名是競此舉子之文也遠追洙泗近師濓洛進德修業修辭立誠此理學之文也至於經國理民布綱陳紀譽隆國乘德遍寰區此士君子得志於時大有為之文也然文雖不同莫不理以主之識以運之氣以充之藻采以華之故文之有理即太和之保合運量各正而肆應不窮者也其識見之周詳貫注則血脈之流通也其格局之一成不易則肢體之上下有定行止有節也其經營組織光芒外煥則盛德之符睟面而盎背也故思欲深不欲淺識欲精不欲粗格調欲高不欲卑包涵欲大不欲小至於事本淺也而文特深之事本粗也而文特精之物本卑也而文特髙之物本小也而文特大之則其取精繪神超然遠寄不屑屑於目前腐近文人墨士之習徑實寓籠絡一切函葢萬有之光華則煦於樂善堂之文鈔獨有深契焉葢樂善堂皇四子館課文也皇四子無日不酌古準今朝吟暮誦無日不搆思抽秘據案舒毫如是久久所作不啻千餘爰叙次甲乙聚而成帙煦於雍正八年六月内奉命在皇子書房行走因得日親儀表細領嘉文總由積學廣博興寄宏敞高步遠追擴然無垠用能潄六經之芳潤根柢道要増益光芒揮灑於片楮尺幅中俾讀之者志翔神豁應接不暇如登大雅之堂而天球河圖之萃然燦陳也如聆韶濩之音而金石絲竹之翕然競奏也如觀多寳之藏而竒珍異品之駭目驚心其出不窮也故可以振頺懦可以維風俗可以紹前聖可以詔來兹將於斯文乎是頼又奚必韓潮蘇海燕許如椽始克愉心稱觀止哉胡煦謹序雍正七年十一月成天蒙恩召至京邸八年三月得入伴皇子講讀草茅微賤不諳天下事惟洛誦聖言粗識義理辰入申出竊異崇高富貴之地何功之宻而心之虛加於寒畯也日既久竊見自孝經四子易書詩春秋戴禮以及左國史漢唐宋諸家之文靡不淹貫性天之微妙綱目之是非政要之從咈名儒名臣之論理論事達人騷人之言憂言樂靡不列眉指掌而究其精詳所著作若論若序記若銘贊若賦若詩盈千累百靡不内朗外潤從容惬適於規矩之中乃踴躍懽忭念我皇上之所以為教皇子之所以為學至於如此也氣質既已清明義理既已昭著問學既已淵洽而言動愈以恭謹以成天之固陋所挾者惟此欵欵愚誠耳然土壤細流山海之高深未嘗讓且擇焉葢所見者大而所志於聖人之道者篤矣秋日清暇皇子自披其所著擇其中什之三為一集而曰知之匪艱行之維艱予之言其無謬於古先哲人之言乎果無謬矣其敢遂謂㡬於成乎昌黎云愈之所好者道也惟恐人之以文視文也老泉謂非天之所與求一言之㡬乎道而不可得不亦夸大其枝葉乎吾非自珍其文將取以自騐也輪轅飾而人弗庸則為虛車此之謂矣至於不涉理不涉事可以助人養心者有三曰樂音曰山水曰詩歌賦亦古詩之流吾將當樂音山水而資其養心也皇子録而存諸座隅者以此成天奉教序簡端繹思經月無踰皇子面詔之意矣惟恭述知遇之隆紀課程之實且以見昭代文明之盛薄乎四海者始自宫中云爾雍正八年庚戌冬日顧成天謹序
