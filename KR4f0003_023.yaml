  - {type: page-break, offset: 0, content: '', id: KR4f0003_WYG_023-1a, image: WYG1300/WYG1300-0437c.png}
body:
  text: 古體詩古風十三首堯舜傳心學危微十六字禹湯繼其傳執中與禮義文王躬亹亹不已功常粹唐虞三代初大道中天麗比屋皆可封無煩别義利詩亡春秋作風薄俗亦僞惟時王道衰人人騁私智天生我仲尼金聲振洙泗刪詩定禮樂堯舜功不啻一自泰山頺彌天布妖彗楊墨逞邪說申韓建私議鄒嶧乃揚徽奮然闢險詖戰國逮嬴秦道蝕斯文墜祖龍輕狂兒輒敢燔典志劉季提三尺儒風豈云熾武帝始求賢董子明正誼三䇿醇乎醇天人理咸備昌黎稱聞道猶未嚌其胾自漢迄宋初道昏人如醉偉哉無極翁粹然秉道氣學不由師𫝊理已臻極致二程實見知主敬標赤幟朱子集其成經天復行地緬維千載心授受本同契絶續遞相衍斯文統緒寄午運數恰中自協唐虞治作君兼作師吉士踵相繼東皇運洪罏發生滋萬象卉木爭芳菲春和風淡蕩入夏氣益舒夭喬俱榮長凉飈西北來一吹天地爽洞庭木葉落空林月色朗萬物何蕭條摧殘委草莽惟有嶺頭松蒼顔挺百丈偉哉君子節千載令人仰巢由避堯舜遁世心自安嚴光繼其蹤隱釣富春灘光武曲成之髙節難躋攀東漢尚名義廉立懦與頑奸雄且顧忌千古一釣竿比干既已死後世仰忠誠吾於三代下復得楚屈平諌君君不聼汨羅抱孤貞詎不惜身死未忍楚祀傾今讀離騷篇凄然傷我情中天秋月皎四野秋風生庭梧一葉落隂蟲相和鳴鴻鴈橫逺塞音響一何清蟬嘒忽已寂又催刀尺聲物理皆如此隨時有枯榮鍾期既棄世伯牙不鼓琴管鮑貧時交意氣稱斷金豫讓報智伯吞炭自成瘖知已有髙下友道有古今骨化不能泯千秋同此心東海有瀛洲仙人居其間安期羡門子九轉成金丹自謂得長生飛升如羽翰倫物苟遺棄孤生亦何歡子房報韓讐傾産不謀家去項而事劉迹如博浪沙功成託導引豈曰棲煙霞全身更全名飄然髙風遐髙風本血誠莫使毫釐差濂溪惟愛蓮淵明惟愛菊吾於羣卉中特愛渭川竹嚴冬草木枯依然挺青緑扶踈繞屋栽朔風鳴寒玉直哉君子節所守貞且篤秦王失其鹿英雄爭逐之沛公入關中三章法令施偉哉蕭相國䇿力咸㑹時鴻門宴諸侯端坐衮冕垂一增不能用勇力徒爾為矧乃恣殘暴衆志均乖離用賢兼愛民斯為王道基煌煌諸葛公大義炳宇宙三分計先定三顧始勉就拒曹挫其鋒和吳息戰鬪七擒孟獲降六出仲達走漢祚竟不振星落莫能救惟公仗忠誠中心思克復雖未躋伊吕猶在蕭曹右豈徒仰勳名宫牆輝爼豆淵明既歸田門前種五栁心與世俗隔讀書快飲酒惟結山水緣那復戀五斗微意殊可風亮節不掛口同雲布層隂密雪降九霄乾坤大地間化為瓊與瑶六龍回日御中天光孔昭藹藹復融融積素一時消人生秉性良胡為自刻雕理欲戰其中復被外誘搖安得如日出隂氣無凍膠執中存道心吾聞諸唐堯蘇卿節氊廬夜囓天山雪一腔血性猶然熱空教淚灑李陵襟獨重千秋蘇武節秋草蕭蕭老茂陵幽宫路杳喚難譍持謁荒原痛𠂻曲節旄落盡如髮秃侍中衣侍中衣慎勿涴草中天子識良佐官蟇呌罷肉糜殘此日何能救饑餓倉皇應悔晨雞鳴蕩隂秋色暗欃槍正色從君却佳馬侍中浩氣今如生猶憶知幾衛伯玉撫牀惜座傷𠂻曲鄭公笏貞觀天子能納諌黏壁封章盈便殿當時貞亮數鄭公君臣一德堪歆羡十思才上十漸陳仲山補衮抒忠純祇今遺蹟傳公笏想像進奏風霜新卓哉牙笏因公貴正直常留浩然氣立碑可仆婦可改此笏千秋只姓魏段太尉笏饑軍蟻雜提霜戈瓊林庫貯何其多倉皇羸馬奉天道寶玦珊瑚可若何封帛梁楣舊相識一時北面非羽翼幾事不密乃害成此日司農見本色氣似虹霓目似電不擊賊身擊賊面慨慷一死重太山凜凛秋霜飛白練公笏非石亦非銅一腔血性流其中桑田有改笏不壞即今見笏如見公俠烈行俠烈復俠烈血性腸中熱能為百折綱不為繞指鐡能為易壞齒不為長存舌一身與一劍衆中推人傑畢命報知已中心差自恱秦吉了雕籠繡柱光離離語䦨芳意情凄迷空庭新緑圍四面家在關山西復西主人憐愛比小鳳筵前艷曲曽三弄等閒不敢學雞鳴鮫綃只恐驚春夢藏雪青女昨夜回鸞車忽遺遍地瓊瑶屑朝來愛日正三竿霽景更與尋常别蝶夢初醒扶短笻踏破瑶京屐齒裂却觀秃兀玉山頺更愛長林素蕊纈課童藏雪聊復爾大瓶小盎分行列隨圓掬起古鏡冷因方裁破瑑圭坼映目晶英心似氷渴腸未沃寒生舌比之滿貯甕頭春自謂此舉猶非拙古香仙露沁詩脾髙齊清供天然設何須雜沓爭後先霽後晨寒市踪絶烹雪用前韻瓷甌瀹净羞琉璃石鐺敲火然松屑明忩有客欲澆書文武火候先分别甕中探取碧瑶瑛圓鏡分光忽如裂瑩徹不減玉壺氷紛零有似瓊華纈駐春才入魚眼起建城名品盤中列雷後雨前渾脆軟小團又惜雙鸞坼獨有普洱號剛堅清標未足誇雀舌㸃成一碗金莖露品泉陸羽應慚拙寒香沃心俗慮蠲蜀箋端研几間設興來走筆一哦詩韵叶氷霜倍清絶冬夜聞空鐘空鐘者以竹木為之繫於鴿尾鴿飛空中則衝風而鳴泠泠然如清夜霜鐘信可聽也屋門下重簾歸鴉寒不起朔風户外飄霜天净如洗我時聊復閒吟弄虛齊裏何來空鐘音喚醒敲詩耳徘徊雲霄中清越難為比乍如焦尾琴調自伯牙指又如寒蟬聲咽露喨且美舂容招提煙清泠三峽水耐冷不能翔飛鳴殊未已鵓鴿爾何勞歸鴉已安只一勞而一逸為君評其㫖野鴉不受羈動息由於已鵓鴿戀豢飬由人而已矣束縛其羽毛玩弄慿童子傍晚放之飛達旦何能止嗟哉天地間何事不如此射雉行麥塍臯月浪花長雉母呼雛翠隄上雛兒䙰褷才學飛翅弱母心愁惘惘少年初挾燕角弓芳畦緩步薰風中雛飛不似雉飛疾箭翻繡羽飄腥紅歸來日暮心中喜不憐老雉傷心死學仙謠東東叩齒鳴天鼓希夷內景升瓊户蓮臺坐嬰閉三蠱仙名已入玉清府海塵漸起蓬萊山瀛洲方丈飄渺間淮南雞犬不易及碧落龍髯那許攀始嘆平生空費力家鄉欲歸歸不得向火人生貧富殊畏寒情無二暖閣下重簾獸炭罏中熾豈無輕裘暖向火時坐地芳馥水沉銷聨翩蠟珠墜春融丈室間清供良具偹是時萬籟收徙倚猶未睡忽聞街市聲寒宵風送至勞逸乃爾異伊人亦我類苦耐霜飇冷為覔錐刀利祁寒而怨咨聞之周書紀所幸陽旋復春和歸次第貞者元之基成者君之賜况復雪新晴豐年已告瑞寒月寒月上忩夜方丙歸鴉棲穩松梢影篆煙一炷裊沉檀靜坐髙齊聽漏永年來頗得三餘樂妙趣當前默自領何用文牀卧翠衾正是幽人蝶夢醒過曲澗花香遊流杯亭日知閣諸勝西苑曠且奧肇自明代作瓊華萬玉堆太液千夫鑿平地起蓬瀛城市而林壑松篁幾百年參天秀崖崿秋深鴻鴈鳴春暖桃李灼肅廟求神仙林亭更開拓方士朝扶鸞虛皇夜飛鶴丞相冠蓮花將軍赤符縳雞犬倐已升殿宇還如昨盛朝建邦畿舊制因城郭何獨廢西苑姑亦存其略髙居非昔比偶幸行宫若雍正二年夏承恩開講幕避暑供遊息勝迹頻探索湛湛芳草青潑潑游魚躍蔥蔥梧桐枝爛爛蓮花蕚或宴水雲榭佳景開芳酌或賦迎薰亭妙句隨興落師友得從容昆弟善笑謔是秋獵塞北竒峯峭天削回思此間山宛似日出爝因緣不復至撫景懷佳約時過玉蝀橋波光含漠漠煙際辨樓臺松竹紛竽籥彈指十年間何異風鳴鐸前日重來遊未能窮其樂遙矚淑清苑凍岸不可泊今朝好風景遲日中天爚步自瀛臺橋踏氷行蹻蹻乾蘆尋曲徑虛殿開金鑰穿雲洞户深步石川梁迮乃知洞裏天自與尋常各冬深景寂寞翠剩琅玕籜閒坐流杯亭更登日知閣㑹心濠濮間呼朋嗒然噱其北乃假山巉巗何磊硌攀援徑絶處深澗戲騰踔時我徑過之我童猶畏却其上掛瀑布結搆儼廬霍飛沫雜氷流玉牙排齗㗁其池乃不凍疑有馮夷託當年觀魚亭塵土生珠箔歸鞍適然返聊爾何住著我聞山水緣好者不為惡何必買山錢底須蠟芒屩前居水中萍兹遊林裏雀異日得清暇還教度略彴充隱小隱隱山林大隱隱朝市如何末世人充隱稱君子安車假徵求賂資囑莫起盛朝有遺賢乃是皇甫氏清流本皎潔咄哉濫於此秋夜遣興春華復秋實來往運槖籥世人於其間憂喜隨時作歡賞樂青陽金天嘆蕭索但知逐境流觸處成執著何人能解懸便是希夷樂皎如秋月心大哉天地幕夜坐夜坐悠然欣自得地罏火暖燈花直年來詩興富冬宵清吟消得銅壺刻朔吹生寒雪灑天窗前梅蘂饒顔色因思勞勞市上人半身僵凍還謀食有時西北來凉颸邊陲天末頻相憶勞逸憂娛頓爾殊慚愧吾廬獨宴息九臯生去不生歸戴九臯以七年出征十年輿骨而返前年夢見傷心極天心仁愛應洗兵旋看明年大平賊軍營十萬壯男兒各各歸家勤稼穡憶逺銀燭垂金英夜長人未睡重簾下氍毺邈然動遐思邊陲萬里遙故人勤王事雪花大如拳朔風徑如刺虎帳不禁寒征衣逺難寄我輩擁重裘宴然讀書次况復嵗華近團圞一家萃何當息烽燧凱旋歌飲至遐邇共歡娛仰首望天賜緑珠學舞按歌足靈慧翠鈿珠落烏雲髻筵前擊碎紫珊瑚盈盈弱質天教麗傾城未得却傾家石侯東市堪咨嗟髙樓一夕恨惆悵玉樹朝來惜落花此時樓廢無消息野草還作傷心色題二十一叔父山靜日長小景吾叔乃詩翁裁句清而好近復參畫禪頗得畫中道髙齊長日暇為我濡毫掃即景繪為圖筆法特髙老一峯插天青波面池亭小峯腰瀑布飛亭畔清流繞更無别粧㸃寫意殊了了我聞詩兼畫妙品古來少摩詰真蹟無元鎮清風渺吾叔乃升堂况值青年早從知天授竒不慿人力巧嗟我學畫法年來曾探討髙山但景仰興洽林泉杳鶴媒歌童子開籠放鶴媒音長翅短清池隈上有野鶴翩然來青莎顧步相徘徊主人喜得新鶴易剪羽還將稻粱餧鶴媒有聲不能語長呌寥天韻凄楚但願聞聲鶴莫來却得髙飛不籠汝雉媒歌平岡草淺雉媒呌遊絲飛絮紛斜照野雉歸飛帶夕暉回視雉媒如相召翻同飲啄不加防上下鼓翅爭翺翔雉媒引雉入羅網弋師歡喜媒徜徉嗚呼同類且如此機詐相傾殊未已雉媒欲報稻粱恩莫辭自赴烹調裏馮媫妤上林虎圈雙門開奔熊正對官家來弱支膽敵千夫勇當前直立驚同儕同儕驚上心喜始識媫妤真愛已得寵不如失寵安懼心才定妬心起君不見呼天誰白中山寃致使人傳大內言神仙曲飄颻羽佩凌天風雲裾娑娑曳綵虹西池阿母煩守宫夢中幾過桃花紅下視蓬萊塵欲起吹來鐵笛蘭煙紫鬱羅蕭臺空劫中驂鸞謁帝雲霄裏却去竹山穿石窟泉底今朝葬仙骨海市蜃氣遙浮滄海東離離曉現蓬萊宫璇題銀榜幻空影重樓掩映扶桑紅鮫綃驪珠燦光澤市與麻姑飾瑶席坐令人間眼界新煙雲萬頃連天碧君不見方士回舟阻風水仙踪大抵皆如此覺生寺大鐘洪鐘二丈髙其圍乃數倍隆棟繫旋蟲含光耀精彩摩挲古質想前朝精鐫表裏龍蛇髙標題嵗月去如海空餘巨響振雲霄即今猶眩俗人眼那論曽傾萬家産道場水月幻莊嚴此語吾聞諸內典層樓重建梵王家倣佛諸天散雨花一聲擊撞獅子吼沙界同音演法華鐘上有全部法華經文題晉戴逵剡山圖山川靈秀稱江南伊人小隱為結庵竹籬茅舍頗自適雲容水態曽相諳老松落落蟠翠色髙峯矗矗烘朝嵐興來掃筆作長幅故知邱壑性所耽三徑雖開人跡絶先生杖䇿獨幽探何須絶琴誇逸致個中妙趣誰能參恭瞻萬壑松風圖感而有作老松經萬年幽壑紛千派蜿蜒掃黛眉虬龍結青蓋耳際無餘聲颯㳫泛天籟奔騰鐡騎馳遙見捲旗斾神韻動諸天妙意殊堪㑹大哉造化功金泉創仙界髙堂臨萬壑一瀉松風快當年諸孫行惟我承恩最賜居亭畔室虬枝森一帶盛夏如秋深日夕靜相對謖謖吹衣襟谷神守清泰轉瞬成昔遊感企瞻圖畫行宫遣興春風布始和昭蘇百卉萌靄靄景物佳曙鳥相和鳴砌畔抽新草緑意含生生何幸承恩來南苑薄言行芳郊未合圍朝暾映檐楹隨境可怡恱吾誰與繫情欲開有山桃未語彼黃鶯借問造化者何復殊枯榮雨中舟歸夕陽西下春雲布霏霏細雨迷蹊路中流雙槳蕩歸舟十里橫煙暗村樹岸栁冥濛待暮鴉寥天低黯催孤鶩咫尺玻璃太液池幻作寒江煙雨渡放鯉修鯉揚朱鬛雙雙卧筠籃失波受困縛吐沫心難堪有人持贈我將以佐㫖甘劇憐苦涸轍猶可潛深潭春風漾水紋新藻緑毿毿撥剌彼遊魚各各生意含呼童攜鯉至放之小池南赴波漸旋泳倐逝如脫銜我非好清况不為口腹饞今春放雙鯉明春百倍添寄語叨餮者放生乃大貪舟行御湖三月春水生微風不動玻璃平樓臺咫尺方壺聳楊栁千條煙靄橫蘭舟容與蕩雙槳飄颻渾似坐玉京緋桃緑李夾兩岸綰綺錯繡春色并我思去夏泛太液荷香十里疑蓬瀛即今光景正明媚緑波搖漾鷗鳬輕等是舟行别今昨年華荏苒何須驚折芳圖烏雲蘭馥翠未整阿香燒水簾櫳靜曉寒初試五銖衣庭欄小立胭脂冷笑折芳枝佐玳鈿露凝粉氣猶鮮鮮歸來徙倚香奩側膽瓶謾插憐清妍對鏡簪花長太息年年不改枝頭色御製樂善堂全集定本卷十九
