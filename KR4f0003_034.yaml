front:
  text: 欽定四庫全書御製樂善堂全集定本卷三十
  hash: sha256:b3457be37cae0413b8895614e725fc7c16cfdcaea62d7390826b35a6fbd4981e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0003_WYG_034-1a, image: WYG1300/WYG1300-0533a.png}
body:
  text: 今體詩冬月盆菊瀟灑東籬已過時文窰佳色尚新滋未殘緑葉紛千㸃初放金英簇幾枝髙格傲霜兼傲雪逸情宜畫亦宜詩晚來篝火清吟處靜領寒芳得句遲冬日同五弟逰西苑即事上林冬日暖風物轉暄妍草色餘青毯晴光撲錦韉探幽尋勝地撫景憶流年詩意催歸轡飛鴉帶晚烟甲寅冬至上躬祀南郊恭紀四律馳道曈曨散曙光祥凝玉輅焕龍章精誠聖德通乾貺肅穆皇儀紀奉常黍谷灰飛方應律雲門樂奏正迎陽微風不動柴煙直遙望天門闢九閶一線陽和何處生重重瑞靄映層城曉光彩映霜花動韶律春回朔氣清百福均隨長日至九瀛並奉泰階平上林已先東皇令殿桞宫梅欲向榮晴旭融融耀曉暉和鑾鳴處啓天扉一陽已復凝千祉萬乘初旋擁六飛雲物定書豐稔嵗祥煙欲上衮龍衣聖𠂻乾愓昭寅祀兆庶羣瞻迓福歸昭蘇景物漏春妍初動祥風拂曉煙五位福凝璇象轉一陽德合聖恩宣瑶編紀瑞飛瓊管篆縷凝香繞御筵最是歡聲連九陌千秋同祝太平年蠟日坐氷牀渡太液池志興破蠟風光日日新曲池凝玉淨無塵不知待渡霜花冷暖坐氷牀過玉津太液人行步玉花金鼇遙望鎖煙霞勝逰不數瓊華島愛聽寒林噪暮鴉冬夜八日方過蠟三餘好是冬漏長銀箭澀爐暖繡簾重梅帳春融雪松忩月舞龍忘言參鼻觀一縷篆煙濃燈花蘭煙凝寶鴨玉燭燦銀檠坐久輕花結春來喜氣迎輝煌紛散彩的爍鎮敷榮錦綺新添瑞華堂更助眀陽和一室滿風月九霄清佳祉欣占報新詩藉爾成探春桞岸輕黃染薄紈風光搖曵許人看花磚度影晴初放錦甸成泥雪半殘何處乍開金屈戍誰家試倚玉䦨干閒情都被春情綰莫漫尋芳趂曉寒春曉春曉晴暾麗名葩宿雨滋紅深新著色芳細潤含姿蝶入花房重風舒葉帶遲徘徊觀霽景山閣夢醒時隔花宫漏禁籞芳菲淑景融遙聞漏滴百花中暗傳日永遲催箭似染林香細度風聲斷續時鳥語雜韻悠揚處午晴烘誰知髙閣輕移㸃消得春園幾樹紅過淋河慿催詩思客途過得得輕蹄踏嫩莎拂面春風三十里一灣新碧小淋河清明日奉命恭祭景陵感成五律玉劍還依舊龍髯未許攀音容千載渺嵗月十年還奉祀瞻依切追思涕淚澘春風送歸轡愁對水潺潺逺煙曉色輕嵐布憑欄入望遙非雲迷谷口似水抱山腰羃䍥披千樹蒼茫隔幾橋山靈驅霧轂飛謁九天朝王原祁雨景畫竹樹冥濛處溪橋杳靄時水風翻桞浪霧雨沐山姿氣韵三秋潤煙嵐尺幅宜司農瀟灑筆似讀許渾詩書開元遺事後沉香亭接望春樓百面牙盤博笑眸一夕淒涼馬嵬驛不教還保玉搔頭漢武曾求汗血蹄百蠻才服又安西當時頗有英雄輩不及王元一彈泥太阿倒柄奈如何閹拜將軍澤已過那識將來猶未足門生天子負心多金雕翡翠玉雕環一笑春生百媚顔試問洗兒錢在否可能容昜贖潼關雨中訪僧不遇煙雨濛濛暗石磯人行渡口鳥飛稀尋僧不遇空回棹還似扁舟訪戴歸山僧閒踏芒鞋去留得蒼松伴客茶我亦無心戀風景歸舟輕拂雨絲斜題趙松雪竹院鳴泉圖山花繞徑竹梢椽一卷黃庭聼瀑泉幽韵清泠傳别院寒光瀟灑動明川依稀琴瑟調階畔借助琅玕戞座邊試問飄然雲水客就中消得幾多年題趙伯駒仙山樓閣卷雲山縹眇列仙鄉海隔紅塵路渺茫只許人間圖上看廣寒宫殿午風凉彩鳯騎來閬苑西瑶華枝上暫教栖晚來留却乘雲去輸與王喬一局棋雲衣散作幾絲霞清淺蓬萊似若耶莫倩麻姑說接待此間不是蔡經家霞帔蹁躚瑞靄生飄飄金舄步風輕飛花一任隨流水劉阮何能借問程夏興三十首用上下平韵水亭簾捲芰荷風香錦堆波㸃㸃紅一幅生綃誰為展不知身在畫圖中落落松篁緑䕃重髙齊閒對樂無悰逺山雨後堪摹似螺髻新梳黛色濃梧桐月影上氷忩凉露微侵暑氣降階際蛩聲才唧唧庭前螢火故雙雙只將無事消長日不用松枰一局棋淨洗端溪焦白硯憑欄又是課詩時閒踏青莎憩石磯清風細雨正霏霏三庚預作三秋意潤氣輕沾白紵衣勻碧玻璃萬頃虗採蓮一曲午風初南華秋水何須讀都入扁舟一覽餘風度修篁月上梧藥爐茶鼎興偏孤生綃欲覓倪迂筆好作髙齊消夏圖疊疊紅霞映碧溪逺山猶在夕陽西幾回步過橫橋去十里輕莎覆軟泥溶溶月色淡空階未盡蟬聲咽緑槐髙卧匡牀風味好從知陶令亦吾儕雨餘青篆長莓苔洗盡塵氛爽氣來日暮凉颸拂巾履扶笻獨上最髙臺氷碗氷厨不受塵閒心消得作閒身桃花源裏風光别來捉蒲葵得幾人一瓣名香靜裏焚篆烟縷縷白如雲幽情未許旁人㑹手自翻書到夕曛古樹月眀鴉影翻空階露淨泣王孫誰家少婦傷離别未到秋來已斷魂西池荷葉大如盤六月春光爛熳看蘇詩繞郭荷花一十里誰知六月下塘春笑煞雙鴛花底宿不勝香霧欲飛難採蓮少婦滿溪灣露重紅裳涕淚澘轉眼秋光到前浦依稀風景想榆關安石榴開照檻鮮緑衣小鳯語庭前遣情花鳥知人意為報山中過小年茉莉香風透綺寮天街夜靜漏聲迢桂宫只在星榆裏無那銀河一水遙石磯晚坐釣綸拋蘆荻蒼茫兩岸交添得一畨新鼓吹宫蛙雨後滿池坳席間暑淨三庚退樓上凉生百尺髙白紵輕衫消受得西風閒倚吮霜毫紈扇初收疊綺羅夜凉人靜蹙雙蛾幽情却恨秋風到細數流螢幾㸃過慿誰催得朱明去為有庭前夜合花三度芳菲俱已過一彎新月照枝斜架上縹緗玉軸裝呼童趂夏曝書忙緑槐庭院無人語時有天風送古香松隂攤飯石牀平靜聼寒濤汗不生那更閒情逐蝴蝶逍遙一枕卧桃笙碧水彎環俯小亭倚欄獨坐閲金經問誰識得菩提趣恰有芭蕉側耳聼紗忩竹簟靜無蠅香吐金猊碧縷凝休向人間求避暑箇中自有玉壺氷漫憶秋凉秋昜到不堪夏熱夏難留眼前風景渾無定供我閒吟獨倚樓林泉瀟灑愜幽尋興罷歸來暮靄侵凉月照人人不寐一甌香乳聼調琴氷盤葵扇何須戀沉李浮瓜底事貪俯檻早占秋景近一灣水色已成藍昨夜微風拂屋檐荷亭爽氣一畨添今朝夢醒披衣處飛瓣飄香到繡簾消夏才教脫葛衫藤蘿月影上巉巗秋聲欲倩歐陽賦白帝明朝又署銜賦得岸痕新雨過急雨初過溪尚喧緑堤苔漬帶新痕烟低岸桞根疑失翠染平蕪浪欲翻波漲漁船方弄棹景供詩客正慿軒那知野老情偏異預卜豐登笑倚門清簟看棋松枰消夏日竹簟納凉颸任爾機心密皆吾靜賞時鼎鳴濤泛峽香灺篆縈絲黑白分明看踈簾月漸移鄭宅茶榴枕桃笙午晝賖紅蘭香細透忩紗夢回石鼎松風沸先試氷甌鄭宅茶水遞何須古辣泉滿杯香露侍兒煎浮瓜沉李渾無事為咏盧同七碗篇夏日園居即事為愛林泉入座清臨溪結屋敞軒楹枝頭閒弄笙簧奏階下平調水石聲苔漬雲根成古篆鷗閒沙浦結前盟午餘底事尋莊蝶恁逐晴莎信步行緑苔滿徑竹梢簷午靜薰風撲畫簾鹿柴間開知客到魚苖新漲識丁添藤牀恍帶三秋爽竹簟渾忘六月炎晚憑欄干閒極目紅霞猶繞數峯尖鏡浦輕颸漾碧漣池亭霽景正澄鮮蝶依芳草能尋路鶴習茶鐺不避烟任去任來幾㸃鷺半開半落數枝蓮晚來弄棹無人畔水滿清溪月滿船古香齊伴幾枝桐百尺扶踈翠色籠杖䇿每緣尋勝景披襟半為納清風篆烟結細簾方靜棋局敲殘日已中不住吟哦緣底事㑹心原與物偕同有至自軍中者詩以慰之兼憶如心居士萬里榆關罷戍回情懷如舊鬢毛皚如心居士知無恙兩字平安藉送來繫馬都門正落暉三庚未脫夾征衣因君略曉邊庭令八月祁連雪已飛幾年别去經風雪今日歸來話别離想像伊人歸未得龍堆握手送君時荷珠曲池倣佛鮫人宅一夜明珠萬斛傾翠蓋敲風紛聚散紅衣映旭轉晶瑩虙妃珮上熒熒墜帝子叉頭顆顆盈分付蘭舟為停棹露盤終日鎮教擎題髙其佩指頭畫雞淮南曽伴升仙去留得生綃幻裏身秀埭昂昂誇獨立可能風雨報寒晨平湖雨渡八首一堤楊桞樹數里白蓮花細雨霏霏處輕舟泛若耶烟雲暗逺天獨坐孤蓬裏颯然風滿湖衣履皆寒水欲覓古渡頭烟波不知處我亦無心客輕舠任來去參錯漁樵舍隱映菰蒲叢冒雨一聲笛吹破千絲風細雨滿湖秋扁舟泛碧流平分詩景去恰有一羣鷗掛帆風力健不須蕩雙櫓遙望翠微峯濛濛亂烟雨乍聼芭蕉鳴却是殘荷響夢中萬里逰只在扁舟上山圍天欲暮風過雨初晴餘景猶堪賞平湖落照明晚晴淨洗塵氛天宇清溪流新漲一聲聲芭蕉葉緑經雷長茉莉花香帶雨榮蟬抱桞枝初放響螢黏荻岸轉添明東岡隱約金波上倣佛年來秋夕情野塘月色菰蒲亞水正青青月色寥蕭淡晚汀野景乍疑秋寂寞新凉且喜夜清泠波紋㵼碧翻輕縠鏡影流光閃碎萍獨對池塘空濶意幾家茅舍㸃郊坰水底霞天晚籟閒登百尺樓明霞倒映十分秋餘光綺散鮫人宅返照晴搖蘆荻洲雲際鷗閒波蕩漾日邊魚躍景沉浮須㬰天末殘紅捲依舊髙空接碧流新凉連朝微雨促新凉獨倚寒空意渺茫庭樹早驚金氣候幽人為換葛衣裳月流梧榭添踈影風入荷池泛冷香欲效廬陵工體物含毫詩思共秋長題唐寅畫箑蘆荻蕭蕭颭碧流月明獨去放扁舟誰知一枕莊周夢占斷寒江萬里秋秋信今年秋信較分明白帝初旋暑氣平梧落井邊天籟動蛩吟砌畔晚凉生已輸紈扇三分爽閒對銀河乙夜清占斷一畨瀟灑意金風玉露動關情題丁雲鵬羅漢卷幻化空中傳幻化却教圖作紫磨身機心息後龍能伏業境忘來虎亦馴瓶鉢繽紛饒法味伽黎圍繞足精神懸知笑㑹拈花處倒退聲聞八百人曝書天末金風至庭前晝曝書古香飄座永秀色入忩虗次第排青簡縱橫打白魚繞廊吟賞處爽度葛巾徐雨驟雨催餘暑幽香濕畹蘭從知秋颯㳫漸覺夜䦨干蛩咽階前細蟬吟桞上殘蕭晨憑賞處添得幾分寒題石屏二絶扁舟夜泛正秋清赤壁巉巉類削成欲共坡翁圖畫裏月眀風淡聼江聲赤壁圖片石本來邱壑物却將邱壑箇中看千林日上嵐烟净七十二峯濕翠寒木蘭山圖萬夀寺方丈小憩門枕秋河冷堂堂法界寬坐參真瓠落小憩且盤桓塔影含烟直簷鈴奏響殘徘徊無一事何用覓心安庭有參天柏階饒匝地花鳥栖喧皓月鶴立對晴霞寥寂鐘魚靜蕭閒山水嘉闍黎公案熟讓客趙州茶禪房隱修竹杖䇿試幽尋路僻莓苔長人閒花木深梵經書貝上古衲挂庭隂掃石聊跏坐悠然塵外心秋曉閒步空庭倚石欄寥蕭秋色入澄觀千章樹葉隨風落一夜蛩音到曉寒鴈字排空長不斷荷衣貼水那勝單招提何處晨鐘度隱隱霜聲帶月殘重乳燕雛燕長成本年即能營巢更伏新雛才學翻飛下畫堂􅔷泥旋復上雕梁未能返哺同烏子且乳新兒作燕娘斜掠西風誇得意却歸南國儼成行盧家少婦凄凉甚兩見雙棲更斷腸過玉蝀橋三首蘆荻蕭蕭颭碧流長空渺渺望中收御河八月芙蓉紫倣佛江南一假秋秋煙漠漠散輕綃斜日西風玉蝀橋乍聼扁舟歌欵乃蘆花深處望迢遙楓林葉落漏斜陽遙望瀛臺隔渺茫却憶十年逰息處水風吹送芰荷香御製樂善堂全集定本卷三十
