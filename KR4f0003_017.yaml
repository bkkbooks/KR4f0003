body:
  text: 賦文戰賦甚矣人之好争也軒尤鼓怒扵凶器羿浞鬭技於霜鋒賁育逞力扵舉重般婁恃巧扵雕蟲良増騖智扵劉項儀秦馳辯於横從是盖所居者髙則惡人之我並所操者異則嫉人之我同未有觧搆釋紛齊天地扵一指和光同塵歸大化之元宗者也吾意文人學士知命樂天謙卑自牧慎重為先其㳺心扵淡也若太羮之味其麗澤相滋也若共濟之船宜其煦煦為儒魚魚為賢不恧我之㦯後不憎人之㦯前而孰知所謂文戰者更有甚扵前言當其屬詞鋒排筆陣萬夫之雄莫擬六籍之奥並進徹札之鏃必期乎中堅露頴之囊何妨扵㳺刃鶚視而張弛咸宜虎變而雷霆用震於是緗帙繽紛盡作鼓鼙之響絳帷掩映俄興旌斾之思呼十二之龍賔發攄竒策揮五千之文字奮迅偏師臨局早分其勝負當場叠用其正竒弟子降心而歛手先生談笑而觧圍是盖厲兵扵學海藏甲於文山請纓同弱冠之子投筆似定逺之班硯石如砥兮紀功莫盡霜毫飛白兮露布爰頒齊物子見而笑之曰是盖以文為戰者夫文以載道而又何戰乎請與子觧干戈之擾而歸洪荒之都望嶧山賦居義府之邃深兮藉藝苑以遨㳺慙脩綆之汲古兮𦍑魄淵其如流邈髙山而景仰兮余獨媿夫前修矢中志以日征兮庶自畫之免羞聞嶧陽之聳峙兮厥維在乎東鄒余仲氏其再經兮為余道其緣由子車氏之故墟兮溯芳軌之尚㽞欲躋攀以顧瞻兮阻川原之亘悠爰徘徊而永念兮運綺思而裁句於麗則乎何有兮名望嶧山之賦昔神禹之任土兮取兹陽之孤桐魯僖公之保有兮乃遂荒扵大東固坤輿所鍾靈兮氣旁薄而莫窮配浩然之至正兮挽戰國之頽風卑衍詭與儀辯兮非大丈夫之謂也排楊墨之滛辭兮曰維正道之足貴也丁鉅艱而獨往兮邁仔肩扵千載也其功不在禹下兮斯言確其可味也惟樹徳之既堅兮吾獨羡夫孕育之所由来奚必誇夫川原之綿衍兮侈形勝之崔嵬重曰望嶧山兮魯之邦隔千里兮天蒼茫竊仰止兮路修長慎自邇兮勤就将指余駕兮息彼鄉徜尼山兮猶可望迎長日之至賦惟大祀以事天爰考候而迎日時履端扵方始迓初陽而誠壹既展奉常之儀乃協用牲之吉稽古之典黄鐘正應乎宫縣行夏之時葭灰亦飛乎緹室盖所以欽承上帝宜調象緯之平布政萬方必始璣衡之一仰斗柄其始旋望扶桑而將出斯日也符上春以備儀詣泰壇而将祀迎祥迓福兮必惟其時𨗳氣延和兮爰修其始遲遲暖律與圭影而並長烈烈凝寒避爐烟而自徙豈惟靈鼓之聲不止陶匏之禮維父天而母地實覃誠而在此是知經紀不忒乃貞眀之有常疾徐中度胡躔緯之失次盖日者陽之精君者徳之成表著眀扵君象乃致敬而用迎萬國共球望金門而和㑹千方輻輳仰旭日之長眀羣僚景從而有秩千古輝煌而莫京斯固一人法天而有慶九有戴帝以咸寜者也景陵瑞芝賦盖聞王者孝慈則芝茂又曰君有至徳則芝生仁恩覃敷扵率土草木爰叶夫嘉禎考夫瑞應之圖稽乎符命之經未有治功允協乎郅理而祥應不驗於山靈者也欽惟聖皇御世敬天法祖煦嫗之澤比陽春汪濊之㤙如膏雨亮功則克諧三事歌叙則允治六府凡溥大化扵雍熙悉循聖祖之遺矩上帝是鍳靈瑞斯頻河清海晏之紀麟逰鳯集之文與夫嘉禾甘露之迭見盖不可以指數陳是皆一人格天之元功而厚澤永逮夫生民者也乃若瑶光發辰象之精金色吐隂陽之秀衍鼎湖兮億載休徴鞏福地兮萬年鴻祐繽紛芝彩表聖祖盛徳之常新焕爛芝房驗吾皇孝思之孔厚金枝瓊葉浥瑞露扵寳城十色九光燦祥霞扵仙囿鏤珊瑚而作榦葩盖髙擎肖龍鳯以呈形卿雲低覆氤氲並日月以争華蔚靄與松楸而並茂豈與夫生扵石室産自珠宫王母之䑓虚紀宓妃之館成空秀甘泉之庭而傳誇晋帝産延英之座而稱美唐宗也哉聖聖同揆徳惟其至既丕顯而丕承信格天而格地嘉祉効乎百靈景運凝乎二氣謹拜首而颺言賦太平之至瑞五絲賦律中蕤賔時惟臯月賞天中之令晨值薰風其南發撫兹佳景浴蘭爰遍乎寰區文此太平競渡亦盛乎楚越乃有金閨雅製綉幕芳思不止線添對日長之何遣聊同錦織象雲爛以交披憑兹十指運彼五絲觀寳縷之續續粲文采之離離延夀算扵萬禩傳勝事扵一時爾其香奩纔罷彤管方陳麗學天孫之様巧開地臘之辰鴨綠鵞黄選色而艶分八彩淺紅深紫成章而手拕雙紋皓齒含霜意運神工而不語青蛾歛翠心追天巧而宜嚬鶯其羽鶯其領難比方其爛熳絲五紽絲五緎更觸緒而繽紛則見夫續比貝連艶羞花朶色如螮蝀逥射乎虹橋舞比羽霓直通扵馺娑瑶筐用盛錦袱是裹方携蒲酌願萬年以祝君亦比葵忱藉一綫而達我重曰當午日兮結五絲綜萬緒兮抽巧思綿寳命兮夀無期紀嵗華兮長如斯稼穡惟寳賦天之鍾異物也石韞玉而山輝蚌含珠而川媚金在沙而待披綃織鮫而成瑞火齊共木難而交朗都梁與五木而争貴繡毯紅氍赤羽文翠固海舶之誇珍亦大賈之網利者也然而饑不可食寒豈能衣惟土物之是愛乃民命之所依希代之姿莫匹連城之價在兹此聖世之至寳羌歌咏扵周詩爾其既耕既耘既方既皁沃時雨而霑濡熟西風而堅好珠顆滿車兮無慙照乗之光玉粒盈倉兮絶勝瓊瑶之報故珍重上厪乎一人而滋培全仰乎大造為植物之獨貴豈異賄之足稱勤耒耜而莫怠謹播植而乃成爰藉亞旅之衆如施追琢之精力作三時兮類藍田之種玉有秋不日兮誇赤水之求珍兾千倉與萬箱兮寜必不貪為寳慶崇墉與比􅌨兮懸知有道則生信饑寒之可禦陋瓊瑰之為輕不假居竒以市何須韞匵而藏餘滯穂兮伊寡婦之利匪異物兮實餽貧之糧故曰寳金玉者心勞而鮮益寳稼穡者心逸而獲臧其為利也最溥其為物也孔良尚計九年之蓄以期兆姓之康南風之薰賦祝融司方朱眀應節蒸溽暑兮欎陶遲火輪兮炎熱羡萬物之敷榮坐池䑓之清絶猗珍簟兮如霜皎氷盤兮沃雪乃其堦塵初動羅幕微飄協巽方以律轉應鶉火而候調出谷泠泠輕纔偃草入林習習響不鳴條蒲劍刺波兮岸畔斜縈乎翠帶荷珠承盖兮池心低曵夫紅綃觧煩襟於九夏扇清景扵崇朝客有廣厦披衣北窓延賞喜嘘拂之及時欣凱樂之有象欎佳氣兮氤氲埽祥雲兮淡蕩爰符五日之期可卜三秋之穣吹来閶闔何須辨其雌䧺布自郊原欣可覩夫長養時也虞絃鼓堯厨吹有道聖人之世無為郅治之時著物如薰疑度籬邉香芷乘陽欲動微飄座上輕絺中八音之節族叶三光之舒遲豈比夫蘭䑓徒侈其詞華沛里空思夫勇士舞掌中而懼飛賞亭畔而稱美彼宫殿但泛其蕙蘭伊閭閻豈被其福履惟睿作聖惟風時薰宣和觧欎澤廣恩均既揚颸扵八表亦應候扵五辰冬暖吹葭管之律春和拂梅栁之津㑹南風之入夏尤遍被乎無垠斯所以醖醸太和之氣而王者法之以施仁者乎書同文賦偉哉書契之盛也麗光天而有耀敷海宇而無垠掌之保氏而肇夫小學觀乎人文而成彼大勲代結䋲而為治因載道以稱神洋溢之風普扇光華之治聿新書紀遵道遵路記稱同軌同倫固草野咸欽其法式抑巗廊用布其絲綸繄夫庖犧造書倉頡創字蝌蚪成形鳥魚誌瑞原所始作不一其類迨後八體漸分六書遂製或篆𨽻而殊科或殳戈之異制或偃露湧泉而稱工或離星垂珠以布勢或掲象魏之條或質嵗成之計或逰元圃之麟或折蟾宫之桂莫不依乎典則遵我王章錯綜以盡其術採摭以備其詳藻耀乎典冊之府輝煌乎翰墨之場指事象形之中則協聲轉注之允臧潤太平而有色宣文治扵重光扵是靖萬慮之紛拏布一人之大化金殿春永而閣帖臨餘玉筆龍飛而黄麻草罷欲加㸃而無有詎一畫之可假昭萬里之同風自一人而逮下眀廷敷奏曽無馬字之訛在野遵從何有魚書之詐則知聖人有作書文大同自南自北自西自東光如日月之燭遐屆舟車所通布章程扵畫一闡治理於鴻濛豈操觚而濡墨者徒工技雕蟲也哉秋河賦暑風退秋月眀麗銀浦扵碧落映金漢扵丹京耿耿之波瀾皎潔皚皚之氣象澄泓露下而天津可渡風飄而微浪不生經漸䑓而逶迤亘玉䋲而清淺從碧海以分来豈黄河之上轉入三秋以杳茫直萬里而曼衍深莫測兮懸東井而昭囬逺莫知兮歴南箕以舒展客有閒庭容與梧砌逍遥感砧聲扵野墅驚蛩響乎清宵眄眀光而寄興抒曠懐於泬寥夫其龍駕将臨星橋初起弄機之女停梭河鼓之旂近止霞妝斜整映牛渚以非遥閣道潛通望鵲梁而甚邇樂莫樂兮舊相知悲莫悲兮久别離嗟陽烏之欲上又天雞之早啼何絳河之傾而不竭兮抑天限固若是其難移徒見夫皓如白練之披皎奪景星之燦當霽夕而逾眀吐霄光而猶爛興無邉之秋思漫題句扵紈扇荔枝賦氣禀純陽根植炎方燦瓊華之爍爍垂寳實之煌煌蔡譜爰稽紀方紅與江綠白圖聿考誇雪肉與氷瓤領味者歎為仙液觀色者驚若絳囊張公之梨難並美安期之棗莫擅長江城之橘謾比擬瑶池之桃洵荒唐信乎天下之竒産而果中之稱王者也爾其瘴雨初収炎風微扇條宻抽旗花開綴霰殆有積而後彰豈無實而自炫翔彩鳯以輝煌合彤雲而絢爛紅丸萬斛紛玉樹以流光神丹九成射瑶圃而掣電燕支顆顆欲盈閩客之筐火齊纍纍乍佐畨舟之宴豈云憇之者如雲葉之垂寳之者無斧斤之患而已哉時惟遐邇同風盛徳昭融雖限山川之逺竟如堂奥之通彼宣風之大吏乃方物之是共樹植皇州豈分幅􅊷之隔實垂上苑應知造化之功賜出金門羣捧玻璃之盞恩分青瑣携歸筠籜之籠此盖叨仙味扵閬苑而沐聖澤扵無窮也夫其朱殻纔分脂膚照眼朗若玉壺之氷潤似清凉之散𦍑熱中之始消豈病渇之用遣佐玉杯兮輕含白露之團列華筵兮共賞氷蠶之繭唇未沾而已香手含潤而莫盥亦何必羡嶺南之三百堆驪珠而滿盌哉多稼如雲賦出郊原而縱目愛金秋之氣清草霏霏而露濕天寥寥而風生寒蟬収響隂蟲載鳴繡錯溝塍乍青連而散漫綺分隴畆正黄茂以縱横酬勤劬扵東作告豐稔乎西成逺而視之如膚寸之出石也近而睨之似朝隮之凝碧也當夫公田既雨霑膏澤之調勻嘉種徧敷披薰風之順適厥田上上兮芒既抽而散芳實發芊芊兮花已飛而帶白奄觀南畆之収何異西郊之積則見夫綿邈鋪川豐融亘田層阜遥分似無心而出岫千畦遍滿若竒峰之連天氤氲散潤兮既史書以占嵗曼衍流膏兮果戶慶扵有年豈坻京之足喻恍薈蔚之愈綿於時庤乃錢鎛築我場圃以樂農夫以御田祖豐滋漫若且聞束晳之詩悦茂油然欣聴籥章之鼓方苞既實慶髙廩扵茨梁堅好不秕喜盈疇之稷黍故曰榖為君寳惟農是親遺秉盈場玉食亦登其芬潔餘糧棲畆金枝轉掩其輪囷豈非聖徳之格天而多稼乃得以如雲乎聖徳合天地賦聖人膺寳籙握靈圖躋含生扵富夀致萬類之昭蘇澤允覃乎九有道克奉乎三無欽眀文思帝堯無以踰也温恭允塞虞舜曷以加乎紀巍巍與蕩蕩信一揆而同符天無不覆地無不載蒼蒼者昭丕冒之宏混混者順發生之大窺博厚而難名測包容而無外是亘古此天地也而誰與為對待哉王者中和位育並立為三規模既同乎幬載對越尤致其精嚴故升中扵天而鬼神格告成扵地而恩澤覃茂以對時而行无妄卑以自牧而體福謙扵是歌一徳之允若與二儀而脗合布政則温如春融育物則量同海納眀如日也麗九華以昭宣散如風也紀八莭扵閶闔然而髙眀既被朝夕彌䖍昭事則幾康是飭行健則元㑹永綿小心翼翼是曰法天若夫廣大咸亨品物必遂既柔順而利貞亦履仁而行義安土能敦是曰則地扵是乎乾坤合徳君師並修海宇仰崇髙之象羣靈樂静謐之休徧尊親扵血氣成參贊之謨謀豈非與清寕而永奠合上下而同流者哉鳥求友聲賦暮春日永修褉風輕栁依依而始綠桃灼灼而載榮山含翠而水秀雲觸石而氣清想羣賢之盛蹟追永和之芳聲命我樽斚招我友朋既窺花而拂竹足樂志而怡情乃有流鶯傍乎髙栁乗春載鳴知時不苟既擇木而遷喬亦因心而求友翺翔寡侣兮爰懐切切之思睍睆呼羣兮用發嚶嚶之口枝頭乍囀兮念知我之猶希陌上頻啼兮恨相應之恐後蜂蝶来往兮疑尚阻扵羣猜鸞鳯遥逺兮兾以引為吾耦歎離羣之已久謂知音其可期友既不我棄兮吾亦豈不爾思自秋徂冬業過時而已矣穿堤泛栁盡今日以求之取則寜逺流音在兹莫使鵩鳥兮得讒言之是肆應同鳴鶴兮願好爵之與縻乃其谷裏春深林間交訂始也以類而相求終焉同聲之是應是謂其音既諧其志亦正爰符金蘭之契雅合風人之詠彼夫烏衣國裏紅縷樓前呌邉秋之孤鶩啼蜀月之杜鶻豈得義同金石韻佩管絃也哉麥秋賦繄鶉火之司令疑商金之屆期影度朱眀始散芳扵榴圃律侵白帝獨抽穂扵麥畦愛芃芃之連纈亦離離之下垂南畆正勤扵此日西成偏紀乎兹時披梅風而含顆潤榖雨而雙岐是盖四時之代序而萬物各遂其繁滋者也乃其堤上鶯啼隴間雉雊芳草未歇而猶霏緑樹成隂而始就何銍艾之奄觀兮當隆曦之永晝覩黄雲之滿野兮驚白藏之應候溽寒露而朝濡兮潛隂吕而夕秀雜収歛扵長養兮參結實扵紛茂炎炎當令碩碩成行紫莖兮韞爽青穂兮含凉大有占而豐登肇象兮中和順而隴畆飛香對銀縚而偶穂兮散珠顆而分芒豈非化工之獨運而為盛世之嘉祥哉夏雲賦夕陽退暑晚籟吹凉蝉嘒嘒其曵響榴艶艶其含芳揮羽扇兮納爽坐氷簟兮生光既澄觀兮瀟灑爰延歩兮徜徉策杖清流之畔響屧踈林之旁見夫夏雲矗峰無心出岫峩峩而其氣始升氲氲而其勢漸就晻靄岡巒之崇蔽虧松杉之茂其方起也似迎日而流霞其上騰也如凌風而散華其紛郁也状綵纈而錦叠其輪囷也類玉葉而金葩或現神女之佩或駕王母之車依稀漢帝兮望祥而書紀寳鼎彷彿安期兮成仙而棗大如𤓰同崑崙兮五色突嵩少兮三花驅不勞鞭兮乍峭峰之崒嵂斵何須斧兮已空竅之谽谺爾其炎蒸頓歇池䑓清絶抱翠石兮影留俯清波兮紋潔暝烟杳靄兮隔栁岸以深沉餘景紛綸兮鏤殘陽而眀滅思添棐几之清病消文園之渇豈非覩欎興之勢而忽觧心中之熱哉學問至芻蕘賦原夫泰岱之髙不譲土壌而尊五嶽河海之廣不擇細流而納百川載萬物而不盈者曰地覆羣有而不居者惟天是以有大而能謙必豫見善而能遷始賢固至理之如此豈入道而不然盖自先民有言詢於芻蕘既下問之不恥乃大徳之孔昭野無遺才英俊彈冠夫廊廟政皆丕應庶人罷議扵市朝固已五風順十雨調集濟濟之多士覩師師扵百僚然而謙謙君子延訪不遺夫草莽穆穆元后諏諮乃逮夫薪樵是以禹下昌言之拜湯勤有莘之招髙宗㳟黙而得左右扵巗野周公勤思而傳吐握扵崇朝凡其守謙以受益用是居上而不驕爾乃設鐸設鞀而蒿莱亦及爰咨爰度而草澤無餘道至廣也豈必備乎垂衣之主心之虚也乃旁求扵戴笠之夫邇言不棄良才必選大度扵是乎彰隆業因此而顯戒損用以持盈得師期乎主善此聖王樂取之誠心而非徒規倣乎先民之舊典御製樂善堂全集定本巻十三
