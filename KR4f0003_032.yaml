front:
  text: 欽定四庫全書御製樂善堂全集定本卷二十八
  hash: sha256:53b93c8776c4ae023290f9609df2bf43148cb71b4848c35ba328e4d1174a9b6c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0003_WYG_032-1a, image: WYG1300/WYG1300-0515c.png}
body:
  text: 今體詩題唐岱畫頁峨嵋鋪雲春入岡巒暖欲烘翠雲鋪岫淡𡨕濛寺臨峰頂嵐煙護閣跨川梁霧氣通疑有王喬乘碧落那無列子御清風海塵任起石山下長對方壺弱水東秋澗鳴泉滴滴復淙淙飛泉挂玉峯聼時秋韻肅望處翠煙濃丹改寒楓葉黃添細草茸披圖饒逸興擬欲䇿孤笻瀟湘煙雨瑟瑟瀟湘煙雨秋憑將妙筆寫風流蒼茫雲水望無極佳句都輸趙倚樓湖山春曉我愛湖山好春來景倍嘉和風吹淡蕩遲日麗穠華桞岸青垂縷桃溪錦疊霞新針抽嫩稻碧葉暗踈麻峯黛疑靈鷲波光是若耶輕舟浮水靣芳徑引山家渲染毫添潤遊觀興自賖何須蠟雙屐小閣坐烹茶山雨欲來南峯北峯雲布千樹萬樹風生獨憑危樓望逺忽然簷滴琴鳴逺浦歸帆天末見扁舟頃刻來前浦塔院晚鐘聲客船一夜雨浮嵐暖翠宿雨含朝潤浮嵐望處深溶溶流碧水羃羃暗踈林萬壑輕風度重溪暖霧沉髙低煙翠裏終日愜登臨煙浮逺岫水閣臨波結搆竒秋澄千頃碧琉璃何人間倚危欄望正是煙浮逺岫時漁莊雪霽把釣寒江雪送歸瓊瑶埋徑認依稀點空逺色迷前墅積素遙岑對野扉此日定知魚不餌長天乍見鳥孤飛晚來簔笠簷頭挂隱隱村墟淡落暉夜坐月滿忩櫺風滿簾地爐銀燭暖帷幨更因靜坐聽逾永詩到寒吟興屢添梅插幾枝供繡佛香熏一炷閲楞嚴於今識得清涼樂向火何曽為附炎水雲榭雲無心出岫水不舍長流雲水相連處蒼茫數點鷗坐席生煙雲石欄俯秋水空眀是我心何如漆園史讀王安石傳保馬青苖次第行纍朝成法忽新更難將知己酬神廟都為違人用惠卿當日司權原作福昔年辭召豈真清試看安石居然出不道蒼生轉􅍔生幻景四詠鐵馬雨夜風晨夢裏驚青驄去後只聞聲嘶殘落月溶溶色響動深閨脈脈情丹鳯城頭還獨宿祁連河畔鎮孤征將軍功與雲臺並幾見臨風血汗生鏡花箇裏春和分外長不隨代謝鎮芬芳香塵如霧何曽著綵蝶成羣那覺忙階畔日暄同借暖簷間風度共飄香仙家若把壺中種詎向人間見阮郎水月一顆眀珠鏡裏涵氷輪孤影印千潭妙圓俱足真無礙形色難求最好參風動波紋光似燭水含雲影碧於藍池邊掬起還慿手歸路須盛無底籃蟬猴久竹青寧生不休阿誰妙慧製獮猴蛻身粧出看新巧薄質生時憶去秋深館三更人共舞江陵千里客同愁萬年松緑磁盆淨時綴髙枝最上頭冬夜憶平郡王暖閣熏爐刻漏移間情萬里憶相知髙齋趣永三餘樂絶塞風寒列戍悲約計凱旋應指日欲緘書寄更無期難堪剪燭清吟夜念到寒更毳幕時冬夜食哈密瓜異域稱竒品中宵潤客腸霜刀剖翠質氷齒嚼黃瓤清解心頭渴甘生舌本香東陵無此種包貢自西方龍翰傅先生蒙恩簡署司寇詩以賀之一紙宣麻特進班虞廷弼教典秋官平情早識懸氷鑑紏惡仍然領豸冠階秩頻膺八座貴絲綸榮錫五雲端從知刑措襄王化台斗星眀傍日看逰蕉園氷牀聲裏過長湖逺岸人行似畫圗雪覆蕉園松突兀雲生古殿路虗無南臨太液風鈴語北望瓊華塔影孤屐齒幾畨逰歷處寒林已聼噪歸烏賦得自鋤眀月種梅花溪畔梅花欲放遲數株分種傍階墀鍤翻夜月和香動手握寒根帶影移花信漫愁催落蕊畫楹初有照來枝何須秉燭尋幽趣舉首氷蟾未墮時與唐岱唐善畫山水范緩倪迂自古人而今繪事數唐寅安排邱壑渾無迹盤礴丹青别有神逺塢人家煙淡淡野橋流水石粼粼買山不用間尋訪倩爾拈毫眼界新百衲琴汧公精物理百衲製名琴見説風流極悠然山水心桐孫勞細綴焦尾漫相尋指上宫商辨誰知絃外音題易祖栻墨竹卷翠掃琳琅繞曲池東坡妙筆寫幽姿一聲清籟露華濕萬箇寒梢月影披想像笙簧吹颯沓依微煙靄辨參差香篝銀燭消長夜恍似瀟湘晤對時雪事八咏東郭履雪敝履雪中行皚皚滿地平無須憐玉趾真是踏瑶京晃朗花紋綻蹁躚鶴步輕等間藍縷客東郭獨傳名蘇卿囓雪寂寞窮荒北飄颻凍雪凝飢腸寒可供浩氣餒何曽聊共氊毛囓從知苦節勝少卿難共喻心事冷如氷袁安卧雪雪深門巷逈僵卧有餘清不作干人想何煩除道迎漫空飛淅瀝撲户轉輕盈素履幽人吉千秋仰令名謝庭咏雪謝家誇寶樹咏雪一庭同獨許閨中秀渾如林下風無心裁綺句有意惜飄蓬何幸三春桞能兼造化功王恭涉雪朝罷催歸騎天街微雪連喜看三白瑞低覆九衢煙緩度髙輿穩輕披鶴􅌁翩窺籬人落魄驚許是神仙孫康映雪積雪夜談經寒光映滿庭雲鋪難逐月冬破乏囊螢豈為憐飛白聊資照汗青朗然消萬慮眉目覺清泠陶榖烹雪削玉更鏤珠寒烹清味殊天香沁肺腑冷色上眉鬚玉食何須羡山厨且自娛羊羔千斛醉漫愧黨家奴程門立雪洛學先生啓巍然道德崇雪深雙户外樂永一庭中久立情靡倦端居興不窮伊人非耐冷應為坐春風題董元山彴圗山境忽窮處潺潺野水流慿誰添略彴引我度荒邱澗草深藏鷺巗藤細舞虯幾株枯木冷一片白波秋挂壁延清矚橫溪足卧逰愛耽風景别不必問孤舟題鄒一桂花卉十二幅杏春雨胭脂洗嫩華幾枝濃疊赤城霞雙鸞恆在雲深處不遣飛瓊到阮家梨比桃清絶比梅妍風送嫣香戶牖傳寂寞雲鬟不堪整惱人天氣暮春天芍藥繁紅艷紫殿春餘第一揚州種色殊逞盡風流還自恨被人強喚是花奴紫藤紫藤花繞蒼松樹嫩蕊垂垂麗幾多一夜西風吹白露還輸老幹耐消磨葵金盤向日如承露憐爾傾心為阿誰午靜花磚風影直將開又是最南枝碧桃薄縠輕綃麗午風畫堂人靜暮春融重門難把芳心綰獨露一枝深院東酴醿羞與羣芳爭冶艷每於幽處見丰姿但教香色尋常在莫恨人間知不知虞美人一曲虞兮愴别神徘徊猶憶楚江濵那知愛玉憐香者不是當年姓項人山丹斕斑瓣纈黃金點錯落花擎赤玉盤砌畔落殘供上藥旁人漫作女兒看石竹也向人前稱此君一叢翠帶襯紅雲但教色媚時人眼漫説檀欒獨出羣牽牛脆蔓芳葩繞竹生錦裳披就下瑶京莫耽佳麗人間樂河畔盈盈最有情菊花看到東籬覺有神風流畫史更詩人素華獨殿羣芳後箇裏原藏萬卉春甲寅元日立春青陽韶運會三寅節應王正景倍新萬彚欣沾元旦雪是日瑞雪百年喜遇嵗朝春昭融氣協鴻鈞德浩蕩天開大造仁獻嵗椒觴還獻夀永綿福履祝君親雪消皓素漫空映綺寮春回大地凍全消光凝玉樹寒深淺水潤蘭階影動搖梅已過時添舊蕊桞將應節放新條朝來最喜霑濡足指日芳畦透麥苖春曉緑野朝煙斂春生料峭寒披衣間獨步曉日正三竿興逐東風去心隨大地寬桃花開也未聊復倚欄看上林花氣户外春光到幾分嫩紅新緑間繽紛清浮玉露瓊葩潤芳透珠簾沉水焚散彩偏承晴旭照飄香多為惠風薰錦叢繡徑經行處蛺蝶驚飛已半醺清明前三日御試命和唐人韻口占應制千紅萬紫正紛紛暗引尋芳蛺蝶魂欲識太平真氣象五風十雨杏花村榆莢雨紫房鑄出沈郎錢庭院霏霏散暖天最愛一朝榆莢雨買成十里桞絲煙春雲淡蕩凝佳氣氤氲散逺天點空晴旭漏出谷晚霞穿麥隴將翻雨花街正羃煙天衣誰為織髙映九霄鮮題唐岱倣古十二幀翠滴螺峰絶點埃幾間板屋面波開為穿曲徑通幽處惹得逰人杖策來蕭寺髙臨雲壑秋一聲清磬萬緣收却教健筆圖清勝好與詩人作卧逰閣跨眀波映水紅開忩不斷芰荷風巨然一幅風流意都入雲煙淡抹中飛流瀑水㵼銀瓶散作平湖漾碧泠最愛髙樓臨樹杪好山濃入四時青米家家法有誰傳渲染煙嵐逼老顛最是披圖堆濕潤江南五月熟梅天桃蹊桞徑行行逺水郭山村處處幽日暮髙齋讀書罷一篙新緑泛澄流宗派吳興皴法竒千巒萬壑正秋時雲間髙閣依微辨為愛拏空松柏枝板橋幾曲接回塘煙樹迷濛晚影蒼欵乃一聲人卧月不知身在水雲鄉翠含眉字列遙岑亭子臨波暮靄沉淡墨天然饒氣韻由來逸品數雲林兩岸猿聲一葉舟客忩鐘醒夢魂留羡君圖寫生綃裏朵朵芙蓉天際浮七尺青竿五尺綸春波鏡面色鋪銀一聲長嘯滄浪濶不羡當年釣渭人胸中邱壑三冬瘦手底瓊瑶六月寒大地忽教成一色凌兢擬踏馬蹄看甲寅三月上耕藉回鑾迎駕恭紀昭蘇景物正勾芒千畝躬耕典制詳禹甸三春榮草木周官六禮煥旗常均平何用郊人耨豐稔遙占太史祥最是聖情勤保赤歡騰父老列成行御苑親推步玉田青旗搖曳引祥煙九重雲擁千官仗萬卉春和三月天樂奏回鑾鳴鳯管禮成帝藉紀瑶編前期時雨霏微灑早卜寰瀛大有年淡蕩和風霽景開天間十二駕龍媒香街幾里花如霧繡陌千塍車似雷華宇共霑恩澤普御園羣仰聖人來迎鑾踊躍葵忱切獨愧凌雲獻賦才讀董仲舒傳不問蒼生問鬼神猶蒙宣室席前親誰知寂寞江都相老抱春秋一逺臣同五弟舟過萬夀寺小憩桂棹輕移過水村午風吹送給孤園繫舟鴈侣同登岸迎客山僧逺出門古殿燈眀佛日照齋厨火爇野蔬溫緑楊十里連歸路弄影寒鴉語更喧御園從耕恭紀六韻上苑土泉滋躬耕膏壤肥禮因加帝藉心是念民依水暖流塍細光融向午暉省耕廑聖慮終畝沐恩輝種布珠塵墜犁翻玉屑飛農勞誠可念豐稔願無違積書巖河北層山巖有石室室中若有積卷故名見水經注杳杳層巖裏依稀卷軸重瑶編餘鳥迹石室有雲封何異金泥密空懷玉檢蹤草青書帶細苔碧篆題濃靈籙誰能識神仙或可逢洞天多祕藏躡履欲相從蜂衙百忙忙裏過三春曉色催衙欲放晨釀密應教輸玉府添丁何事按魚鱗花間户牖重重邃門外風光日日新採得瓊葩無限喜更看歸仗簇前陳賦得沙留鳥篆斜好鳥離芳樹春晴下錦沙繁音奏絲管古篆印龍蛇紛錯蒼苔偃縱橫緑字斜蹄迒誰為辨新漲莫教遮轆轤聲渌水漲平湖春田轉轆轤耳根鳴斷續眼界樂霑濡漫厭繁音急從觀生意蘇機心緣力稼不與漢隂殊蟬始鳴濃隂一帶暗溪煙曳響新蟬噪午天曾記昨年嫌聒耳今朝初聽轉生憐緑林髙處弄微聲似話寒暄最有情向晚臨風吸清露枯枝遺蛻認前生春園幾日罷流鶯又聽新蟬嘒嘒鳴誰道耳根難擺脫請君聽取噪前聲御製樂善堂全集定本卷二十八
