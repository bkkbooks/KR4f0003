body:
  text: 乾隆二十三年六月十五日奉上諭近日偶閲樂善堂集縁初刻所存巻帙頗繁其中多有不甚惬心之句昔人云文章千古得失寸心朕非悔其少作博不恡情去留之名政以隨時删訂則今昔詣力所到端可藉以自騐其令内廷諸臣悉心校閲分擬應存應删簽貼進呈候朕裁酌重訂定本以付剞劂欽此
