  - {type: page-break, offset: 0, content: '', id: KR4f0003_WYG_020-1a, image: WYG1300/WYG1300-0414c.png}
body:
  text: 古體詩長春春華秋實催年改繁卉辭條想弱蕾駐春惟有月季花點綴四時勝剪綵緑葉雜間深淺紅亞盆巧笑凌東風不笑東風放花色惟笑東風吹不得二月十一日晚烹雪水偶成仲春漫天飛瑞雪不異甘霖及時節預卜二麥兆豐收田夫村叟咸歡悅吾曹此樂正有餘清興更與尋常别呼僮藉席為收取滿貯磁缸水甘冽晚來活火事煎烹一甌香乳看清絶自啜自省沁詩脾銀蘭熖長光明滅因思上蒼霏瓊霙祗緣大地春方茁如何吾曹擅妄取但為口腹供飲啜復思此法古有之清味不須和梅齧吾曹所飲能幾何萬物資生亦不缺竹爐茗碗相周旋哦詩夜半寒更徹春蔬春融地氣如膏滑一畦煙甲隨雷發簷前小鳥喚春眠裛露擕籃勤采掇早韭初菘紛列盤清芬細嚼氷齒寒淡泊有味取次領旦晚為爾還加餐君不見一食千金丞相府猶説區區難下箸雨前茶穀雨前春雷後色染鵝黃新上栁擕籠男婦溪山走爭試採茶三昧手日烘山腰暖碧雲槍旗半吐搖酣春賣與商人博衣食徒勞曾未沾其唇伊余品泉逸興賖啜罷還憶貧民家新絲新榖都已賣即今又賣新芽茶古意好花早萎謝佳人半憔悴天非惜雨露尤物人所忌寶鈿羞黃金傅粉奪珠翠清曉臨荷池脈脈含愁思上開並蒂蓮下有雙鴛睡繁英且耐時接翅緣同類一朝秋風凄中路還乖異物理有如此那得長相萃惆悵倚朱欄旁人詎解意寧為山下草不為山上松雨露苟及時榮長爭茸茸憶昔當結褵原以託始終如何顔色改棄置等飄蓬青樓繫玉騣凶鬯匕二八桃李容君脫紫錦裘貰酒擊歌鐘不念貧賤時以我曽禦窮灼灼海棠花關關黃鶯兒綵袖倚闌干眄彼芳菲枝芳菲豈常住况復鶯語遲離愁已若此會合應無期素手援龍梭織成回文詞回文有斷絶此恨無已時綿綿洛陽道道旁何所有多見送行人悲歌折楊栁楊栁折不盡絡繹驅車走願為路上塵逐君馬蹄後君行求富貴金印大如斗還恐宦途艱榮華不可久何如早歸來與君長相守樓松即偃蓋松也見抱朴子盤山之側雙株松拏空森竦翠色濃落落不改四時色蕭蕭獨韻三秋風幾年驅車薊州路摩挲古幹不能去高聳浮圖帶野煙平飛畫棟凌雲霧品題曾記抱朴子樓松鬱鬱差相似梢振寒聲捲浪濤根蟠巨石疊階戺當時銅雀已成塵此樓獨占千年春婀娜何曾貯歌舞幽祕或可棲仙人可憐路旁桃李枝陽和發育爭參差西風搖落無顔色空令獨樹含清悲安得韋偃寫直幹倩伊圖入鵝溪絹挂壁涼颸鎮日秋坐卧青雲眄銀漢王叔明山水圖吳興王叟風流客愛向生絹寫丹碧畫家六法占高科氣韻生動神奕奕粉墨慘淡費經營懸之高堂滿秋色胸中邱壑鬱盤礴安排三逺畫家有高逺深逺平逺之説無形迹主峯聳峙客峰赴山帶溪流相絡繹溪邊釣艇任風斜溪上人家隱竹柏仰睇高渺若無路梵宫忽向青冥闢千尋石壁挂瀑布匹練遙空瀉飛白盤拏撑突老松枝三面畫法石分三面還看多怪石筆思縱橫奪化工恍惚煙雲生几席摩詰風流難再續此圖珍重等球璧大理石牀歌皚皚雪質排雲黑葆光含潤如球璧來從滇南萬里遙量度長材越數尺良工琢磨成匡牀紫檀為架文錦席天然山水石紋間倪黃手迹橫空碧窈窕洞壑藏神仙瀑布飛流挂松柏峯巒層沓雲氣深灘頭溪尾相連繹坐中恍惚秋風生何必買山娛泉石春暮西厰騎射離離紫陌花苒苒暮春天紛紅一以萎緑楊全鎖煙可惜流鶯語驚起曉窗眠秣我青驪駒策我珊瑚鞭乘興聨騎去晴郊草芊芊馳射平原中隨意娛芳年君看女夷功三月韶華鮮九十彈指過有似箭離弦何如無心者萬物任其然榮華何繫戀風過百花穿維時日西下歸鞍三五聨有客興春緒中懷凄以牽勸君莫傷春四時相代遷與君消惆悵瀹茗烹山泉即此目前景可味南華篇移碧桃園中碧桃樹滋生隨處有日久未剪治叢條覺漸醜遊賞寂無人隱榮山之後嗟哉繁華姿棄置誰之咎幽齋一日間呼僮荷畚走叢者去其雜隱者出諸藪移植小池前間以垂絲栁三月花盛開殷紅映紗牖桃兮不徒榮報我亦已厚我既悟此理願告灌園叟良材莫使淪嗟爾能聼否髙其佩指頭畫虎鐡嶺老人閻李流畫不用筆用指頭縱橫揮灑饒竒趣晚年手法彌警遒為吾染指畫蒼虎氣橫幽壑寒颼颼落墨伊始雅雀避著色欲罷豺狼愁怒似蒼鷹厲拳爪炯然霹靂凝雙眸萬里平川望無極三株古柏拏龍虬老人閲世如雲浮獨於畫法未肯休此圖贈我實手迹筆繪還輸第二籌髙堂晝靜風生壁却憶行圍塞北秋水竹村清溪左右環緑玉參差繞悠然水竹村迥絶塵氛擾細籟韻琅玕月鑑澄光皎中有靜觀人託興何幽渺春漲起平波小園發新篠可以釣修鱗時或集佳鳥披書緑窗隂得句蕭齋曉訪客過溪邊回望叢篁杳有鳥二十章孔子教小子曰詩可以興又曰多識於鳥獸草木之名鳥獸草木中觸吾性情有興機焉若徒追琢字句強裁聲韻烏可與言詩哉唐元微之作有鳥二十章備載鴟梟老烏諸惡鳥之可憎雖疾世之憤辭然不失三百詩人之旨余讀而慕之倣其體亦成二十章所詠者皆鳯皇鵷鷺諸名禽微之以刺而示戒余以美而示勸其有助於性情一也至於風格之髙錘錬之雅余固未能及古人觀者取其意而略其辭焉有鳥有鳥百鳥王雄為鳯兮雌為皇朝棲崑圃飲玉露夕宿蓬島餐琳琅九苞六德耀文明恢恢天宇恣翺翔厥惟聖人修至德來巢阿閣呈嘉祥藹藹吉士馳王路千秋萬載邦家光有鳥有鳥名朱鷺波靜昆明常顧步漢鼓曽標樂府聲周舞亦載詩人賦振振有序羽翮聨和鳴未許雜孤鶩玉筍班中識爾名由來博得人人慕有鳥有鳥雙鴛鴦接翼交頸遊方塘共宿蘭沼何容與同飛鏡浦相回翔若有人兮翠袖裳思夫君兮天一方春朝步兮春池旁覩佳禽兮增慨慷有鳥有鳥在水滸飛鳴行搖如相語如相語相急難相急難兮食不安逺羅網兮泛清瀾啄蘆頭兮心共間君不見悌有鶺鴒孝有烏人稟秀靈如不如有鳥有鳥聲緡蠻遷喬求友出谷間楚楚金衣緑隂裏諧鳴玉管呌春闌髙齋日午簾幕悄側耳徐聼音未了生平不少素心人關山迢遞豫懷渺有鳥有鳥曰靈鵲羽族本天似先覺但不告憂惟告樂惠迪則吉宜忖度慿兹作喜易舛錯鳥智人愚非見謔有鳥有鳥名布榖髙喚枝頭村栁緑村老聞聲急荷鋤趂時耕作還相朂東鄰西舍催耕遍喉吻苦乾飲水曲不似籠中雙畫眉巧言但博主人肉有鳥有鳥枝上啼啼聲風送到深閨聲聲催織當春日織女聼罷顰雙眉飽蠶方作繭那易成新絲新絲還要賣匹帛安可期我願拖綾曵錦者常念茒簷忍凍時有鳥有鳥如輕舟毛衣皓潔名沙鷗穩宿洞庭秋夜月間泛瀟湘煙水流將雛命侣頗自得對爾還似逍遙遊有鳥有鳥名鴻雁秋去春來期不變成羣飲宿向沙洲蘆葦蕭騷波瀲灔古人重爾信義敦嘉禮親迎用致奠如何世人轉不如糟粳富貴分欣厭有鳥有鳥雉將雛雛兒聲澀學母呼壠上風搖麥浪緑引雛拾蟲却相逐大堤年少挾金丸見雉此意不肯彈彈雉雛兒誰為哺彈雛却憐雉心寒收弓擲丸不復看有鳥有鳥慈烏鴉飛集庭樹聲啞啞聲啞啞引其雛羽毛翩翩尾畢逋尾畢逋雛亦長烏老更借其雛養母為慈兮子為孝禽鳥亦識人之道有鳥有鳥清秋隼獨韻金風利爪吻徑氣狰獰似駿驄眼疾身輕雙翅敏晴臯一下萬山青狐兔燕雀藏伏盡有鳥有鳥名黃鵠軒軒霞舉超凡俗矯翮翩躚來玉京却向太液池邊浴隨仙去後空餘樓入琴彈罷猶思曲冥冥灝氣恣翺翔引我欲窮千里目有鳥有鳥雲錦文巴山靈禽夙所聞的的彩色映日麗煌煌繪羽翻風新竒姿藻耀欺凡鳥雕籠飲啄為君老却勝塒頭村雞鳴瘦立風霜報天曉有鳥有鳥呈符瑞援毫作歌紀其事伊昔明皇即位初貝州飛蝗害苖穗乃有白鳥凡數千一一喙啄蝗盡斃當時姚宋作相公調和燮理稱郅治開元天寶易治亂玉妃擅寵昭陽殿祿山食人如食禾嗟此蝗兮可若何安得白鳥大如蓋食此蝗兮安內外有鳥有鳥志不移銜石填海無巳時海却何時滿石亦何時斷但見羽毛秃兀爪喙疲咄哉汝鳥尚有志人而無志鳥所嗤有鳥有鳥雙白鷴清秋玉立菰蒲灘踏波緩舞藻文動澄流照影翩珊珊性情髙潔如其色自首至尾無點黑俗眼欲看看不得有鳥有鳥金翠斑厥名孔雀産巴山産巴山來帝里屏張藻耀文眀起羽儀為國獻嘉祥不甘戢翼巖阿裏有鳥有鳥雲間鶴萬年枝上欣所託徑羽梳風意態孤清聲韻月響深壑常伴仙家丹鼎煙不慮虞人施矰繳有時灑翮一髙飛迢迢天路翔寥廓采松花緑蘚遍松隂松花帖蘚落嫩黃映深碧清香入簾箔我持碧筠筐采采盈筐著服食為清心非欲驂元鶴新漲雨餘眄蘭沼泛瀲新波漲碧沚蹙羅紋紅荷搖翠浪新浴鷗鷺羣沙嶼遙相望我欲置扁舟鼓枻空明上讀蘇子瞻題司馬君實獨樂園詩即用原韻插架萬卷書隨手自拈下披覽結遐心似遊霄雿野當時獨樂園溫公開樽斚清吟薄雲天曠談述虞夏洛中九老人來往涉風雅事同東山遊迹非白蓮社東坡生花筆自是天假者題詩盤硬語曲高和者寡獨樂悅性情衆樂看陶冶惟公入朝時衛卒擁其馬惟公入園時一切浮榮捨蕭然物外遊不似歌渥赭猗歟匡濟才間情寄嘔啞觀刈麥麥苖入夏結穗黃東壠西壠碩且長老農此日走田忙腰鐮遍割樂嵗穰笑看黃雲各成片密莖隨手行行亂肩挑背負晒簷頭饘粥有餘他不羡呼兒莫逐飛來雀令渠亦識收成樂雨後聼溪聲流雲猶在青天上霽景澄鮮風蕩漾因風泛起是何聲但見溪頭新水漲溪流宛轉繞芳堤采采蒹葭覆水齊宿潤全滋菡蓞色新晴不斷鸊鶘啼鸊鶘啼處煙波繞直瀉流泉鳴未了決決長疑珮響搖潺潺低咽琴聲悄耳根塵雜苦訇轟入聼從教洗滌清我非智者亦樂水幽情逸韻相交并幾度臨流間徙倚風力漸停溪漲止莫謂溪聲斷續殊動靜循環理若此熱連朝祝融氣正作碧落無風雲腳破揮扇招涼涼不來匡牀暑熾誰能卧我思上蒼運四時祁寒暑雨原相佐冷暖由來有定期怨咨自是人心過平情可得避暑方深屋下簾獨靜坐讀書樂周孔未云逺典籍良具陳深造乃有得面墻終自淪伊余本下學敢忘書史親轉念學海濶未易窺涯津汲古乏修綆貽誚腹笥貧昌黎讀書篇字字堪書紳况復饒至味好與結芳鄰樂意寓靜觀優遊期日新秋蘭崇蘭泛清飇婆娑翠帶長采采欲誰贈徘徊步中堂露彩含莖潤日華映蕊黃蜂蝶不知采古淡含幽光我持金剪刀更擕緑筠筐非為紉芳佩愛此王者香投壺秋風動簾幕曉隂忽開晴中堂聚嘉客投壺怡我情一中詎云巧三辭禮亦成勝負不相角新詩還共賡餘韻雜踈籟入耳聲琤琤蓍簮吟韓詩外傳載孔子遊少源之野有婦人中澤而泣使弟子問焉曰鄉者刈蓍薪亡吾蓍簮弟子曰刈蓍薪而亡蓍簮何悲焉曰非傷亡簮也蓋不忘故也余讀而有感焉作蓍簮吟憶昔妾簮蓍結䄜事夫君和鳴如鼓瑟自卜將終身妾失蓍簮日乃在彼中澤良人天一方誰能覔其迹妾泣亡簮非泣簮可憐郎心異妾心君不見新衣稱體舊衣捨世間誰泣亡簮者擬杜工部東鄰棗樹歌春光晼晚春風斜東鄰棗樹方開花大火西流屆秋日東鄰棗樹紛結實開花結實年年好催得東鄰人欲老兒童不解惜流光但愛秋來飽吃棗西鄰有客常著書閉户不出一月餘東鄰棗亦覺少否不似王吉誇出婦鬬蟋蟀百草收芳秋瑟瑟烏衣王孫應候出兒童不解秋聲凄延入髙堂甓為室甓為室甕為城厲鋒養鋭期相爭甘芻好飲供其腹豪氣凌秋喙爪速是時晶陽照華屋兩童角勝誰輸服乘間偶作壁上觀沙場不見戈戟攢當前勇力先手搏怒氣奮張敵膽寒濶顙修腰振兩翼牙排利鋸目如墨羽林十二漢家郎蟲達功髙居第一軒鬐仰面試長鳴臨敵拏攫如鷙英草間竊伏堪鄙笑陳前持重功方成功成破敵立不動應機變化多操縱黃髭鮮卑見股栗獨身跳免呼伯仲燕然峯上勒勳功蠮螉塞外靖邊烽定州花磁賜湯沐飛將軍是人中雄須臾角罷兩童起負者蹙眉贏者喜呼童來前聼我言自古興衰皆若此楚漢雌雄迹已陳三家鼎峙徒紛紛將軍汗馬功難並鐘鼎勒字生埃塵獨不見開元天子宫內宴玉妃小賭昭陽殿金籠不啻十家産萬金之資費一旦又不見咸淳丞相半間堂翠盆香褥臨秋張但愛山河鬬蠻觸那知六載圍樊襄由來此物亦有時榮華昔日今安之浮生誤落汝童手驅之陳戰焉能辭一朝偶敗非得已應看再戰出新竒聆我此言氣始釋梧桐月上天將夕匡牀靜倚未曽眠更聼盆中鳴唧唧御製樂善堂全集定本卷十六
