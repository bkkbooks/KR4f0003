  text: 欽定四庫全書御製樂善堂全集定本卷二十一
  hash: sha256:d4122e3d2fef7b8f9be239815ccdad4530ab81ff2b0317bc60edcb49adf3a461
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0003_WYG_025-1a, image: WYG1300/WYG1300-0455a.png}
body:
  text: 古體詩題劉松年武夷九曲圖憶聞之蔡先生武夷層巘嵐煙碧水墅山村變朝夕桃源祗許一舟通就中疑有神仙跡聞之先生八閩客為余曾說山川僻當時興寄玉筍峰嗟吁道阻未尋屐錢唐筆墨超凡格半幅霜綃圖咫尺題詩九曲足卧遊還似書窗話疇昔少年行邯鄲美少年平生好仗義白日佩劍出里門一聲叱咤千人避捨身只為意氣投生憎富貴誇交遊為君復讐望君報千杯一醉酒家樓雨夜窗響芭蕉曉荷亞洲渚誰知夢覺中一枕新秋雨牀頭蠟屐閒起走繞廊柱葛衫不禁風微凉添幾許同五弟月夜舟歸湖波㶑灔當秋澄一輪寒浸秋月明上下清光星斗燦輕舠打槳中流行萬籟閴寂天在水蘆葦㸃㸃飛流螢長空泬寥堪妙㑹鴈行拈韻欣同賡詩成泊岸松窗卧還聼沿階蟋蟀鳴逺將歸欲别恨時促將歸恨日長庭前繫馬雙垂楊為君再整羅衣裳去時路即歸來路别後新歡應勝故記得曾攀弱桞枝即今瀟灑成枯樹今宵夢不到天涯垂垂銀燭初成花欲訴離愁猶未了一聲雞喚東方曉城門歌城門閉兮言路開羣驚鐡騎燕山來城門開兮言路閉處堂燕雀欣得計同盟已誤復和親坐令汴水成灰塵小舟黎陽渡五日却笑南朝無一人君不見當時首禍由童貫才見邊烽先鼠竄廢宅行蛛絲密織珊瑚箔銅扉雙敞堪羅雀花開寒砌為誰妍鳥啄風筝珠玉落當年甲第禁人窺此日塵生祕閣帷繚垣欹倒村童入折取庭前丹桂枝老翁驚視傷𠂻曲憶種茒檐領芳馥薰人勢焰强移栽曽拆儂家數間屋蓼花風秋潭徹底清岸蓼紅低映西風水面來娉婷舞腰競蒼茫蘆葦花寂寞芰荷柄日落晚煙橫韻寫寒芳淨有所思置酒髙堂上聼歌有所思所思在何處迢遞天之涯有惠雙南金不如心相知南金用有盡相知無已時眄彼中庭樹忽生連理枝連理非為貴所貴不相離同心而契濶咄哉徒含悲月夜蘆洲似雪蘆花滿洲渚搖曵西風夜深語喚回清夢水亭幽秋色秋聲迷處所清光㶑㶑月在江隱映漁舟過寒浦雲臺歌紫氣欲奪炎天赤南陽布衣提三尺昆陽一戰掃豺烽洛中布治敷天澤攀龍附鳳為侯王二十八將名煌煌中興功烈資贊襄雲臺圖貌千秋揚君不見淮隂葅醢英彭死子房從遊赤松子何似榮名保始終卓哉君臣能濟美除架白露零場圃瑟瑟西風寒可憐含甲蔬生意忽摧殘垂架青青葉引蔓已半乾呼僮為除治蕭然景物䦨猶喜逺山翠乍入踈窗觀無須感代謝漫愁乏盤餐冷畦旋種韭㑹當凌霜攢秋原草迷離鋪翠露珠濕村郊寒颭西風急錦蹊繡阪憶春遊秋光滿目扶笻立霜林葉落叠殷紅猶疑紫艷堆芳叢寒雀成羣噪新霽平原晚景煙濛濛漁舟唱晚蒹葭戰夕風明霞入澄水罷釣蕩漁舟欸乃波面起雲山列逺屏坐卧鏡光裏孤篷掛玉鈎濁醪宴妻子短笛咽凉颸詎解調宫徵秋來景寂寥漁樂獨無比秋浦泛舟西風拂水煙波緑櫂過寒溪三四曲采采蒹葭颭白花臨流驚起雙鷗浴雙鷗忽入芰荷叢可憐寂寞餘殘紅錦帆畫舫披薰風猶憶競渡誇天中轉眼秋湖明似鏡雲山倒影澄波靜岸桞寥蕭咽晚蟬艤舟月掛孤篷正髙其佩指頭畫魚玻璃幾頃孤煙橫修鱗數尾不辨名晴光蕩漾耀金碧泳游波面依浮萍誰知瀟灑濠梁興付與一指傳其生掛壁滄浪秋意渺倣佛當年在藻情有初行君不見晉武曽焚雉頭裘平吳還駕羊車遊又不見明皇珠玉焚前殿太真寵盛長夜宴人心靡不有其初幾見歷久常不渝當時焚寶博虛譽誰知欲熾翻焚軀漢文却馬輕千里崇尚節儉輝青史不聞號令付炎官祗覺中心淡如水八月三日作金烏才西下歸鳥集踈林乍見中秋月弄影清池深徘徊倚石欄閒望抒清吟却憶昨年秋今夕送知音癸丑年八月三日平郡王奉命西征邊陲渺天末颯沓霜風侵撫景懷契濶躊躇思不禁南仲方出車頡利未生擒月明人盡望壯士秋思沉我方宴卧餘風景聊追尋夜深蛩語咽凉露濕衣襟仲秋曲銀壺滴滴更漏長踈梧月影含秋光夢回幽枕蛩響切曉看殘荷露氣凉蓼花翻風亞洲渚驚起賔鴻飛别浦一聲孤唳碧天髙二十四絃調玉柱夜聞覺生寺鐘紗牖度凉颸桐枝弄踈影睡鴨篆紋消一榻深宵冷忽聞野寺鐘十里傳音永不知十方界誰歟發深省桑條韋桑條韋繼嫵媚娘一朝封劍斬五王後車仍蹈前車轍可憐唐室多専房本為相憐更相倚誰知祻在椒房裏神龍餤餅不可言總為龍裘欲加已嗚呼開創事亦難太宗圖治頗英賢惜哉家法未盡美致令女祻相連綿遊西海輕舠蕩入蒹葭叢波澄西海連長空雲山倒影弄明媚寂寞殘荷搖晚紅蕭齊習靜過三伏今日扁舟晚景逐煙汀沙渚轉蒼茫却憶薰風吹岸緑南苑雨中即景蕭蕭緑槐枝徹夜滴踈響檐頭喚曉頻野雀三與兩閒從閣道行金風透颯爽含潤草猶芊凌寒菊初放墻外馬聲嘶悠然動遐想雙栁樹雙雙髙栁拂長空繁枝低亞相青葱不知植此者誰氏秋來踈葉凌西風露浥平原獵騎出得意誰知消嵗日南苑徘徊雙鳥飛煙栁蕭條僅存一漫言草木本無情可憐獨樹傷無朋寒郊倣佛靈和殿月上空餘孑影明海子外行圍朝霧斂秋空遙天白如水獵騎出郭門寒郊行邐迤箭逐雙雕飛鷹伺羣雉起相逢倚杖翁農話斜陽裏悠揚墟里煙淡掛踈林紫歸鞍拂晚風獵罷心猶喜鷹搏兔風吹衰草寒颼飀蒼鷹在臂凝霜眸瞥然狡兔走平疇三窟已失空含愁髙盤雲翮孤星流厲爪下擊勢更遒怒氣一奮誰能收嗟彼韓盧有技徒增羞嗚呼汝鷹性匪柔却邀富室千金求古來英鷙半埋沒凡雀嘈沓何其稠南紅門捕魚煙蓼亞寒汀澄波漾秋浦垂綸玉鏡明潛鱗堪指數蕭然秋意深數聲離岸櫓漁笛橫西風雲山入新譜寄衣曲夜凉漏永聲鼕鼕征衣自裁還自縫素絲牽恨紛難理銀釭照淚闌干紅香閨無那秋蕭索頻憶龍堆朔風作及時遙寄禦君寒只恐到遲君不著瀚海石子歌昔聞瀚海石子竒今日几席得玩之瀚海渺在天之涯草不抽莖樹鮮枝春光罕照秋風悲長年那得雨露滋其中産石羌誰為嗟彼從軍戍邊陲更過萬里無歸期故人天末相贈貽開匣忽覩光離離逺寄用表長相思紅如珊瑚碧琉璃硬黃深青各有差大如雞卵未剖時小如叉上紛珠璣亦有竒峰異壑姿天然那事追琢施感君贈我置藝帷長日靜對心神怡髙歌消得梧月移吁嗟故人知不知濬沼圓池寬數畝秋水涵清虛植以芰荷花畜以文錦魚嵗月既云久其下積泥淤潑剌礙遊鱗相忘憶江湖物亦含其生與人豈異趨一朝深濬之爰為安其居快哉玉鏡中潛躍隨所如何殊濠濮上撫景襟懷舒題唐岱秋山不老手卷唐生胸中有廬霍為余一寫秋山狀毫端氣韻擅蕭踈􅏀壑縱橫出心匠逺峰螺髻翠欲滴飛龍直下噴銀浪招提想像晚鐘鳴森列松杉作屏障我聞山水貴可居卧遊亦足娛清曠展對蕭齊秋意深拂拂金風侵几上賦得霜花撲曉韉山路散晨光行人殘夢醒欵假嘶寒風落月挂斜影空林霏素霜萬壑朝嵐靜愛日晃征鞍㸃滴留清冷倣佛踏春遊花落餘殘景題李思訓寒江待渡圖輕嵐淡抹西風肅征人趂曉紛馳逐啞啞羣雀噪渡頭漁舟猶伴殘燈宿千林紅葉正凋殘欲落未落古月寒勞勞名利何時歇一幅寥蕭几上看風篁笙奏明窗愛日多几案光生暖檻外竹千竿翠影欣踈散何來笙簧韻寥寥風送逺繁節乍敲鏗低拍殊幽緩清如嘯遇孫勝比咸撥阮漫云耳根囂天籟三千滿雀噪東方欲生明纎月西南落平林曙景通啞啞鳴寒雀霜風斷續吹繁音轉髙閣似話五更寒如語栖枝樂蕭晨入聼幽明窗興堪託愛日已三竿暖影侵帷幕快哉黃棉襖人鳥同時著冬夜對月書懷烏鵲棲穩人行少弗弗霜風窗外掃曲屏銀燭含幽光獨愛侵帷玉蟾皎地罏然炭暖氣徐俯仰丈室慚溫飽此時緬想饑寒人茅屋欷歔愁未了境遇由來不可齊消懷聊把陳篇考忽聼霜鐘送林杪踈櫺影度梅香悄喜對清光延佇吟殘更欲盡雞啼曉遊法海寺即景纎月挂空林曙鴉帶寒影匹馬衝霜風為訪招提境村墟散炊烟回首眄斜嶺扶桑耀朝暉寒谷添晴景我行已覺疲禪僧坐方靜稍然石竈烟為我烹苦茗尋古斷碑存探幽石徑永誰能問法源暫可息浮梗帝京佳氣多烟火籠萬井却供眺逺閣一覽餘清省寺有眺逺閣晴明望帝京如咫尺法海寺題壁百年蘭若雲封戶山僧靜坐絶往還我來杖䇿尋幽勝啾啾山鳥鳴空山欲落未落楓葉赤乍斷乍續秋雲閒烟蘿石徑歸路杳孤月已上臨禪關冬夜讀韋詩焚香對銀檠夜靜見明月遲遲玉漏寒萬籟此時歇蘇州五字詩披覽逸興發園客事獨繭格調殊清越七竅總不鑿安排活潑潑終卷不能釋玉繩橫未斡蠟珠謡香篝斷續蘭烟吐月窗細把長更數銀檠明滅詩思遲一天霜影簾垂户誰敲仙掌鏗鏘鳴猶疑滿斛珠璣傾却教吟興娛清夜窗外寒賡緑玉聲村賽曲老巫伐鼓聲鼕鼕冬醅初熟霜柑紅合家羅拜致䖍恭村村樂事傳豳風黍稌堆西稻堆東倉箱萬億快年豐謝神默佑恩何窮賽罷福酒先酬翁老巫牽羊别家去來年大有神應助霜曉炊煙村墟寒曙暉霜重烏啼少微辨炊烟橫旋向踈林繞縷縷披風寒依依散晴曉晨粥想已成曵篆絲漸小長祝茅簷裏歡然溫且飽嗇夫詞上林虎圈當晨開六龍飛騎官家來苑尉小臣乏口給諜諜獨顯嗇夫才霸陵漢帝稱仁厚特地褒嘉頒墨綬若非採取釋之言坐令佞者羣奔走君不見正色立朝周大夫廷議期期不出口鶴氅裘翩翩鶴氅如披銀望之直是仙中人可憐落魄籬邊者中心歆羡良艱屯君不見仙人不住人間世瀛洲方丈誰能濟長安比戶豪富家朝坐華堂暮空第吁嗟仙人不若此豈如垂釣披裘學嚴子草色勾芒鼓吹招搖東羲和御日騎蒼龍暖雲晴旭當天烘皇州十里輝春融女夷小試龍梭慢春信遲遲歸别院繁紅猶未上瓊枝嫩黃乍覺鋪芳甸光風轉蕙物昭蘇暗報陽和日日殊輕寒料峭天街曉試辨茸茸色有無萍始生潑剌遊鱗才上水嫩萍拖翠春流始牽風搖漾縠紋輕試詰生生忘所以緑髮新梳濕未乾半含清潤凌波寒誰家一匹氷紈素忽織參差藻無數石徑松雲石洞盤紆雲掩門長松落落拏雲根虬枝颯沓泛清籟幽勝不數桃花源緑隂掩映蒼苔翠仙家孤鶴偷閒睡醒來雲氣忽滿身疑是丹爐烟繞翅漁莊晚霽夕陽天外明逺浦歸帆疾吳童盼阿儂獨倚柴門日晚烟漾澄流漁莊足蕭瑟何來欵乃曲忽自叢蘆出霽影射波紅曬網棕皮室共擬金波上數杯醉椰蜜野寺殘陽斜日照林低野寺鐘魚靜亭亭塔影孤川風淡晚景片雲出岫間餘霞橫抹嶺誰歟牛背人歸路歌聲永暮色逺蒼茫金波忽流影山僧獨趺跏炷香觀平等野店風帘杏花村裏春光好人家隱映回巒抱招得遊人䇿蹇來一尺青帘挂林表輕風搖曵髙復低斜拂垂楊緑未齊曉烟羃䍥溶溶月夕籟低徊淡淡溪東皇鼓物標青幟臨風無限悠揚意韶華撩眼興陶然不緣野店新醪醉過覺生禪房十里輕隂路便覺非塵境緩轡到招提颯然松風靜禪房花木香小憩耽清景上人息萬緣跏坐觀平等徘徊石徑紆徙倚松軒永且喫趙州茶莫問雲門餅歸騎漫教催餘霞亘西嶺御製樂善堂全集定本卷二十一
